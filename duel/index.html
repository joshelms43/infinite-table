<!DOCTYPE html>
<!-- Duel — Infinite Table. Version: 0.10.0
     1v1 first-person duel. Every round ends in a draft: both players pick one
     powerup from three, first to four rounds takes the match.
     Favor-the-shooter netcode over TableKit broadcast; each player is the
     authority on their own health. Practice mode runs the same game against
     a local bot, no wire. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Duel — Infinite Table</title>
<meta name="theme-color" content="#121A16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --table-night:#121A16; --felt-green:#1D2B25; --text-ivory:#F2EEE2;
  --card-ivory:#F7F2E6; --ink-black:#24241D; --muted-ink:#6E6C5E;
  --primary-coral:#E26A4B; --primary-coral-deep:#BC4F37; --money-gold:#BE8F41;
  --p-teal:#3B8B82; --p-sky:#6394B6; --p-purple:#7F6595; --p-amber:#E0AB52;
  --line-soft:rgba(242,238,226,.13);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;touch-action:none;-webkit-touch-callout:none;overscroll-behavior:none;background:var(--table-night);
  font-family:'Nunito Sans',system-ui,sans-serif;color:var(--text-ivory);user-select:none}
#gl{position:fixed;inset:0;width:100%;height:100%;display:block}
button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit}

/* ---- combat HUD ---- */
#hud{position:fixed;inset:0;pointer-events:none;z-index:5;display:none}
body.fighting #hud{display:block}
#xh{position:fixed;left:50%;top:50%;width:6px;height:6px;margin:-3px 0 0 -3px;border-radius:50%;
  background:rgba(242,238,226,.9);box-shadow:0 0 5px rgba(8,12,10,.7)}
#xh.mark::after{content:'';position:absolute;inset:-9px;border:2px solid var(--money-gold);
  border-radius:50%;animation:markpop .18s ease}
@keyframes markpop{from{transform:scale(.5);opacity:1}to{transform:scale(1.15);opacity:0}}
#hpwrap{position:fixed;left:22px;bottom:calc(20px + env(safe-area-inset-bottom))}
#hpnum{font-family:'Lilita One',cursive;font-size:34px;line-height:1;text-shadow:0 2px 6px rgba(8,12,10,.7)}
#hpbar{width:170px;height:7px;border-radius:4px;background:rgba(242,238,226,.14);margin-top:7px;overflow:hidden}
#hpfill{height:100%;border-radius:4px;background:var(--text-ivory);transition:width .15s}
#shbar{width:170px;height:4px;border-radius:3px;background:rgba(242,238,226,.1);margin-top:4px;overflow:hidden}
#shfill{height:100%;border-radius:3px;background:var(--money-gold);transition:width .15s}
#ammowrap{position:fixed;right:22px;bottom:calc(20px + env(safe-area-inset-bottom));text-align:right}
#ammo{font-family:'Lilita One',cursive;font-size:34px;line-height:1;text-shadow:0 2px 6px rgba(8,12,10,.7)}
#ammo.dry{color:var(--primary-coral)}
#reloadtag{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:var(--money-gold);margin-top:6px;opacity:0}
#reloadtag.show{opacity:1}
#rounds{position:fixed;top:calc(16px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  display:flex;gap:9px;align-items:baseline;font-family:'Lilita One',cursive;font-size:26px;
  text-shadow:0 2px 6px rgba(8,12,10,.7)}
#rounds .sc-mine{color:var(--money-gold)}
#rounds .sc-theirs{color:var(--primary-coral)}
#rounds .vs{font-size:14px;opacity:.35}
#mypicks{position:fixed;left:22px;top:calc(18px + env(safe-area-inset-top));max-width:190px;
  font-size:10.5px;font-weight:800;letter-spacing:.4px;opacity:.5;line-height:1.7}
#hurt{position:fixed;inset:0;pointer-events:none;z-index:4;opacity:0;
  background:radial-gradient(90% 90% at 50% 50%, transparent 55%, rgba(226,106,75,.55));
  transition:opacity .3s}
#blind{position:fixed;inset:0;pointer-events:none;z-index:7;background:#fff;opacity:0;transition:opacity .15s}
.dmg{position:fixed;pointer-events:none;z-index:6;font-family:'Lilita One',cursive;font-size:19px;
  color:var(--text-ivory);text-shadow:0 2px 6px rgba(8,12,10,.7);animation:dmgpop .7s ease-out forwards}
.dmg.crit{color:var(--money-gold);font-size:25px}
@keyframes dmgpop{from{opacity:0;transform:translateY(4px)}20%{opacity:1}to{opacity:0;transform:translateY(-30px)}}
#foehp{position:fixed;pointer-events:none;z-index:5;width:64px;height:5px;border-radius:3px;
  background:rgba(8,12,10,.55);overflow:hidden;display:none}
#foehpfill{height:100%;background:var(--primary-coral)}
.peerbar{position:fixed;pointer-events:none;z-index:5;width:64px;height:5px;border-radius:3px;
  background:rgba(8,12,10,.55);overflow:hidden;display:none}
.peerbar>div{height:100%}

/* ---- forced landscape (Safari has no orientation lock — we rotate the world instead) ---- */
body.rot90{position:fixed;top:0;left:0;width:100vh;height:100vw;
  transform:rotate(90deg) translateY(-100%);transform-origin:top left}

/* ---- touch controls ---- */
#touchui{display:none}
body.touch.fighting #touchui{display:block}
#stick{position:fixed;width:110px;height:110px;margin:-55px 0 0 -55px;border-radius:50%;
  border:2px solid rgba(242,238,226,.22);background:rgba(242,238,226,.05);
  pointer-events:none;z-index:6;display:none}
#sticknub{position:absolute;left:50%;top:50%;width:46px;height:46px;margin:-23px 0 0 -23px;
  border-radius:50%;background:rgba(242,238,226,.35)}
.tbtn{position:fixed;z-index:6;pointer-events:auto;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Lilita One',cursive;color:var(--text-ivory);
  background:rgba(242,238,226,.1);border:1.5px solid rgba(242,238,226,.25);
  text-shadow:0 1px 4px rgba(8,12,10,.6)}
.tbtn:active{background:rgba(242,238,226,.22)}
#fireBtn{right:26px;bottom:calc(78px + env(safe-area-inset-bottom));width:84px;height:84px;font-size:17px;
  background:linear-gradient(180deg,rgba(226,106,75,.85),rgba(188,79,55,.85));
  border-color:rgba(255,255,255,.3);box-shadow:0 4px 14px rgba(188,79,55,.4)}
#jumpBtn{right:122px;bottom:calc(52px + env(safe-area-inset-bottom));width:60px;height:60px;font-size:13px}
#dashBtn{right:150px;bottom:calc(126px + env(safe-area-inset-bottom));width:54px;height:54px;font-size:12px;display:none}
#reloadBtn{right:36px;bottom:calc(178px + env(safe-area-inset-bottom));width:54px;height:54px;font-size:12px}
body.touch #ammowrap{bottom:calc(20px + env(safe-area-inset-bottom));right:22px}

/* ---- banners ---- */
#banner{position:fixed;left:50%;top:34%;transform:translateX(-50%);z-index:8;text-align:center;
  font-family:'Lilita One',cursive;font-size:42px;letter-spacing:1px;pointer-events:none;
  text-shadow:0 4px 16px rgba(8,12,10,.7);opacity:0;transition:opacity .2s}
#banner.show{opacity:1}
#banner small{display:block;font-size:15px;letter-spacing:2px;color:var(--money-gold);margin-top:6px}

/* ---- sheets ---- */
.sheetwrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;
  background:radial-gradient(120% 100% at 50% 30%, rgba(18,26,22,.5), rgba(10,15,12,.86));
  opacity:1;transition:opacity .25s;padding:20px}
.sheetwrap.hide{opacity:0;pointer-events:none}
.panel{text-align:center;max-width:360px;width:100%}
.gametitle{font-family:'Lilita One',cursive;font-size:46px;letter-spacing:1px;line-height:1;
  text-shadow:0 4px 14px rgba(8,12,10,.6)}
.gametitle .gold{color:var(--money-gold)}
.btncol{display:flex;flex-direction:column;gap:10px;margin-top:26px}
.bigbtn{font-family:'Lilita One',cursive;font-size:17px;color:#fff;
  background:linear-gradient(180deg,var(--primary-coral),var(--primary-coral-deep));
  border-radius:13px;padding:14px;letter-spacing:.5px;
  box-shadow:0 4px 12px rgba(188,79,55,.4), inset 0 1px 0 rgba(255,255,255,.25);transition:transform .12s}
.bigbtn:active{transform:scale(.97)}
.bigbtn.busy{pointer-events:none;opacity:.7}
.quietbtn{font-family:'Lilita One',cursive;font-size:14px;color:var(--text-ivory);
  background:rgba(255,255,255,.07);border:1px solid var(--line-soft);border-radius:12px;padding:12px;
  text-decoration:none;display:block}
.quietbtn.busy{pointer-events:none;opacity:.6}
.joinrow{display:flex;gap:8px}
.joinrow input{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--line-soft);border-radius:12px;
  color:var(--text-ivory);font-family:'Lilita One',cursive;font-size:17px;letter-spacing:5px;
  text-transform:uppercase;text-align:center;padding:12px;outline:none;min-width:0}
.joinrow .quietbtn{flex:0 0 auto;padding:12px 18px}
.lvlgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-top:18px}
.lvlgrid button{font-family:'Lilita One',cursive;font-size:18px;color:var(--text-ivory);
  background:rgba(255,255,255,.07);border:1px solid var(--line-soft);border-radius:12px;padding:13px 0}
.lvlgrid button:active{background:rgba(255,255,255,.16)}
.lvlgrid button.last{border-color:rgba(190,143,65,.55);color:var(--money-gold)}
#neterr{font-size:12px;font-weight:800;color:var(--primary-coral);margin-top:12px;min-height:16px}
.codebig{font-family:'Lilita One',cursive;font-size:52px;letter-spacing:10px;color:var(--money-gold);
  margin:18px 0 4px;text-shadow:0 3px 10px rgba(8,12,10,.6)}
.teamcols{display:flex;gap:12px;margin:16px 0 14px}
.teamcol{flex:1;border-radius:14px;padding:18px 0 14px;border:2px solid var(--line-soft);
  background:rgba(255,255,255,.05);display:flex;flex-direction:column;gap:6px;align-items:center;
  transition:border-color .15s, background .15s}
.teamcol .tname{font-family:'Lilita One',cursive;font-size:19px}
.teamcol .tcount{font-family:'Lilita One',cursive;font-size:30px;opacity:.85}
.teamcol.coral .tname{color:var(--primary-coral)}
.teamcol.teal .tname{color:var(--p-teal)}
.teamcol.mine.coral{border-color:var(--primary-coral);background:rgba(226,106,75,.12)}
.teamcol.mine.teal{border-color:var(--p-teal);background:rgba(59,139,130,.12)}
.botrow{display:flex;gap:8px;margin-bottom:10px}
.botrow .quietbtn{flex:1;font-size:12px;padding:9px 4px}
.botrow .botlvl{flex:2;font-family:'Lilita One',cursive;font-size:13px;display:flex;
  align-items:center;justify-content:center;color:var(--money-gold)}
.waitline{font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;opacity:.5}
.overline{font-size:11px;font-weight:800;letter-spacing:2.4px;text-transform:uppercase;opacity:.5}
.bigword{font-family:'Lilita One',cursive;font-size:52px;line-height:1.05;margin:8px 0 2px;
  text-shadow:0 4px 14px rgba(8,12,10,.6)}
.bigword.win{color:var(--money-gold)}
.bigword.loss{color:var(--primary-coral)}

/* ---- draft ---- */
#draft .overline{margin-bottom:16px}
#cards{display:flex;gap:12px;justify-content:center}
.pcard{width:120px;min-height:168px;border-radius:13px;overflow:hidden;cursor:pointer;text-align:left;
  background:linear-gradient(168deg,#FFFDF6 0%,var(--card-ivory) 55%,#EFE8D3 100%);
  border:1px solid rgba(10,25,26,.4);color:var(--ink-black);
  box-shadow:0 3px 7px rgba(8,12,10,.35), 0 12px 26px rgba(8,12,10,.28);
  display:flex;flex-direction:column;
  transition:transform .16s cubic-bezier(.2,1.1,.3,1), box-shadow .16s;
  animation:cardin .4s cubic-bezier(.2,.9,.3,1) backwards}
.pcard:nth-child(2){animation-delay:.07s}
.pcard:nth-child(3){animation-delay:.14s}
@keyframes cardin{from{opacity:0;transform:translateY(16px) rotate(1.5deg)}}
.pcard:hover{transform:translateY(-8px)}
.pcard:active{transform:translateY(-4px) scale(.98)}
.pcard .band{height:8px;flex:0 0 auto}
.pcard .pname{font-family:'Lilita One',cursive;font-size:15.5px;line-height:1.15;padding:11px 11px 6px}
.pcard .ptext{font-size:11px;font-weight:700;color:var(--muted-ink);line-height:1.45;padding:0 11px 12px}
.pcard.taken{pointer-events:none;transform:translateY(-10px) scale(1.03);
  box-shadow:0 0 0 3px var(--money-gold), 0 14px 30px rgba(8,12,10,.4)}
.pcard.dead{pointer-events:none;opacity:.35}
#draftwait{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:var(--money-gold);margin-top:18px;min-height:15px;opacity:0;transition:opacity .2s}
#draftwait.show{opacity:1}

#clickcatch{position:fixed;inset:0;z-index:9;display:none;align-items:center;justify-content:center;
  background:rgba(10,15,12,.45);font-family:'Lilita One',cursive;font-size:19px;letter-spacing:.5px;
  text-shadow:0 2px 8px rgba(8,12,10,.8);cursor:pointer}
#clickcatch.show{display:flex}
@media (max-width:430px){
  #cards{gap:8px}
  .pcard{width:104px;min-height:150px}
  .pcard .pname{font-size:13px;padding:9px 9px 5px}
  .pcard .ptext{font-size:9.5px;padding:0 9px 10px}
}
@media (prefers-reduced-motion: reduce){ .pcard{animation:none} }
</style>
</head>
<body>

<canvas id="gl"></canvas>

<div id="hurt"></div>
<div id="blind"></div>
<div id="hud">
  <div id="xh"></div>
  <div id="hpwrap">
    <div id="hpnum">100</div>
    <div id="hpbar"><div id="hpfill" style="width:100%"></div></div>
    <div id="shbar"><div id="shfill" style="width:0%"></div></div>
  </div>
  <div id="ammowrap">
    <div id="ammo">8</div>
    <div id="reloadtag">Reloading</div>
  </div>
  <div id="rounds"></div>
  <div id="mypicks"></div>
  <div id="foehp"><div id="foehpfill" style="width:100%"></div></div>
  <div id="peerbars"></div>
  <div id="touchui">
    <div id="stick"><div id="sticknub"></div></div>
    <button class="tbtn" id="fireBtn">Fire</button>
    <button class="tbtn" id="jumpBtn">Jump</button>
    <button class="tbtn" id="dashBtn">Dash</button>
    <button class="tbtn" id="reloadBtn">Reload</button>
  </div>
</div>
<div id="banner"></div>
<div id="clickcatch">Click To Aim</div>

<div class="sheetwrap" id="menu">
  <div class="panel">
    <div class="gametitle"><span class="gold">DUEL</span></div>
    <div class="btncol">
      <button class="bigbtn" id="hostbtn">Host Duel</button>
      <div class="joinrow">
        <input id="codein" maxlength="4" placeholder="CODE" autocomplete="off">
        <button class="quietbtn" id="joinbtn">Join</button>
      </div>
      <button class="quietbtn" id="practicebtn">Practice</button>
      <button class="quietbtn" id="landbtn">Landscape</button>
      <a class="quietbtn" href="../">Home</a>
    </div>
    <div id="neterr"></div>
  </div>
</div>

<div class="sheetwrap hide" id="teamroom">
  <div class="panel" style="max-width:400px">
    <div class="waitline">Table Code</div>
    <div class="codebig" id="codeshow"></div>
    <div class="teamcols">
      <button class="teamcol coral" id="pickcoral">
        <span class="tname">Coral</span><span class="tcount" id="coralcount">0</span>
      </button>
      <button class="teamcol teal" id="pickteal">
        <span class="tname">Teal</span><span class="tcount" id="tealcount">0</span>
      </button>
    </div>
    <div class="botrow" id="botrow" style="display:none">
      <button class="quietbtn" id="botcoral">+ Coral Bot</button>
      <button class="quietbtn" id="botteal">+ Teal Bot</button>
      <button class="quietbtn" id="botminus">− Bot</button>
    </div>
    <div class="botrow" id="botlvlrow" style="display:none">
      <button class="quietbtn" id="botlvldown">−</button>
      <div class="botlvl" id="botlvlshow">Bot Level 5</div>
      <button class="quietbtn" id="botlvlup">+</button>
    </div>
    <div class="waitline" id="roomline">Pick A Side</div>
    <div class="btncol">
      <button class="bigbtn" id="startmatch" style="display:none">Start Match</button>
      <button class="quietbtn" id="cancelhost">Leave</button>
    </div>
  </div>
</div>

<div class="sheetwrap hide" id="levels">
  <div class="panel">
    <div class="overline">Practice</div>
    <div class="lvlgrid" id="lvlgrid"></div>
    <div class="btncol"><button class="quietbtn" id="lvlback">Back</button></div>
  </div>
</div>

<div class="sheetwrap hide" id="draft">
  <div class="panel" style="max-width:440px">
    <div class="overline" id="draftline">Pick A Powerup</div>
    <div id="cards"></div>
    <div id="draftwait">Waiting For Them</div>
  </div>
</div>

<div class="sheetwrap hide" id="matchover">
  <div class="panel">
    <div class="overline">Match</div>
    <div class="bigword" id="matchword">Won</div>
    <div class="waitline" id="matchscore"></div>
    <div class="btncol">
      <button class="bigbtn" id="rematchbtn">Play Again</button>
      <a class="quietbtn" href="../">Home</a>
    </div>
  </div>
</div>

<script src="../shared/config.js?v=0.10.0"></script>
<script src="../shared/tablekit.js?v=0.10.0"></script>
<script src="../shared/duel-powerups.js?v=0.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
<script>
/* ================= Duel — engine ================= */
var PU = window.DuelPowerups;
var ROUNDS_TO_WIN = 10;
var COL = { night:0x121A16, felt:0x1D2B25, ivory:0xF2EEE2, coral:0xE26A4B,
  gold:0xBE8F41, timber:0x4E3A2A, fog:0x0C1310, teal:0x3B8B82 };

TableKit.watchErrors({ game: 'duel', version: '0.10.0' });

/* ---- category bands for the draft cards ---- */
var CAT = {};
['heavy','rapid','buckshot','twin','slug','needle','longbarrel','akimbo','lucky','overcharge','lastcall','marksman',
 'freight','jackhammer','handcannon','dice','soreloser','trickshot','executioner','momentum','showtime','payback',
 'hayfever','mulekick']
  .forEach(function(id){ CAT[id]='#E26A4B'; });
['bounce','superball','phantom','homing','bloodhound','mortar','grenadier','shortfuse','cluster','split','boomerang','gravitywell','chicken',
 'helium','drunk','popcorn','echo','confetti','sneaky','bees','pinball','finale','balloon','disco','beachball','partypopper']
  .forEach(function(id){ CAT[id]='#6394B6'; });
['frost','venom','incendiary','flash','riot','leech','trebuchet','dizzy','battlecry','pickpocket'].forEach(function(id){ CAT[id]='#7F6595'; });
['tank','glass','regen','aegis','battery','thorns','pocket','unit','deflector','secondwind','anchor','stand','hoarder','tortoise']
  .forEach(function(id){ CAT[id]='#3B8B82'; });
['sprinter','moonboots','doublejump','airshow','dash','blink','castle','adrenaline','rocketboots',
 'faststart','zoomies','hiccups','crab','clownshoes']
  .forEach(function(id){ CAT[id]='#E0AB52'; });
['mag','quickhands','beltfeed','sugarrush','scavenger','panichands'].forEach(function(id){ CAT[id]='#BE8F41'; });

/* ---- renderer / scene ---- */
var canvas = document.getElementById('gl');
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setClearColor(COL.fog);
var scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(COL.fog, 0.028);
var camera = new THREE.PerspectiveCamera(72, 1, 0.08, 120);
function size(){
  if (ROT && window.innerWidth > window.innerHeight) {
    ROT = false; document.body.classList.remove('rot90');   /* they rotated the phone — stand down */
    if ($('landbtn')) $('landbtn').textContent = 'Landscape';
  }
  var w=vw(),h=vh();
  renderer.setSize(w,h,false); camera.aspect=w/h;
  camera.fov = h > w ? 92 : 72;   /* portrait needs the width back */
  camera.updateProjectionMatrix(); }
window.addEventListener('resize', size); size();

scene.add(new THREE.HemisphereLight(0x3A4C42, 0x0A0F0C, 0.95));
var moon = new THREE.DirectionalLight(0xBFD2C6, 0.5); moon.position.set(-8,14,6); scene.add(moon);
var lamp1 = new THREE.PointLight(0xE8C57A, 1.0, 30, 1.6); lamp1.position.set(0,6,0); scene.add(lamp1);
var lamp2 = new THREE.PointLight(0xE8C57A, 0.6, 26, 1.7); lamp2.position.set(-8,5,-5); scene.add(lamp2);
var lamp3 = new THREE.PointLight(0xE8C57A, 0.6, 26, 1.7); lamp3.position.set(8,5,5); scene.add(lamp3);

/* ---- arena: one list of AABBs drives render, movement, and bullets ---- */
/* [cx, cy, cz, hx, hy, hz, colorKey] — cy is the box centre */
var ARENA = [
  [0,-0.5,0, 15,0.5,10, 'felt'],          /* floor */
  [-15.4,2,0, 0.4,2.5,10.6, 'timber'],    /* walls */
  [ 15.4,2,0, 0.4,2.5,10.6, 'timber'],
  [0,2,-10.4, 15.9,2.5,0.4, 'timber'],
  [0,2, 10.4, 15.9,2.5,0.4, 'timber'],
  [0,0.55,0, 1.9,0.55,0.8, 'timber'],     /* centre cover */

/* ---- collision helpers ---- */
function collideBox(px, py, pz, hx, hy, hz, b) {
  /* a hair of skin so exact contact never reads as overlap — resting on a box
     top must not trip the side check and fire the step-up */
  var EPS = 1e-4;
  return Math.abs(px-b[0]) < hx+b[3]-EPS && Math.abs(py-b[1]) < hy+b[4]-EPS && Math.abs(pz-b[2]) < hz+b[5]-EPS;
}
function anyCollide(px, py, pz, hx, hy, hz) {
  for (var i = 0; i < ARENA.length; i++) if (collideBox(px,py,pz,hx,hy,hz,ARENA[i])) return ARENA[i];
  return null;
}

/* ---- audio ---- */
var AC = null;
function audio(){ if (AC) return AC;
  try { AC = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){ AC=null; }
  return AC; }
function sNoise(dur, freq, vol) {
  var ac = audio(); if (!ac) return;
  var buf = ac.createBuffer(1, ac.sampleRate*dur, ac.sampleRate), d = buf.getChannelData(0);
  for (var i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/d.length,2);
  var src = ac.createBufferSource(); src.buffer = buf;
  var f = ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=freq;
  var g = ac.createGain(); g.gain.value = vol;
  src.connect(f); f.connect(g); g.connect(ac.destination); src.start();
}
function sTone(freq, dur, vol, type) {
  var ac = audio(); if (!ac) return;
  var o = ac.createOscillator(); o.type = type||'triangle'; o.frequency.value = freq;
  var g = ac.createGain();
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
  o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime+dur+0.02);
}
function sShot(){ sNoise(0.09, 1600, 0.35); sTone(120, 0.1, 0.25, 'sine'); }
function sHit(crit){ sTone(crit?1320:880, 0.18, 0.22); }

/* Primary pointer decides the default; actual use decides the truth. A

var TOUCH = false;
try { TOUCH = window.matchMedia && window.matchMedia('(pointer: coarse)').matches; } catch (e) {}

/* ---- movement: one body of rules for both fighters ---- */
function spawnFighter(f, west, slot) {
  if (slot) { f.pos.set(slot.x, 0.01, slot.z); f.yaw = slot.yaw; }
  else { f.pos.set(west ? -12 : 12, 0.01, west ? -6 : 6); f.yaw = west ? -Math.PI/4 : Math.PI*3/4; }
  f.pitch = 0; f.vel.set(0,0,0);
  f.hp = f.stats.hp; f.shield = f.stats.shieldStart;
  f.mag = f.stats.magSize; f.reload = 0; f.fireCd = 0; f.shotsInMag = 0;
  f.alive = true; f.slow = 0; f.slowT = 0; f.dots = []; f.sinceHit = 99;
  f.swUsed = false; f.payback = false;
  f.onGround = false; f.airJumps = 0; f.dashCd = 0;
  f.hicT = 2 + Math.random()*2; f.popped = false; f.spinT = 0; f.spinV = 0;
}
function spawnMe() { spawnFighter(me, G.host || G.mode==='bot'); }
function spawnFoe() {
  spawnFighter(foe, !(G.host || G.mode==='bot'));
  foeNet.pos.copy(foe.pos); foeNet.has = true;
}

/* inp: { f, r (-1..1), jump, dash } — keyboard, thumbs, and the bot brain all
   speak this and only this. If the player can't do it, there is no way to ask. */
function moveFighter(fi, inp, dt) {
  var s = fi.stats;
  var adren = s.adrenaline && fi.hp < 40 ? 1.3 : 1;
  var speed = s.moveSpeed * adren * (1 - fi.slow);
  if (s.fastStart && G.fightT < 3) speed *= 1.5;
  if (s.zoomies && (G.fightT % 4) < 1) speed *= 1.8;
  var f = inp.f || 0, r = inp.r || 0;
  if (s.crabMode) {                      /* speed follows how sideways you're going */
    var tot = Math.abs(f) + Math.abs(r);
    var mix = tot > 0 ? Math.abs(r) / tot : 0;
    speed *= 0.85 + mix * 0.45;
  }
  var sin = Math.sin(fi.yaw), cos = Math.cos(fi.yaw);
  var wx = (-sin*f + cos*r), wz = (-cos*f - sin*r);
  var len = Math.max(1, Math.hypot(wx, wz));
  var ax = wx/len*speed, az = wz/len*speed;
  var ground = fi.onGround ? 14 : 4;
  fi.vel.x += (ax - fi.vel.x) * Math.min(1, dt*ground);
  fi.vel.z += (az - fi.vel.z) * Math.min(1, dt*ground);

  /* jumping */
  var wantJump = inp.jump;
  if (s.hiccups) {
    fi.hicT -= dt;
    if (fi.hicT <= 0) { fi.hicT = 2.5 + Math.random()*2.5;
      if (fi.onGround) { wantJump = true; fi._jumpHeld = false; if (fi === me) sTone(980, 0.07, 0.16, 'square'); } }
  }
  if (wantJump && !fi._jumpHeld) {
    var jumped = false;
    if (fi.onGround) { fi.vel.y = s.jumpPower; fi.onGround = false; jumped = true; }
    else if (fi.airJumps < s.extraJumps) { fi.vel.y = s.jumpPower*0.92; fi.airJumps++; jumped = true; }
    if (jumped && s.honk) { sTone(310, 0.12, 0.22, 'square'); sTone(240, 0.16, 0.18, 'square'); }
  }
  fi._jumpHeld = !!wantJump;

  /* dash / blink — only if the sheet grants it, same cooldown for everyone */
  fi.dashCd = Math.max(0, fi.dashCd - dt);
  if (inp.dash && s.dashCharges > 0 && fi.dashCd <= 0) {
    fi.dashCd = 2;
    var dx = -sin*(f||1), dz = -cos*(f||1);
    if (f===0 && r!==0){ dx = cos*r; dz = -sin*r; }
    if (s.dashTeleport) {
      var h = bodyHalf(fi);
      var tx = fi.pos.x + dx*4.5, tz = fi.pos.z + dz*4.5;
      if (!anyCollide(tx, fi.pos.y+h.hy, tz, h.hx, h.hy, h.hx)) { fi.pos.x = tx; fi.pos.z = tz; }
      if (fi === me) sTone(1200, 0.1, 0.18);
    } else {
      fi.vel.x += dx*14; fi.vel.z += dz*14;
      if (fi === me) sNoise(0.12, 900, 0.15);
    }
  }

  fi.vel.y -= 22 * (fi.vel.y < 0 ? s.fallFactor : 1) * dt;

  var half = bodyHalf(fi);
  var hx = half.hx, hy = half.hy;
  var cy = function(){ return fi.pos.y + hy; };

  /* x with step-up */
  var nx = fi.pos.x + fi.vel.x*dt;
  if (!anyCollide(nx, cy(), fi.pos.z, hx, hy, hx)) fi.pos.x = nx;
  else if (!anyCollide(nx, cy()+0.55, fi.pos.z, hx, hy, hx) && fi.onGround) { fi.pos.x = nx; fi.pos.y += 0.55; }
  else fi.vel.x = 0;
  /* z with step-up */
  var nz = fi.pos.z + fi.vel.z*dt;
  if (!anyCollide(fi.pos.x, cy(), nz, hx, hy, hx)) fi.pos.z = nz;
  else if (!anyCollide(fi.pos.x, cy()+0.55, nz, hx, hy, hx) && fi.onGround) { fi.pos.z = nz; fi.pos.y += 0.55; }
  else fi.vel.z = 0;
  /* y */
  var ny = fi.pos.y + fi.vel.y*dt;
  var hitBox = anyCollide(fi.pos.x, ny+hy, fi.pos.z, hx, hy, hx);
  if (!hitBox) { fi.pos.y = ny; fi.onGround = false; }
  else {
    if (fi.vel.y <= 0) {
      fi.pos.y = hitBox[1] + hitBox[4];
      if (s.floorBounce && fi.vel.y < -9) { fi.vel.y = -fi.vel.y*0.55; if (fi === me) sTone(300,0.1,0.15); }
      else { fi.vel.y = 0; fi.onGround = true; fi.airJumps = 0; }
    } else { fi.vel.y = 0; }
  }
  if (fi.pos.y < -6) { fi.pos.y = 0.01; fi.vel.set(0,0,0); }
}

function moveSelf(dt) {
  var f = 0, r = 0;
  if (keys.KeyW) f += 1; if (keys.KeyS) f -= 1;
  if (keys.KeyD) r += 1; if (keys.KeyA) r -= 1;
  if (touch.active) { f = -touch.my; r = touch.mx; }   /* analog: a half stick is a walk */
  moveFighter(me, { f: f, r: r, jump: !!keys.Space, dash: !!keys.ShiftLeft }, dt);
  camera.position.set(me.pos.x, me.pos.y + eyeHeight(me), me.pos.z);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = me.yaw; camera.rotation.x = me.pitch;
}

/* ---- shooting ---- */
var bullets = [];
var bulletMat = new THREE.MeshBasicMaterial({ color: 0xF3D48A });
var foeBulletMat = new THREE.MeshBasicMaterial({ color: 0xE26A4B });
var chickenMat = new THREE.MeshStandardMaterial({ color: 0xF2EEE2, roughness: 0.7 });

function bulletMesh(stats, mine) {
  if (stats.bulletStyle === 'chicken') {
    var g = new THREE.Group();
    var b = new THREE.Mesh(new THREE.SphereGeometry(stats.bulletSize, 10, 8), chickenMat);
    g.add(b);
    var comb = new THREE.Mesh(new THREE.BoxGeometry(stats.bulletSize*0.4, stats.bulletSize*0.5, stats.bulletSize*0.5),
      new THREE.MeshBasicMaterial({ color: 0xE26A4B }));
    comb.position.y = stats.bulletSize*0.9; g.add(comb);
    var beak = new THREE.Mesh(new THREE.BoxGeometry(stats.bulletSize*0.35, stats.bulletSize*0.3, stats.bulletSize*0.5),
      new THREE.MeshBasicMaterial({ color: 0xE0AB52 }));
    beak.position.z = stats.bulletSize; g.add(beak);
    return g;
  }
  if (stats.bulletStyle === 'confetti') {
    var hue = ['#E26A4B','#E0AB52','#6394B6','#7F6595','#3B8B82'][Math.floor(Math.random()*5)];
    var box = new THREE.Mesh(new THREE.BoxGeometry(stats.bulletSize*1.6, stats.bulletSize*0.5, stats.bulletSize*1.6),
      new THREE.MeshBasicMaterial({ color: new THREE.Color(hue) }));
    box.rotation.set(Math.random()*3, Math.random()*3, Math.random()*3);
    return box;
  }
  if (stats.bulletStyle === 'ghost') {
    return new THREE.Mesh(new THREE.SphereGeometry(Math.max(0.05, stats.bulletSize), 8, 6),
      new THREE.MeshBasicMaterial({ color: 0xF2EEE2, transparent: true, opacity: 0.07 }));
  }
  if (stats.bulletStyle === 'beach') {
    return new THREE.Mesh(new THREE.SphereGeometry(Math.max(0.05, stats.bulletSize), 12, 10),
      new THREE.MeshBasicMaterial({ color: [0xE26A4B, 0x6394B6, 0xE0AB52][Math.floor(Math.random()*3)] }));
  }
  if (stats.bulletStyle === 'bee') {
    var bee = new THREE.Mesh(new THREE.SphereGeometry(Math.max(0.04, stats.bulletSize), 8, 6),
      new THREE.MeshBasicMaterial({ color: 0xE0AB52 }));
    return bee;
  }
  return new THREE.Mesh(new THREE.SphereGeometry(Math.max(0.05, stats.bulletSize), 10, 8),
    mine ? bulletMat : foeBulletMat);
}

function spawnBullet(owner, origin, dir, stats, opts) {
  opts = opts || {};
  var m = bulletMesh(stats, owner === 'me');
  m.position.copy(origin);
  scene.add(m);
  bullets.push({
    owner: owner, mesh: m, stats: stats,
    pos: origin.clone(), vel: dir.clone().multiplyScalar(stats.bulletSpeed),
    life: 3.2, bounces: stats.bounces,
    split: stats.splitCount > 0 && !opts.noSplit ? 0.32 : 0,
    boom: opts.boom !== undefined ? opts.boom : (opts.fromCluster ? 0 : stats.explosionRadius),
    returning: false, dmgScale: opts.dmgScale || 1,

function fireFighter(f, owner, baseDir) {

  if (f.mag <= 0) { if (!f.stats.noReload) startReloadFor(f); return false; }
  var s = f.stats;
  var adren = s.adrenaline && f.hp < 40 ? 1.3 : 1;
  var rate = s.fireRate * adren;
  if (s.fastStart && G.fightT < 3) rate *= 1.5;

  var dmgScale = 1;
  if (f.shotsInMag === 1 && s.firstShotBonus) dmgScale += s.firstShotBonus;
  if (f.mag === 0 && s.lastShotBonus) dmgScale += s.lastShotBonus;
  if (s.airShot && !f.onGround) dmgScale *= 1.4;             /* showtime */
  if (s.payback && f.payback) { dmgScale *= 1.8; f.payback = false; }

  var count = s.bulletCount, spread = s.spread;

    count += Math.min(11, f.mag);                            /* bless you */

    var dir = baseDir.clone();
    dir.x += (Math.random()-0.5)*2*spread;
    dir.y += (Math.random()-0.5)*2*spread;
    dir.z += (Math.random()-0.5)*2*spread;
    dir.normalize();
    spawnBullet(owner, origin, dir, s, { dmgScale: dmgScale, boom: boom });
    shots.push([dir.x, dir.y, dir.z]);
  }
  if (s.muleKick > 0) {
    fi_kick(f, baseDir, s.muleKick);

  else if (f === me) sShot(); else sNoise(0.07, 1000, 0.12);
  var wireKey = f === me ? G.myKey : f.botKey;

}

function fi_kick(f, dir, mag) {
  f.vel.x -= dir.x * mag; f.vel.z -= dir.z * mag;

function fire() {
  var dir = new THREE.Vector3(0,0,-1).applyEuler(camera.rotation);

/* segment-to-segment closest distance: bullet path vs body axis */
function segSegDist(p1, q1, p2, q2) {
  var d1 = q1.clone().sub(p1), d2 = q2.clone().sub(p2), r = p1.clone().sub(p2);
  var a = d1.dot(d1), e = d2.dot(d2), f = d2.dot(r);
  var sN, tN;
  if (a <= 1e-8 && e <= 1e-8) return p1.distanceTo(p2);
  if (a <= 1e-8) { sN = 0; tN = Math.max(0, Math.min(1, f/e)); }
  else {
    var c = d1.dot(r);
    if (e <= 1e-8) { tN = 0; sN = Math.max(0, Math.min(1, -c/a)); }
    else {
      var b = d1.dot(d2), den = a*e - b*b;
      sN = den > 1e-8 ? Math.max(0, Math.min(1, (b*f - c*e)/den)) : 0;
      tN = (b*sN + f)/e;
      if (tN < 0) { tN = 0; sN = Math.max(0, Math.min(1, -c/a)); }
      else if (tN > 1) { tN = 1; sN = Math.max(0, Math.min(1, (b - c)/a)); }
    }
  }
  var c1 = p1.clone().addScaledVector(d1, sN);
  var c2 = p2.clone().addScaledVector(d2, tN);
  return c1.distanceTo(c2);
}
function hitsFighter(prev, next, f, radiusBonus) {

  var feet = f.pos.clone(); feet.y += r;
  var head = f.pos.clone(); head.y += 1.8*f.stats.scale - r;
  return segSegDist(prev, next, feet, head) <= r;
}

function hitsHead(prev, next, f, radiusBonus) {
  var hc = f.pos.clone(); hc.y += 1.58 * f.stats.scale;

function targetOf(owner){ return owner === 'me' ? foe : me; }   /* practice mode */
/* net mode: the nearest living enemy, for homing and boomerangs */
function nearestEnemyTo(pos) {
  if (G.mode === 'bot') return foe;
  var best = null, bd = 1e9;
  enemiesOfMine().forEach(function (P) {
    var d = P.f.pos.distanceTo(pos);
    if (d < bd) { bd = d; best = P.f; }
  });

}
function bulletTargetFighter(b) {
  if (b.owner === 'me') return G.mode === 'bot' ? foe : nearestEnemyTo(b.pos);

function stepBullet(b, dt) {
  var s = b.stats;
  /* homing (pinball wizard bullets pick it up after a bounce) */
  var hm = s.homing + (b.homingBoost || 0);
  if (hm > 0 && !b.returning) {
    var tgt = bulletTargetFighter(b);
    if (tgt) {
    var want = tgt.pos.clone(); want.y += 1.0*tgt.stats.scale;
    want.sub(b.pos).normalize().multiplyScalar(b.vel.length());
    b.vel.lerp(want, Math.min(1, hm * dt));
    }
  }
  /* boomerang */
  if (s.boomerang && !b.returning && b.life < 2.5) {
    b.returning = true;
    b.vel.multiplyScalar(-1);
  }
  if (b.returning) {
    var homeF = b.owner === 'me' ? null : (G.mode === 'bot' ? foe : (peers[b.owner] && peers[b.owner].f));
    var homeP = b.owner === 'me' ? camera.position :
      (homeF ? homeF.pos.clone().setY(homeF.pos.y+1.2) : camera.position.clone().setY(-99));
    var wantR = homeP.clone().sub(b.pos).normalize().multiplyScalar(s.bulletSpeed*1.2);

      me.mag = Math.min(me.stats.magSize, me.mag + 1); updateAmmoHud();

    }
  }
  b.vel.y -= s.bulletGravity * dt;
  /* split */
  if (b.split > 0) {
    b.split -= dt;
    if (b.split <= 0) {
      for (var k = 0; k < s.splitCount; k++) {
        var d = b.vel.clone().normalize();
        d.x += (Math.random()-0.5)*0.5; d.y += (Math.random()-0.5)*0.3; d.z += (Math.random()-0.5)*0.5;
        spawnBullet(b.owner, b.pos, d.normalize(), s, { noSplit: true, dmgScale: b.dmgScale*0.6 });
      }
    }
  }

  if (s.grow > 0) {
    b.sizeNow = Math.min(0.9, b.sizeNow + s.grow * dt);
    b.mesh.scale.setScalar(b.sizeNow / Math.max(0.01, s.bulletSize));
  }
  /* disco: a lap around the shooter, then away it goes */
  if (b.orbitT > 0) {

    var host = b.owner === 'me' ? me : foe;
    var hc = host.pos.clone(); hc.y += eyeHeight(host) * 0.8;
    b.pos.set(hc.x + Math.cos(b.orbitA) * 1.0, hc.y + Math.sin(b.orbitA * 2) * 0.2, hc.z + Math.sin(b.orbitA) * 1.0);

    b.vel.z += (Math.random()-0.5) * wob;

  var stepLen = Math.max(0.12, s.bulletSize);

       Teammates are never targets: friendly fire does not exist. */

      if (G.mode === 'bot') {
        if (foe.alive && hitsFighter(prev, b.pos, foe, b.sizeNow)) {

        }
      }
    } else if (G.mode === 'bot') {
      if (me.alive && hitsFighter(prev, b.pos, me, b.sizeNow)) {
        landHit(b, b.pos.clone(), 1, hitsHead(prev, b.pos, me, b.sizeNow), me);
        return false;
      }

      /* the host judges its bots' shots against everyone they can hurt */
      var bteam = peers[b.owner].team;
      if (me.alive && G.myTeam !== bteam && hitsFighter(prev, b.pos, me, b.sizeNow)) {
        landHit(b, b.pos.clone(), 1, hitsHead(prev, b.pos, me, b.sizeNow), me);
        return false;
      }
      var pk = Object.keys(peers);
      for (var bi = 0; bi < pk.length; bi++) {
        var BP = peers[pk[bi]];
        if (pk[bi] === b.owner || BP.team === bteam || !BP.f.alive) continue;
        if (hitsFighter(prev, b.pos, BP.f, b.sizeNow)) {

      if (box) {

          /* reflect off the axis we penetrated least along */

function explode(b, at) {

  if (b.owner === 'me' && s.selfPush) {
    var dSelf = camera.position.distanceTo(at);
    if (dSelf < b.boom + 1.4) {
      var shove = camera.position.clone().sub(at).normalize().multiplyScalar(11);
      me.vel.x += shove.x; me.vel.z += shove.z;

/* shooter side: a hit landed on the opponent */

  if (s.execute && victim.hp < 0.35 * victim.stats.hp) dmg *= 1.6;
  if (s.momentum) dmg *= 1 + Math.min(0.6, 0.04 * G.fightT);
  if (s.bounceBonus && b.bouncedN > 0) dmg *= 1 + 0.75 * Math.min(2, b.bouncedN);

/* victimRef: a fighter (practice) or a peer object (net). The shooter judges,

    burn: s.burn ? [s.burn, s.burnDur] : null,
    slow: s.slowOnHit ? [s.slowOnHit, s.slowDur] : null,

function healFighter(f, n) {

      var thorn = { dmg: back, crit: false, kb: 0, thorn: true };
      if (G.mode === 'net') routeHit(fx.k, f === me ? G.myKey : f.botKey, thorn, true);
      else applyHit(f === me ? foe : me, thorn, true);
    }
  }
  if (f === me) {
    sHurt();

    setTimeout(function(){ $('hurt').style.opacity = 0; }, 120);
  }

}

/* ---- rounds & draft ---- */
function startCountdown() {
  G.phase = 'countdown'; G.round++;
  hide('draft'); hide('matchover'); hide('menu'); hide('teamroom'); hide('levels');
  G.fightT = 0;
  document.body.classList.add('fighting');
  me.stats = PU.statsFor(me.picks);
  if (G.mode === 'bot') {
    foe.stats = PU.statsFor(foe.picks);
    foeMesh.scale.setScalar(foe.stats.scale);
    spawnMe(); spawnFoe();
    foeMesh.visible = true;
  } else {
    /* deterministic slots: sorted roster keys, indexed within each team */
    var slotIdx = { coral: 0, teal: 0 };
    Object.keys(G.roster).sort().forEach(function (k) {
      var team = G.roster[k];
      var slot = spawnSlot(team, slotIdx[team]++);
      if (k === G.myKey) { spawnFighter(me, team === 'coral', slot); }
      else if (peers[k]) {
        var Q = peers[k];
        Q.f.stats = PU.statsFor(Q.f.picks);
        spawnFighter(Q.f, team === 'coral', slot);
        Q.net.pos.copy(Q.f.pos); Q.net.yaw = Q.f.yaw; Q.net.has = true;
        Q.mesh.scale.setScalar(Q.f.stats.scale);
        Q.mesh.visible = true;
        tintPeer(Q);
      }
    });
    foeMesh.visible = false;
  }
  updateHpHud(); updateAmmoHud(); updateRoundsHud(); updatePicksHud();
  $('dashBtn').style.display = me.stats.dashCharges > 0 ? 'flex' : 'none';
  $('reloadBtn').style.display = me.stats.noReload ? 'none' : 'flex';
  $('reloadtag').classList.remove('show');
  G.countdownT = 3;
  grabPointer();
}
function roundOver(iWon) {           /* practice mode; net rounds end via the host */
  if (G.phase !== 'fight' || G.mode === 'net') return;
  G.phase = 'intermission';
  if (iWon) { G.myScore++; } else { G.foeScore++; }
  updateRoundsHud();
  banner(iWon ? 'Round Yours' : 'Round Theirs', null, 1500);
  setTimeout(function () {
    if (G.myScore >= ROUNDS_TO_WIN || G.foeScore >= ROUNDS_TO_WIN) matchOver();
    else openDraft();
  }, 1600);
}
function matchOver() {
  G.phase = 'over';
  document.body.classList.remove('fighting');
  document.exitPointerLock && document.exitPointerLock();
  var won = G.myScore >= ROUNDS_TO_WIN;
  eachPeer(function (P) { P.mesh.visible = false; if (P.bar) P.bar.style.display = 'none'; });
  $('matchword').textContent = won ? 'Won' : 'Lost';
  $('matchword').className = 'bigword ' + (won ? 'win' : 'loss');
  $('matchscore').textContent = G.myScore + ' — ' + G.foeScore;
  foeMesh.visible = false;
  show('matchover');
  sPick();
}

function openDraft() {
  G.phase = 'draft';
  document.exitPointerLock && document.exitPointerLock();
  $('clickcatch').classList.remove('show');
  G.myPick = null; G.foePickId = null;
  if (G.pendingFoePick) { var pend = G.pendingFoePick; G.pendingFoePick = null; receivePick(pend); }
  $('draftwait').classList.remove('show');
  /* deterministic per player: match seed, round, and your own key's hash */
  var salt = G.mode === 'bot' ? 0x9E37 : hashKey(G.myKey || 'me');
  var mySeed = (G.seed ^ (G.round*2654435761)) ^ salt;
  var options = PU.deal(me.picks, PU.seededRng(mySeed >>> 0));
  var wrap = $('cards');
  wrap.innerHTML = '';
  options.forEach(function (id) {
    var p = PU.byId(id);
    var c = document.createElement('button');
    c.className = 'pcard';
    c.innerHTML = '<span class="band" style="background:'+(CAT[id]||'#BE8F41')+'"></span>' +
      '<span class="pname">'+p.name+'</span><span class="ptext">'+p.text+'</span>';
    c.onclick = function () { choosePick(id, c); };
    wrap.appendChild(c);
  });
  show('draft');
  if (G.mode === 'net' && G.host) {
    clearTimeout(hostMaybeRound._t);
    hostMaybeRound._t = setTimeout(function () {
      if (G.phase !== 'draft') return;
      G.tx && G.tx.send('round', { n: G.round, k: G.myKey });
      startCountdown();
    }, 20000);
    eachPeer(function (P, bk) {
      if (!P.bot) return;
      setTimeout(function () {
        if (G.phase !== 'draft' || G.picked[bk] === G.round || !peers[bk]) return;
        var bSeed = ((G.seed ^ (G.round*2654435761)) ^ hashKey(bk)) >>> 0;
        var opts = PU.deal(P.f.picks, PU.seededRng(bSeed));
        /* what this bot has seen: enemy picks from fought rounds only */
        var seen = [];
        if (G.myTeam !== P.team) seen = seen.concat(me.picks.slice(0, me.picks.length - (G.myPick ? 1 : 0)));
        eachPeer(function (Q, qk) {
          if (Q.team === P.team) return;
          seen = seen.concat(Q.f.picks.slice(0, Q.f.picks.length - (G.picked[qk] === G.round ? 1 : 0)));
        });
        var id = botDraftPick(opts, P.f.picks, seen, P.level || 5);
        P.f.picks.push(id);
        G.picked[bk] = G.round;
        if (G.tx) G.tx.send('pick', { k: bk, id: id });
        hostMaybeRound();
      }, 700 + Math.random()*1300);
    });
  }
  /* bot picks after a beat */
  if (G.mode === 'bot') {
    setTimeout(function () {
      var foeSeed = (G.seed ^ (G.round*2654435761)) ^ 0x79B9;
      var foeOpts = PU.deal(foe.picks, PU.seededRng(foeSeed >>> 0));
      /* what it has seen: every pick of mine from rounds already fought.
         If I've drafted this round already, that newest one is still secret. */
      var seen = me.picks.slice(0, me.picks.length - (G.myPick ? 1 : 0));
      receivePick(botDraftPick(foeOpts, foe.picks, seen, G.botLevel));
    }, 900 + Math.random()*1200);
  }
}
function choosePick(id, cardEl) {
  if (G.myPick) return;
  G.myPick = id;
  me.picks.push(id);
  sPick();
  var kids = $('cards').children;
  for (var i = 0; i < kids.length; i++) kids[i].classList.add(kids[i] === cardEl ? 'taken' : 'dead');
  if (G.mode === 'net') {
    G.picked[G.myKey] = G.round;
    if (G.tx) G.tx.send('pick', { k: G.myKey, id: id });
    $('draftwait').classList.add('show');
    if (G.host) hostMaybeRound();
  } else maybeAdvance();
}
function receivePick(id) {
  G.foePickId = id;               /* their picks stay their secret — the fight reveals them */
  foe.picks.push(id);
  maybeAdvance();
}
function maybeAdvance() {
  if (G.mode === 'net') return;      /* the host calls the next round */
  if (G.myPick && G.foePickId) {
    $('draftwait').classList.remove('show');
    setTimeout(startCountdown, 1100);
  } else if (G.myPick) {
    $('draftwait').classList.add('show');
  }
}

/* ---- the wire ---- */
var STATE_HZ = 1/12, stateAcc = 0;
function netEvents() {
  return ['state','shoot','hit','death','pick','begin','rematch','team','roundend','round'];
}
function onWire(ev, p) {
  var P;
  if (ev === 'state') {
    P = peers[p.k]; if (!P) return;
    P.net.pos.set(p.p[0], p.p[1], p.p[2]);
    P.net.yaw = p.y; P.net.has = true;
    P.f.hp = p.hp;
  } else if (ev === 'shoot') {
    P = peers[p.k]; if (!P) return;
    var o = new THREE.Vector3(p.o[0], p.o[1], p.o[2]);
    p.d.forEach(function (d) {
      spawnBullet(p.k, o, new THREE.Vector3(d[0], d[1], d[2]), P.f.stats, { dmgScale: p.ds, boom: p.bm });
    });
    if (P.f.stats.bulletStyle==='chicken') sCluck(); else sNoise(0.07, 1000, 0.12);
  } else if (ev === 'hit') {
    if (p.to === G.myKey) takeHit(p, !!p.thorn);
    else if (G.host && peers[p.to] && peers[p.to].bot) applyHit(peers[p.to].f, p, !!p.thorn);
  } else if (ev === 'death') {
    P = peers[p.k]; if (!P) return;
    P.f.alive = false;
    if (G.host) hostCheckWipe();
  } else if (ev === 'pick') {
    P = peers[p.k];
    if (P && G.picked[p.k] !== G.round) { G.picked[p.k] = G.round; P.f.picks.push(p.id); }
    if (G.host) hostMaybeRound();
  } else if (ev === 'team') {
    if (p.team === null) { dropPeer(p.k); updateTeamRoom(); return; }
    P = ensurePeer(p.k);
    P.team = p.team;
    if (isBotKey(p.k)) P.bot = true;
    tintPeer(P);
    updateTeamRoom();
  } else if (ev === 'begin') {
    G.seed = p.seed; G.hostKey = p.k;
    G.roster = p.roster;
    Object.keys(p.roster).forEach(function (k) {
      if (k === G.myKey) { G.myTeam = p.roster[k]; return; }
      var Q = ensurePeer(k); Q.team = p.roster[k];
      if (isBotKey(k)) Q.bot = true;
      tintPeer(Q);
    });
    Object.keys(peers).forEach(function (k) { if (!p.roster[k]) dropPeer(k); });
    G.myScore = 0; G.foeScore = 0; G.round = 0; G.picked = {};
    me.picks = [];
    eachPeer(function (Q) { Q.f.picks = []; });
    startCountdown();
  } else if (ev === 'roundend') {
    onRoundEnd(p.team);
  } else if (ev === 'round') {
    startCountdown();
  } else if (ev === 'rematch') {
    if (G.host) hostBegin();
  }
}

/* everyone scores the round the host called */
function onRoundEnd(winnerTeam) {
  if (G.phase !== 'fight' && G.phase !== 'intermission') return;
  if (G.phase === 'intermission') return;
  G.phase = 'intermission';
  var mine = winnerTeam === G.myTeam;
  if (mine) G.myScore++; else G.foeScore++;
  updateRoundsHud();
  banner(mine ? 'Round Yours' : 'Round Theirs', null, 1500);
  setTimeout(function () {
    if (G.myScore >= ROUNDS_TO_WIN || G.foeScore >= ROUNDS_TO_WIN) matchOver();
    else openDraft();
  }, 1600);
}
function hostCheckWipe() {
  if (!G.host || G.phase !== 'fight') return;
  var coral = teamAliveCount('coral'), teal = teamAliveCount('teal');
  var winner = coral === 0 ? 'teal' : (teal === 0 ? 'coral' : null);
  if (winner) {
    G.tx && G.tx.send('roundend', { team: winner, k: G.myKey });
    onRoundEnd(winner);
  }
}
function hostMaybeRound() {
  if (!G.host || G.phase !== 'draft') return;
  var all = G.picked[G.myKey] === G.round;
  Object.keys(G.roster).forEach(function (k) {
    if (k !== G.myKey && G.picked[k] !== G.round) all = false;
  });
  if (all) {
    clearTimeout(hostMaybeRound._t);
    setTimeout(function () {
      G.tx && G.tx.send('round', { n: G.round, k: G.myKey });
      startCountdown();
    }, 900);
  }
}
function presentKeys() {
  if (!G.tx) return [];
  var seats = TableKit.seatsFrom(G.tx.presence(), 8);
  return seats.map(function (s2) { return (s2.meta && s2.meta.key) || s2.key || s2; })
    .filter(function (k) { return typeof k === 'string'; });
}
function onPresence() {
  if (!G.tx || G.mode !== 'net') return;
  var here = {};
  presentKeys().forEach(function (k) { here[k] = 1; });
  if (G.phase === 'waiting') {
    /* someone new — tell them my side so their room fills in */
    if (G.myTeam) G.tx.send('team', { k: G.myKey, team: G.myTeam });
    Object.keys(peers).forEach(function (k) { if (!here[k] && !isBotKey(k)) { dropPeer(k); } });
    updateTeamRoom();
    return;
  }
  /* mid-match departures */
  var gone = [];
  Object.keys(peers).forEach(function (k) { if (!here[k] && !isBotKey(k)) gone.push(k); });
  if (!gone.length) return;
  var hostLeft = gone.indexOf(G.hostKey) >= 0 && !G.host;
  gone.forEach(function (k) { if (peers[k]) peers[k].f.alive = false; dropPeer(k); delete G.roster[k]; });
  if (hostLeft || Object.keys(G.roster).length < 2) {
    leaveToMenu('They left the table.');
    return;
  }
  if (G.host) hostCheckWipe();
}
function leaveToMenu(msg) {
  document.body.classList.remove('fighting');
  document.exitPointerLock && document.exitPointerLock();
  hide('draft'); hide('teamroom'); hide('matchover');
  G.phase = 'menu'; foeMesh.visible = false;
  eachPeer(function (P, k) { dropPeer(k); });
  if (G.tx) { try { G.tx.close(); } catch (e) {} G.tx = null; }
  G.mode = null; G.myTeam = null; G.roster = {};
  show('menu');
  $('hostbtn').classList.remove('busy'); $('joinbtn').classList.remove('busy');
  $('neterr').textContent = msg || '';
}
function hostBegin() {
  /* the roster is whoever's here with a side picked; both sides must exist */
  var roster = {};
  if (G.myTeam) roster[G.myKey] = G.myTeam;
  eachPeer(function (P, k) { if (P.team) roster[k] = P.team; });
  var coral = 0, teal = 0;
  Object.keys(roster).forEach(function (k) { if (roster[k] === 'coral') coral++; else teal++; });
  if (!coral || !teal) { $('roomline').textContent = 'Both Sides Need A Player'; return; }
  var seed = (Math.random()*4294967296) >>> 0;
  G.seed = seed; G.roster = roster; G.hostKey = G.myKey;
  G.myScore = 0; G.foeScore = 0; G.round = 0; G.picked = {};
  me.picks = [];
  eachPeer(function (P) { P.f.picks = []; });
  Object.keys(peers).forEach(function (k) { if (!roster[k]) dropPeer(k); });
  eachPeer(function (P) {
    if (!P.bot) return;
    P.f.botKey = P.key;
    P.brain = { p: botParams(P.level || 5), hist: [], wanderT: 0,
      mv: { f: 0, r: 0 }, pauseT: 0.8 + Math.random(), tkey: null };
  });
  G.tx.send('begin', { seed: seed, roster: roster, k: G.myKey });
  startCountdown();
}

/* ---- the team room ---- */
function updateTeamRoom() {

var roomBotLvl = 5;
try { roomBotLvl = Math.max(1, Math.min(10, parseInt(localStorage.getItem('duel_lvl') || '5', 10) || 5)); } catch (e) {}
function botKeys() { return Object.keys(peers).filter(isBotKey).sort(); }
function addBot(team) {

$('botcoral').onclick = function () { addBot('coral'); };
$('botteal').onclick = function () { addBot('teal'); };

var joining = false;
async function joinRoom(code, asHost) {

/* levels 1-10 scale skill, never rules: aim error, reaction lag, turn speed,
   trigger discipline, movement and draft judgement. The bot's body, gun, and
   sheet obey exactly the code the player's do — there is nothing else to call. */
function botParams(L) {
  var t = (L - 1) / 9;
  return {
    aimErr:   0.20  + (0.014 - 0.20) * t,   /* radians of per-shot scatter */
    turnSpd:  2.2   + (9.5  - 2.2)  * t,    /* max radians/s the aim can swing */
    reactT:   0.60  + (0.12 - 0.60) * t,    /* it shoots at where you were */
    fireGate: 0.35  + (0.06 - 0.35) * t,    /* won't fire until aim is this close */
    pause:    0.55 * (1 - t),               /* thinking time between bursts */
    jumpRate: 0.05  + (0.55 - 0.05) * t,    /* jumps per second, roughly */
    iq:       t
  };
}
/* draft judgement — general value, synergy with its own build, and counters to
   what it has SEEN. It never reads your current secret pick; it knows only the
   powerups you have already used in fought rounds, like any opponent watching. */
var BOT_VAL = { heavy:2, rapid:1.8, tank:1.8, aegis:1.7, twin:1.6, lucky:1.6,
  marksman:1.6, leech:1.6, longbarrel:1.5, homing:1.5, executioner:1.5,
  sprinter:1.4, regen:1.4, battery:1.4, bloodhound:1.4, slug:1.3, mag:1.3,
  doublejump:1.3, quickhands:1.2, venom:1.2, secondwind:1.2, deflector:1.2,
  frost:1.2, trickshot:1.1, momentum:1.1, sneaky:1.1, buckshot:1.1,
  glass:0.8, chicken:0.8, confetti:0.7, helium:0.6, castle:0.5, drunk:0.9, zoomies:0.9 };
var BOT_SYN = [
  ['grenadier','shortfuse','cluster','rocketboots','finale','mortar'],
  ['bounce','superball','trickshot','pinball','chicken'],
  ['buckshot','scavenger','akimbo','twin'],
  ['handcannon','quickhands','panichands','overcharge','lastcall','finale'],
  ['aegis','battery'], ['dash','blink'],
  ['doublejump','airshow','showtime','moonboots','rocketboots'],
  ['venom','incendiary'], ['adrenaline','soreloser','secondwind']
];
var BOT_COUNTER = [
  { sees: ['aegis','battery'], likes: { venom: 1.4, incendiary: 1.2 } },          /* dots skip shield */
  { sees: ['glass','heavy','marksman','handcannon'], likes: { tank: 1.2, aegis: 1.1, deflector: 1.2, secondwind: 1.4 } },
  { sees: ['sprinter','blink','dash','zoomies','moonboots','airshow','doublejump'],
    likes: { homing: 1.2, bloodhound: 1.3, frost: 1.4, gravitywell: 0.8 } },
  { sees: ['homing','bloodhound','bees'], likes: { deflector: 1.5 } },
  { sees: ['tank','unit','hoarder'], likes: { executioner: 1.6, venom: 0.8 } },
  { sees: ['thorns'], likes: { leech: 1.0, regen: 0.8 } }
];
function botDraftPick(options, ownPicks, seenPicks, level) {
  if (level <= 3) return options[Math.floor(Math.random()*options.length)];
  var best = options[0], bestScore = -1;
  options.forEach(function (id) {
    var score = BOT_VAL[id] || 1;
    if (level >= 6) BOT_SYN.forEach(function (grp) {
      if (grp.indexOf(id) < 0) return;
      grp.forEach(function (m) { if (m !== id && ownPicks.indexOf(m) >= 0) score += 0.9; });
    });
    if (level >= 8) BOT_COUNTER.forEach(function (rule) {
      var seen = rule.sees.some(function (m) { return seenPicks.indexOf(m) >= 0; });
      if (seen && rule.likes[id]) score += rule.likes[id];
    });
    score += Math.random() * 0.15;   /* never perfectly predictable */
    if (score > bestScore) { bestScore = score; best = id; }
  });
  return best;
}

function startBot(level) {
  level = Math.max(1, Math.min(10, level || G.botLevel || 1));
  G.botLevel = level;
  try { localStorage.setItem('duel_lvl', String(level)); } catch (e) {}
  G.mode = 'bot'; G.host = true; G.tx = null;
  G.seed = (Math.random()*4294967296) >>> 0;
  G.myScore = 0; G.foeScore = 0; G.round = 0;
  me.picks = []; foe.picks = [];
  G.botBrain = { p: botParams(level), hist: [], wanderT: 0, mv: { f: 0, r: 0 },
    pauseT: 0.8, jump: false, dash: false };
  hide('levels');
  startCountdown();
}

function angDiff(a, b) {
  var d = (a - b) % (Math.PI*2);
  if (d > Math.PI) d -= Math.PI*2;
  if (d < -Math.PI) d += Math.PI*2;
  return d;
}

/* one brain drive for every bot body — the practice foe and hosted team bots
   alike. It moves through moveFighter and pulls fireFighter's trigger; the
   only inputs are a fighter, a brain, and a target it is allowed to see. */
function brainDrive(f, B, target, tkey, owner, dt) {
  if (!B || !f.alive) return;
  var s = f.stats, P = B.p;
  if (B.tkey !== tkey) { B.tkey = tkey; B.hist = []; }   /* new mark, fresh memory */
  B.hist.push({ t: G.fightT, x: target.pos.x, y: target.pos.y, z: target.pos.z });
  if (B.hist.length > 90) B.hist.shift();
  var seen = B.hist[0];
  for (var i = B.hist.length-1; i >= 0; i--) {
    if (B.hist[i].t <= G.fightT - P.reactT) { seen = B.hist[i]; break; }
  }

  var eye = f.pos.clone(); eye.y += eyeHeight(f);
  var to = new THREE.Vector3(seen.x, seen.y + 1.3, seen.z).sub(eye);
  var horiz = Math.hypot(to.x, to.z) || 1e-6;
  var wantYaw = Math.atan2(-to.x, -to.z);
  var wantPitch = Math.atan2(to.y, horiz);
  var dy = angDiff(wantYaw, f.yaw);
  f.yaw += Math.max(-P.turnSpd*dt, Math.min(P.turnSpd*dt, dy));
  var dp = wantPitch - f.pitch;
  f.pitch += Math.max(-P.turnSpd*dt, Math.min(P.turnSpd*dt, dp));
  f.pitch = Math.max(-1.45, Math.min(1.45, f.pitch));

  B.wanderT -= dt;
  var dist = target.pos.distanceTo(f.pos);
  if (B.wanderT <= 0) {
    B.wanderT = (0.5 + Math.random()*1.1) * (1.2 - P.iq*0.5);
    var press = dist > 11 ? 1 : (dist < 4.5 ? -0.8 : (P.iq > 0.5 ? 0.2 : 0));
    B.mv.f = press;
    B.mv.r = (Math.random() < 0.5 ? 1 : -1) * (0.6 + Math.random()*0.4);
  }
  B.jump = Math.random() < P.jumpRate * dt;
  B.dash = s.dashCharges > 0 && P.iq > 0.4 && f.dashCd <= 0 && Math.random() < dt * 0.5;
  moveFighter(f, { f: B.mv.f, r: B.mv.r, jump: B.jump, dash: B.dash }, dt);

  B.pauseT = Math.max(0, B.pauseT - dt);
  var offTarget = Math.abs(angDiff(wantYaw, f.yaw)) + Math.abs(wantPitch - f.pitch);
  if (B.pauseT <= 0 && target.alive && offTarget < P.fireGate) {
    var cp = Math.cos(f.pitch);
    var dir = new THREE.Vector3(-Math.sin(f.yaw)*cp, Math.sin(f.pitch), -Math.cos(f.yaw)*cp);
    dir.x += (Math.random()-0.5) * 2 * P.aimErr;
    dir.y += (Math.random()-0.5) * 2 * P.aimErr;
    dir.z += (Math.random()-0.5) * 2 * P.aimErr;
    dir.normalize();
    if (fireFighter(f, owner, dir)) B.pauseT = P.pause * (0.5 + Math.random());
  }
}

function stepBot(dt) {
  if (!G.botBrain || !foe.alive) return;
  brainDrive(foe, G.botBrain, me, 'me', 'foe', dt);
  foeNet.pos.copy(foe.pos); foeNet.yaw = foe.yaw; foeNet.has = true;
}

/* the host runs its team bots — same drive, wire keys of their own */
function nearestEnemyOf(team, pos) {
  var best = null, bk = null, bd = 1e9, d;
  if (G.myTeam !== team && me.alive) { best = me; bk = G.myKey; bd = me.pos.distanceTo(pos); }
  eachPeer(function (P, k) {
    if (P.team === team || !P.f.alive) return;
    d = P.f.pos.distanceTo(pos);
    if (d < bd) { bd = d; best = P.f; bk = k; }
  });
  return best ? { f: best, key: bk } : null;
}
function stepHostBots(dt) {
  if (!G.host || G.mode !== 'net') return;
  eachPeer(function (P) {
    if (!P.bot || !P.brain) return;
    stepFighterStatus(P.f, dt);
    if (!P.f.alive) return;
    var tgt = nearestEnemyOf(P.team, P.f.pos);
    if (!tgt) return;
    brainDrive(P.f, P.brain, tgt.f, tgt.key, P.key, dt);
    P.net.pos.copy(P.f.pos); P.net.yaw = P.f.yaw; P.net.has = true;
  });
}

/* landscape: a native orientation lock where the platform has one; where it doesn't
   (iOS Safari ships type/angle/onchange but no lock), rotate the whole game 90
   degrees and remap the thumbs — same trick every web game pulls on iPhones */
(function () {
  window.updateLandBtn = function () { $('landbtn').style.display = TOUCH ? '' : 'none'; };
  window.updateLandBtn();
  var lockable = window.screen && screen.orientation && typeof screen.orientation.lock === 'function';
  var on = false;
  $('landbtn').onclick = function () {
    audio();
    if (lockable && !on) {
      document.documentElement.requestFullscreen()
        .then(function () { return screen.orientation.lock('landscape'); })
        .then(function () { on = true; $('landbtn').textContent = 'Portrait'; })
        .catch(function () { setRot(!ROT); on = ROT;   /* lock refused — rotate instead */
          $('landbtn').textContent = on ? 'Portrait' : 'Landscape'; });
    } else if (lockable && on) {
      try { screen.orientation.unlock(); } catch (e) {}
      if (document.exitFullscreen) document.exitFullscreen().catch(function () {});
      if (ROT) setRot(false);
      on = false; $('landbtn').textContent = 'Landscape';
    } else {
      setRot(!ROT); on = ROT;
      $('landbtn').textContent = on ? 'Portrait' : 'Landscape';
    }
  };
  document.addEventListener('fullscreenchange', function () {
    if (!document.fullscreenElement && on && !ROT) { on = false; $('landbtn').textContent = 'Landscape'; }
  });
})();


/* ---- self status ticks ---- */
function checkDown(f) {
  if (f.hp <= 0 && f.alive) {
    if (f.stats.secondWind && !f.swUsed) {
      f.swUsed = true; f.hp = 1;
      if (f === me) { sTone(392,0.3,0.25); sTone(523,0.3,0.2); }
    } else {
      f.hp = 0; f.alive = false;
      if (f === me) {
        if (G.tx) G.tx.send('death', { k: G.myKey });
        if (G.mode === 'bot') roundOver(false);
        else if (G.host) hostCheckWipe();
        if (G.mode === 'net' && G.phase === 'fight') banner('Down', 'Watch The Round', 1500);
      } else if (f.botKey) {
        if (G.tx) G.tx.send('death', { k: f.botKey });
        hostCheckWipe();
      } else roundOver(true);
    }
  }
}

function stepFighterStatus(f, dt) {
  f.sinceHit += dt;
  if (f.spinT > 0) { f.spinT -= dt; f.yaw += f.spinV * dt; }
  if (f.slowT > 0) { f.slowT -= dt; if (f.slowT <= 0) f.slow = 0; }
  var dotDmg = 0;
  for (var i = f.dots.length-1; i >= 0; i--) {
    var d = f.dots[i];
    d.t -= dt; dotDmg += d.dps*dt;
    if (d.t <= 0) f.dots.splice(i, 1);
  }
  if (dotDmg > 0) {
    f.hp -= dotDmg; f.sinceHit = 0;
    checkDown(f);
    if (f === me) updateHpHud();
  }
  if (f.stats.regen > 0 && f.sinceHit > f.stats.regenDelay && f.hp < f.stats.hp && f.alive) {
    f.hp = Math.min(f.stats.hp, f.hp + f.stats.regen*dt);
    if (f === me) updateHpHud();
  }
  if (f.stats.shieldRegen > 0 && f.sinceHit > 3 && f.shield < Math.max(f.stats.shieldStart, 30)) {
    f.shield = Math.min(Math.max(f.stats.shieldStart, 30), f.shield + f.stats.shieldRegen*dt);
    if (f === me) updateHpHud();
  }
  if (f.reload > 0) {
    f.reload -= dt;
    if (f.reload <= 0) { f.reload = 0; f.mag = f.stats.magSize; f.shotsInMag = 0;
      if (f === me) { $('reloadtag').classList.remove('show'); updateAmmoHud(); sTone(700,0.05,0.1,'square'); } }
  }
  f.fireCd = Math.max(0, f.fireCd - dt);
}

function stepSelfStatus(dt) {
  stepFighterStatus(me, dt);
  if (((keys.Mouse0 || mouseDown) && locked) || touch.firing) fire();
}
var mouseDown = false;
canvas.addEventListener('mousedown', function(){ mouseDown = true; });
window.addEventListener('mouseup', function(){ mouseDown = false; });

/* left half of the screen is the stick, the rest of it is the look */
function onTouchStart(e) {
  audio();
  setTouchMode(true);
  if (G.phase !== 'fight' && G.phase !== 'countdown') return;
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    if (t.target && t.target.closest && t.target.closest('.tbtn, button, a, input')) continue;
    var q = tp(t);
    if (q.x < vw() * 0.45 && touch.moveId === null) {
      touch.moveId = t.identifier;
      touch.ax = q.x; touch.ay = q.y;
      setStickVec(0, 0);
      var st = $('stick');
      st.style.display = 'block';
      st.style.left = q.x + 'px'; st.style.top = q.y + 'px';
      $('sticknub').style.transform = 'translate(0px,0px)';
    } else if (touch.lookId === null) {
      touch.lookId = t.identifier;
      touch.lx = q.x; touch.ly = q.y;
    }
  }
  e.preventDefault();
}
function onTouchMove(e) {
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    var q = tp(t);
    if (t.identifier === touch.moveId) {
      var dx = q.x - touch.ax, dy = q.y - touch.ay;
      var d = Math.hypot(dx, dy);
      if (d > 52) { dx *= 52/d; dy *= 52/d; }
      setStickVec(dx/52, dy/52);
      $('sticknub').style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
    } else if (t.identifier === touch.lookId) {
      applyLook(q.x - touch.lx, q.y - touch.ly);
      touch.lx = q.x; touch.ly = q.y;
    }
  }
  e.preventDefault();
}
function onTouchEnd(e) {
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    if (t.identifier === touch.moveId) {
      touch.moveId = null; clearStick();
      $('stick').style.display = 'none';
    } else if (t.identifier === touch.lookId) {
      touch.lookId = null;
    }
  }
}
window.addEventListener('touchstart', onTouchStart, { passive: false });
window.addEventListener('touchmove', onTouchMove, { passive: false });
window.addEventListener('touchend', onTouchEnd);
window.addEventListener('touchcancel', onTouchEnd);

function bindHold(id, down, up) {
  var el2 = $(id);
  el2.addEventListener('touchstart', function (e) { e.preventDefault(); e.stopPropagation(); audio(); down(); }, { passive: false });
  el2.addEventListener('touchend', function (e) { e.preventDefault(); e.stopPropagation(); if (up) up(); }, { passive: false });
  el2.addEventListener('touchcancel', function () { if (up) up(); });
}
bindHold('fireBtn', function () { touch.firing = true; fire(); }, function () { touch.firing = false; });
bindHold('jumpBtn', function () { keys.Space = true; }, function () { keys.Space = false; });
bindHold('dashBtn', function () { keys.ShiftLeft = true; }, function () { keys.ShiftLeft = false; });
bindHold('reloadBtn', function () {
  if (G.phase === 'fight' && !me.stats.noReload && me.mag < me.stats.magSize && me.reload <= 0) startReload();
});

/* ---- remote presentation ---- */
function stepPeerVisuals(dt) {
  var showPhases = G.phase==='fight'||G.phase==='countdown'||G.phase==='intermission';
  eachPeer(function (P) {
    if (!P.net.has) { P.mesh.visible = false; if (P.bar) P.bar.style.display = 'none'; return; }
    if (!(P.bot && G.host)) P.f.pos.lerp(P.net.pos, Math.min(1, dt*10));
    P.mesh.position.copy(P.f.pos);
    P.mesh.rotation.y += (P.net.yaw - P.mesh.rotation.y) * Math.min(1, dt*10);
    P.mesh.visible = P.f.alive && showPhases;
    if (!P.bar) return;
    if (P.mesh.visible) {
      var top = P.f.pos.clone(); top.y += 2.0 * P.f.stats.scale;
      var pr = top.project(camera);
      if (pr.z < 1) {
        P.bar.style.display = 'block';
        P.bar.style.left = ((pr.x*0.5+0.5)*vw() - 32) + 'px';
        P.bar.style.top = ((-pr.y*0.5+0.5)*vh() - 8) + 'px';
        P.bar.firstChild.style.width = Math.max(0, P.f.hp / P.f.stats.hp * 100) + '%';
      } else P.bar.style.display = 'none';
    } else P.bar.style.display = 'none';
  });
}
function stepFoeVisual(dt) {
  if (G.mode === 'net') { stepPeerVisuals(dt); $('foehp').style.display = 'none'; return; }
  if (!foeNet.has) return;
  foe.pos.lerp(foeNet.pos, Math.min(1, dt*10));
  foeMesh.position.copy(foe.pos);
  foeMesh.rotation.y += (foeNet.yaw - foeMesh.rotation.y) * Math.min(1, dt*10);
  foeMesh.visible = foe.alive && (G.phase==='fight'||G.phase==='countdown'||G.phase==='intermission');
  /* their bar, floated over their head */
  var el = $('foehp');
  if (foeMesh.visible) {
    var top = foe.pos.clone(); top.y += 2.0*foe.stats.scale;
    var p = top.project(camera);
    if (p.z < 1) {
      el.style.display = 'block';
      el.style.left = ((p.x*0.5+0.5)*vw() - 32) + 'px';
      el.style.top = ((-p.y*0.5+0.5)*vh() - 8) + 'px';
      $('foehpfill').style.width = Math.max(0, foe.hp/foe.stats.hp*100) + '%';
    } else el.style.display = 'none';
  } else el.style.display = 'none';
}

/* ---- main loop ---- */
var clock3 = new THREE.Clock();
function tick() {
  requestAnimationFrame(tick);
  var dt = Math.min(clock3.getDelta(), 0.05);
  var i;

  if (G.phase === 'countdown') {
    G.countdownT -= dt;
    var n = Math.ceil(G.countdownT);
    if (n !== tick._lastN && n > 0) { banner(String(n), null, 700); sTone(440, 0.1, 0.15); tick._lastN = n; }
    moveSelf(dt);
    if (G.countdownT <= 0) { G.phase = 'fight'; G.fightT = 0; banner('Fight', null, 700); sTone(880, 0.2, 0.2); }
  }
  if (G.phase === 'fight') {
    G.fightT += dt;
    if (me.alive) { moveSelf(dt); stepSelfStatus(dt); }
    if (G.mode === 'bot') { stepBot(dt); stepFighterStatus(foe, dt); }
    if (G.mode === 'net') stepHostBots(dt);
    stateAcc += dt;
    if (G.tx && stateAcc > STATE_HZ) {
      stateAcc = 0;
      G.tx.send('state', { k: G.myKey, p: [me.pos.x, me.pos.y, me.pos.z], y: me.yaw, hp: me.hp });
      if (G.host) eachPeer(function (P) {
        if (!P.bot) return;
        G.tx.send('state', { k: P.key, p: [P.f.pos.x, P.f.pos.y, P.f.pos.z], y: P.f.yaw, hp: P.f.hp });
      });
    }
  }
  if (G.phase === 'fight' || G.phase === 'intermission' || G.phase === 'countdown') {
    for (i = bullets.length-1; i >= 0; i--) {
      if (!stepBullet(bullets[i], dt)) { scene.remove(bullets[i].mesh); bullets.splice(i, 1); }
    }
    stepFoeVisual(dt);
  }
  for (i = fx.length-1; i >= 0; i--) {
    var e = fx[i];
    e.life -= dt;
    if (e.grow) { e.obj.scale.addScalar(e.grow*dt); e.mat.opacity = Math.max(0, e.life/0.28)*0.8; }
    else { e.vel.y -= 9.8*dt; e.obj.position.addScaledVector(e.vel, dt); }
    if (e.life <= 0) { scene.remove(e.obj); fx.splice(i, 1); }
  }
  renderer.render(scene, camera);
}
tick();

/* menu camera — inside the arena, looking down the length of it */
camera.position.set(0, 4.4, 8.6);
camera.rotation.order = 'YXZ';
camera.rotation.x = -0.34;

/* ---- headless eye ---- */
window.DuelDebug = {
  THREE_OK: true,
  renderer: renderer, scene: scene, camera: camera,
  me: me, foe: foe, foeMesh: foeMesh, G: G, bullets: bullets,
  ARENA: ARENA, anyCollide: anyCollide, segSegDist: segSegDist,
  hitsFighter: hitsFighter, hitsHead: hitsHead, spawnBullet: spawnBullet, stepBullet: stepBullet,
  startBot: startBot, moveSelf: moveSelf, keys: keys,
  moveFighter: moveFighter, fireFighter: fireFighter, applyHit: applyHit,
  computeHitDamage: computeHitDamage, stepFighterStatus: stepFighterStatus,
  stepBot: stepBot, botParams: botParams, botDraftPick: botDraftPick,
  startReloadFor: startReloadFor,
  setTouchMode: setTouchMode, isTouch: function(){ return TOUCH; },
  peers: peers, ensurePeer: ensurePeer, dropPeer: dropPeer, spawnSlot: spawnSlot,
  teamAliveCount: teamAliveCount, enemiesOfMine: enemiesOfMine, hashKey: hashKey,
  nearestEnemyTo: nearestEnemyTo, onWire: onWire, hostCheckWipe: hostCheckWipe,
  brainDrive: brainDrive, stepHostBots: stepHostBots, nearestEnemyOf: nearestEnemyOf,
  isBotKey: isBotKey, routeHit: routeHit,
  PU: PU,
  touch: touch, setStickVec: setStickVec, clearStick: clearStick, applyLook: applyLook,
  setRot: setRot, tp: tp, vw: vw, vh: vh, isRot: function(){ return ROT; },
  stepSelfStatus: stepSelfStatus, fire: fire
};
</script>
