<!DOCTYPE html>
<!-- Infinite Table — 8-Ball. Version: 0.6.3

     The first continuous-physics game with turn-based rules on the platform. The wire
     never carries ball positions in flight: a shot is an intent {angle, power}, the host
     replays it through shared/pool-physics.js, judges it with shared/pool-rules.js, and
     broadcasts the input plus the authoritative final positions. Every phone animates
     the same deterministic replay locally and snaps to the host's truth when it lands.
     Host-authoritative like Mafia; the shooter waits ~a beat for the echo, and in
     exchange nobody's table can ever disagree. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>8-Ball</title>
<style>
  :root{
    --felt:#1f6f43; --felt-deep:#144d2e; --wood:#5b3a24; --wood-deep:#3a2312;
    --ivory:#f4efe5; --gold:#e8c63b; --gold-deep:#b8952a;
    --panel:#0e1813; --panel-2:#152219; --line:#26402f; --line-soft:#1c3124;
    --good:#3fce6f; --bad:#ff5d6c; --chalk:#7fb6d9; --dim:#8fb29b; --dimmer:#6d8f7a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Segoe UI",Roboto,system-ui,Arial,sans-serif;color:var(--ivory);
    background:
      radial-gradient(1100px 700px at 50% -14%, #1e3b2b 0%, rgba(0,0,0,0) 60%),
      radial-gradient(900px 900px at 50% 115%, #0d1a12 0%, rgba(0,0,0,0) 55%),
      linear-gradient(180deg,#0b1510 0%, #060c09 100%);
    min-height:100%;display:flex;flex-direction:column;align-items:center;padding:8px;
  }
  #wrap{width:100%;max-width:760px;display:flex;flex-direction:column;min-height:100%;}
  header{display:flex;align-items:center;justify-content:space-between;padding:6px 4px 10px;}
  h1{margin:0;font-size:22px;letter-spacing:3px;font-weight:900;display:flex;align-items:center;gap:9px;}
  .orb{
    width:26px;height:26px;border-radius:50%;flex:0 0 auto;
    background:radial-gradient(circle at 34% 30%, #4a4a52 0%, #17171b 42%, #060608 100%);
    box-shadow:inset -2px -3px 5px rgba(0,0,0,.7), 0 2px 5px rgba(0,0,0,.5);
    position:relative;
  }
  .orb::after{
    content:'8';position:absolute;inset:0;margin:auto;width:14px;height:14px;border-radius:50%;
    background:#f4efe5;color:#17171b;font-size:10px;font-weight:900;line-height:14px;text-align:center;
  }
  .ver{font-size:11px;color:var(--dimmer);letter-spacing:.8px;}
  .sub{color:var(--dim);font-size:13px;line-height:1.5;}
  .card{
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);border-radius:16px;padding:18px;
    box-shadow:0 18px 42px rgba(0,0,0,.5), inset 0 1px 0 rgba(244,239,229,.05);
  }
  .hero{
    margin:-18px -18px 16px;padding:26px 18px 22px;border-radius:15px 15px 0 0;
    background:
      radial-gradient(240px 130px at 82% 20%, rgba(232,198,59,.14) 0%, rgba(0,0,0,0) 70%),
      radial-gradient(120% 150% at 22% 0%, #257a4a 0%, #1a5f39 55%, #123f26 100%);
    border-bottom:1px solid rgba(232,198,59,.22);
    display:flex;align-items:center;gap:14px;
  }
  .hero .orb{width:44px;height:44px;box-shadow:inset -3px -5px 9px rgba(0,0,0,.7), 0 6px 14px rgba(0,0,0,.5);}
  .hero .orb::after{width:22px;height:22px;font-size:15px;line-height:22px;}
  .hero .ht{font-size:19px;font-weight:900;letter-spacing:1.5px;}
  .hero .hs{color:#cfe6d6;font-size:12.5px;margin-top:3px;letter-spacing:.3px;}
  .btn{
    display:block;width:100%;margin-top:10px;padding:14px;border-radius:12px;cursor:pointer;
    border:1px solid #2c5038;background:linear-gradient(180deg,#1a2f21,#13251a);
    color:var(--ivory);font-size:14px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;
    box-shadow:0 3px 10px rgba(0,0,0,.35), inset 0 1px 0 rgba(244,239,229,.07);
    transition:transform .06s, filter .12s;
  }
  .btn.primary{background:linear-gradient(180deg,#2f9459,#1e6c41);border-color:rgba(63,206,111,.45);}
  .btn:active{transform:translateY(1px);filter:brightness(1.08);}
  input{
    width:100%;padding:13px;border-radius:11px;border:1px solid #2c5038;background:#0b150f;
    color:var(--ivory);font-size:16px;letter-spacing:1px;margin-top:8px;outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  input:focus{border-color:rgba(232,198,59,.55);box-shadow:0 0 0 3px rgba(232,198,59,.12);}
  input::placeholder{color:#527a61;}
  .row{display:flex;gap:8px;} .row .btn{margin-top:8px;}
  .or{display:flex;align-items:center;gap:10px;color:var(--dimmer);font-size:11px;letter-spacing:2px;margin-top:14px;}
  .or::before,.or::after{content:'';flex:1;height:1px;background:var(--line-soft);}
  #banner{
    position:fixed;left:50%;top:12px;transform:translate(-50%,-8px);
    background:rgba(10,20,14,.92);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
    border:1px solid rgba(232,198,59,.35);color:var(--ivory);
    padding:10px 18px;border-radius:12px;font-weight:800;letter-spacing:.8px;font-size:12.5px;
    opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;z-index:40;max-width:92vw;text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
  }
  #banner.on{opacity:1;transform:translate(-50%,0);}
  .codebig{
    font-size:40px;letter-spacing:12px;text-align:center;font-weight:900;margin:12px 0 4px;padding-left:12px;
    color:var(--gold);text-shadow:0 0 24px rgba(232,198,59,.35), 0 2px 0 rgba(0,0,0,.55);
  }
  .seat{
    display:flex;align-items:center;gap:11px;padding:10px 12px;
    border:1px solid var(--line);border-radius:12px;margin-top:8px;background:#0d1a13;
  }
  .seat .sav,.pav{
    width:30px;height:30px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    font-weight:900;font-size:13px;color:#0b150f;
    background:linear-gradient(180deg,#e8c63b,#c9a52a);box-shadow:inset 0 -2px 3px rgba(0,0,0,.25);
  }
  .seat .sname{flex:1;font-weight:700;}
  .seat .host{color:var(--gold);font-size:10px;letter-spacing:1.5px;font-weight:800;}
  /* the match screen */
  #hud{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:stretch;margin-bottom:8px;}
  .plate{
    display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-radius:13px;
    padding:8px 10px;background:linear-gradient(180deg,#12211770,#0d1a1370);min-width:0;
    transition:border-color .2s, box-shadow .2s;
  }
  #plateB{flex-direction:row-reverse;text-align:right;}
  #plateB .pgroup{justify-content:flex-end;}
  .plate .pav{width:26px;height:26px;font-size:12px;}
  #plateB .pav{background:linear-gradient(180deg,#8fc3e0,#5f93b3);}
  .pmain{min-width:0;flex:1;}
  .plate.turn{border-color:rgba(232,198,59,.75);box-shadow:0 0 14px rgba(232,198,59,.22), inset 0 0 10px rgba(232,198,59,.05);animation:turnpulse 2.2s ease-in-out infinite;}
  @keyframes turnpulse{
    0%,100%{box-shadow:0 0 10px rgba(232,198,59,.16), inset 0 0 8px rgba(232,198,59,.04);}
    50%{box-shadow:0 0 20px rgba(232,198,59,.34), inset 0 0 12px rgba(232,198,59,.08);}
  }
  .pname{font-weight:800;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pgroup{font-size:9.5px;letter-spacing:1.2px;color:var(--dim);text-transform:uppercase;margin-top:3px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
  .pgroup .mini{width:9px;height:9px;border-radius:50%;display:inline-block;border:1px solid rgba(0,0,0,.5);box-shadow:inset -1px -1px 1px rgba(0,0,0,.35), 0 1px 1px rgba(0,0,0,.3);}
  #clock{
    min-width:52px;display:flex;align-items:center;justify-content:center;
    font-weight:900;font-size:17px;color:var(--ivory);
    border:1px solid var(--line);border-radius:13px;background:#0d1a13;padding:0 10px;
    font-variant-numeric:tabular-nums;
  }
  #clock.low{color:var(--bad);border-color:rgba(255,93,108,.5);animation:clockpulse 1s ease-in-out infinite;}
  @keyframes clockpulse{0%,100%{box-shadow:none;}50%{box-shadow:0 0 12px rgba(255,93,108,.3);}}
  #stage{position:relative;width:100%;}
  canvas{display:block;width:100%;touch-action:none;border-radius:14px;box-shadow:0 22px 48px rgba(0,0,0,.55), 0 3px 10px rgba(0,0,0,.4);}
  #fine{display:none;align-items:center;gap:10px;margin-top:9px;}
  #fine.on{display:flex;}
  #finelab{font-size:9px;letter-spacing:2px;color:var(--dimmer);font-weight:800;}
  #finetrack{position:relative;flex:1;height:24px;border-radius:12px;background:#0b150f;border:1px solid var(--line);touch-action:none;overflow:hidden;}
  #finetrack::before{content:'';position:absolute;left:50%;top:5px;bottom:5px;width:1px;background:var(--line);}
  #fineknob{position:absolute;left:50%;top:2px;width:44px;height:18px;margin-left:-22px;border-radius:10px;
    background:linear-gradient(180deg,#2f9459,#1e6c41);border:1px solid rgba(63,206,111,.5);
    transition:transform .18s;}
  #fineknob.live{transition:none;}
  #hint{text-align:center;font-size:12.5px;color:var(--dim);margin-top:9px;min-height:17px;letter-spacing:.3px;}
  #log{font-size:11.5px;color:var(--dimmer);margin-top:5px;text-align:center;min-height:15px;font-style:italic;}
  #over{
    position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(400px 300px at 50% 42%, rgba(20,40,28,.94) 0%, rgba(5,10,7,.96) 100%);
    border-radius:14px;z-index:5;
  }
  #over.on{display:flex;}
  #over .big{
    font-size:32px;font-weight:900;letter-spacing:3px;
    background:linear-gradient(180deg,#f7e9a8 0%, var(--gold) 55%, var(--gold-deep) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 4px 22px rgba(232,198,59,.25);
  }
  #over .why{color:var(--dim);margin:8px 0 4px;font-size:13px;letter-spacing:.4px;}
  #over .rule{width:120px;height:1px;background:linear-gradient(90deg,transparent,rgba(232,198,59,.6),transparent);margin:10px 0 16px;}
  #over .btn{width:auto;padding:13px 26px;}
  .screen{display:none;} .screen.on{display:block;}
  #game.screen.on{display:flex;flex-direction:column;}
</style>
</head>
<body>
<div id="wrap">
<header>
  <h1><span class="orb"></span>EIGHT BALL</h1>
  <span class="ver">v0.6.3</span>
</header>

<div id="home" class="screen on">
  <div class="card">
    <div class="hero">
      <span class="orb"></span>
      <div>
        <div class="ht">EIGHT BALL</div>
        <div class="hs">Two players &middot; one table &middot; no called pockets</div>
      </div>
    </div>
    <input id="pname" maxlength="14" placeholder="Your name">
    <button class="btn primary" onclick="NET.host()">Host a Table</button>
    <div class="or">OR JOIN ONE</div>
    <div class="row">
      <input id="jcode" maxlength="4" placeholder="CODE" style="text-transform:uppercase">
      <button class="btn" style="width:44%" onclick="NET.join()">Join</button>
    </div>
    <button class="btn" style="margin-top:14px;opacity:.75" onclick="NET.solo()">Practice Solo &middot; both seats, no wire</button>
  </div>
</div>

<div id="lobby" class="screen">
  <div class="card">
    <div class="sub" style="text-align:center">Table code — read it across the room</div>
    <div class="codebig" id="codebig">····</div>
    <div id="seatlist"></div>
    <div id="lobbyctl"></div>
  </div>
</div>

<div id="game" class="screen">
  <div id="hud">
    <div class="plate" id="plateA"><div class="pav"></div><div class="pmain"><div class="pname"></div><div class="pgroup"></div></div></div>
    <div id="clock">–</div>
    <div class="plate" id="plateB"><div class="pav"></div><div class="pmain"><div class="pname"></div><div class="pgroup"></div></div></div>
  </div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="over"><div class="big"></div><div class="why"></div><div class="rule"></div><div id="overctl"></div></div>
  </div>
  <div id="fine"><div id="finelab">FINE AIM</div><div id="finetrack"><div id="fineknob"></div></div></div>
  <div id="hint"></div>
  <div id="log"></div>
</div>
</div>
<div id="banner"></div>

<script src="../shared/config.js?v=0.6.3"></script>
<script src="../shared/tablekit.js?v=0.6.3"></script>
<script src="../shared/pool-rules.js?v=0.6.3"></script>
<script src="../shared/pool-physics.js?v=0.6.3"></script>
<script>
'use strict';
/* ---------- little helpers, house style ---------- */
const $ = s => document.querySelector(s);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let BTIMER = null;
function banner(t){ const b=$('#banner'); if(!b) return; b.textContent=t; b.classList.add('on'); clearTimeout(BTIMER); BTIMER=setTimeout(()=>b.classList.remove('on'), 2600); }
function nameField(){ const v=(($('#pname')||{}).value||'').trim(); return v || 'Player '+Math.floor(Math.random()*90+10); }

const PP = (typeof PoolPhysics!=='undefined') ? PoolPhysics : null;
const PR = (typeof PoolRules!=='undefined') ? PoolRules : null;
const CLOCK_MS = 75000;   // generous — pool is a thinking game; expiry is an ordinary foul

/* ---------- game state, one shape everywhere ---------- */
let G = {
  phase:'home',            // home | lobby | play | over
  seq:0,
  by:null,                 // who authored this state
  to:false,                // this state is a clock-claim by the waiting player — a rightful shot at the same seq beats it
  balls:[],                // [{id, x, y, pocketed}] — velocities never live in state
  turnKey:null,
  open:true, groups:{},    // groups[key] = 'red' | 'yellow'
  breakShot:true,
  breakerKey:null,         // who racked this game — breaks alternate
  inHand:null,             // {key, behindHead} | null — that player may drag the cue
  winner:null, winBy:'',
  nextSeed:0, nextBreaker:null,   // stamped into the game-over state so either player can build the identical next rack
  roster:[],               // [{key, name}]
  log:[],
  clockSecs:null,
  clockFullAt:0,           // authority-local deadline; snapshot() turns it into clockSecs for the wire
};
let ANIM = null;           // {sim, endState, last} while a shot is flying
let SHOTQ = [];            // shots that arrived while one was still flying — played, never dropped
let CLOCKBASE = null;      // {secs, at} — this phone's view of the running clock
let DEADLINE = null;       // the same clock as a local timestamp — whoever's job it is, enforces from this
let AIMDIR = null;         // {angle} — sticky aim, set by dragging the table, kept until the turn passes
let POWERDRAG = null;      // {p} while the side bar is being pulled — release fires
let SPIN = { x:0, y:0 };   // english: x side, y follow(+)/draw(-) — set on the little cue face, spent by the next shot
let PLACING = false;       // dragging the cue for ball in hand
let OPPAT = 0;             // when the other side was last heard from
let OPPQUIET = false;      // their phone went quiet — informational, never blocking: this is the whole point

function me(){ return NET.pkey; }
function myTurn(){ return G.phase==='play' && (NET.mode==='solo' || G.turnKey===me()) && !ANIM && !SHOTQ.length; }
function opponentOf(key){ const o = G.roster.find(r=>r.key!==key); return o ? o.key : null; }
function cueBall(balls){ return (balls||G.balls).find(b=>b.id===0); }
function onTableIds(balls){ return (balls||G.balls).filter(b=>!b.pocketed && b.id!==0).map(b=>b.id); }

/* ---------- the state, as data ---------- */
function snapshot(){
  return {
    phase:G.phase, seq:G.seq, by:G.by, to:!!G.to,
    balls:G.balls.map(b=>({ id:b.id, x:+b.x.toFixed(4), y:+b.y.toFixed(4), pocketed:!!b.pocketed })),
    turnKey:G.turnKey, open:G.open, groups:G.groups, breakShot:G.breakShot, breakerKey:G.breakerKey,
    inHand:G.inHand, winner:G.winner, winBy:G.winBy,
    nextSeed:G.nextSeed, nextBreaker:G.nextBreaker,
    roster:G.roster, log:G.log.slice(0,4),
    clockSecs: (G.phase==='play' && G.clockFullAt) ? Math.max(0, Math.ceil((G.clockFullAt-Date.now())/1000)) : null,
  };
}

/* A rack is a pure function of (seed, breaker, roster) — that is the whole trick.
   Both players can build the next game independently and broadcast identical states;
   the race between two rerack taps is idempotent by construction. */
function buildRack(p){
  const order = PR.rackOrder(p.seed);
  const pos = PP.rackPositions();
  const cs = PP.cueStart();
  const bn = (p.roster.find(r=>r.key===p.breakerKey)||{}).name||'?';
  return {
    phase:'play', seq:p.seq, by:p.by, to:false,
    balls:[{ id:0, x:+cs.x.toFixed(4), y:+cs.y.toFixed(4), pocketed:false }]
      .concat(order.map((id,i)=>({ id, x:+pos[i].x.toFixed(4), y:+pos[i].y.toFixed(4), pocketed:false }))),
    turnKey:p.breakerKey, open:true, groups:{}, breakShot:true, breakerKey:p.breakerKey,
    inHand:{ key:p.breakerKey, behindHead:true },
    winner:null, winBy:'', nextSeed:0, nextBreaker:null,
    roster:p.roster, log:[bn+' breaks. Place the cue behind the line.'],
    clockSecs: Math.ceil(CLOCK_MS/1000),
  };
}

/* Fold a simulated shot and its verdict into G. The shooter is the authority for
   their own stroke — this runs exactly once, on the shooter's phone. */
function foldShot(shooter, sim, res, flightMs){
  G.balls = sim.balls.map(b=>({ id:b.id, x:b.x, y:b.y, pocketed:b.pocketed }));
  if(res.respotEight){
    const eight = G.balls.find(b=>b.id===8);
    const spot = PP.respotPosition(G.balls);
    eight.pocketed=false; eight.x=spot.x; eight.y=spot.y;
  }
  const names = {}; G.roster.forEach(r=>names[r.key]=r.name);
  const sn = names[shooter]||'?';
  if(sim.events.firstHit!=null || sim.events.pocketed.length) G.breakShot = false;
  if(res.assignShooter){
    const opp = opponentOf(shooter);
    G.groups[shooter] = res.assignShooter;
    G.groups[opp] = res.assignShooter==='red' ? 'yellow' : 'red';
  }
  G.open = res.nowOpen;
  if(res.win || res.lose){
    G.phase='over';
    G.winner = res.win ? shooter : opponentOf(shooter);
    G.winBy = res.win ? 'the black, clean' : (res.foul || 'the black, thrown away');
    G.inHand = null; G.clockFullAt = 0;
    G.nextSeed = (Math.random()*0x7fffffff)|0;           // the loser of THIS coin flip is determinism: stamped once, used by either tap
    G.nextBreaker = opponentOf(G.breakerKey) || shooter; // breaks alternate
    G.log.unshift((names[G.winner]||'?')+' wins — '+G.winBy+'.');
  } else {
    const next = (res.again && !res.foul) ? shooter : opponentOf(shooter);
    G.turnKey = next;
    if(res.foul){
      G.inHand = { key:next, behindHead:!!res.behindHead };
      const cb = cueBall();
      if(cb.pocketed || (res.behindHead && cb.x > PP.HEADSTRING)){
        const spot = NET.freeSpot(res.behindHead);
        cb.pocketed=false; cb.x=spot.x; cb.y=spot.y;
      }
      G.log.unshift('Foul on '+sn+' — '+res.foul+'. '+(names[next]||'?')+' has ball in hand'+(res.behindHead?' behind the line':'')+'.');
    } else {
      G.inHand = null;
      const potted = sim.events.pocketed.filter(id=>id!==0);
      if(potted.length){
        const nr = potted.filter(id=>PR.groupOf(id)==='red').length;
        const ny = potted.filter(id=>PR.groupOf(id)==='yellow').length;
        const bits = [];
        if(nr) bits.push(nr===1?'a red':nr+' reds');
        if(ny) bits.push(ny===1?'a yellow':ny+' yellows');
        if(potted.indexOf(8)>=0) bits.push('the black');
        G.log.unshift(sn+' pockets '+bits.join(' and ')+(res.again?' and stays on.':'.'));
      }
      else G.log.unshift(sn+' — dry. '+(names[next]||'?')+' to shoot.');
    }
    G.clockFullAt = Date.now() + (flightMs||0) + CLOCK_MS;
  }
  G.seq++; G.by = shooter; G.to = false;
}

/* The clock, enforced by whoever's job it is. The turn player calls it on themselves
   first; only a long-gone shooter gets claimed by the waiter — and even then, a
   rightful shot arriving at the same seq wins the tie. */
function timeoutFoul(claimer, isClaim){
  const slow = G.turnKey, next = opponentOf(slow);
  const names={}; G.roster.forEach(r=>names[r.key]=r.name);
  G.turnKey = next;
  G.inHand = { key:next, behindHead:!!G.breakShot };
  const cb = cueBall();
  if(cb && G.breakShot && cb.x > PP.HEADSTRING){ const sp=NET.freeSpot(true); cb.x=sp.x; cb.y=sp.y; }
  G.log.unshift('Shot clock on '+(names[slow]||'?')+'. '+(names[next]||'?')+' has ball in hand.');
  G.clockFullAt = Date.now() + CLOCK_MS;
  G.seq++; G.by = claimer; G.to = !!isClaim;
  NET.sendState();
  applyState(snapshot(), true);
}

/* ---------- the network: no host. Authority follows the turn. ----------
   A shot is applied on the shooter's phone and broadcast as input + resulting
   state; the other phone replays the identical deterministic animation and lands
   on the identical state. Highest seq wins; turn exclusivity means competing
   states at one seq can only come from a clock-claim race, which the 'to' flag
   settles in the rightful shooter's favour. Nobody waits for anybody to be awake. */
const NET = {
  mode:'off', code:null, pkey:null, myName:'', tx:null, sb:null, _ch:null, _meta:null, _rbAt:0, _hbn:0, _downAt:0,
  async ensure(){
    if(this.sb) return true;
    try{
      const sb = await TableKit.client();
      this.sb = sb; this.pkey = TableKit.pkey();
      return true;
    }catch(e){ banner('OFFLINE? '+(e&&e.message||e)); return false; }
  },
  async connect(code, hosting, quiet){
    if(!(await this.ensure())) return false;
    this.code = code;
    try{
      this.tx = await TableKit.join({
        prefix:'pool', code,
        events:['start','state','shot','hello','hb'],
        onMessage:(ev,p)=>this.onMessage(ev,p),
        onPresence:()=>{ render(); },
        meta:{ key:this.pkey, name:this.myName, host:!!hosting },
      });
    }catch(e){ if(!quiet) banner('COULD NOT CONNECT — CHECK SIGNAL'); return false; }
    this._ch = this.tx._ch;
    this._meta = { key:this.pkey, name:this.myName, host:!!hosting };
    return true;
  },
  async revive(fromWake){
    if(!this.code || this.mode==='off') return;
    if(this.tx && this.tx.alive()){
      this._downAt = 0;
      if(this._meta){ try{ this.tx.track(this._meta); }catch(e){} }
      if(fromWake && this.mode==='peer'){
        settle();                                        // land any flight frozen by the nap before talking
        this.tx.send('hello',{ key:this.pkey });         // who moved while I slept?
        if(G.phase==='play' || G.phase==='over') this.sendState();   // and here is where I left off
      }
      if(G.phase==='lobby') render();
      return;
    }
    if(!this._downAt) this._downAt = Date.now();
    const blip = Date.now() - this._downAt < 10000;   // short drops reconnect in silence; only a real outage gets words
    if(!blip && Date.now() - (this._rbAt||0) > 15000){ this._rbAt = Date.now(); banner('RECONNECTING…'); }
    if(await this.connect(this.code, this.mode==='lobby-host', blip)){
      if(!blip) banner('BACK AT THE TABLE');
      this._downAt = 0;
      if(this.mode==='peer'){ this.tx.send('hello',{ key:this.pkey }); if(G.phase==='play'||G.phase==='over') this.sendState(); }
      else if(this.mode==='joining'){ this.tx.send('hello',{ key:this.pkey }); }
      render();
    }
  },
  lobbySeats(){ return TableKit.seatsFrom(this.tx ? this.tx.presence() : {}, 8).map(m=>({ key:m.key, name:m.name||'Player', host:!!m.host })); },
  async host(){
    try{
      this.myName = nameField();
      if(!(await this.connect(TableKit.roomCode(), true))) return;
      this.mode='lobby-host'; G.phase='lobby'; render();
    }catch(e){ banner('HOST FAILED: '+(e&&e.message||e)); }
  },
  async join(){
    try{
      this.myName = nameField();
      const code = (($('#jcode')||{}).value||'').toUpperCase().trim();
      if(code.length!==4){ banner('FOUR LETTERS'); return; }
      if(!(await this.connect(code,false))) return;
      this.mode='joining'; G.phase='lobby'; render();
      this.tx.send('hello',{ key:this.pkey });
    }catch(e){ banner('JOIN FAILED: '+(e&&e.message||e)); }
  },
  solo(){   // a practice table: both seats, one thumb, zero network — the whole game, minus the waiting
    this.myName = nameField();
    this.pkey = this.pkey || 'solo-a';
    this.tx = { send(){}, presence:()=>({}), track(){}, alive:()=>true, close(){} };   // the wire, unplugged
    this.mode = 'solo';
    const roster = [{ key:this.pkey, name:this.myName }, { key:'solo-b', name:'Sparring' }];
    const st = buildRack({ seq:1, seed:(Math.random()*0x7fffffff)|0, breakerKey:this.pkey, roster, by:this.pkey });
    applyState(st, true);
  },
  startGame(){   // the lobby's only privilege: assemble the roster and hand the game to the table
    const seats = this.lobbySeats();
    if(seats.length < 2){ banner('NEED TWO PLAYERS'); return; }
    if(seats.length > 2){ banner('POOL SEATS TWO — FIRST TWO PLAY'); }
    const roster = seats.slice(0,2).map(s=>({ key:s.key, name:s.name }));
    const st = buildRack({ seq:1, seed:(Math.random()*0x7fffffff)|0, breakerKey:this.pkey, roster, by:this.pkey });
    this.mode='peer';
    OPPAT = Date.now();
    this.tx.send('start',{ roster, state:st });
    applyState(st, true);
  },
  sendState(){ if(this.tx && this.mode==='peer') this.tx.send('state', snapshot()); },
  onMessage(type, m){
    if(this.mode==='lobby-host'){
      if(type==='hello') render();   // presence carries the lobby until the rack is built
      return;
    }
    OPPAT = Date.now();
    if(OPPQUIET){ OPPQUIET=false; render(); }
    if(type==='start'){
      if(this.mode!=='peer') this.mode='peer';
      G.roster = m.roster||G.roster;
      const tail = SHOTQ.length ? SHOTQ[SHOTQ.length-1].seq : (ANIM ? ANIM.endState.seq : G.seq);
      if(m.state && m.state.seq > tail){ ANIM=null; SHOTQ=[]; applyState(m.state); }
      else render();
      return;
    }
    if(this.mode==='joining' && (type==='state' || type==='shot')) this.mode='peer';   // missed the start; the game found us anyway
    if(this.mode!=='peer') return;
    if(type==='hb'){
      if((m.seq|0) > G.seq && !ANIM && !SHOTQ.length) this.tx.send('hello',{ key:this.pkey });   // they're ahead of us; ask for the state
      return;
    }
    if(type==='hello'){
      if(G.phase==='play' || G.phase==='over') this.sendState();
      return;
    }
    if(type==='state'){
      const tail = SHOTQ.length ? SHOTQ[SHOTQ.length-1].seq : (ANIM ? ANIM.endState.seq : G.seq);
      if(m.seq > tail){ ANIM=null; SHOTQ=[]; applyState(m); }
      else if(!ANIM && !SHOTQ.length){
        if(m.seq > G.seq) applyState(m);
        else if(m.seq === G.seq && G.to && !m.to) applyState(m);   // my clock-claim loses to the rightful authority
      }
      return;
    }
    if(type==='shot'){
      const tail = SHOTQ.length ? SHOTQ[SHOTQ.length-1].seq : (ANIM ? ANIM.endState.seq : G.seq);
      if(m.seq === G.seq && G.to && !m.to && !ANIM && !SHOTQ.length){ playShot(m.before, m.shot, m.state); return; }   // their shot was in flight when I claimed; theirs stands
      if(m.seq <= tail) return;
      if(ANIM){ if(SHOTQ.length < 4) SHOTQ.push(m); return; }      // finish the flight in progress, then play this one
      playShot(m.before, m.shot, m.state);
      return;
    }
  },
  /* my table, my stroke — simulated here, judged here, broadcast from here */
  shoot(a){
    if(!myTurn()) return;
    const shooter = this.mode==='solo' ? G.turnKey : this.pkey;
    const angle = +a.angle, power = Math.max(0, Math.min(1, +a.power));
    const sx = Math.max(-1, Math.min(1, +a.sx||0)), sy = Math.max(-1, Math.min(1, +a.sy||0));
    if(!isFinite(angle) || !isFinite(power)) return;
    const cue = cueBall();
    if(!cue || cue.pocketed) return;
    const pre = snapshot();
    const before = G.balls.map(b=>({ id:b.id, x:b.x, y:b.y, pocketed:b.pocketed }));
    const ballsBefore = onTableIds(G.balls);
    const sim = PP.simulate(G.balls, { angle, power, sx, sy });
    const res = PR.judge({
      breakShot:G.breakShot, open:G.open,
      myGroup:G.groups[shooter]||null,
      ballsBefore, events:sim.events,
    });
    foldShot(shooter, sim, res, Math.ceil(sim.ticks * PP.DT * 1000));
    const state = snapshot();
    this.tx.send('shot', { seq:state.seq, shooter, before, shot:{ angle, power, sx, sy }, state });
    SPIN = { x:0, y:0 };                              // spin is spent by the stroke that used it
    applyState(pre, true);                            // wind the visible table back —
    playShot(before, { angle, power, sx, sy }, state);// the result arrives when the balls stop, same as for them
  },
  place(x, y){
    const seat = this.mode==='solo' ? G.turnKey : this.pkey;
    if(!myTurn() || !G.inHand || G.inHand.key!==seat) return;
    if(!PP.placeOK(G.balls, x, y, G.inHand.behindHead)){ banner("IT WON'T SIT THERE"); return; }
    const cue = cueBall(); cue.x=x; cue.y=y; cue.pocketed=false;
    G.seq++; G.by=this.pkey; G.to=false;
    this.sendState();
    applyState(snapshot(), true);
  },
  rerack(){   // either tap builds the identical rack — the seed and breaker were stamped when the 8 fell
    if(G.phase!=='over' || !G.nextSeed || !G.nextBreaker) return;
    const st = buildRack({ seq:G.seq+1, seed:G.nextSeed, breakerKey:G.nextBreaker, roster:G.roster, by:this.pkey });
    this.tx.send('start',{ roster:G.roster, state:st });
    applyState(st, true);
  },
  /* somewhere legal to put a returned cue ball */
  freeSpot(behindHead){
    const cs = PP.cueStart();
    if(PP.placeOK(G.balls, cs.x, cs.y, behindHead)) return cs;
    for(let k=0;k<400;k++){
      const x = behindHead ? (PP.R + (PP.HEADSTRING-2*PP.R)*((k*29)%97)/97) : (PP.R + (PP.W-2*PP.R)*((k*29)%97)/97);
      const y = PP.R + (PP.H-2*PP.R)*((k*53)%89)/89;
      if(PP.placeOK(G.balls, x, y, behindHead)) return { x, y };
    }
    return cs;
  },
};

/* one heartbeat for everything that must not depend on the happy path — or on
   the other phone being awake. Proof of life goes out; the clock is enforced by
   whoever's job it is; a quiet opponent is noted, never waited on. */
function settle(){
  if(ANIM){ const e=ANIM.endState; ANIM=null; applyState(e, e.turnKey===me()); }
  while(SHOTQ.length){ const n=SHOTQ.shift(); applyState(n.state, true); }
}
function netTick(){
  if(NET.mode!=='peer' && NET.mode!=='solo') return;
  NET._hbn = (NET._hbn|0) + 1;
  if(NET.mode==='peer' && NET._hbn % 5 === 0 && (G.phase==='play' || G.phase==='over') && NET.tx) NET.tx.send('hb',{ seq:G.seq });
  if(G.phase==='play' && !ANIM && !SHOTQ.length && DEADLINE){
    if(NET.mode==='solo'){ if(Date.now() > DEADLINE) timeoutFoul(G.turnKey, false); }
    else if(G.turnKey===me() && Date.now() > DEADLINE) timeoutFoul(me(), false);         // my clock, my foul — called on myself
    else if(G.turnKey!==me() && Date.now() > DEADLINE + 8000) timeoutFoul(me(), true);   // theirs, long gone — the waiter claims the table
  }
  if((G.phase==='play' || G.phase==='over') && OPPAT && !OPPQUIET && Date.now()-OPPAT > 20000){
    OPPQUIET = true; render();                          // noted on the plate — the game does not stop
  }
}
setInterval(netTick, 1000);

/* ---------- applying state, animating shots ---------- */
function applyState(s, localEcho){
  G.phase=s.phase; G.seq=s.seq; G.by=s.by||null; G.to=!!s.to;
  G.balls=(s.balls||[]).map(b=>({ id:b.id, x:b.x, y:b.y, pocketed:!!b.pocketed }));
  G.turnKey=s.turnKey; G.open=s.open; G.groups=s.groups||{};
  G.breakShot=s.breakShot; G.breakerKey=s.breakerKey||G.breakerKey; G.inHand=s.inHand||null;
  G.winner=s.winner; G.winBy=s.winBy||'';
  G.nextSeed=s.nextSeed||0; G.nextBreaker=s.nextBreaker||null;
  G.roster=s.roster||G.roster; G.log=s.log||G.log;
  if(G.phase==='play' && G.turnKey===me()){ if(!AIMDIR) defaultAim(); } else AIMDIR = null;
  CLOCKBASE = (s.clockSecs!=null) ? { secs:s.clockSecs, at:Date.now() } : null;
  DEADLINE = (s.clockSecs!=null && s.phase==='play') ? Date.now() + s.clockSecs*1000 : null;
  if(G.phase==='play' && G.clockFullAt < Date.now()) G.clockFullAt = DEADLINE || 0;   // keep the authority-local clock in step when adopting a state
  render();
}
function playShot(before, shot, endState){
  POWERDRAG=null; PLACING=false;
  ANIM = { sim: PP.stepper(before, shot), endState, last: Date.now() };
  CLOCKBASE = null;
  render();
}
function stepAnim(){
  if(!ANIM) return;
  const now = Date.now();
  const ticks = Math.min(2400, Math.max(1, Math.round((now-ANIM.last)/1000/PP.DT)));
  ANIM.last = now;
  ANIM.sim.step(ticks);
  if(ANIM.sim.done){
    const end = ANIM.endState; ANIM=null;
    applyState(end, end.turnKey===me());
    if(G.phase==='over') banner((rosterName(G.winner)||'?').toUpperCase()+' WINS');
    else if(/^Foul|^Shot clock/.test(G.log[0]||'')) banner('FOUL');
    if(SHOTQ.length){ const n=SHOTQ.shift(); playShot(n.before, n.shot, n.state); }
  }
}
function rosterName(key){ const r=G.roster.find(x=>x.key===key); return r&&r.name; }

/* ---------- the table on canvas ---------- */
const cv = $('#cv');
const ctx = cv && cv.getContext ? (cv.getContext('2d')||null) : null;
let VIEW = { s:1, ox:0, oy:0, rot:false, pxw:0, pxh:0 };
const RAILPAD = 0.205;   // rail width in table metres — measured off the reference: 0.19 of cloth width

const GUTTER = 0.24;   // metres-equivalent of wood beside the table, where the power bar lives — never over the cloth
function fit(){
  if(!ctx || !cv.getBoundingClientRect) return;
  const r = cv.getBoundingClientRect(); if(!r || !r.width) return;
  const dpr = (window.devicePixelRatio||1);
  const tw = PP.W + RAILPAD*2, th = PP.H + RAILPAD*2;
  const aspect = (th + GUTTER)/tw;                                 // upright table plus the bar's gutter
  const maxH = Math.max(320, (window.innerHeight||800) - 195);     // leave room for the plates, the hint and the log
  const cssH = Math.min(r.width/aspect, maxH);
  const cssW = cssH*aspect;
  cv.style.width = cssW+'px';
  cv.style.height = cssH+'px';
  cv.style.margin = '0 auto';
  cv.width = Math.round(cssW*dpr); cv.height = Math.round(cssH*dpr);
  const s = cv.width / (th + GUTTER);
  VIEW = { s, rot:true, pxw:cv.width, pxh:cv.height, ox: RAILPAD*s, oy: RAILPAD*s, gutX: th*s };
  buildSurface();
}
function X(tx,ty){ return VIEW.rot ? (PP.H-ty)*VIEW.s + VIEW.ox : tx*VIEW.s + VIEW.ox; }
function Y(tx,ty){ return VIEW.rot ? tx*VIEW.s + VIEW.oy : ty*VIEW.s + VIEW.oy; }
function toTable(px,py){
  return VIEW.rot
    ? { x:(py-VIEW.oy)/VIEW.s, y: PP.H - (px-VIEW.ox)/VIEW.s }
    : { x:(px-VIEW.ox)/VIEW.s, y:(py-VIEW.oy)/VIEW.s };
}

let TSURF = null;    // the table, painted once per resize — every frame just lays it down
let PFX = [];        // pocket-drop flourishes: {x, y, id, at}
let PREVPOCK = '';   // last frame's pocketed set, to notice the moment a ball drops

function lcg(seed){ let x=seed>>>0; return ()=>((x = (x*1664525+1013904223)>>>0)/4294967296); }

function paintTable(g, pxw, pxh, S){
  /* Every colour and ratio below is measured off the reference photograph, not
     guessed: cloth teal (10,132,127), mahogany (84,38,40), rails 0.19 of cloth
     width, corner holes r=0.075 CW centred (-0.05,-0.065) CW outside the corner,
     side holes r=0.075 CW centred 0.084 CW outside the edge, one cream block per
     corner with the hole embedded in it, a cream tab outside each side hole. */
  const CW = PP.H;   // cloth width in table metres — the reference's measuring stick
  /* the mahogany bed */
  const wg = g.createLinearGradient(0,0,pxw,pxh);
  wg.addColorStop(0,'#7c2b2d'); wg.addColorStop(0.5,'#5e2023'); wg.addColorStop(1,'#471a1c');
  g.fillStyle = wg; g.fillRect(0,0,pxw,pxh);
  const rnd = lcg(8);
  for(let i=0;i<24;i++){
    const gx = rnd()*pxw;
    g.strokeStyle = rnd()<0.5 ? 'rgba(0,0,0,0.10)' : 'rgba(190,90,88,0.10)';
    g.lineWidth = 1 + rnd()*2.2;
    g.beginPath(); g.moveTo(gx + (rnd()-0.5)*8, 0); g.lineTo(gx + (rnd()-0.5)*18, pxh); g.stroke();
  }
  /* the teal cloth */
  const x0=X(0,0), y0=Y(0,0), x1=X(PP.W,PP.H), y1=Y(PP.W,PP.H);
  const cx=Math.min(x0,x1), cy=Math.min(y0,y1), cw=Math.abs(x1-x0), ch=Math.abs(y1-y0);
  g.fillStyle='#07655e'; g.fillRect(cx,cy,cw,ch);
  const fg=g.createRadialGradient(cx+cw/2, cy+ch*0.42, ch*0.05, cx+cw/2, cy+ch/2, ch*0.72);
  fg.addColorStop(0,'#0b8d84'); fg.addColorStop(0.62,'#087a72'); fg.addColorStop(1,'#05534d');
  g.fillStyle=fg; g.fillRect(cx,cy,cw,ch);
  const sp = lcg(41);
  for(let i=0;i<1400;i++){
    const nx=cx+sp()*cw, ny=cy+sp()*ch;
    g.fillStyle = sp()<0.5 ? 'rgba(255,255,255,0.02)' : 'rgba(0,0,0,0.03)';
    g.fillRect(nx, ny, 1.4, 1.4);
  }
  /* cushions: a slightly darker teal band with a lit nose */
  const CU = S*0.034;
  g.fillStyle='rgba(0,0,0,0.16)';
  g.fillRect(cx,cy,cw,CU); g.fillRect(cx,cy+ch-CU,cw,CU);
  g.fillRect(cx,cy,CU,ch); g.fillRect(cx+cw-CU,cy,CU,ch);
  g.strokeStyle='rgba(255,255,255,0.09)'; g.lineWidth=Math.max(1,S*0.005);
  g.strokeRect(cx+CU, cy+CU, cw-2*CU, ch-2*CU);
  /* the rails meet the cloth */
  g.strokeStyle='rgba(0,0,0,0.4)'; g.lineWidth=S*0.014;
  g.strokeRect(cx+S*0.007, cy+S*0.007, cw-S*0.014, ch-S*0.014);
  g.strokeStyle='rgba(255,205,200,0.12)'; g.lineWidth=S*0.008;
  g.strokeRect(cx-S*0.006, cy-S*0.006, cw+S*0.012, ch+S*0.012);
  /* the marks of the game */
  g.strokeStyle='#ffffff22'; g.lineWidth=Math.max(1,S*0.004);
  g.beginPath(); g.moveTo(X(PP.HEADSTRING,0),Y(PP.HEADSTRING,0)); g.lineTo(X(PP.HEADSTRING,PP.H),Y(PP.HEADSTRING,PP.H)); g.stroke();
  g.fillStyle='#ffffff2c'; g.beginPath(); g.arc(X(PP.FOOTSPOT.x,PP.FOOTSPOT.y),Y(PP.FOOTSPOT.x,PP.FOOTSPOT.y),S*0.008,0,7); g.fill();
  /* diamond sights */
  const dia=(tx,ty)=>{
    const dx2=X(tx,ty), dy2=Y(tx,ty), r=S*0.011;
    g.save(); g.translate(dx2,dy2); g.rotate(Math.PI/4);
    g.fillStyle='rgba(0,0,0,0.3)'; g.fillRect(-r+1,-r+1,2*r,2*r);
    const pg=g.createLinearGradient(-r,-r,r,r);
    pg.addColorStop(0,'#f4efe2'); pg.addColorStop(1,'#cdc2a6');
    g.fillStyle=pg; g.fillRect(-r,-r,2*r,2*r);
    g.restore();
  };
  for(let i=1;i<8;i++){ if(i===4) continue; dia(PP.W*i/8, -RAILPAD*0.5); dia(PP.W*i/8, PP.H+RAILPAD*0.5); }
  for(let j=1;j<4;j++){ dia(-RAILPAD*0.5, PP.H*j/4); dia(PP.W+RAILPAD*0.5, PP.H*j/4); }
  /* pocket stations, to the measurements. Silhouette law still holds. */
  const LIP = S*0.03;
  g.save();
  g.beginPath();
  const rr2=(x,y,w2,h2,rad)=>{ g.moveTo(x+rad,y); g.arcTo(x+w2,y,x+w2,y+h2,rad); g.arcTo(x+w2,y+h2,x,y+h2,rad); g.arcTo(x,y+h2,x,y,rad); g.arcTo(x,y,x+w2,y,rad); g.closePath(); };
  rr2(LIP, LIP, (VIEW.gutX||pxw)-2*LIP, pxh-2*LIP, S*0.075);
  g.clip();
  const cream=(x,y,w2,h2,rad)=>{
    const cg=g.createLinearGradient(x,y,x,y+h2);
    cg.addColorStop(0,'#f1e9d4'); cg.addColorStop(0.6,'#e0d5b8'); cg.addColorStop(1,'#c6ba9b');
    g.beginPath(); rr2(x,y,w2,h2,rad); g.fillStyle=cg; g.fill();
    g.strokeStyle='rgba(45,20,18,0.5)'; g.lineWidth=Math.max(1,S*0.004);
    g.beginPath(); rr2(x,y,w2,h2,rad); g.stroke();
  };
  const hole=(x,y,r2)=>{
    const hg=g.createRadialGradient(x-r2*0.15,y-r2*0.15,r2*0.05,x,y,r2);
    hg.addColorStop(0,'#000000'); hg.addColorStop(0.8,'#060708'); hg.addColorStop(1,'#101010');
    g.fillStyle=hg; g.beginPath(); g.arc(x,y,r2,0,7); g.fill();
  };
  const HR = 0.075*CW*S;      // hole radius, measured
  const OFF = 0.058*CW*S;     // corner hole centre, outside the corner on both axes
  /* corners: one cream block, the hole embedded in it */
  const BLK = 0.21*CW*S;
  [[cx,cy,-1,-1],[cx+cw,cy,1,-1],[cx,cy+ch,-1,1],[cx+cw,cy+ch,1,1]].forEach(([kx,ky,dx,dy])=>{
    const hx = kx + dx*OFF, hy = ky + dy*OFF;
    cream(hx - BLK/2 + dx*BLK*0.12, hy - BLK/2 + dy*BLK*0.12, BLK, BLK, S*0.06);
    hole(hx, hy, HR);
  });
  /* sides: hole in the rail kissing the cloth edge, a cream tab outside it */
  const SOFF = 0.082*CW*S;
  [[cx,-1],[cx+cw,1]].forEach(([kx,dx])=>{
    const hx = kx + dx*SOFF, hy = cy+ch/2;
    cream(hx + dx*HR*0.35 - (dx<0?0.09*CW*S:0), hy - 0.105*CW*S, 0.09*CW*S, 0.21*CW*S, S*0.045);
    hole(hx, hy, HR*0.96);
  });
  g.restore();
}
function buildSurface(){
  TSURF = null;
  try{
    if(typeof document==='undefined' || !document.createElement) return;
    const t = document.createElement('canvas');
    if(!t || !t.getContext) return;
    const g = t.getContext('2d');
    if(!g || !g.fillRect) return;

/* ---------- rolling: the whole point of a ball ----------
   Each ball keeps a render-side unit vector to its number pole. When it moves,
   the vector rolls: axis perpendicular to travel, angle = distance/R — Rodrigues,
   the honest way. Numbers slide over the crown and vanish around the limb; the
   tonal pole stamp is projected honestly, an ellipse whose foreshortening
   is |n.z| — flat across the face when edge-on, a rim ring when the pole faces up.
   None of this touches the wire: orientation is cosmetic, so it lives here. */
let ORI = {};       // id -> {x,y,z} unit vector to the number pole
let LASTPOS = {};   // id -> last drawn position, for roll deltas
function oriFor(id){
  let n = ORI[id];
  if(!n){
    const a = id*2.399 + 0.7;
    const v = { x: Math.cos(a)*0.8, y: Math.sin(a)*0.8, z: 0.6 };   // tilted: the band reads as a band, the number still reads as a number
    const m = Math.hypot(v.x,v.y,v.z);
    n = ORI[id] = { x:v.x/m, y:v.y/m, z:v.z/m };
  }
  return n;
}
function rollBalls(balls){
  balls.forEach(b=>{
    if(b.pocketed){ delete LASTPOS[b.id]; return; }
    const lp = LASTPOS[b.id];
    if(lp){
      const dx=b.x-lp.x, dy=b.y-lp.y, d=Math.hypot(dx,dy);
      if(d>1e-7){
        const th = Math.min(d/PP.R, 0.85);   // fast balls smear rather than strobe
        const ax=-dy/d, ay=dx/d;             // rolling axis: perpendicular to travel
        const n = oriFor(b.id), c=Math.cos(th), si=Math.sin(th);

        const cx = ay*n.z, cy = -ax*n.z, cz = ax*n.y - ay*n.x;   // a×n
        let nx = n.x*c + cx*si + ax*dot*(1-c);

        let nz = n.z*c + cz*si;
        const m = Math.hypot(nx,ny,nz)||1;
        ORI[b.id] = { x:nx/m, y:ny/m, z:nz/m };

function drawBallAt(bx,by,id,alpha,scale){

    const r=FINE.getBoundingClientRect(); if(!r||!r.width) return;
    const half=r.width/2;
    const dx=Math.max(-half,Math.min(half,e.clientX-FDRAG.x0));
    AIMDIR={ angle: FDRAG.a0 + (dx/half)*(2*Math.PI/180) };
    if(FKNOB) FKNOB.style.transform='translateX('+(dx*0.9)+'px)';
  });
  const fineUp=()=>{ FDRAG=null; if(FKNOB){ FKNOB.classList.remove('live'); FKNOB.style.transform='translateX(0)'; } };
  FINE.addEventListener('pointerup',fineUp);
  FINE.addEventListener('pointercancel',fineUp);
}
if(cv && cv.addEventListener){
  cv.addEventListener('pointerdown',onDown);
  cv.addEventListener('pointermove',onMove);
  cv.addEventListener('pointerup',onUp);
  cv.addEventListener('pointercancel',()=>{ DRAGID=null; DRAGKIND=null; POWERDRAG=null; PLACING=false; });
}
if(typeof window!=='undefined' && window.addEventListener){
  window.addEventListener('resize',()=>{ fit(); });
}

/* ---------- HUD ---------- */
function groupBadge(key){
  const g=G.groups[key];
  if(G.open || !g) return '<span>OPEN TABLE</span>';
  const ids = onTableIds().filter(id=>PR.groupOf(id)===g);
  const dots = ids.map(id=>'<span class="mini" style="background:'+PR.BALL_COLORS[id]+'"></span>').join('');
  const done = ids.length===0;
  return '<span>'+(g==='red'?'REDS':'YELLOWS')+'</span>'+(done?'<span style="color:var(--gold)">ON THE BLACK</span>':dots);
}
function render(){
  ['home','lobby','game'].forEach(id=>{
    const el=$('#'+id); if(el) el.classList.toggle('on',
      (id==='home'&&G.phase==='home') || (id==='lobby'&&G.phase==='lobby') || (id==='game'&&(G.phase==='play'||G.phase==='over')));
  });
  if(G.phase==='lobby'){
    const code=$('#codebig'); if(code) code.textContent=NET.code||'····';
    const seats=NET.tx?NET.lobbySeats():[];
    const list=$('#seatlist');
    if(list) list.innerHTML = seats.map(s=>'<div class="seat"><span class="sav">'+esc((s.name||'?').trim()[0]||'?').toUpperCase()+'</span><span class="sname">'+esc(s.name)+'</span>'+(s.host?'<span class="host">HOST</span>':'')+'</div>').join('') || '<div class="sub" style="text-align:center;margin-top:8px">Waiting for a challenger…</div>';
    const ctl=$('#lobbyctl');
    if(ctl) ctl.innerHTML = (NET.mode==='lobby-host')
      ? '<button class="btn primary" onclick="NET.startGame()">Rack Them Up</button>'
      : '<div class="sub" style="text-align:center;margin-top:10px">The host racks when you\'re both here.</div>';
    return;
  }
  if(G.phase!=='play' && G.phase!=='over') return;
  fit();
  const A=G.roster[0]||{}, B=G.roster[1]||{};
  [['#plateA',A],['#plateB',B]].forEach(([sel,pl])=>{
    const el=$(sel); if(!el) return;
    el.classList.toggle('turn', G.phase==='play' && G.turnKey===pl.key);
    const nm=el.querySelector('.pname'), gr=el.querySelector('.pgroup');
    const here = NET.tx ? TableKit.seatsFrom(NET.tx.presence(), 8).some(m=>m.key===pl.key) : true;
    if(nm) nm.textContent=(pl.name||'—')+(pl.key===me()?' (you)':'')+(here?'':' · away');
    const av=el.querySelector('.pav');
    if(av) av.textContent=((pl.name||'?').trim()[0]||'?').toUpperCase();
    if(gr) gr.innerHTML=groupBadge(pl.key);
  });
  const hint=$('#hint');
  if(hint){
    let t='';
    if(G.phase==='over') t='';
    else if(ANIM) t='';
    else if(myTurn()){
      if(G.inHand && G.inHand.key===(NET.mode==='solo'?G.turnKey:me())) t=G.breakShot ? 'Drag the cue to place it behind the line. Aim on the table, then pull the side bar down and let go.' : 'Ball in hand — drag the cue'+(G.inHand.behindHead?' behind the line':' anywhere')+'. Aim on the table, power on the bar.';
      else t='Aim on the table, trim with FINE AIM. Tap the little ball for spin. Pull the bar — let go.';
    } else t=(rosterName(G.turnKey)||'They')+' is at the table.'+(OPPQUIET?' Their phone went quiet — the clock still runs.':'');
    hint.textContent=t;
  }
  const fineEl=$('#fine'); if(fineEl && fineEl.classList) fineEl.classList.toggle('on', myTurn() && !!AIMDIR && !PLACING);
  const log=$('#log'); if(log) log.textContent=G.log[0]||'';
  const over=$('#over');
  if(over){
    over.classList.toggle('on', G.phase==='over');
    if(G.phase==='over'){
      const big=over.querySelector('.big'), why=over.querySelector('.why'), ctl=$('#overctl');
      if(big) big.textContent=(rosterName(G.winner)||'?').toUpperCase()+' WINS';
      if(why) why.textContent=G.winBy;
      if(ctl) ctl.innerHTML='<button class="btn primary" onclick="NET.rerack()">Rerack — '+esc(rosterName(G.nextBreaker)||'?')+' breaks</button>';
    }
  }
}
setInterval(()=>{   // the clock face; enforcement lives with the host
  const el=$('#clock'); if(!el) return;
  if(G.phase!=='play' || ANIM || !CLOCKBASE){ el.textContent = G.phase==='play' ? '·' : '–'; el.classList.remove('low'); return; }
  const left=Math.max(0, CLOCKBASE.secs - Math.floor((Date.now()-CLOCKBASE.at)/1000));
  el.textContent=left; el.classList.toggle('low', left<=15);
}, 500);

/* ---------- wiring ---------- */
if(typeof TableKit!=='undefined') TableKit.watchErrors({ game:'pool', version:'0.1.0', onError:(msg)=>banner('BROKE — '+String(msg).slice(0,40)) });
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') NET.revive(true); });
setInterval(()=>{ if(NET.tx && (G.phase==='lobby' || G.phase==='play' || G.phase==='over')) NET.revive(false); }, 5000);

fit(); render(); raf(loop);

globalThis.__B = {
  get NET(){ return NET; }, get G(){ return G; }, set G(v){ G = v; },
  get ANIM(){ return ANIM; }, set ANIM(v){ ANIM = v; },
  get SHOTQ(){ return SHOTQ; },
  get DEADLINE(){ return DEADLINE; }, set DEADLINE(v){ DEADLINE = v; },
  get AIMDIR(){ return AIMDIR; }, set AIMDIR(v){ AIMDIR = v; },
  get POWERDRAG(){ return POWERDRAG; }, set POWERDRAG(v){ POWERDRAG = v; },
  get OPPAT(){ return OPPAT; }, set OPPAT(v){ OPPAT = v; },
  get OPPQUIET(){ return OPPQUIET; },
  applyState, playShot,
};
</script>
</body>
