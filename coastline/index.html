<script>
/* ================= AI ================= */
function spendAI(c,p){ // for consumed action/rent cards: hand -> discard
  const i=p.hand.findIndex(x=>x.id===c.id);
  if(i>-1) p.hand.splice(i,1);
  G.discard.push(c); G.playsLeft--;
  tableDrop(c, p.name);
  aiShowcase(c, G.turn);
}
function playFromHandAI(c,p){ // for cards that stay in play (props, banked, buildings)
  const i=p.hand.findIndex(x=>x.id===c.id);
  if(i>-1) p.hand.splice(i,1);
  G.playsLeft--;
  aiPlayVis(null);
}
function aiPlayVis(card){
  if(G.turn<1) return;
  const els = document.querySelectorAll('#opponents .opp');
  const oppEl = els && els.length ? els[G.turn-1] : null;
  if(!oppEl || !oppEl.getBoundingClientRect) return;
  const r = oppEl.getBoundingClientRect();
  oppEl.classList.add('aiplay');
  setTimeout(()=>{ if(oppEl.classList) oppEl.classList.remove('aiplay'); }, 380);
  if(card){
    const pileR = rectOf(document.querySelector('#playpile'));
    if(pileR) flyCard(staticCardHTML(card), { left:r.left+r.width/2-51, top:r.top+r.height-16, width:102, height:150 }, pileR, { fromScale:0.45, scale:0.16, dur:320, rot:-5 });
  }
}
function othersOf(idx){ return G.players.map((_,i)=>i).filter(i=>i!==idx); }
function aiWildColor(p,c){
  const choices = c.t==='wild' ? c.colors : Object.keys(COLORS);
  let best=null,score=-1;
  for(const col of choices){
    const n=countIn(p,col), size=COLORS[col].size;
    if(n>=size) continue;
    const supplyOK = colorSupply(p,col,G.turn) >= (size-n-1);
    const sc = (n===size-1?100:0) + n*3 + (supplyOK?2:-4);
    if(sc>score){score=sc;best=col;}
  }
  return best;
}
/* ================= AI BRAIN: card counting + EV decisions ================= */
const AI_W = {
  pg_complete: 9, pg_near: 5, pg_base: 2.4,
  wild_dead: 0.35,
  tk_base: 10, tk_val: 0.4, tk_hold: 0.5,
  rent_eff: 0.9, hike_cost: 2.2,
  sw_gain: 0.9, sw_loss: 0.6, sw_v: 0.25,
  swap_min: 1.5,
  pd_base: 4.6, pd_low: 1.5, pd_high: 2.5,
  bank_v: 0.25,
  jsn_burn: 2.5, jsn_margin: 0.5,
  pay_complete: 9, pay_near: 5, pay_base: 2.5,
};
function wOf(q){ return (q && q.tuneW) || AI_W; }
function keyOf(c){
  if(c.t==='money') return 'm'+c.v;
  if(c.t==='prop') return 'p:'+c.color;
  if(c.t==='wild') return 'w:dual';
  if(c.t==='wildall') return 'w:all';
  if(c.t==='rent') return 'r:pair';
  if(c.t==='rentall') return 'r:all';
  if(c.t==='action') return 'a:'+c.kind;
  return '?';
}
let CENSUS = null;
function deckCensus(){
  if(CENSUS) return CENSUS;
  const m = {}; let tot = 0;
  buildDeck().forEach(c=>{ const k=keyOf(c); m[k]=(m[k]||0)+1; tot++; });
  CENSUS = { m, tot };
  return CENSUS;
}
function unseenFor(selfIdx){
  // everything not visible to this player = deck + other hands, derived, reshuffle-proof
  const cen = deckCensus();
  const seen = {}; let seenTot = 0;
  const add = c => { const k=keyOf(c); seen[k]=(seen[k]||0)+1; seenTot++; };
  G.discard.forEach(add);
  G.players.forEach((q,i)=>{
    q.bank.forEach(add);
    propList(q).forEach(x=>add(x.card));
    Object.values(q.bldg).forEach(b=>{ if(b.granny)add(b.granny); if(b.resort)add(b.resort); });
    if(i===selfIdx) q.hand.forEach(add);
  });
  const m = {}; let tot = 0;
  Object.keys(cen.m).forEach(k=>{ const n=Math.max(0, cen.m[k]-(seen[k]||0)); m[k]=n; tot+=n; });
  return { m, tot };
}
function pHoldsAtLeastOne(kindKey, holderIdx, selfIdx){
  const un = unseenFor(selfIdx);
  const K = un.m[kindKey]||0, N = un.tot, h = G.players[holderIdx].hand.length;
  if(K<=0 || h<=0 || N<=0) return 0;
  let pNone = 1;
  for(let i=0;i<h;i++) pNone *= Math.max(0, N-K-i) / Math.max(1, N-i);
  return Math.min(1, Math.max(0, 1-pNone));
}
function colorSupply(p, color, selfIdx){
  const un = unseenFor(selfIdx);
  return (un.m['p:'+color]||0) + p.hand.filter(c=>c.t==='prop'&&c.color===color).length;
}
function progressGain(p, color){
  const W = wOf(p);
  const n = countIn(p,color), size = COLORS[color].size;
  if(n>=size) return 0;
  if(n===size-1) return completeColors(p).length>=2 ? 1000 : W.pg_complete;
  return n===size-2 ? W.pg_near : W.pg_base;
}
function liquidOf(q){ return payAssetsTotal(q); }
function threatOf(t){
  const q = G.players[t];
  let best = 0;
  Object.keys(q.props).forEach(col=>{ if(!isComplete(q,col)) best=Math.max(best, countIn(q,col)/COLORS[col].size); });
  return completeColors(q).length*8 + best*4 + liquidOf(q)*0.12;
}
function jsnAdjusted(ev, defIdx, selfIdx){
  const pj = pHoldsAtLeastOne('a:nodeal', defIdx, selfIdx);
  return ev*(1-pj) + wOf(G.players[selfIdx]).jsn_burn*pj; // forcing out their No Deal has value too
}
function aiShouldJSN(p, defIdx, atkIdx, desc, count){
  if(!p.hand.some(x=>x.t==='action'&&x.kind==='nodeal')) return false;
  const loss = desc==='Hostile Takeover' ? 14 : desc==='Sneaky Swipe' ? 6 :
               desc==='Swap Meet' ? 4 : desc==='Rent' ? 6 :
               desc==='Call In a Favour' ? 5 : desc==='Shout a Round' ? 2 : 4;
  const un = unseenFor(defIdx);
  const jsnValue = 3 + Math.max(0, 2-(un.m['a:nodeal']||0)); // scarcer = more precious
  const pCounter = pHoldsAtLeastOne('a:nodeal', atkIdx, defIdx);
  const attackerNearWin = completeColors(G.players[atkIdx]).length>=2;
  if(desc==='Hostile Takeover') return true; // never surrender a set unprotested
  if(attackerNearWin && (desc==='Sneaky Swipe'||desc==='Rent')) return true;
  return loss*(1-pCounter) - jsnValue*0.6 > wOf(p).jsn_margin;
}
function keepScore(c, p){
  if(c.t==='action'){
    if(c.kind==='nodeal') return 99;
    if(c.kind==='takeover') return 90;
    if(c.kind==='hike') return 52;
    if(c.kind==='payday') return 45;
    return 40 + c.v*2;
  }
  if(c.t==='wildall') return 70;
  if(c.t==='wild') return 60;
  if(c.t==='prop') return 42 + progressGain(p,c.color)*3;
  if(c.t==='rent'||c.t==='rentall') return 46 + c.v;
  return c.v*4.5; // money
}

function brainCandidates(p, idx, next){
  const C = []; const add = (ev, run, meta)=>{ if(ev>0.4) C.push(Object.assign({ev, run}, meta||{})); };
  const enemies = othersOf(idx);

  // properties
  p.hand.filter(c=>c.t==='prop').forEach(c=>{
    add(progressGain(p,c.color), ()=>{
      playFromHandAI(c,p); addProp(p,c,c.color);
      log(p.name+' played '+cardName(c)+'.');
      if(checkAllWin())return; next();
    }, {cardId:c.id, mode:'play', label:'Play '+cardName(c)});
  });

  // wilds — supply-aware colour choice
  p.hand.filter(c=>c.t==='wild'||c.t==='wildall').forEach(c=>{
    const col = aiWildColor(p,c);
    if(col && (c.t==='wild' || countIn(p,col)>0)){
      const need = COLORS[col].size - countIn(p,col) - 1;
      const odds = colorSupply(p,col,idx) >= need ? 1 : wOf(p).wild_dead;
      add(progressGain(p,col)*odds*0.95, ()=>{
        playFromHandAI(c,p); addProp(p,c,col);
        log(p.name+' played a wild into '+COLORS[col].label+'.');
        if(checkAllWin())return; next();
      }, {cardId:c.id, mode:'play', label:'Wild into '+COLORS[col].label});
    }
  });

  // hostile takeover
  const tk = p.hand.find(c=>c.t==='action'&&c.kind==='takeover');
  if(tk){
    let best=null;
    enemies.forEach(t=>completeColors(G.players[t]).forEach(col=>{
      const val=(G.players[t].props[col]||[]).reduce((s,c)=>s+c.v,0) + rentFor(G.players[t],col)*0.5;
      if(!best||val>best.val) best={t,col,val};
    }));
    if(best){
      const winNow = completeColors(p).length>=2;
      const urgent = completeColors(G.players[best.t]).length>=2;
      let ev = winNow ? 1000 : jsnAdjusted(wOf(p).tk_base + best.val*wOf(p).tk_val, best.t, idx);
      if(!winNow && !urgent && G.turnCount<4) ev *= wOf(p).tk_hold; // hold it early
      add(ev, ()=>{
        spendAI(tk,p); renderAll();
        log(p.name+' launched a Hostile Takeover on '+(best.t===0?'your':G.players[best.t].name+"'s")+' '+COLORS[best.col].label+' set!');
        banner('HOSTILE TAKEOVER!','var(--coral)');
        resolveBlock(best.t,idx,'Hostile Takeover',blocked=>{
          if(!blocked){ doTakeover(best.t,idx,best.col); if(checkAllWin())return; }
          else log('Takeover blocked.');
          next();
        });
      }, {cardId:tk.id, mode:'play', label:'Hostile Takeover → '+(best.t===0?'you':G.players[best.t].name)});
    }
  }

  // rent — expected collection vs each side's real liquidity, hike combo weighed
  p.hand.filter(c=>c.t==='rent'||c.t==='rentall').forEach(c=>{
    const cols = c.t==='rent' ? c.colors : Object.keys(p.props);
    let bo=null;
    cols.forEach(col=>{ const r=rentFor(p,col); if(r>0&&(!bo||r>bo.r)) bo={col,r}; });
    if(!bo) return;
    const targets = c.t==='rentall'
      ? [enemies.slice().sort((a,b)=>liquidOf(G.players[b])-liquidOf(G.players[a]))[0]]
      : enemies;
    const collect = amt => targets.reduce((s,t)=>s+jsnAdjusted(Math.min(amt, liquidOf(G.players[t]))*wOf(p).rent_eff, t, idx), 0);
    const hike = p.hand.find(x=>x.t==='action'&&x.kind==='hike');
    add(collect(bo.r), ()=>runRent(c,bo,targets,null), {cardId:c.id, mode:'play', label:'Charge '+COLORS[bo.col].label+' rent ($'+bo.r+'M)'});
    if(hike && G.playsLeft>=2) add(collect(bo.r*2)-wOf(p).hike_cost, ()=>runRent(c,bo,targets,hike), {cardId:c.id, mode:'play', label:'Charge '+COLORS[bo.col].label+' rent + Hike ($'+(bo.r*2)+'M)'});
  });
  function runRent(c,bo,targets,hike){
    let amount = bo.r;
    spendAI(c,p);
    if(hike){ spendAI(hike,p); amount*=2; }
    log(p.name+' charged $'+amount+'M '+COLORS[bo.col].label+' rent.');
    banner('RENT — $'+amount+'M','var(--coral)');
    renderAll();
    processQueue(targets,(t,go)=>{
      resolveBlock(t,idx,'Rent',blocked=>{
        if(blocked){ log((t===0?'You':G.players[t].name)+' blocked the rent.'); return go(); }
        requestPayment(t,amount,idx,go);
      });
    },()=>{ if(!checkAllWin()) next(); });
  }

  // sneaky swipe — completion value both ways
  const sw = p.hand.find(c=>c.t==='action'&&c.kind==='swipe');
  if(sw){
    let best=null;
    enemies.forEach(t=>stealTargetsOf(t).forEach(x=>{
      const q=G.players[t];
      const myGain = x.card.t==='prop' ? progressGain(p,x.color) : 3;
      const theirLoss = (countIn(q,x.color)===COLORS[x.color].size-1 ? 4 : 1.5) + countIn(q,x.color)*0.6;
      const ev = jsnAdjusted(myGain*wOf(p).sw_gain + theirLoss*wOf(p).sw_loss + x.card.v*wOf(p).sw_v, t, idx);
      if(!best||ev>best.ev) best={t,x,ev};
    }));
    if(best) add(best.ev, ()=>{
      spendAI(sw,p); renderAll();
      log(p.name+' played Sneaky Swipe on '+(best.t===0?'you':G.players[best.t].name)+'!');
      resolveBlock(best.t,idx,'Sneaky Swipe',blocked=>{
        if(!blocked){ transferProp(G.players[best.t],p,best.x.card); log(p.name+' swiped '+cardName(best.x.card)+'.'); if(checkAllWin())return; }
        else log('Swipe blocked.');
        next();
      });
    }, {cardId:sw.id, mode:'play', label:'Swipe '+cardName(best.x.card)});
  }

  // swap meet — the old AI never played this; net-completion trades only
  const sm = p.hand.find(c=>c.t==='action'&&c.kind==='swap');
  if(sm){
    let best=null;
    const mine = propList(p).filter(x=>!isComplete(p,x.color) && x.card.t==='prop');
    enemies.forEach(t=>stealTargetsOf(t).forEach(x=>{
      if(x.card.t!=='prop') return;
      mine.forEach(mx=>{
        const q=G.players[t];
        const myGain = progressGain(p,x.color);
        const myLoss = countIn(p,mx.color)===COLORS[mx.color].size-1 ? 6 : 2;
        const theirGain = countIn(q,mx.color)===COLORS[mx.color].size-1 ? 6 : 1.5;
        const theirLoss = countIn(q,x.color)===COLORS[x.color].size-1 ? 4 : 1.5;
        const net = myGain - myLoss + theirLoss - theirGain;
        if(net>wOf(p).swap_min){
          const ev = jsnAdjusted(net, t, idx);
          if(!best||ev>best.ev) best={t,x,mx,ev};
        }
      });
    }));
    if(best) add(best.ev, ()=>{
      spendAI(sm,p); renderAll();
      log(p.name+' proposed a Swap Meet with '+(best.t===0?'you':G.players[best.t].name)+'.');
      resolveBlock(best.t,idx,'Swap Meet',blocked=>{
        if(!blocked){
          transferProp(G.players[best.t],p,best.x.card);
          transferProp(p,G.players[best.t],best.mx.card);
          log(p.name+' traded '+cardName(best.mx.card)+' for '+cardName(best.x.card)+'.');
          if(checkAllWin())return;
        } else log('Swap blocked.');
        next();
      });
    }, {cardId:sm.id, mode:'play', label:'Swap for '+cardName(best.x.card)});
  }

  // favour — richest target
  const fv = p.hand.find(c=>c.t==='action'&&c.kind==='favour');
  if(fv){
    const t = enemies.slice().sort((a,b)=>liquidOf(G.players[b])-liquidOf(G.players[a]))[0];
    add(jsnAdjusted(Math.min(5, liquidOf(G.players[t]))*0.85, t, idx), ()=>{
      spendAI(fv,p); renderAll();
      log(p.name+' called in a favour from '+(t===0?'you':G.players[t].name)+' — $5M.');
      resolveBlock(t,idx,'Call In a Favour',blocked=>{
        if(blocked){ log('Favour blocked.'); return next(); }
        requestPayment(t,5,idx,()=>{ if(!checkAllWin()) next(); });
      });
    }, {cardId:fv.id, mode:'play', label:'Call In a Favour → '+(t===0?'you':G.players[t].name)});
  }

  // shout
  const sh = p.hand.find(c=>c.t==='action'&&c.kind==='shout');
  if(sh){
    const ev = enemies.reduce((s,t)=>s+jsnAdjusted(Math.min(2, liquidOf(G.players[t]))*0.85, t, idx), 0);
    add(ev, ()=>{
      spendAI(sh,p); renderAll();
      log(p.name+' shouted a round — everyone owes them $2M.');
      processQueue(enemies,(t,go)=>{
        resolveBlock(t,idx,'Shout a Round',blocked=>{
          if(blocked){ log('Blocked.'); return go(); }
          requestPayment(t,2,idx,go);
        });
      },()=>{ if(!checkAllWin()) next(); });
    }, {cardId:sh.id, mode:'play', label:'Shout a Round'});
  }

  // payday — draw equity, hand-size aware
  const pd = p.hand.find(c=>c.t==='action'&&c.kind==='payday');
  if(pd) add(wOf(p).pd_base + (p.hand.length<=3?wOf(p).pd_low:0) - (p.hand.length>=7?wOf(p).pd_high:0), ()=>{
    spendAI(pd,p); const a=draw(),b=draw(); if(a)p.hand.push(a); if(b)p.hand.push(b);
    log(p.name+' played Payday.'); next();
  }, {cardId:pd.id, mode:'play', label:'Payday (draw 2)'});

  // buildings
  const gr = p.hand.find(c=>c.t==='action'&&c.kind==='granny');
  if(gr){
    const col = completeColors(p).find(c=>c!=='black'&&!p.bldg[c]?.granny);
    if(col) add(3.8, ()=>{ playFromHandAI(gr,p); if(!p.bldg[col])p.bldg[col]={}; p.bldg[col].granny=gr; log(p.name+' added a Granny Flat to '+COLORS[col].label+'.'); next(); }, {cardId:gr.id, mode:'play', label:'Granny Flat on '+COLORS[col].label});
  }
  const rs = p.hand.find(c=>c.t==='action'&&c.kind==='resort');
  if(rs){
    const col = completeColors(p).find(c=>p.bldg[c]?.granny&&!p.bldg[c]?.resort);
    if(col) add(4.2, ()=>{ playFromHandAI(rs,p); p.bldg[col].resort=rs; log(p.name+' built a Beach Resort on '+COLORS[col].label+'.'); next(); }, {cardId:rs.id, mode:'play', label:'Beach Resort on '+COLORS[col].label});
  }

  // banking — money, then spare cards
  const mn = [...p.hand].filter(c=>c.t==='money').sort((a,b)=>b.v-a.v)[0];
  if(mn) add(0.8 + mn.v*wOf(p).bank_v, ()=>{ playFromHandAI(mn,p); p.bank.push(mn); log(p.name+' banked some money.'); next(); }, {cardId:mn.id, mode:'bank', label:'Bank $'+mn.v+'M'});
  const spare = [...p.hand].filter(c=>(c.t==='action'&&c.kind!=='nodeal')||c.t==='rent'||c.t==='rentall').sort((a,b)=>keepScore(a,p)-keepScore(b,p))[0];
  if(spare) add((G.playsLeft<3?0.7:0.45) + spare.v*0.08, ()=>{ playFromHandAI(spare,p); p.bank.push(spare); log(p.name+' banked a card.'); next(); }, {cardId:spare.id, mode:'bank', label:'Bank '+cardName(spare)});

  return C;
}
function aiStep(p){
  if(G.over) return;
  const idx = G.turn;
  const next = ()=>{ if(G.over) return; renderAll(); setTimeout(()=>aiStep(p), Math.max(aiDelay(), visWait()+150)); };
  if(G.playsLeft<=0) return endTurn();
  const C = brainCandidates(p, idx, next);
  if(!C.length) return endTurn();
  C.sort((a,b)=>b.ev-a.ev);
  C[0].run();
}
