<script>
/* ================= ACTIONS / NO DEAL / PAYMENTS ================= */
function spendAction(c, actor){
  const p = (typeof actor==='number' ? G.players[actor] : actor) || me();
  const i = p.hand.findIndex(x=>x.id===c.id);
  if(i>-1) p.hand.splice(i,1);
  G.discard.push(c);
  G.playsLeft--;
  tableDrop(c, p===me()?'You':p.name);
  closeSheet(); renderAll();
}
/* No Deal chain. cb(blocked:boolean) */
function jsnChain(aIdx, bIdx, count, desc, cb, viaPay){
    const p = G.players[aIdx];
    const steal = count===0 && !viaPay;
    if(p.isAI){
      // the AI thinks for a uniform beat on steals, so its holdings never leak by timing
      const _decide = ()=>{
        if(hasNoDeal(p) && aiShouldJSN(p, aIdx, bIdx, desc, count)){
          const nd = takeNoDeal(p); log(p.name+' played No Deal!');
          if(aIdx>0) aiShowcase(nd, aIdx);
          renderAll();
          setTimeout(()=>jsnChain(bIdx,aIdx,count+1,desc,cb), Math.max(700, visWait()+200));
        } else cb(count%2===1);
      };
      const _aid = steal ? AI_REACT_MS : 0;
      if(_aid) setTimeout(_decide, _aid); else _decide();
      return;
    }
    if(count===0 && viaPay){
      if(!hasNoDeal(p)) return cb(count%2===1);
      // no popup: the payment UI itself offers the block (drag No Deal! onto the pile)
      return cb(false, { jsn:{ by:bIdx, desc } });
    }
    // humans get the reaction window — uniformly, whether or not they hold the card
    const dispCard = count>=1
      ? { t:'action', kind:'nodeal', v:(ACTIONS['nodeal']||{}).v||4 }
      : { t:'action', kind:kindForDesc(desc), v:(ACTIONS[kindForDesc(desc)]||{}).v||0 };
    if(aIdx!==MYSEAT && NET.mode==='host'){
      NET.ask(aIdx, {type:'react', desc, count, card: dispCard, ms: REACT_MS}, m=>{
        if(m && m.use && hasNoDeal(p)){
          const nd = takeNoDeal(p); log(G.players[aIdx].name+' played No Deal!');
          NET.evt(aIdx, nd);
          renderAll();
          setTimeout(()=>jsnChain(bIdx,aIdx,count+1,desc,cb), 400);
        } else cb(count%2===1);
      });
      const seat = aIdx, askAt = Date.now();
      setTimeout(()=>{
        if(Date.now()-askAt < REACT_MS) return;   // the net only catches after the window truly had its time
        if(NET.pendingAskInfo[seat] && NET.pendingAskInfo[seat].type==='react') forceResolveAsk(seat);
      }, REACT_MS + 3500);
      return;
    }
    visDefer(()=>enterReactMode(
      { desc, card: dispCard, atk: G.players[bIdx].name, ms: REACT_MS },
      ()=>{
        if(!hasNoDeal(p)) return cb(count%2===1);
        takeNoDeal(p); log('You played No Deal!'); sfx('alert'); renderAll();
        jsnChain(bIdx, aIdx, count+1, desc, cb);
      },
      ()=> cb(count%2===1)
    ));
}
function resolveBlock(defIdx, atkIdx, desc, cb, viaPay){
  jsnChain(defIdx, atkIdx, 0, desc, cb, viaPay);
}
const REACT_MS = 2600;
let AI_REACT_MS = 1000;   // the AI's uniform thinking beat on steals; zeroed by tests for sync runs
function kindForDesc(desc){
  return { 'Sneaky Swipe':'swipe', 'Hostile Takeover':'takeover', 'Swap Meet':'swap' }[desc] || 'nodeal';
}
function enterReactMode(info, onUse, onPass){
  exitReactMode(true);
  MODE.type = 'react';
  MODE.reactUse = (c)=>{ exitReactMode(); onUse(c); };
  MODE.reactPass = ()=>{ exitReactMode(); onPass(); };
  sfx('alert'); haptic([10,50,10]);
  const w = document.createElement('div');
  w.id = 'reactwrap';
  w.innerHTML = `<div class="reactatk">${info.atk} · ${info.desc}</div>
    <div class="reactcard">${staticCardHTML(info.card, null)}</div>
    <div class="reactbar"><span style="animation-duration:${info.ms}ms"></span></div>`;
  w.onclick = ()=>{ if(MODE.reactPass) MODE.reactPass(); };
  document.body.appendChild(w);
  MODE.reactT = setTimeout(()=>{ if(MODE.type==='react' && MODE.reactPass) MODE.reactPass(); }, info.ms);
  renderAll();
}
function exitReactMode(silent){
  clearTimeout(MODE.reactT); MODE.reactT = null;
  const w = document.getElementById('reactwrap'); if(w && w.remove) w.remove();
  if(MODE.type==='react') MODE.type = null;
  MODE.reactUse = null; MODE.reactPass = null;   // ghosts cleared unconditionally
  if(!silent) renderAll();
}
function reactWithNoDeal(c){
  if(MODE.type!=='react' || !MODE.reactUse) return;
  if(!c || c.t!=='action' || c.kind!=='nodeal') return;
  const use = MODE.reactUse;
  if(NET.mode==='client'){
    exitReactMode();
    NET.reply('react', { use:true, id:c.id });
    renderAll(); return;
  }
  use(c);
}
/* ----- payments ----- */
function payAssetsTotal(p){ return bankTotal(p) + propList(p).reduce((s,x)=>s+x.card.v,0); }
function transferBank(payer,receiver,card){
  const i = payer.bank.findIndex(c=>c.id===card.id);
  if(i>-1){ payer.bank.splice(i,1); receiver.bank.push(card); }
}
function transferProp(payer,receiver,card){
  const color = removeProp(payer,card);
  if(color!=null){
    loseBuildingsIfBroken(payer,color);
    addProp(receiver,card,color);
  }
}
function requestPayment(payerIdx, amount, receiverIdx, done, jsnCtx){
  const payer=G.players[payerIdx], receiver=G.players[receiverIdx];
  if(amount<=0) return done();
  const worth = payAssetsTotal(payer);
  if(worth===0){ log(payer.name+' has nothing to pay with.'); return done(); }
  if(worth<=amount && payer.isAI){
    // AI hands over everything; humans always get the pay screen (and their block chance)
    payer.bank.splice(0).forEach(c=>receiver.bank.push(c));
    propList(payer).forEach(x=>transferProp(payer,receiver,x.card));
    Object.keys(payer.bldg).forEach(col=>{ // stray buildings discarded
      if(payer.bldg[col].granny) G.discard.push(payer.bldg[col].granny);
      if(payer.bldg[col].resort) G.discard.push(payer.bldg[col].resort);
      delete payer.bldg[col];
    });
    log(payer.name+' paid everything they had to '+receiver.name+'.');
    renderAll(); return done();
  }
  if(payer.isAI){
    // exact-cover DP: minimise value given + strategic damage; never complete the receiver's set
    const items = [];
    payer.bank.forEach(c=>items.push({c, v:c.v, pen:0, bank:true}));
    propList(payer).forEach(x=>{
      const n=countIn(payer,x.color), size=COLORS[x.color].size;
      const PW = wOf(payer);
      let pen = isComplete(payer,x.color) ? PW.pay_complete : (n===size-1 ? PW.pay_near : PW.pay_base);
      if(x.card.t!=='prop') pen += 2; // wilds are flexible — keep them
      if(x.card.t==='prop'){
        const rn=countIn(receiver,x.color);
        if(rn>0) pen += (rn===size-1 ? 40 : 4); // gifting completion is unforgivable
      }
      items.push({c:x.card, v:Math.max(1,x.card.v), pen, bank:false});
    });
    const CAP = amount+11;
    const dp = new Array(CAP+1).fill(Infinity), pick = new Array(CAP+1).fill(null);
    dp[0]=0;
    items.forEach((it,ii)=>{
      for(let a=CAP; a>=0; a--){
        if(dp[a]===Infinity) continue;
        const na=Math.min(CAP, a+it.v), cost=dp[a]+it.v+it.pen;
        if(cost<dp[na]){ dp[na]=cost; pick[na]={ii, from:a}; }
      }
    });
    let bestA=-1;
    for(let a=amount; a<=CAP; a++) if(dp[a]<Infinity && (bestA<0||dp[a]<dp[bestA])) bestA=a;
    const chosen=new Set();
    for(let a=bestA; a>0 && pick[a]; ){ chosen.add(pick[a].ii); a=pick[a].from; }
    if(bestA<0) items.forEach((it,ii)=>chosen.add(ii)); // shouldn't happen (short-pay handled earlier)
    [...chosen].map(ii=>items[ii]).sort((a,b)=>a.v-b.v).forEach(it=>{
      if(it.bank) transferBank(payer,receiver,it.c); else transferProp(payer,receiver,it.c);
    });
    log(payer.name+' paid $'+amount+'M to '+receiver.name+'.');
    renderAll();
    if(receiverIdx===0){ sfx('coin'); zonePop('#mybank'); }
    return done();
  }
  // human payer
  if(payerIdx!==MYSEAT && NET.mode==='host'){
    const canBlock = !!(jsnCtx && hasNoDeal(payer));
    NET.ask(payerIdx, {type:'pay', amount, recv:receiverIdx, canBlock}, m=>{
      if(m && m.block && canBlock){
        const i = payer.hand.findIndex(x=>x.t==='action' && x.kind==='nodeal' && (m.id==null || x.id===m.id));
        const nd = i>=0 ? payer.hand.splice(i,1)[0] : null;
        if(nd){
          G.discard.push(nd);
          log(payer.name+' played No Deal!');
          NET.evt(payerIdx, nd);
          renderAll();
          jsnChain(jsnCtx.by, payerIdx, 1, jsnCtx.desc, blocked=>{
            if(blocked) jsnCtx.onCancel();
            else requestPayment(payerIdx, amount, receiverIdx, done, null);
          });
          return;
        }
      }
      NET.applyPaymentIds(payerIdx, receiverIdx, amount, (m&&m.ids)||[]);
      done();
    });
    return;
  }
  visDefer(()=>enterPayMode(amount, receiverIdx, done, jsnCtx));
}
function processQueue(idxs, perFn, done){
  const q=[...idxs];
  (function next(){ if(G.over) return; const i=q.shift(); if(i===undefined) return done(); perFn(i,next); })();
}
/* ----- human action executions ----- */
function targetOut(t){ return !!(G.players[t] && G.players[t].out); }
function attackGate(b){
  if(attacksAllowed()) return false;
  if(b===MYSEAT) banner('NO ATTACKS ON THE FIRST GO-ROUND','var(--warning-amber)');
  return true;
}
function doFavour(c,targetIdx,by){
  if(NET.intercept('favour',{id:c.id,t:targetIdx})) return;
  if(attackGate(by==null?MYSEAT:by)) return;
  if(targetOut(targetIdx)) return;
  const b=(by==null?MYSEAT:by); announcePlay(b,c);
  spendAction(c,b);
  log(nameOf(b)+' played Call In a Favour on '+nameOf(targetIdx)+'.');
  resolveBlock(targetIdx,b,'Call In a Favour',(blocked,x)=>{
    if(blocked){ log(nameOf(targetIdx)+' blocked it.'); checkAllWin(); renderAll(); return; }
    const jc = x&&x.jsn ? {...x.jsn, onCancel:()=>{ log(nameOf(targetIdx)+' blocked it.'); checkAllWin(); renderAll(); }} : null;
    requestPayment(targetIdx,5,b,()=>{ checkAllWin(); renderAll(); flashOpp(targetIdx); sfx('coin'); }, jc);
  }, true);
}
function doShout(c,by){
  if(NET.intercept('shout',{id:c.id})) return;
  if(attackGate(by==null?MYSEAT:by)) return;
  const b=(by==null?MYSEAT:by); announcePlay(b,c);
  spendAction(c,b);
  log(nameOf(b)+' shouted a round — everyone owes them $2M.');
  processQueue(othersOf(b),(t,next)=>{
    resolveBlock(t,b,'Shout a Round',(blocked,x)=>{
      if(blocked){ log(G.players[t].name+' blocked it.'); return next(); }
      const jc = x&&x.jsn ? {...x.jsn, onCancel:()=>{ log(G.players[t].name+' blocked it.'); next(); }} : null;
      requestPayment(t,2,b,next,jc);
    }, true);
  },()=>{ checkAllWin(); renderAll(); });
}
function doRent(c,color,targetIdx,by){
  if(NET.intercept('rent',{id:c.id,color,t:targetIdx})) return;
  if(attackGate(by==null?MYSEAT:by)) return;
  if(targetOut(targetIdx)) return;
  const b=(by==null?MYSEAT:by); announcePlay(b,c);
  const actor = G.players[b];
  const base = rentFor(actor,color);
  const hikeCard = actor.hand.find(x=>x.t==='action'&&x.kind==='hike');
  if(hikeCard && G.playsLeft>=2 && b!==MYSEAT && NET.mode==='host' && !G.players[b].isAI){
    NET.ask(b, { type:'hike', base, color }, m=>{
      execRent(c, color, targetIdx, (m && m.use) ? hikeCard : null, base, b);
    });
    return;
  }
  if(hikeCard && G.playsLeft>=2 && b===MYSEAT){
    const who = targetIdx!=null ? G.players[targetIdx].name+' pays' : 'everyone pays';
    openSheet(`<h3>Rent Hike?</h3><div class="sub">You hold a Rent Hike — double this to $${base*2}M (${who}). Costs one extra play.</div>
      <div class="optlist">
        <button class="optbtn primary" onclick="window._hk(true)">Charge $${base*2}M</button>
        <button class="optbtn" onclick="window._hk(false)">Just $${base}M</button>
      </div>`);
    window._hk = (yes)=>{ closeSheet(); execRent(c,color,targetIdx,yes?hikeCard:null,base,b); };
  } else execRent(c,color,targetIdx,null,base,b);
}
function execRent(c,color,targetIdx,hikeCard,base,by){
  const b=(by==null?MYSEAT:by);
  haptic(10);
  spendAction(c,b);
  let amount = base;
  if(hikeCard){ spendAction(hikeCard,b); amount = base*2; }
  const targets = targetIdx!=null ? [targetIdx] : othersOf(b);
  log(nameOf(b)+' charged $'+amount+'M '+COLORS[color].label+' rent.');
  processQueue(targets,(t,next)=>{
    resolveBlock(t,b,'Rent',(blocked,x)=>{
      if(blocked){ log(nameOf(t)+' blocked the rent.'); return next(); }
      const jc = x&&x.jsn ? {...x.jsn, onCancel:()=>{ log(nameOf(t)+' blocked the rent.'); next(); }} : null;
      requestPayment(t,amount,b,()=>{ flashOpp(t); sfx('coin'); next(); }, jc);
    }, true);
  },()=>{ checkAllWin(); renderAll(); });
}
function stealTargetsOf(pIdx){ // props not in complete sets
  const p=G.players[pIdx];
  return propList(p).filter(x=>!isComplete(p,x.color));
}
function execSwipe(c, tIdx, cardId, by){
  if(targetOut(tIdx)) return;
  if(NET.intercept('swipe',{id:c.id,t:tIdx,cid:cardId})) return;
  if(attackGate(by==null?MYSEAT:by)) return;
  const b=(by==null?MYSEAT:by); announcePlay(b,c);
  const target = G.players[tIdx];
  const entry = propList(target).find(x=>x.card.id===cardId);
  if(!entry) return;
  spendAction(c,b);
  log(nameOf(b)+' played Sneaky Swipe on '+nameOf(tIdx)+'.');
  resolveBlock(tIdx,b,'Sneaky Swipe',blocked=>{
    if(blocked){ log('Swipe blocked.'); checkAllWin(); renderAll(); return; }
    transferProp(target,G.players[b],entry.card);
    log(nameOf(b)+' swiped '+cardName(entry.card)+'.');
    flashOpp(tIdx); sfx('good'); haptic(12);
    checkAllWin(); renderAll();
  });
}
function execTakeoverD(c, tIdx, color, by){
  if(NET.intercept('takeover',{id:c.id,t:tIdx,color})) return;
  const b=(by==null?MYSEAT:by); announcePlay(b,c);
  spendAction(c,b);
  log(nameOf(b)+' launched a Hostile Takeover on '+nameOf(tIdx)+"'s "+COLORS[color].label+' set!');
  resolveBlock(tIdx,b,'Hostile Takeover',blocked=>{
    if(blocked){ log('Takeover blocked.'); checkAllWin(); renderAll(); return; }
    doTakeover(tIdx,b,color);
    checkAllWin(); renderAll(); flashOpp(tIdx); sfx('good'); haptic([12,50,18]);
  });
}
function execSwapFinal(c, tIdx, theirCardId, mineCardId, by){
  if(targetOut(tIdx)) return;
  if(attackGate(by==null?MYSEAT:by)) return;
  if(NET.intercept('swap',{id:c.id,t:tIdx,cid:theirCardId,mid:mineCardId})) return;
  const b=(by==null?MYSEAT:by); announcePlay(b,c);
  const target=G.players[tIdx];
  const actorP = G.players[b];
  const theirEntry = propList(target).find(x=>x.card.id===theirCardId);
  const mineEntry = propList(actorP).find(x=>x.card.id===mineCardId);
  if(!theirEntry||!mineEntry) return;
  spendAction(c,b);
  log(nameOf(b)+' proposed a Swap Meet with '+nameOf(tIdx)+'.');
  resolveBlock(tIdx,b,'Swap Meet',blocked=>{
    if(blocked){ log('Swap blocked.'); checkAllWin(); renderAll(); return; }
    transferProp(actorP,target,mineEntry.card);
    transferProp(target,actorP,theirEntry.card);
    log(nameOf(b)+' swapped '+cardName(mineEntry.card)+' for '+cardName(theirEntry.card)+'.');
    flashOpp(tIdx); sfx('good'); haptic(12);
    checkAllWin(); renderAll();
  });
}
function doTakeover(fromIdx,toIdx,color){
  if(targetOut(fromIdx)) return;
  if(attackGate(toIdx)) return;
  const from=G.players[fromIdx], to=G.players[toIdx];
  const cards=(from.props[color]||[]).splice(0);
  delete from.props[color];
  cards.forEach(card=>addProp(to,card,color));
  if(from.bldg[color]){
    if(!to.bldg[color]) to.bldg[color]={};
    if(from.bldg[color].granny) to.bldg[color].granny=from.bldg[color].granny;
    if(from.bldg[color].resort) to.bldg[color].resort=from.bldg[color].resort;
    delete from.bldg[color];
  }
  log(to.name+' took the whole '+COLORS[color].label+' set.');
}
</script>

<script src="../shared/config.js?v=0.10.1"></script>
<script src="../shared/tablekit.js?v=0.10.1"></script>
<script src="../shared/identity.js?v=0.10.1"></script>
<script>
/* ================= ONLINE (v0.3.0): host-authoritative over Supabase Realtime ================= */
const SUPABASE_URL = (typeof window!=='undefined' && window.SUPABASE_URL) || '';
const SUPABASE_ANON = (typeof window!=='undefined' && window.SUPABASE_ANON) || '';

const NET = {
  mode: 'off',           // 'off' | 'lobby-host' | 'joining' | 'host' | 'client'
  seat: 0, code: null, tx: null, names: [], pile: null,
  applying: false, pendingAsks: {},
  myName: (typeof localStorage!=='undefined' && localStorage.getItem && localStorage.getItem('it_name')) || '',

  /* --- executor gate: on a client, local calls become intents --- */
  intercept(k, a){
    if(this.applying) return false;
    if((this.mode==='host' || this.mode==='client')
       && typeof netBusy==='function' && netBusy()
       && !(G.players[G.turn] && G.players[G.turn].isAI)){
      showPrompt('Waiting for the payment to finish…', false);
      return true;   // blocks every entry: drag, tap, and the Options menu
    }
    if(this.mode!=='client') return false;
    if(this.roster && this.hostKey && this.gone[this.hostKey]){
      banner('HOST RECONNECTING…','var(--warning-amber)');
      return true;
    }
    this.tx.send('intent', { seat: this.seat, k, a });
    clearSelection(); hidePrompt(); closeSheet();
    this.sentWait = true;
    showPrompt('Sent…', false);
    setTimeout(()=>renderAll(), 60);   // the hand re-renders from truth — nothing dangles mid-air
    return true;
  },
  reply(type, payload){ this.tx.send('intent', { seat: this.seat, k:'reply', a:Object.assign({rt:type, aid:this._curAid}, payload) }); },
  evt(seat, card){ if(this.mode==='host' && this.tx && card) this.tx.send('evt', { kind:'play', seat, card }); },

  /* --- host: ask a remote seat for a decision --- */
  hostKey: null,
  teardown(){
    clearInterval(CLK._iv); CLK._iv = null;
    clearInterval(this._askWD); this._askWD = null;
    clearTimeout(this._healT); this._healT = null;
    clearTimeout(this._hostDeadT); this._hostDeadT = null;
    clearTimeout(this._promoT); this._promoT = null;
    Object.keys(this._goneTimers||{}).forEach(k=>clearTimeout(this._goneTimers[k])); this._goneTimers = {};
    Object.keys(this._elimT||{}).forEach(k=>clearTimeout(this._elimT[k])); this._elimT = {};
  },
  hostSeat(){ const i = this.roster ? this.roster.findIndex(r=>r.key===this.hostKey) : -1; return i; },
  pendingAskInfo: {},
  pendingAskAt: {},
  ask(seat, ask, cb){
    this._askSeq = (this._askSeq||0) + 1;
    ask.aid = this._askSeq;
    this.pendingAsks[seat] = cb;
    this.pendingAskInfo[seat] = ask;
    this.pendingAskAt[seat] = Date.now();
    if(!this._askWD){
      this._askWD = setInterval(()=>{
        if(this.mode!=='host' || !this.tx) return;
        const now = Date.now();
        Object.keys(this.pendingAskInfo).forEach(sk=>{
          if(now - (this.pendingAskAt[sk]||0) > 15000){
            this.pendingAskAt[sk] = now;
            this.tx.send('ask', { seat:+sk, ask:this.pendingAskInfo[sk] });   // asks re-send until answered — forever
          }
        });
      }, 8000);
      if(this._askWD.unref) this._askWD.unref();
    }
    this.pushState();
    this.tx.send('ask', { seat, ask });
  },
  applyPaymentIds(payerIdx, receiverIdx, amount, ids){
    const payer=G.players[payerIdx], receiver=G.players[receiverIdx];
    const idset = new Set(ids);
    let bankSel = payer.bank.filter(c=>idset.has(c.id));
    let propSel = propList(payer).filter(x=>idset.has(x.card.id));
    let tot = bankSel.reduce((s,c)=>s+c.v,0) + propSel.reduce((s,x)=>s+x.card.v,0);
    if(tot < Math.min(amount, payAssetsTotal(payer))){
      // invalid or short selection: fall back to a fair smallest-first cover
      bankSel=[]; propSel=[];
      let owed=amount;
      const order=[...payer.bank.map(c=>({c,v:c.v,bank:true})), ...propList(payer).map(x=>({c:x.card,v:x.card.v,bank:false}))].sort((a,b)=>a.v-b.v);
      for(const o of order){ if(owed<=0)break; if(o.bank) bankSel.push(o.c); else propSel.push({card:o.c}); owed-=o.v; }
    }
    bankSel.forEach(c=>transferBank(payer,receiver,c));
    propSel.forEach(x=>transferProp(payer,receiver,x.card));
    log(payer.name+' paid $'+amount+'M to '+receiver.name+'.');
    renderAll();
  },

  /* --- host: apply a client intent as that seat --- */
  applyIntent(m){
    const seat = m.seat, k = m.k, a = m.a || {};
    if(k==='reply'){
      const cb = this.pendingAsks[seat];
      const want = this.pendingAskInfo[seat] && this.pendingAskInfo[seat].aid;
      if(cb && want!=null && a && a.aid!==want) return;   // a stale reply from a dead ask: it bounces
      if(cb){ delete this.pendingAsks[seat]; delete this.pendingAskInfo[seat]; delete this.pendingAskAt[seat]; cb(a); }
      return;
    }
    if(G.over || G.turn!==seat){ this.tx.send('nack', { seat }); return; }   // stale / out-of-turn: bounce it back
    if(Object.keys(this.pendingAsks).length){ this.tx.send('nack', { seat }); return; } // interrupt resolving: bounce
    const p = G.players[seat];
    const findHand = id => p.hand.find(c=>c.id===id);
    this.applying = true;
    try{
      if(k==='rewild'){ this.applying=true; try{ moveWildTo(a.id, a.to, seat); } finally { this.applying=false; } renderAll(); return; }
      const c = a.id!=null ? findHand(a.id) : null;
      if(k==='endturn') endTurn();
      else if(!c) {}
      else if(k==='bank') bankCard(c, seat);
      else if(k==='prop') playProp(c, a.color, seat);
      else if(k==='bldg') placeBldg(c, a.color, a.slot, seat);
      else if(k==='payday') playPayday(c, seat);
      else if(k==='shout') doShout(c, seat);
      else if(k==='favour') doFavour(c, a.t, seat);
      else if(k==='rent') doRent(c, a.color, a.t, seat);
      else if(k==='swipe') execSwipe(c, a.t, a.cid, seat);
      else if(k==='takeover') execTakeoverD(c, a.t, a.color, seat);
      else if(k==='swap') execSwapFinal(c, a.t, a.cid, a.mid, seat);
      else if(k==='rewild') moveWildTo(a.id, a.to, seat);
    } finally {
      this.applying = false;
    }
    renderAll();
  },

  /* --- state sync (public state broadcast; own hand per-seat) --- */
  serialize(){
    const tc = G.discard[G.discard.length-1];
    const top = (tc && tc.t) ? cardName(tc) : 'Pile';
    return {
      turn:G.turn, playsLeft:G.playsLeft, turnCount:G.turnCount, over:G.over,
      deckN:G.deck.length, pile:{ label:top, n:G.discard.length },
      players:G.players.map(q=>({ name:q.name, isAI:!!q.isAI, out:!!q.out, handN:q.hand.length, bank:q.bank, props:q.props, bldg:q.bldg })),
      clk: RULES.clock.mode==='on' ? { bank: CLK.bank, turnLeft: CLK.turnLeft, active: clockActiveSeat() } : null,
      hostKey: this.hostKey,
      logs: logs.slice(0,16),
      waitFor: Object.keys(this.pendingAsks).length ? +Object.keys(this.pendingAsks)[0] : null,
      waitAll: Object.keys(this.pendingAsks).map(Number),
    };
  },
  pushState(){
    if(this.mode!=='host' || !this.tx) return;
    this.tx.send('state', this.serialize());
    G.players.forEach((q,i)=>{ if(!q.isAI && i!==MYSEAT) this.tx.send('hand', { seat:i, cards:q.hand }); });
    this.persistHost();
  },
  persistBlob(){
    return {
      v: 1, code: this.code, ts: Date.now(),
      roster: this.roster,
      pendingAskSeat: Object.keys(this.pendingAsks).length ? +Object.keys(this.pendingAsks)[0] : null,
      rules: RULES,
      pile: (typeof TABLEPILE!=='undefined') ? TABLEPILE.slice(-3) : [],
      clk: RULES.clock.mode==='on' ? { bank: CLK.bank, turnLeft: CLK.turnLeft } : null,
      logs: logs.slice(0, 16),
      G: { deck:G.deck, discard:G.discard, turn:G.turn, playsLeft:G.playsLeft, turnCount:G.turnCount, over:G.over,
           players: G.players.map(q=>({ name:q.name, isAI:!!q.isAI, hand:q.hand, bank:q.bank, props:q.props, bldg:q.bldg })) },
    };
  },
  persistHost(){
    if(this.mode!=='host' || G.over) return;
    const now = Date.now();
    if(this._lastPersist && now - this._lastPersist < 500) return;
    this._lastPersist = now;
    try{ localStorage.setItem('it_host', JSON.stringify(this.persistBlob())); }catch(e){}
  },
  restoreFromBlob(blob){
    if(blob.rules && blob.rules.v===1) RULES = { ...RULES_DEFAULTS, ...blob.rules, clock: { ...RULES_DEFAULTS.clock, ...(blob.rules.clock||{}) } };
    this.roster = blob.roster;
    GAME_STARTED = true;
    newGame();
    const g = blob.G;
    G.deck = g.deck; G.discard = g.discard;
    G.turn = g.turn; G.playsLeft = g.playsLeft; G.turnCount = g.turnCount; G.over = false;
    G.players = g.players.map(q=>({ name:q.name, isAI:!!q.isAI, hand:q.hand, bank:q.bank, props:q.props, bldg:q.bldg }));
    if(typeof TABLEPILE!=='undefined'){ TABLEPILE.length = 0; (blob.pile||[]).forEach(c=>TABLEPILE.push(c)); }
    logs.length = 0; (blob.logs||[]).forEach(l=>logs.push(l));
    this.pendingAsks = {}; this.pendingAskInfo = {};
    if(blob.clk){ clockStart(); CLK.bank = blob.clk.bank || CLK.bank; CLK.turnLeft = blob.clk.turnLeft || 0; }
    if(blob.pendingAskSeat!=null){
      log('Interrupted action cancelled on resume.');
    }
    this.seat = 0; MYSEAT = 0; this.mode = 'host';
  },
  async resurrectHost(blob){
    this.myName = (blob.roster && blob.roster[0] && blob.roster[0].name) || this.myName || 'Host';
    if(!(await this.connect(blob.code, true))) return false;
    this.mode = 'host';
    this._meta = { key:this.pkey, name:this.myName, uid:(ID.user&&ID.user.id)||null, host:true, joined:Date.now(), rev:0 };
    this.tx.track(this._meta);
    await new Promise(r=>setTimeout(r, 1200));
    let rival = false;
    try{ Object.values(this.tx.presence()||{}).forEach(a=>a.forEach(mm=>{ if(mm && mm.host && mm.key!==this.pkey) rival = true; })); }catch(e){}
    if(rival){
      try{ localStorage.removeItem('it_host'); }catch(e){}
      banner('THE TABLE MOVED ON — REJOINING','var(--warning-amber)');
      this.mode = 'joining';
      if(this._meta){ this._meta.host = false; this.tx.track(this._meta); }
      this.tx.send('hello', { key: this.pkey });
      return true;
    }
    this.restoreFromBlob(blob);
    const hm=$('#home'); if(hm&&hm.classList) hm.classList.remove('show');
    banner(blob.pendingAskSeat!=null ? 'RESUMED — LAST ACTION CANCELLED' : 'TABLE RESUMED','var(--money-gold)');
    this.tx.send('start', { roster: this.roster, rules: RULES });
    renderAll();
    this.pushState();
    return true;
  },
  applyState(st){
    const myHand = (G.players[MYSEAT] && G.players[MYSEAT].hand) || [];
    G.turn=st.turn; G.playsLeft=st.playsLeft; G.turnCount=st.turnCount;
    G.deck = new Array(st.deckN);
    G.discard = new Array(st.pile.n);
    this.pile = st.pile;
    const cards = a => (a||[]).filter(c=>c && c.t);   // the wire turns undefined into null; never render a hole
    if(st.hostKey) this.hostKey = st.hostKey;
    const waitAll = st.waitAll || (st.waitFor!=null ? [st.waitFor] : []);
    if((MODE.type==='pay' || MODE.type==='discard') && st.waitFor!==undefined && !waitAll.includes(this.seat)
       && Date.now()-(this._lastAskAt||0) > 1500){
      MODE.type=null; MODE.sel=null; MODE.jsn=null; hidePrompt();
    }
    if(st.clk){ CLK.bank = st.clk.bank || CLK.bank; CLK.turnLeft = st.clk.turnLeft||0; CLK.active = st.clk.active; renderClocks(); }
    G.players = st.players.map((q,i)=>({
      name:q.name, isAI:q.isAI, out:!!q.out, bank:cards(q.bank),
      props:Object.fromEntries(Object.entries(q.props||{}).map(([k,v])=>[k, cards(v)])),
      bldg:q.bldg,
      hand: i===MYSEAT ? myHand : new Array(q.handN).fill(0).map((_,j)=>({ id:'h'+i+'_'+j, t:'money', v:0 })),
    }));
    if(st.logs && st.logs.length){
      logs.length = 0;
      st.logs.forEach(l=>logs.push(l));
      const ll = $('#loglist');
      if(ll && ll.innerHTML!==undefined) ll.innerHTML = logs.slice(0,120).map(l=>`<div>${l}</div>`).join('');
    }
    this._lastWaitFor = st.waitFor;
    this._lastWaitAll = waitAll;
    if(waitAll.includes(this.seat) && !MODE.type) this.armHeal(); else this.clearHeal();
    const wasOver = G.over; G.over = st.over;
    if(st.over){ try{ localStorage.removeItem('it_room'); }catch(e){} }
    if(st.over){ try{ localStorage.removeItem('it_host'); }catch(e){} }
    if(this.lastTurn!==st.turn && !st.over){
      this.lastTurn = st.turn;
      banner(st.turn===this.seat ? 'YOUR TURN' : st.players[st.turn].name.toUpperCase()+"'S TURN", st.turn===this.seat ? 'var(--gold-money)' : null);
      if(st.turn===this.seat){ sfx('good'); haptic([8,40,8]); }
    }
    this.hold = (st.waitFor!=null && st.waitFor!==this.seat);
    if(this.sentWait){ this.sentWait=false; hidePrompt(); }
    if(this.hold && st.turn===this.seat) showPrompt('Waiting for '+ (G.players[st.waitFor]? st.players[st.waitFor].name : 'a player') +'…', false);
    else if(this.hold===false && st.turn===this.seat && MODE.type===null && !SELECTED) hidePrompt();
    renderAll();
    if(st.over && !wasOver){
      const w = G.players.find(p=>completeColors(p).length>=3);
      if(w){
        $('#wintitle').textContent = w===me() ? 'You win' : w.name+' wins';
        $('#winsub').textContent = 'Three complete sets: ' + completeColors(w).map(c=>COLORS[c].label).join(', ');
        fillWinRows(); NET.teardown();
        setTimeout(()=>{ refreshWinBtn(); $('#winscreen').classList.add('show'); sfx(w===me()?'win':'alert'); if(w===me()) confetti(); }, 500);
      }
    }
  },

  onMessage(type, m){
    if(this.mode==='host'){
      if(type==='intent') this.applyIntent(m);
      if(type==='myhand' && this._collectedHands && !this._promoDone && m && m.seat!=null && m.seat!==MYSEAT){
        this._collectedHands[m.seat] = m.cards || [];
        const need = G.players.filter((p,i)=>!p.isAI && !p.out).length;
        if(Object.keys(this._collectedHands).length >= need) this.finishPromotion();
      }
      if(type==='hello'){
        if(m && m.key && this.roster && this.roster.some(r=>r.key===m.key)){
          this.tx.send('start', { roster: this.roster, rules: RULES });   // returning player: hand their seat back
        }
        this.pushState();
        if(m && m.key && this.roster){
          const si = this.roster.findIndex(r=>r.key===m.key);
          if(si>=0 && this.pendingAskInfo[si]) this.tx.send('ask', { seat: si, ask: this.pendingAskInfo[si] });   // mid-payment rejoin: the ask comes back
        }
      }
      return;
    }
    if(this.mode==='client'){
      if(type==='state') this.applyState(m);
      if(type==='hand' && m.seat===this.seat){
        if(G.players[this.seat]) G.players[this.seat].hand = m.cards;
        renderAll();
      }
      if(type==='evt' && m.kind==='play' && m.seat!==this.seat && m.card) aiShowcase(m.card, m.seat);
      if(type==='needhands'){
        this.tx.send('myhand', { seat: this.seat, cards: G.players[this.seat].hand });
      }
      if(type==='nack' && m.seat===this.seat){ banner('NOT RIGHT NOW','var(--warning-amber)'); hidePrompt(); this.sentWait=false; renderAll(); }
      if(type==='ask' && m.seat===this.seat){
        const a0 = m.ask || {};
        if(a0.aid!=null && this._curAid===a0.aid && MODE.type) return;   // watchdog re-send of the ask we're already in
        this._curAid = a0.aid!=null ? a0.aid : this._curAid;
        this._lastAskAt = Date.now();
        exitReactMode(true);   // no ghost timers survive into a new ask
        this.clearHeal();
        try{ if(typeof closePOVForce==='function' && POVIDX!=null) closePOVForce(); }catch(e){}
        const a = m.ask;
        if(a.type==='pay') visDefer(()=>enterPayMode(a.amount, a.recv, ()=>{}, a.canBlock ? { by:null, desc:'' } : null));
        if(a.type==='discard'){ MODE.type='discard'; MODE.need=a.need; MODE.sel=new Set(); sfx('alert'); renderAll(); updateDiscardHUD(); }
        if(a.type==='hike'){
          openSheet(`<h3>Rent Hike?</h3><div class="sub">Double this rent to $${a.base*2}M — costs one extra play.</div>
            <div class="optlist">
              <button class="optbtn primary" onclick="NET.reply('hike',{use:true});closeSheet()">Charge $${a.base*2}M</button>
              <button class="optbtn" onclick="NET.reply('hike',{use:false});closeSheet()">Just $${a.base}M</button>
            </div>`, true);
        }
        if(a.type==='react'){
          enterReactMode(
            { desc: a.desc, card: a.card || { t:'action', kind:'nodeal', v:4 }, atk: '', ms: a.ms || REACT_MS },
            ()=>{},   // the drag path replies through reactWithNoDeal
            ()=>{ NET.reply('react', { use:false }); }
          );
        }
      }
      return;
    }
    if(type==='start' && (this.mode==='joining' || this.mode==='client')) this.onStart(m, false);
  },

  /* --- lobby --- */
  makeCode(){ const A='ABCDEFGHJKMNPQRSTUVWXYZ23456789'; let c=''; for(let i=0;i<4;i++) c+=A[Math.floor(Math.random()*A.length)]; return c; },
  async connect(code, hosting){
    let sb;
    try{ sb = await TableKit.client(); }   // credentials, SDK, client: the platform's job
    catch(e){ banner('OFFLINE — '+(e && e.message || 'no connection'),'var(--danger-red)'); return false; }
    if(!this.pkey){
      let pk = null;
      try{ pk = localStorage.getItem('it_pkey'); }catch(e){}
      if(!pk){ pk = Math.random().toString(36).slice(2,10); try{ localStorage.setItem('it_pkey', pk); }catch(e){} }
      this.pkey = pk;
    }
    const ch = sb.channel('room-'+code, { config:{ broadcast:{ self:false }, presence:{ key: this.pkey } } });
    const self = this;
    this.tx = {
      send(type, payload){ ch.send({ type:'broadcast', event:type, payload }); },
      track(meta){ ch.track(meta); },
      presence(){ return ch.presenceState(); },
    };
    ['state','hand','evt','ask','intent','start','hello','nack','needhands','myhand'].forEach(ev=>{
      ch.on('broadcast', { event:ev }, (msg)=>self.onMessage(ev, msg.payload));
    });
    ch.on('presence', { event:'sync' }, ()=>{ self.renderLobby(); self.reconcilePresence(); });
    ch.on('presence', { event:'leave' }, (ev)=>self.onLeave((ev && ev.leftPresences)||[]));
    ch.on('presence', { event:'join' }, (ev)=>self.onJoin((ev && ev.newPresences)||[]));
    await new Promise(res=>ch.subscribe(st=>{ if(st==='SUBSCRIBED') res(); }));
    this.code = code;
    return true;
  },
  _busyBtn(btn, on){ if(btn && btn.classList){ btn.classList.toggle('busy', !!on); btn.disabled = !!on; } },
  async hostGame(btn){
    if(this._connecting) return; this._connecting = true; this._busyBtn(btn, true);
    try{ await this._hostGame(); } finally { this._connecting = false; this._busyBtn(btn, false); }
  },
  async _hostGame(){
    this.myName = (this.myName||'Host').slice(0,12) || 'Host';
    if(typeof localStorage!=='undefined' && localStorage.setItem) localStorage.setItem('it_name', this.myName);
    const code = this.makeCode();
    if(!(await this.connect(code, true))) return;
    this.mode = 'lobby-host';
    this._meta = { key:this.pkey, name:this.myName, uid:(ID.user&&ID.user.id)||null, host:true, joined:Date.now(), rev:0 };
    this.tx.track(this._meta);
    $('#homemain').style.display='none'; $('#homelobby').style.display='';
    $('#lobbycode').textContent = code;
    const ln=$('#lobbyname'); if(ln && ln.value!==undefined) ln.value = this.myName || '';
    this.renderLobby();
  },
  async joinGame(btn){
    if(this._connecting) return; this._connecting = true; this._busyBtn(btn, true);
    try{ await this._joinGame(); } finally { this._connecting = false; this._busyBtn(btn, false); }
  },
  async _joinGame(){
    this.myName = (this.myName||'Guest').slice(0,12) || 'Guest';
    if(typeof localStorage!=='undefined' && localStorage.setItem) localStorage.setItem('it_name', this.myName);
    const code = (($('#joincode')&&$('#joincode').value)||'').toUpperCase().trim();
    if(code.length!==4){ alert('Enter the 4-letter room code.'); return; }
    if(!(await this.connect(code, false))) return;
    this.mode = 'joining';
    this.tx.send('hello', { key:this.pkey });
    this._meta = { key:this.pkey, name:this.myName, uid:(ID.user&&ID.user.id)||null, host:false, joined:Date.now(), rev:0 };
    this.tx.track(this._meta);
    $('#homemain').style.display='none'; $('#homelobby').style.display='';
    $('#lobbycode').textContent = code;
    const ln2=$('#lobbyname'); if(ln2 && ln2.value!==undefined) ln2.value = this.myName || '';
    const st=$('#lobbystart'); if(st&&st.style) st.style.display='none';
    $('#lobbywait').textContent = 'Waiting for the host…';
    this.renderLobby();
  },
  gone: {},
  _goneTimers: {},
  isGone(idx){
    if(this.mode!=='host' && this.mode!=='client') return false;
    const r = this.roster && this.roster[idx];
    return !!(r && !r.isAI && this.gone[r.key]);
  },
  armHeal(){
    if(this._healT) return;
    this._healTries = 0;
    const tick = ()=>{
      this._healT = null;
      const stuck = (this._lastWaitAll||[]).includes(this.seat) && !MODE.type && !document.querySelector('#overlay.show');
      if(!stuck || this.mode!=='client') return;
      this.tx.send('hello', { key: this.pkey });   // the host answers with the pending ask
      if(++this._healTries < 3) this._healT = setTimeout(tick, 4000);
    };
    this._healT = setTimeout(tick, 1600);
  },
  clearHeal(){ if(this._healT){ clearTimeout(this._healT); this._healT = null; } },
  electNewHost(deadKey){
    const present = new Set();
    try{ Object.values(this.tx.presence()||{}).forEach(a=>a.forEach(mm=>{ if(mm&&mm.key) present.add(mm.key); })); }catch(e){}
    for(let i=0;i<this.roster.length;i++){
      const r = this.roster[i];
      if(!r || r.isAI || r.key===deadKey) continue;
      if(G.players[i] && G.players[i].out) continue;
      if(present.has(r.key) || r.key===this.pkey) return r.key;
    }
    return null;
  },
  migrateFrom(deadKey){
    const deadSeat = this.roster.findIndex(r=>r.key===deadKey);
    const heir = this.electNewHost(deadKey);
    if(!heir){
      G.over = true;
      banner('TABLE CLOSED','var(--danger-red)');
      renderAll(); return;
    }
    this.hostKey = heir;
    if(heir!==this.pkey){
      const hn = this.roster.find(r=>r.key===heir);
      banner('NEW HOST: '+((hn&&hn.name)||'').toUpperCase(),'var(--money-gold)');
      hidePrompt();
      return;   // the heir's first state confirms everything
    }
    this.promoteToHost(deadSeat, deadKey);
  },
  promoteToHost(deadSeat, deadKey){
    this.mode = 'host';
    this.hostKey = this.pkey;
    hidePrompt();
    banner('YOU ARE THE HOST NOW','var(--money-gold)');
    if(this._meta){ this._meta.host = true; this._meta.rev = (this._meta.rev||0)+1; try{ this.tx.track(this._meta); }catch(e){} }
    this._collectedHands = {};
    this._promoDone = false;
    this._collectedHands[MYSEAT] = G.players[MYSEAT].hand.slice();
    if(deadSeat>=0 && G.players[deadSeat] && !G.players[deadSeat].out){
      G.players[deadSeat].hand = [];   // its contents were never ours to know; the rebuild reclaims them
      eliminatePlayer(deadSeat, 'left the table');
    }
    if(G.over) return;
    this.tx.send('needhands', { to: this.pkey });
    this._promoT = setTimeout(()=>this.finishPromotion(), 1800);
  },
  finishPromotion(){
    if(this._promoDone) return; this._promoDone = true;
    clearTimeout(this._promoT);
    G.players.forEach((p,i)=>{
      if(this._collectedHands[i]) p.hand = this._collectedHands[i];
      else p.hand = p.hand.filter(c=>typeof c.id==='number');   // placeholders were never cards
    });
    rebuildDeckFromKnown();
    log('Table rebuilt — the discard was shuffled back into the deck.');
    renderAll();
    this.pushState();
  },
  reconcilePresence(){
    if(!this.tx || !this.roster) return;
    const present = new Set();
    try{
      Object.values(this.tx.presence()||{}).forEach(arr=>arr.forEach(mm=>{ if(mm && mm.key) present.add(mm.key); }));
    }catch(e){ return; }
    this.roster.forEach(r=>{
      if(!r || r.isAI || !r.key) return;
      if(present.has(r.key)){
        clearTimeout(this._goneTimers[r.key]); delete this._goneTimers[r.key];
        if(this.gone[r.key]){
          delete this.gone[r.key];
          const hostKey = this.hostKey;
          if(r.key===hostKey && this._hostDeadT){ clearTimeout(this._hostDeadT); this._hostDeadT = null; hidePrompt(); }
          if(this._elimT && this._elimT[r.key]){ clearTimeout(this._elimT[r.key]); delete this._elimT[r.key]; }
          if(!G.over) banner(r.key===hostKey ? 'HOST IS BACK' : 'RECONNECTED','var(--success-green)');
          renderAll();
        }
      } else if(!this.gone[r.key] && !this._goneTimers[r.key]){
        // absence must persist before it means anything — transports flap
        this._goneTimers[r.key] = setTimeout(()=>this._confirmGone(r.key), 3500);
      }
    });
  },
  _confirmGone(key){
    delete this._goneTimers[key];
    let stillGone = true;
    try{
      Object.values(this.tx.presence()||{}).forEach(arr=>arr.forEach(mm=>{ if(mm && mm.key===key) stillGone = false; }));
    }catch(e){}
    if(stillGone){
      this.gone[key] = true; renderAll();
      const hostKey = this.hostKey;
      if(this.mode==='client' && key===hostKey && !this._hostDeadT){
        showPrompt('Host reconnecting…', false);
        this._hostDeadT = setTimeout(()=>{
          this._hostDeadT = null;
          if(!this.gone[hostKey] || G.over) return;
          this.migrateFrom(hostKey);   // the table outlives its host
        }, 45000);
      }
      if(this.mode==='host' && key!==this.hostKey){
        if(!this._elimT) this._elimT = {};
        const seat = this.roster ? this.roster.findIndex(r=>r.key===key) : -1;
        if(seat>=0 && G.players[seat] && !G.players[seat].out && !this._elimT[key]){
          this._elimT[key] = setTimeout(()=>{
            delete this._elimT[key];
            if(this.gone[key] && !G.over && G.players[seat] && !G.players[seat].out){
              eliminatePlayer(seat, 'left the table');
            }
          }, 45000);
        }
      }
    }
  },
  onJoin(joined){ this.reconcilePresence(); },
  onLeave(left){
    this.reconcilePresence();
    if(!this.roster || G.over) return;
    renderAll();
    return;   // the verdict on anyone — including the host — belongs to reconcilePresence
    if(this.mode==='host'){
      left.forEach(p=>{
        const r = p && this.roster.find(x=>x.key===p.key);
        if(r) banner((r.name||'A player').toUpperCase()+' DISCONNECTED','var(--warning-amber)');
      });
    }
  },
  lobbySeats(){
    const pres = this.tx ? this.tx.presence() : {};
    const byKey = {};
    Object.values(pres).forEach(arr=>arr.forEach(mm=>{
      if(!mm || !mm.key) return;
      const cur = byKey[mm.key];
      if(!cur || (mm.rev||0) > (cur.rev||0)) byKey[mm.key] = mm;   // renames replace, never duplicate
    }));
    const list = Object.values(byKey);
    list.sort((a,b)=>((b.host?1:0)-(a.host?1:0)) || (a.joined-b.joined));
    return list.slice(0,5);
  },
  bots: [],
  botNames: ['Bazza','Shaz','Davo'],
  addBot(){
    if(this.tableSeats().length>=5) return;
    const used = this.bots.map(b=>b.name);
    const name = this.botNames.find(n=>!used.includes(n)) || 'Robbo';
    this.bots.push({ key:'bot-'+name.toLowerCase(), name, isAI:true });
    this.renderLobby();
  },
  removeBot(key){
    this.bots = this.bots.filter(b=>b.key!==key);
    this.renderLobby();
  },
  tableSeats(){
    return [...this.lobbySeats(), ...this.bots].slice(0,5);
  },
  commitRename(v){
    v = (v||'').trim().slice(0,12) || this.myName || 'Player';
    const changed = v !== this.myName;
    this.myName = v;
    try{ localStorage.setItem('it_name', v); }catch(e){}
    try{ if(typeof ID!=='undefined') ID.saveName(v); }catch(e){}
    if(this._meta && this.tx){
      this._meta.name = v;
      this._meta.rev = (this._meta.rev||0) + 1;
      this.tx.track(this._meta);
    }
    const ln = $('#lobbyname'); if(ln && ln.value!==undefined) ln.value = v;
    if(changed) banner('NAME CHANGED','var(--success-green)');
    this.renderLobby();
  },
  renderLobby(){
    const el = $('#lobbyseats'); if(!el || !this.tx) return;
    const seats = this.tableSeats();
    renderRuleChips();
    const sb = $('#lobbystart');
    if(sb && sb.textContent!==undefined && this.mode==='lobby-host'){
      const ready = seats.length>=2;
      sb.textContent = ready ? 'Start Game' : 'Waiting for players…';
      sb.disabled = !ready;
      if(sb.classList) sb.classList.toggle('waiting', !ready);
    }
    if(this._seatN!=null && seats.length>this._seatN && !GAME_STARTED){ sfx('tick'); haptic(4); }
    this._seatN = seats.length;
    el.innerHTML = seats.map((mm,i)=>{
      const mine = !mm.isAI && mm.key===this.pkey;
      const nameCell = `<span style="flex:1;text-align:left"><span class="seatdot ${mm.isAI?'bot':''}"></span>${mm.name}${mine?' · you':''}${mm.host?' · host':''}${mm.isAI?' · bot':''}</span>`;
      return `<div class="lobbyseat"><span class="avatar" style="background:${mm.isAI?'var(--felt-highlight)':(i===0?'var(--money-gold)':'var(--felt-highlight)')}">${mm.isAI?'☺':(mm.name||'?')[0]}</span>${nameCell}${mm.isAI&&this.mode==='lobby-host'?`<button class="frremove" onclick="NET.removeBot('${mm.key}')">✕</button>`:''}</div>`;
    }).join('')
      + (seats.length<2 ? '<div class="sub" style="opacity:.5">Share the code</div>' : '');
    const ab = $('#addbot'); if(ab && ab.style) ab.style.display = (this.mode==='lobby-host' && seats.length<4) ? '' : 'none';

};

<script>
/* ================= AI ================= */
function spendAI(c,p){ // for consumed action/rent cards: hand -> discard
  const i=p.hand.findIndex(x=>x.id===c.id);
  if(i>-1) p.hand.splice(i,1);
  G.discard.push(c); G.playsLeft--;
  tableDrop(c, p.name);
  aiShowcase(c, G.turn);
}
function playFromHandAI(c,p){ // for cards that stay in play (props, banked, buildings)
  const i=p.hand.findIndex(x=>x.id===c.id);
  if(i>-1) p.hand.splice(i,1);
  G.playsLeft--;
  aiPlayVis(null);
}
function aiPlayVis(card){
  if(G.turn<1) return;
  const els = document.querySelectorAll('#opponents .opp');
  const oppEl = els && els.length ? els[G.turn-1] : null;
  if(!oppEl || !oppEl.getBoundingClientRect) return;
  const r = oppEl.getBoundingClientRect();
  oppEl.classList.add('aiplay');
  setTimeout(()=>{ if(oppEl.classList) oppEl.classList.remove('aiplay'); }, 380);
  if(card){
    const pileR = rectOf(document.querySelector('#playpile'));
    if(pileR) flyCard(staticCardHTML(card), { left:r.left+r.width/2-51, top:r.top+r.height-16, width:102, height:150 }, pileR, { fromScale:0.45, scale:0.16, dur:320, rot:-5 });
  }
}
function othersOf(idx){ return G.players.map((_,i)=>i).filter(i=>i!==idx && !G.players[i].out); }
function alivePlayers(){ return G.players.map((_,i)=>i).filter(i=>!G.players[i].out); }
function rebuildDeckFromKnown(){
  const known = new Set();
  const take = a => (a||[]).forEach(c=>{ if(c && typeof c.id==='number') known.add(c.id); });
  G.players.forEach(p=>{
    take(p.hand); take(p.bank);
    Object.values(p.props).forEach(take);
    Object.values(p.bldg||{}).forEach(sl=>Object.values(sl||{}).forEach(c=>{ if(c&&c.id!=null) known.add(c.id); }));
  });
  G.deck = shuffle(buildDeck().filter(c=>!known.has(c.id)));
  G.discard = [];
}
function eliminatePlayer(seat, reason){
  const p = G.players[seat]; if(!p || p.out) return;
  p.out = true;
  while(p.hand.length) G.discard.push(p.hand.pop());
  log(nameOf(seat)+' is out — '+reason+'.');
  banner((seat===MYSEAT?'YOU ARE':p.name.toUpperCase()+' IS')+' OUT','var(--danger-red)');
  sfx('alert');
  if(typeof NET!=='undefined' && NET.pendingAsks && NET.pendingAsks[seat]){
    forceResolveAsk(seat);   // the chain gets its answer before the seat goes dark — no orphaned callbacks
  }
  if(seat===MYSEAT){ MODE.type=null; MODE.sel=null; MODE.jsn=null; exitReactMode(true); hidePrompt(); }
  if(seat===MYSEAT && !G.over){
    showPrompt("You're out — spectating. The table plays on.", false);
  }
  const alive = alivePlayers();
  if(alive.length===1){
    G.over = true; renderAll();
    if(NET.mode!=='off'){ try{ localStorage.removeItem('it_room'); localStorage.removeItem('it_host'); }catch(e){} }
    if(NET.mode==='host' && typeof ID!=='undefined') ID.recordMatch(alive[0]);
    const w = G.players[alive[0]];
    $('#wintitle').textContent = alive[0]===MYSEAT ? 'You win' : w.name+' wins';
    $('#winsub').textContent = 'Last one standing';
    fillWinRows(); NET.teardown();
    const ws=$('#winscreen'); if(ws&&ws.classList) ws.classList.add('show');
    if(NET.mode==='host') NET.pushState();
    return;
  }
  if(G.turn===seat && !G.over) finishEnd();
  renderAll();
  if(NET.mode==='host') NET.pushState();
}
function aiWildColor(p,c){
  const choices = c.t==='wild' ? c.colors : Object.keys(COLORS).filter(col=>(p.props[col]||[]).length);
  let best=null,score=-1;
  for(const col of choices){
    const n=countIn(p,col), size=COLORS[col].size;
    if(n>=size) continue;
    const supplyOK = colorSupply(p,col,G.turn) >= (size-n-1);
    const sc = (n===size-1?100:0) + n*3 + (supplyOK?2:-4);
    if(sc>score){score=sc;best=col;}
  }
  return best;
}
/* ================= AI BRAIN: card counting + EV decisions ================= */
const AI_W = {
  pg_complete: 9, pg_near: 5, pg_base: 2.4,
  wild_dead: 0.35,
  tk_base: 10, tk_val: 0.4, tk_hold: 0.5,
  rent_eff: 0.9, hike_cost: 2.2,
  sw_gain: 0.9, sw_loss: 0.6, sw_v: 0.25,
  swap_min: 1.5,
  pd_base: 4.6, pd_low: 1.5, pd_high: 2.5,
  bank_v: 0.25,
  jsn_burn: 2.5, jsn_margin: 0.5,
  pay_complete: 9, pay_near: 5, pay_base: 2.5,
};
function wOf(q){ return (q && q.tuneW) || AI_W; }
function keyOf(c){
  if(c.t==='money') return 'm'+c.v;
  if(c.t==='prop') return 'p:'+c.color;
  if(c.t==='wild') return 'w:dual';
  if(c.t==='wildall') return 'w:all';
  if(c.t==='rent') return 'r:pair';
  if(c.t==='rentall') return 'r:all';
  if(c.t==='action') return 'a:'+c.kind;
  return '?';
}
let CENSUS = null;
function deckCensus(){
  if(CENSUS) return CENSUS;
  const m = {}; let tot = 0;
  buildDeck().forEach(c=>{ const k=keyOf(c); m[k]=(m[k]||0)+1; tot++; });
  CENSUS = { m, tot };
  return CENSUS;
}
function unseenFor(selfIdx){
  // everything not visible to this player = deck + other hands, derived, reshuffle-proof
  const cen = deckCensus();
  const seen = {}; let seenTot = 0;
  const add = c => { const k=keyOf(c); seen[k]=(seen[k]||0)+1; seenTot++; };
  G.discard.forEach(add);
  G.players.forEach((q,i)=>{
    q.bank.forEach(add);
    propList(q).forEach(x=>add(x.card));
    Object.values(q.bldg).forEach(b=>{ if(b.granny)add(b.granny); if(b.resort)add(b.resort); });
    if(i===selfIdx) q.hand.forEach(add);
  });
  const m = {}; let tot = 0;
  Object.keys(cen.m).forEach(k=>{ const n=Math.max(0, cen.m[k]-(seen[k]||0)); m[k]=n; tot+=n; });
  return { m, tot };
}
function pHoldsAtLeastOne(kindKey, holderIdx, selfIdx){
  const un = unseenFor(selfIdx);
  const K = un.m[kindKey]||0, N = un.tot, h = G.players[holderIdx].hand.length;
  if(K<=0 || h<=0 || N<=0) return 0;
  let pNone = 1;
  for(let i=0;i<h;i++) pNone *= Math.max(0, N-K-i) / Math.max(1, N-i);
  return Math.min(1, Math.max(0, 1-pNone));
}
function colorSupply(p, color, selfIdx){
  const un = unseenFor(selfIdx);
  return (un.m['p:'+color]||0) + p.hand.filter(c=>c.t==='prop'&&c.color===color).length;
}
function progressGain(p, color){
  const W = wOf(p);
  const n = countIn(p,color), size = COLORS[color].size;
  if(n>=size) return 0;
  if(n===size-1) return completeColors(p).length>=2 ? 1000 : W.pg_complete;
  return n===size-2 ? W.pg_near : W.pg_base;
}
function liquidOf(q){ return payAssetsTotal(q); }
function threatOf(t){
  const q = G.players[t];
  let best = 0;
  Object.keys(q.props).forEach(col=>{ if(!isComplete(q,col)) best=Math.max(best, countIn(q,col)/COLORS[col].size); });
  return completeColors(q).length*8 + best*4 + liquidOf(q)*0.12;
}
function jsnAdjusted(ev, defIdx, selfIdx){
  const pj = pHoldsAtLeastOne('a:nodeal', defIdx, selfIdx);
  return ev*(1-pj) + wOf(G.players[selfIdx]).jsn_burn*pj; // forcing out their No Deal has value too
}
function aiShouldJSN(p, defIdx, atkIdx, desc, count){
  if(!p.hand.some(x=>x.t==='action'&&x.kind==='nodeal')) return false;
  const loss = desc==='Hostile Takeover' ? 14 : desc==='Sneaky Swipe' ? 6 :
               desc==='Swap Meet' ? 4 : desc==='Rent' ? 6 :
               desc==='Call In a Favour' ? 5 : desc==='Shout a Round' ? 2 : 4;
  const un = unseenFor(defIdx);
  const jsnValue = 3 + Math.max(0, 2-(un.m['a:nodeal']||0)); // scarcer = more precious
  const pCounter = pHoldsAtLeastOne('a:nodeal', atkIdx, defIdx);
  const attackerNearWin = completeColors(G.players[atkIdx]).length>=2;
  if(desc==='Hostile Takeover') return true; // never surrender a set unprotested
  if(attackerNearWin && (desc==='Sneaky Swipe'||desc==='Rent')) return true;
  return loss*(1-pCounter) - jsnValue*0.6 > wOf(p).jsn_margin;
}
function keepScore(c, p){
  if(c.t==='action'){
    if(c.kind==='nodeal') return 99;
    if(c.kind==='takeover') return 90;
    if(c.kind==='hike') return 52;
    if(c.kind==='payday') return 45;
    return 40 + c.v*2;
  }
  if(c.t==='wildall') return 70;
  if(c.t==='wild') return 60;
  if(c.t==='prop') return 42 + progressGain(p,c.color)*3;
  if(c.t==='rent'||c.t==='rentall') return 46 + c.v;
  return c.v*4.5; // money
}

function brainCandidates(p, idx, next){
  const C = []; const add = (ev, run, meta)=>{ if(ev>0.4) C.push(Object.assign({ev, run}, meta||{})); };
  const enemies = othersOf(idx);

  // properties
  p.hand.filter(c=>c.t==='prop').forEach(c=>{
    add(progressGain(p,c.color), ()=>{
      playFromHandAI(c,p); addProp(p,c,c.color);
      log(p.name+' played '+cardName(c)+'.');
      aiShowcase(c, idx);
      if(checkAllWin())return; next();
    }, {cardId:c.id, mode:'play', label:'Play '+cardName(c)});
  });

  // wilds — supply-aware colour choice
  p.hand.filter(c=>c.t==='wild'||c.t==='wildall').forEach(c=>{
    const col = aiWildColor(p,c);
    if(col && (c.t==='wild' || countIn(p,col)>0)){
      const need = COLORS[col].size - countIn(p,col) - 1;
      const odds = colorSupply(p,col,idx) >= need ? 1 : wOf(p).wild_dead;
      add(progressGain(p,col)*odds*0.95, ()=>{
        playFromHandAI(c,p); addProp(p,c,col);
        log(p.name+' played a wild into '+COLORS[col].label+'.');
        aiShowcase(c, idx);
        if(checkAllWin())return; next();
      }, {cardId:c.id, mode:'play', label:'Wild into '+COLORS[col].label});
    }
  });

  // hostile takeover
  const tk = p.hand.find(c=>c.t==='action'&&c.kind==='takeover');
  if(tk){
    let best=null;
    enemies.forEach(t=>completeColors(G.players[t]).forEach(col=>{
      const val=(G.players[t].props[col]||[]).reduce((s,c)=>s+c.v,0) + rentFor(G.players[t],col)*0.5;
      if(!best||val>best.val) best={t,col,val};
    }));
    if(best){
      const winNow = completeColors(p).length>=2;
      const urgent = completeColors(G.players[best.t]).length>=2;
      let ev = winNow ? 1000 : jsnAdjusted(wOf(p).tk_base + best.val*wOf(p).tk_val, best.t, idx);
      if(!winNow && !urgent && G.turnCount<4) ev *= wOf(p).tk_hold; // hold it early
      attacksAllowed() && add(ev, ()=>{
        spendAI(tk,p); renderAll();
        log(p.name+' launched a Hostile Takeover on '+(best.t===0?'your':G.players[best.t].name+"'s")+' '+COLORS[best.col].label+' set!');
        banner('HOSTILE TAKEOVER!','var(--coral)');
        resolveBlock(best.t,idx,'Hostile Takeover',blocked=>{
          if(!blocked){ doTakeover(best.t,idx,best.col); if(checkAllWin())return; }
          else log('Takeover blocked.');
          next();
        });
      }, {cardId:tk.id, mode:'play', label:'Hostile Takeover → '+(best.t===0?'you':G.players[best.t].name)});
    }
  }

  // rent — expected collection vs each side's real liquidity, hike combo weighed
  p.hand.filter(c=>c.t==='rent'||c.t==='rentall').forEach(c=>{
    const cols = c.t==='rent' ? c.colors : Object.keys(p.props);
    let bo=null;
    cols.forEach(col=>{ const r=rentFor(p,col); if(r>0&&(!bo||r>bo.r)) bo={col,r}; });
    if(!bo) return;
    const targets = c.t==='rentall'
      ? [enemies.slice().sort((a,b)=>liquidOf(G.players[b])-liquidOf(G.players[a]))[0]]
      : enemies;
    const collect = amt => targets.reduce((s,t)=>s+jsnAdjusted(Math.min(amt, liquidOf(G.players[t]))*wOf(p).rent_eff, t, idx), 0);
    const hike = p.hand.find(x=>x.t==='action'&&x.kind==='hike');
    add(collect(bo.r), ()=>runRent(c,bo,targets,null), {cardId:c.id, mode:'play', label:'Charge '+COLORS[bo.col].label+' rent ($'+bo.r+'M)'});
    if(hike && G.playsLeft>=2) attacksAllowed() && add(collect(bo.r*2)-wOf(p).hike_cost, ()=>runRent(c,bo,targets,hike), {cardId:c.id, mode:'play', label:'Charge '+COLORS[bo.col].label+' rent + Hike ($'+(bo.r*2)+'M)'});
  });
  function runRent(c,bo,targets,hike){
    let amount = bo.r;
    spendAI(c,p);
    if(hike){ spendAI(hike,p); amount*=2; }
    log(p.name+' charged $'+amount+'M '+COLORS[bo.col].label+' rent.');
    banner('RENT — $'+amount+'M','var(--coral)');
    renderAll();
    processQueue(targets,(t,go)=>{
      resolveBlock(t,idx,'Rent',(blocked,x)=>{
        if(blocked){ log((t===0?'You':G.players[t].name)+' blocked the rent.'); return go(); }
        const jc = x&&x.jsn ? {...x.jsn, onCancel:()=>{ log((t===0?'You':G.players[t].name)+' blocked the rent.'); go(); }} : null;
        requestPayment(t,amount,idx,go,jc);
      }, true);
    },()=>{ if(!checkAllWin()) next(); });
  }

  // sneaky swipe — completion value both ways
  const sw = p.hand.find(c=>c.t==='action'&&c.kind==='swipe');
  if(sw){
    let best=null;
    enemies.forEach(t=>stealTargetsOf(t).forEach(x=>{
      const q=G.players[t];
      const myGain = x.card.t==='prop' ? progressGain(p,x.color) : 3;
      const theirLoss = (countIn(q,x.color)===COLORS[x.color].size-1 ? 4 : 1.5) + countIn(q,x.color)*0.6;
      const ev = jsnAdjusted(myGain*wOf(p).sw_gain + theirLoss*wOf(p).sw_loss + x.card.v*wOf(p).sw_v, t, idx);
      if(!best||ev>best.ev) best={t,x,ev};
    }));
    if(best) add(best.ev, ()=>{
      spendAI(sw,p); renderAll();
      log(p.name+' played Sneaky Swipe on '+(best.t===0?'you':G.players[best.t].name)+'!');
      resolveBlock(best.t,idx,'Sneaky Swipe',blocked=>{
        if(!blocked){ transferProp(G.players[best.t],p,best.x.card); log(p.name+' swiped '+cardName(best.x.card)+'.'); if(checkAllWin())return; }
        else log('Swipe blocked.');
        next();
      });
    }, {cardId:sw.id, mode:'play', label:'Swipe '+cardName(best.x.card)});
  }

  // swap meet — the old AI never played this; net-completion trades only
  const sm = p.hand.find(c=>c.t==='action'&&c.kind==='swap');
  if(sm){
    let best=null;
    const mine = propList(p).filter(x=>!isComplete(p,x.color) && x.card.t==='prop');
    enemies.forEach(t=>stealTargetsOf(t).forEach(x=>{
      if(x.card.t!=='prop') return;
      mine.forEach(mx=>{
        const q=G.players[t];
        const myGain = progressGain(p,x.color);
        const myLoss = countIn(p,mx.color)===COLORS[mx.color].size-1 ? 6 : 2;
        const theirGain = countIn(q,mx.color)===COLORS[mx.color].size-1 ? 6 : 1.5;
        const theirLoss = countIn(q,x.color)===COLORS[x.color].size-1 ? 4 : 1.5;
        const net = myGain - myLoss + theirLoss - theirGain;
        if(net>wOf(p).swap_min){
          const ev = jsnAdjusted(net, t, idx);
          if(!best||ev>best.ev) best={t,x,mx,ev};
        }
      });
    }));
    if(best) add(best.ev, ()=>{
      spendAI(sm,p); renderAll();
      log(p.name+' proposed a Swap Meet with '+(best.t===0?'you':G.players[best.t].name)+'.');
      resolveBlock(best.t,idx,'Swap Meet',blocked=>{
        if(!blocked){
          transferProp(G.players[best.t],p,best.x.card);
          transferProp(p,G.players[best.t],best.mx.card);
          log(p.name+' traded '+cardName(best.mx.card)+' for '+cardName(best.x.card)+'.');
          if(checkAllWin())return;
        } else log('Swap blocked.');
        next();
      });
    }, {cardId:sm.id, mode:'play', label:'Swap for '+cardName(best.x.card)});
  }

  // favour — richest target
  const fv = p.hand.find(c=>c.t==='action'&&c.kind==='favour');
  if(fv){
    const t = enemies.slice().sort((a,b)=>liquidOf(G.players[b])-liquidOf(G.players[a]))[0];
    attacksAllowed() && add(jsnAdjusted(Math.min(5, liquidOf(G.players[t]))*0.85, t, idx), ()=>{
      spendAI(fv,p); renderAll();
      log(p.name+' called in a favour from '+(t===0?'you':G.players[t].name)+' — $5M.');
      resolveBlock(t,idx,'Call In a Favour',(blocked,x)=>{
        if(blocked){ log('Favour blocked.'); return next(); }
        const jc = x&&x.jsn ? {...x.jsn, onCancel:()=>{ log('Favour blocked.'); next(); }} : null;
        requestPayment(t,5,idx,()=>{ if(!checkAllWin()) next(); }, jc);
      }, true);
    }, {cardId:fv.id, mode:'play', label:'Call In a Favour → '+(t===0?'you':G.players[t].name)});
  }

  // shout
  const sh = p.hand.find(c=>c.t==='action'&&c.kind==='shout');
  if(sh){
    const ev = enemies.reduce((s,t)=>s+jsnAdjusted(Math.min(2, liquidOf(G.players[t]))*0.85, t, idx), 0);
    attacksAllowed() && add(ev, ()=>{
      spendAI(sh,p); renderAll();
      log(p.name+' shouted a round — everyone owes them $2M.');
      processQueue(enemies,(t,go)=>{
        resolveBlock(t,idx,'Shout a Round',(blocked,x)=>{
          if(blocked){ log('Blocked.'); return go(); }
          const jc = x&&x.jsn ? {...x.jsn, onCancel:()=>{ log('Blocked.'); go(); }} : null;
          requestPayment(t,2,idx,go,jc);
        }, true);
      },()=>{ if(!checkAllWin()) next(); });
    }, {cardId:sh.id, mode:'play', label:'Shout a Round'});
  }

  // payday — draw equity, hand-size aware
  const pd = p.hand.find(c=>c.t==='action'&&c.kind==='payday');
  if(pd) add(wOf(p).pd_base + (p.hand.length<=3?wOf(p).pd_low:0) - (p.hand.length>=7?wOf(p).pd_high:0), ()=>{
    spendAI(pd,p); const a=draw(),b=draw(); if(a)p.hand.push(a); if(b)p.hand.push(b);
    log(p.name+' played Payday.'); next();
  }, {cardId:pd.id, mode:'play', label:'Payday (draw 2)'});

  // buildings
  const gr = p.hand.find(c=>c.t==='action'&&c.kind==='granny');
  if(gr){
    const col = completeColors(p).find(c=>buildable(c)&&!p.bldg[c]?.granny);
    if(col) add(3.8, ()=>{ playFromHandAI(gr,p); if(!p.bldg[col])p.bldg[col]={}; p.bldg[col].granny=gr; log(p.name+' added a Granny Flat to '+COLORS[col].label+'.'); aiShowcase(gr, idx); next(); }, {cardId:gr.id, mode:'play', label:'Granny Flat on '+COLORS[col].label});
  }
  const rs = p.hand.find(c=>c.t==='action'&&c.kind==='resort');
  if(rs){
    const col = completeColors(p).find(c=>p.bldg[c]?.granny&&!p.bldg[c]?.resort);
    if(col) add(4.2, ()=>{ playFromHandAI(rs,p); p.bldg[col].resort=rs; log(p.name+' built a Beach Resort on '+COLORS[col].label+'.'); aiShowcase(rs, idx); next(); }, {cardId:rs.id, mode:'play', label:'Beach Resort on '+COLORS[col].label});
  }

  // banking — money, then spare cards
  const mn = [...p.hand].filter(c=>c.t==='money').sort((a,b)=>b.v-a.v)[0];
  if(mn) add(0.8 + mn.v*wOf(p).bank_v, ()=>{ playFromHandAI(mn,p); p.bank.push(mn); log(p.name+' banked some money.'); aiShowcase(mn, idx); next(); }, {cardId:mn.id, mode:'bank', label:'Bank $'+mn.v+'M'});
  const spare = [...p.hand].filter(c=>(c.t==='action'&&c.kind!=='nodeal')||c.t==='rent'||c.t==='rentall').sort((a,b)=>keepScore(a,p)-keepScore(b,p))[0];
  if(spare) add((G.playsLeft<3?0.7:0.45) + spare.v*0.08, ()=>{ playFromHandAI(spare,p); p.bank.push(spare); log(p.name+' banked a card.'); aiShowcase(spare, idx); next(); }, {cardId:spare.id, mode:'bank', label:'Bank '+cardName(spare)});

  return C;
}
function aiStep(p){
  if(G.over) return;
  const idx = G.turn;
  const next = ()=>{ if(G.over) return; renderAll(); setTimeout(()=>aiStep(p), Math.max(aiDelay(), visWait()+150)); };
  if(G.playsLeft<=0) return endTurn();
  const C = brainCandidates(p, idx, next);
  if(!C.length) return endTurn();
  C.sort((a,b)=>b.ev-a.ev);
  C[0].run();
}

try{ if(typeof ID!=='undefined'){ ID.renderProfile(); if(SUPABASE_URL) setTimeout(()=>ID.init(), 400); } }catch(e){}
renderAll();
try{ refreshRejoin(); }catch(e){}
/* deep links from the lobby: ?join=CODE joins a room, ?invite=FRIEND hosts + invites */
try{
  const qp = new URLSearchParams(location.search);
  if(qp.get('join')){
    setTimeout(()=>{ const jc=$('#joincode'); if(jc) jc.value = qp.get('join'); NET.joinGame(); }, 900);
  } else if(qp.get('invite')){
    setTimeout(async ()=>{ await NET.hostGame(); if(typeof ID!=='undefined') ID.invite(qp.get('invite')); }, 900);
  }
}catch(e){}
function startSolo(){
  clockStart();
  newGame();
  INITDEAL = true;
  me().hand.forEach(c=>NEWIDS.add(c.id));
  renderAll();
  INITDEAL = false;
  me().hand.forEach((c,i)=>setTimeout(()=>{ sfx('tick'); }, 140+i*95));
  log('Dealt 5 cards each. First to 3 complete sets wins.');
  setTimeout(startTurn, 700);
}
