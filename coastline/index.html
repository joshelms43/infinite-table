<!DOCTYPE html>
<!--
  COASTLINE — the Sunshine Coast property card game
  Version: 0.4.8
  Single-file vanilla HTML/JS. No build step.
  v0.1.0 scope: local play, 1 human vs 2 AI opponents, full ruleset.
  Multiplayer (Supabase Realtime) planned for v0.2.0.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Coastline — v0.4.8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  /* ============ 1. BASE UI ============ */
  --table-night:#121A16; --felt-green:#1D2B25; --felt-highlight:#29392F;
  --text-ivory:#F2EEE2; --text-faint:rgba(242,238,226,.55);
  /* ============ 2. CARDS ============ */
  --card-ivory:#F7F2E6; --card-edge:#D9D2C0; --ink-black:#24241D; --muted-ink:#6E6C5E;
  /* ============ 3. ACTIONS ============ */
  --primary-coral:#E26A4B; --primary-coral-deep:#BC4F37;
  --money-gold:#BE8F41; --money-gold-deep:#97702C;
  /* ============ 4. STATUS ============ */
  --success-green:#3E8E68; --danger-red:#B8483D; --warning-amber:#D9A03F; --info-slate:#5A8CA8;
  /* ============ 5. PROPERTY / GAME COLOURS ============ */
  --property-amber:#E0AB52; --property-teal:#3B8B82; --property-coral:#D4756B;
  --property-green:#5C8B53; --property-purple:#7F6595; --property-orange:#D0813E;
  --property-brown:#86603F; --property-sky:#6394B6; --property-sage:#8B9A6B;
  --property-charcoal:#474D4A;
  /* ============ 6. SHADOWS / BORDERS ============ */
  --line-soft-t:rgba(242,238,226,.13); --line-faint-t:rgba(242,238,226,.07);
  --scrim:rgba(12,17,14,.78);
  /* ============ legacy aliases (all rules resolve through tokens) ============ */
  --table:var(--felt-green); --table-deep:var(--table-night); --table-edge:var(--table-night);
  --ui-highlight:var(--felt-highlight); --ui-deep:var(--table-night);
  --foam:var(--text-ivory);
  --sand:var(--card-ivory); --sand-edge:var(--card-edge); --ink:var(--ink-black); --ink-soft:var(--muted-ink);
  --coral:var(--primary-coral); --coral-deep:var(--primary-coral-deep);
  --gold-money:var(--money-gold); --gold-deep:var(--money-gold-deep);
  --action-success:var(--success-green); --action-danger:var(--danger-red);
  --action-warning:var(--warning-amber); --action-info:var(--info-slate);
  --line:var(--line-soft-t); --line-soft:var(--line-faint-t);
  --c-gold:var(--property-amber); --c-teal:var(--property-teal); --c-coral:var(--property-coral);
  --c-green:var(--property-green); --c-purple:var(--property-purple); --c-orange:var(--property-orange);
  --c-brown:var(--property-brown); --c-sky:var(--property-sky); --c-sage:var(--property-sage);
  --c-black:var(--property-charcoal);
  --sh-card:0 2px 5px rgba(8,12,10,.28), 0 9px 22px rgba(8,12,10,.2);
  --sh-raise:0 14px 26px rgba(8,12,10,.42);
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  animation:appin .35s ease;
  font-family:'Nunito Sans',system-ui,sans-serif;color:var(--foam);
  background:var(--table);
  min-height:100dvh;
  overscroll-behavior:none;display:flex;flex-direction:column;overscroll-behavior:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible,[onclick]:focus-visible{outline:2px solid var(--gold-money);outline-offset:2px}
::-webkit-scrollbar{display:none}

/* ---------- header ---------- */
header{display:flex;align-items:flex-end;justify-content:space-between;padding:12px 16px 8px}
.eyebrow{font-size:9px;font-weight:800;letter-spacing:2.2px;opacity:.55;margin-bottom:1px}
.logo{font-family:'Lilita One',cursive;font-size:23px;letter-spacing:.5px;color:var(--sand);line-height:1}
.logo .wave{color:var(--c-teal)}
.ver{font-size:10.5px;opacity:.5;font-weight:700}
.hdr-right{display:flex;gap:6px;align-items:center}
.icon-btn{transition:transform .1s;
  font-size:15px;width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.07);border:1px solid var(--line-soft);
}
.icon-btn:active{background:rgba(255,255,255,.16)}

/* ---------- opponents ---------- */
#opponents{display:flex;gap:8px;padding:4px 16px 8px}
.opp{transition:box-shadow .3s ease, opacity .3s ease;
  flex:1;background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.1)), var(--table-deep);
  border:1px solid var(--line-soft);border-radius:14px;padding:9px 10px 8px;
  box-shadow:0 2px 8px rgba(8,12,10,.3);transition:box-shadow .25s, transform .12s;cursor:pointer;
}
.opp:active{transform:scale(.98)}
.opp.active{border-color:rgba(226,106,75,.7)}
.opp-top{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.avatar{
  width:24px;height:24px;border-radius:50%;flex:0 0 24px;
  font-family:'Lilita One',cursive;font-size:12.5px;color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 -2px 3px rgba(0,0,0,.25);
}
.opp-name{font-weight:800;font-size:13.5px;flex:1}
.opp-meta{font-size:10.5px;opacity:.65;font-weight:700;white-space:nowrap}
.opp.active .opp-meta::before{content:'▸ ';color:var(--gold-money);animation:blip 1.1s ease-in-out infinite}
.tidebar{display:flex;flex-wrap:wrap;gap:4px;min-height:15px;align-items:flex-end}
.chipset{display:flex;gap:1.5px;align-items:flex-end}
.chip{width:7px;border-radius:2px;height:12px;box-shadow:inset 0 -2px 2px rgba(0,0,0,.25)}
.chip.done-mark{height:15px;box-shadow:0 0 0 1.5px var(--gold-money), inset 0 -2px 2px rgba(0,0,0,.25)}
.opp-bldg{font-size:10px;margin-left:2px;color:var(--gold-money)}
.emptynote{opacity:.35;font-size:10px;font-weight:600}

/* ---------- table strip ---------- */
#tablestrip{display:flex;align-items:center;gap:8px;padding:2px 16px 8px;font-size:12px}
.pill.low{border-color:var(--warning-amber);color:var(--warning-amber)}
.pill{
  display:inline-block;font-size:10.5px;font-weight:800;background:rgba(255,255,255,.07);
  border:1px solid var(--line-soft);border-radius:20px;padding:3px 9px;white-space:nowrap;
}
#log{display:none}
#playpile{margin-right:auto}
#turnbadge{
  font-family:'Lilita One',cursive;font-size:12.5px;color:var(--table-deep);
  background:linear-gradient(180deg,#E3C588,var(--gold-money));border-radius:8px;padding:4px 10px;
  white-space:nowrap;box-shadow:0 2px 5px rgba(8,12,10,.35);
}

/* ---------- player board ---------- */
#board{flex:1;overflow-y:auto;padding:4px 16px 6px;display:flex;flex-direction:column;gap:12px}
.zone-label{
  font-size:9.5px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;
  opacity:.42;margin-bottom:5px;display:flex;align-items:center;gap:8px;
}
.zone-label::after{content:'';flex:1;height:1px;background:var(--line-soft)}
#myprops{display:flex;flex-wrap:wrap;gap:7px;min-height:48px}
.setgroup{
  background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(0,0,0,.1));
  border:1px solid var(--line);border-radius:11px;padding:6px 8px;
  display:flex;flex-direction:column;gap:4px;cursor:pointer;transition:transform .12s;
}
.setgroup:active{transform:scale(.97)}
.setgroup.complete{
  border-color:rgba(217,160,63,.75);
  background:linear-gradient(180deg, rgba(217,160,63,.16), rgba(217,160,63,.05));
}
.setdot{width:9px;height:9px;border-radius:3px;box-shadow:inset 0 -2px 2px rgba(0,0,0,.3)}
.bldg-tags{display:flex;gap:3px}
.bldg-tag{font-size:9px;font-weight:800;letter-spacing:.4px;background:var(--gold-money);color:var(--table-deep);border-radius:4px;padding:1px 5px;box-shadow:0 1px 2px rgba(8,12,10,.3)}
#mybank{display:flex;gap:5px;flex-wrap:wrap;align-items:center;min-height:32px}
.banktotal{font-size:12px;font-weight:800;opacity:.75;margin-left:4px;display:inline-block}
.banktotal.pop{animation:zpop .35s ease}

/* ---------- hand ---------- */
#handwrap{background:linear-gradient(to top, rgba(10,15,12,.55), transparent);padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
#handbar{display:flex;justify-content:space-between;align-items:center;padding:0 16px 8px}
#playsleft{display:flex;gap:5px;align-items:center;font-size:11.5px;font-weight:800;letter-spacing:.3px}
.playdot{width:10px;height:10px;border-radius:50%;background:var(--coral);opacity:.22;box-shadow:inset 0 -2px 2px rgba(0,0,0,.3);transition:opacity .25s, box-shadow .25s}
.playdot.on{opacity:1;box-shadow:0 0 6px rgba(226,106,75,.6), inset 0 -2px 2px rgba(0,0,0,.3)}
#endturn{
  font-family:'Lilita One',cursive;font-size:14px;letter-spacing:.4px;color:#fff;
  background:linear-gradient(180deg,var(--coral),var(--coral-deep));
  border-radius:12px;padding:8px 18px;box-shadow:0 3px 10px rgba(188,79,55,.32), inset 0 1px 0 rgba(255,255,255,.25);
}
#endturn:active{transform:translateY(1px)}
#endturn:disabled{opacity:.3;box-shadow:none}
#hand{display:flex;overflow-x:auto;padding:48px 16px 10px;margin-top:-30px;overscroll-behavior:contain}
#hand.few{justify-content:center}
.cardw{flex:0 0 102px;width:102px;position:relative;touch-action:pan-x;transition:transform .26s cubic-bezier(.34,1.56,.64,1)}
.cardw.pressed{z-index:40!important}
.cardw.pressed .card{
  transform:scale(.955) translateY(2px);
  box-shadow:0 1px 4px rgba(8,12,10,.45);
  transition:transform .07s ease, box-shadow .07s ease;
}
.cardw.hidden-src{visibility:hidden}
.cardw .card{rotate:var(--fan,0deg);translate:0 var(--fanY,0px)}
.cardw.raised .card{rotate:0deg;translate:0 0}
.cardw.raised{z-index:60!important;transform:translateY(-30px)}
.cardw.part-l{transform:translateX(-9px)}
.cardw.part-r{transform:translateX(9px)}
.cardw.denied .card{animation:deny .32s ease}
@keyframes deny{25%{transform:translateX(-5px)}50%{transform:translateX(5px)}75%{transform:translateX(-3px)}}
.cardw.raised .card{box-shadow:var(--sh-raise);transform:scale(1.03)}
.card{transition:transform .18s cubic-bezier(.2,1.1,.3,1), box-shadow .18s}
.card{
  width:102px;min-width:102px;max-width:102px;height:150px;min-height:150px;max-height:150px;
  flex:0 0 102px;border-radius:11px;
  background:linear-gradient(168deg, #FFFDF6 0%, var(--sand) 55%, #F1E9D4 100%);
  color:var(--ink);position:relative;overflow:hidden;
  border:1px solid rgba(10,25,26,.35);box-shadow:var(--sh-card);
  display:flex;flex-direction:column;transition:transform .15s, box-shadow .15s;
}
.card.static{cursor:default}
.card .band{
  height:27px;flex:0 0 27px;display:flex;align-items:center;justify-content:center;
  font-size:9.5px;font-weight:800;color:#fff;letter-spacing:.9px;text-transform:uppercase;
  text-shadow:0 1px 2px rgba(0,0,0,.45);padding:0 5px;text-align:center;
  box-shadow:inset 0 -3px 4px rgba(0,0,0,.18);
}
.card .body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 7px;text-align:center;gap:3px}
.card .cname{font-weight:800;font-size:11.5px;line-height:1.18}
.card .cdesc{font-size:8.8px;color:var(--ink-soft);line-height:1.25;font-weight:700}
.coin{
  position:absolute;top:31px;left:5px;z-index:2;
  font-size:8px;font-weight:800;color:var(--table-deep);
  background:linear-gradient(180deg,#E3C588,var(--gold-money));
  border-radius:9px;padding:1.5px 5px;border:1px solid rgba(96,70,20,.4);
  box-shadow:0 1px 2px rgba(0,0,0,.3);
}
.ladder{padding:0 10px 8px;display:flex;flex-direction:column;gap:2.5px}
.rrow{display:flex;justify-content:space-between;font-size:8.6px;font-weight:700;color:var(--ink-soft)}
.rrow b{color:var(--ink)}
.rrow .star{color:var(--gold-deep)}
.card.moneycard .mband{
  height:20px;flex:0 0 20px;display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:800;letter-spacing:2px;color:var(--gold-deep);
  border-bottom:1px dashed rgba(96,70,20,.3);
}
.card.moneycard{background:linear-gradient(168deg,#FFF6DE,#FBE7B4 60%,#F3D488)}
.card.moneycard .mbody{flex:1;display:flex;align-items:center;justify-content:center}
.bigcoin{
  width:58px;height:58px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #EBDCAE, var(--gold-money) 60%, var(--gold-deep));
  border:2px solid rgba(96,70,20,.45);box-shadow:0 3px 6px rgba(96,70,20,.3), inset 0 2px 3px rgba(255,255,255,.6);
  display:flex;align-items:center;justify-content:center;
  font-family:'Lilita One',cursive;font-size:16px;color:#6B4A08;
}
.card.actioncard .band{background:linear-gradient(180deg,var(--coral),var(--coral-deep))}
.card.rentcard .band{background:linear-gradient(90deg,var(--b1),var(--b2))}
.card.wildall .band{background:linear-gradient(90deg,#E8B93B,#F26D5B,#8E5EA8,#1FA8A0)}
.bandsplit{background:linear-gradient(90deg,var(--b1) 50%,var(--b2) 50%)!important}

/* ---------- modal / sheet ---------- */
#overlay{position:fixed;inset:0;background:var(--scrim);backdrop-filter:blur(2px);display:flex;align-items:flex-end;justify-content:center;z-index:50;opacity:0;pointer-events:none;transition:opacity .18s ease}
#overlay.show{opacity:1;pointer-events:auto}
#sheet{
  width:100%;max-width:520px;background:linear-gradient(180deg,var(--ui-highlight),var(--ui-deep) 50%);
  border-radius:24px 24px 0 0;padding:10px 16px calc(18px + env(safe-area-inset-bottom));
  max-height:78dvh;overflow-y:auto;border-top:1px solid rgba(255,255,255,.18);
  box-shadow:0 -10px 40px rgba(0,0,0,.5);
}
#sheet::before{content:'';display:block;width:38px;height:4px;border-radius:4px;background:rgba(255,255,255,.25);margin:0 auto 12px}
#sheet h3{font-family:'Lilita One',cursive;font-size:17.5px;letter-spacing:.3px;margin-bottom:4px}
#sheet .sub{font-size:12.5px;opacity:.8;margin-bottom:12px;font-weight:600;line-height:1.4}
.optlist{display:flex;flex-direction:column;gap:8px}
.optbtn{
  background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:11px;
  padding:12px 13px;text-align:left;font-weight:700;font-size:13.5px;color:var(--foam);
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  transition:background .12s;
}
.optbtn:active{background:rgba(255,255,255,.16)}
.optbtn .hint{font-size:11px;opacity:.55;font-weight:700;text-align:right}
.optbtn.danger{border-color:rgba(226,106,75,.7)}
.optbtn.primary{background:linear-gradient(180deg,var(--coral),var(--coral-deep));border-color:transparent;color:#fff;box-shadow:0 3px 8px rgba(188,79,55,.35)}
.optbtn:disabled{opacity:.32}
.colorpickrow{display:flex;gap:8px;flex-wrap:wrap}
.colorpick{
  width:48px;height:48px;border-radius:11px;border:2px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:9.5px;color:#fff;
  text-shadow:0 1px 2px rgba(0,0,0,.5);box-shadow:inset 0 -4px 6px rgba(0,0,0,.25), 0 2px 4px rgba(8,12,10,.3);
}
.colorpick:active{transform:scale(.95)}

/* ---------- win ---------- */
#winscreen{
  position:fixed;inset:0;z-index:60;display:flex;
  background:rgba(10,15,12,.72);backdrop-filter:blur(3px);
  flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;
  opacity:0;pointer-events:none;transition:opacity .25s ease;
}
#winscreen.show{opacity:1;pointer-events:auto}
.wincard{
  background:linear-gradient(180deg,var(--felt-highlight),var(--table-deep) 72%);
  border:1px solid var(--line);border-radius:20px;padding:26px 28px 24px;
  box-shadow:0 20px 50px rgba(8,12,10,.6);max-width:340px;
  display:flex;flex-direction:column;gap:10px;align-items:center;
  animation:winpop .35s cubic-bezier(.2,1.3,.4,1);
}
@keyframes winpop{from{transform:scale(.85) translateY(14px);opacity:0}}
#winscreen h1{font-family:'Lilita One',cursive;font-size:34px;color:var(--gold-money);text-shadow:0 4px 14px rgba(0,0,0,.4)}
#winscreen p{font-weight:700;opacity:.85;max-width:300px;line-height:1.45}
#winstats{font-size:12px;font-weight:700;opacity:.55}
#winscreen button{
  font-family:'Lilita One',cursive;font-size:16px;color:#fff;border-radius:12px;padding:13px 30px;margin-top:8px;
  background:linear-gradient(180deg,var(--coral),var(--coral-deep));
  box-shadow:0 4px 12px rgba(188,79,55,.45), inset 0 1px 0 rgba(255,255,255,.25);
}

/* ---------- log drawer ---------- */
#logdrawer{position:fixed;inset:0;background:rgba(10,15,12,.9);backdrop-filter:blur(3px);z-index:55;display:none;padding:26px 18px;overflow-y:auto}
#logdrawer.show{display:block}
#logdrawer h3{font-family:'Lilita One',cursive;margin-bottom:12px;letter-spacing:.4px}
#loglist{display:flex;flex-direction:column;gap:7px;font-size:13px;font-weight:600}
#loglist div{border-bottom:1px solid var(--line-soft);padding-bottom:6px;opacity:.9}
#logclose{position:fixed;top:14px;right:18px;font-size:20px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.1)}

/* ---------- drag & direct manipulation (restored) ---------- */
.dragclone{
  position:fixed;z-index:81;pointer-events:none;will-change:transform;
  width:102px;height:150px;
  filter:drop-shadow(0 14px 22px rgba(8,12,10,.55));
}
.dragclone .card{transform:scale(1);transition:transform .13s cubic-bezier(.3,1.4,.5,1);animation:none}
.dragclone.lifted .card{transform:scale(1.07)}
.dragclone.springback{transition:transform .19s cubic-bezier(.3,1.5,.5,1)}
.droppable{outline:2px dashed rgba(255,255,255,.35);outline-offset:2px}
.dropok{
  outline:2px solid var(--gold-money);outline-offset:2px;
  box-shadow:0 0 14px rgba(217,160,63,.55)!important;transform:scale(1.03);
  transition:transform .12s, box-shadow .12s;
}
.snapped{animation:snapin .28s cubic-bezier(.2,1.4,.4,1)}
@keyframes snapin{35%{transform:scale(1.06)}}
.setghost{
  flex:0 0 102px;width:102px;height:150px;border:2px dashed rgba(217,160,63,.5);
  border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
  font-size:11px;font-weight:800;color:var(--foam);opacity:.92;text-align:center;padding:6px;
}
.setghost .setdot{width:14px;height:14px;border-radius:4px}
#promptbar{
  position:fixed;left:50%;bottom:calc(220px + env(safe-area-inset-bottom));transform:translateX(-50%);
  z-index:45;display:none;align-items:center;gap:10px;max-width:92vw;
  background:rgba(12,17,14,.94);border:1px solid rgba(217,160,63,.65);border-radius:22px;
  padding:8px 8px 8px 15px;font-size:12.5px;font-weight:800;box-shadow:0 6px 18px rgba(8,12,10,.5);
  white-space:nowrap;overflow:hidden;
}
#promptbar.show{display:flex;animation:promptin .22s cubic-bezier(.2,1.2,.4,1)}
@keyframes promptin{from{opacity:0;transform:translateX(-50%) translateY(10px)}}
#promptbar button{
  font-size:11px;font-weight:800;background:rgba(255,255,255,.12);border-radius:14px;padding:5px 11px;flex:0 0 auto;
}
.opp.selectable{outline:2px solid var(--gold-money);animation:selpulse 1.1s ease-in-out infinite;cursor:pointer}
@keyframes selpulse{50%{box-shadow:0 0 14px rgba(217,160,63,.7)}}
.pickable{outline:2.5px solid var(--gold-money);outline-offset:2px;border-radius:11px;cursor:pointer}
.pickable:active{transform:scale(.96)}
.interrupt-flag{
  display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:800;letter-spacing:1.4px;
  color:var(--gold-money);text-transform:uppercase;margin-bottom:6px;
}
.interrupt-flag::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--gold-money);animation:blip 1s ease-in-out infinite}
@keyframes blip{50%{opacity:.3}}

/* ---------- action play zone (property area morphs while aiming an action) ---------- */
#myprops.actionmode .tset{display:none}
.actionzone{
  flex:1 1 100%;min-height:146px;border:2px dashed rgba(217,160,63,.6);border-radius:16px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  background:rgba(217,160,63,.07);
}
.actionzone .azname{font-family:'Lilita One',cursive;font-size:17px;letter-spacing:.4px;color:var(--gold-money)}
.actionzone .azsub{font-size:11px;font-weight:700;opacity:.7}
.miniback{flex:0 0 44px;width:44px;height:64px}
.miniback .cardback{border-radius:7px}
.miniback .cardback span{font-size:17px}

<script>
/* ---- global error surface: masked "Script error" becomes a readable toast ---- */
(function(){
  function report(text){
    try{
      if(typeof log === 'function') log('⚠ ' + text);
      var t = document.createElement('div');
      t.className = 'errtoast';
      t.textContent = '⚠ ' + text;
      t.addEventListener('pointerdown', function(){ t.remove(); });
      document.body.appendChild(t);
      setTimeout(function(){ if(t.parentNode) t.remove(); }, 9000);
    }catch(e){}
  }
  window.addEventListener('error', function(e){
    var msg = e.message || 'Script error';
    if(e.error && e.error.stack) msg = e.error.stack.split('\n').slice(0,2).join(' · ');
    if(e.lineno) msg += ' @' + e.lineno + ':' + (e.colno||0);
    report(msg);
  });
  window.addEventListener('unhandledrejection', function(e){
    report('Promise: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
})();
</script>

}
function countIn(p,color){ return (p.props[color]||[]).length; }

function rentFor(p,color){

  if(kind==='pick') tone(520,0,.045,'triangle',.05);

    w.style.zIndex = i+1;
    w.style.marginLeft = i>0 ? (-ov+'px') : '0px';
    if(w.classList) w.classList.toggle('paysel', MODE.type==='discard' && MODE.sel && MODE.sel.has(c.id));
    if(w.style && w.style.setProperty){
      const fm=(hand.length-1)/2, foff=i-fm;
      const fdeg=Math.max(-4,Math.min(4, foff*(8/Math.max(hand.length-1,1))));
      w.style.setProperty('--fan', fdeg.toFixed(2)+'deg');
      w.style.setProperty('--fanY', (Math.abs(foff)*1.3).toFixed(1)+'px');
    }
    if(w !== hand.children[i]) hand.insertBefore(w, hand.children[i]||null);
    seen.add(String(c.id));
  });
  [...hand.children].forEach(w=>{ if(!seen.has(w.dataset.cid)) w.remove(); });
  hand.classList.toggle('few', n<=3);
  NEWIDS.clear();
  // FLIP: slide surviving cards from old to new positions
  [...hand.children].forEach(w=>{
    const old = first[w.dataset.cid];
    if(old===undefined) return;
    const dx = old - w.getBoundingClientRect().left;
    if(Math.abs(dx)>3){
      w.style.transition = 'none';
      w.style.transform = `translateX(${dx}px)`;
      requestAnimationFrame(()=>{
        w.style.transition = '';
        w.style.transform = '';
      });
    }
  });
  // draws: card backs fly from the deck into each new slot, face pops on arrival
  if(newNodes.length){
    const deckEl = document.getElementById('deckcount');
    const deckR = rectOf(deckEl);
    newNodes.forEach(({w, idx})=>{
      const cardEl = w.firstElementChild;
      if(cardEl && cardEl.style) cardEl.style.opacity = '0';
      setTimeout(()=>{
        const slot = rectOf(w);
        const from = deckR ? { left: deckR.left, top: deckR.top, width: 102, height: 150 } : null;
        const reveal = ()=>{
          if(cardEl && cardEl.style){ cardEl.style.opacity = ''; }
          if(cardEl && cardEl.classList){
            cardEl.classList.add('landpop');
            setTimeout(()=>cardEl.classList&&cardEl.classList.remove('landpop'), 260);
          }
          sfx('tick');
        };
        if(from && slot){
          if(idx===0) zonePop('#deckcount');
          flyCard(BACK_HTML, from, slot, { fromScale: 0.22, scale: 1, dur: 240, fade: false, rot: 0, onEnd: reveal });
        } else reveal();
      }, idx*stag);
    });
    const last = newNodes[newNodes.length-1].w;
    setTimeout(()=>{ if(last.scrollIntoView) last.scrollIntoView({behavior:'smooth', inline:'nearest', block:'nearest'}); }, newNodes.length*stag+260);
  }
}

/* ----- card flight (played cards travel, drawn cards arrive from the deck) ----- */
function rectOf(el){ return (el && el.getBoundingClientRect) ? el.getBoundingClientRect() : null; }
function flyCard(html, from, to, opts){
  opts = opts||{};
  if(!from || !to || !document.body || !document.body.appendChild) return;
  const f = document.createElement('div');
  f.className = 'flyer';
  f.innerHTML = html;
  const fw = from.width||102, fh = from.height||150;
  f.style.left = from.left+'px'; f.style.top = from.top+'px';
  f.style.width = fw+'px'; f.style.height = fh+'px';
  if(opts.fromScale) f.style.transform = `scale(${opts.fromScale})`;
  document.body.appendChild(f);
  const dx = (to.left + (to.width||0)/2) - (from.left + fw/2);
  const dy = (to.top + (to.height||0)/2) - (from.top + fh/2);
  const dur = opts.dur||270;
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>{
    if(!f.style) return;
    f.style.transition = `transform ${dur}ms cubic-bezier(.25,.8,.25,1), opacity ${dur}ms ease-in`;
    f.style.transform = `translate(${dx}px,${dy}px) scale(${opts.scale!=null?opts.scale:0.3}) rotate(${opts.rot||0}deg)`;
    if(opts.fade!==false) f.style.opacity = '0.12';
  }); });
  setTimeout(()=>{ if(f.remove) f.remove(); if(opts.onEnd) opts.onEnd(); }, dur+50);
}

/* one router: zone taps while a card is raised; also swallows post-drag ghost clicks */
document.addEventListener('click', e=>{
  if(SUPPRESSTAP){
    if(e.target && e.target.closest && e.target.closest('#inspect')) closeInspect();
    e.stopPropagation(); e.preventDefault(); return;
  }
  if(!SELECTED) return;
  const t = e.target;
  if(t.closest && t.closest(`#hand .cardw[data-cid="${SELECTED.id}"]`)) return; // its own onclick lowers it
  const zone = DRAG.zones.find(z=> z.el===t || (z.el.contains && z.el.contains(t)));
  if(zone){
    e.stopPropagation(); e.preventDefault();
    const played = SELECTED;
    const srcW = document.querySelector(`#hand .cardw[data-cid="${played.id}"]`);
    const srcRect = rectOf(srcW);
    clearSelection();
    if(zone.el.classList){ zone.el.classList.add('snapped'); setTimeout(()=>zone.el.classList&&zone.el.classList.remove('snapped'),300); }
    haptic(12);
    playFlight(played, srcRect, zone.el, 4);
    zone.act();
    return;
  }
  if(t.closest && (t.closest('#hand .cardw') || t.closest('#promptbar'))) return; // switching cards / using bar
  e.stopPropagation();
  clearSelection(); sfx('tick'); // tap anywhere else: card returns to hand
}, true);

/* ================= DRAG ENGINE ================= */
const DRAG = { pend:null, active:false, card:null, clone:null, srcW:null, px0:0, py0:0, zones:[], over:null };
let SUPPRESSTAP = false;
document.getElementById('hand').addEventListener('pointerdown', e=>{
  if((!isMyTurn() && !G.over) || document.querySelector('#overlay.show')) return;
  if(typeof netBusy==='function' && netBusy()) return;
  if(MODE.type && MODE.type!=='discard') return;
  const w = e.target.closest ? e.target.closest('.cardw') : null;
  if(!w) return;
  const c = findInHand(me(), +w.dataset.cid);
  if(!c) return;
  DRAG.pend = { w, c, x:e.clientX, y:e.clientY, id:e.pointerId, raised: !!(SELECTED && SELECTED.id===c.id) };
  if(w.classList) w.classList.add('pressed');   // squish fires on every touch, instantly
  haptic(4);
  clearTimeout(HOLDT);
  HOLDT = setTimeout(()=>{
    if(DRAG.pend && !DRAG.active){ const cc = DRAG.pend.c; DRAG.pend = null; unpress(); openInspect(cc); }
  }, 430);
});
let HOLDT = null;
function openInspect(c){
  haptic(10); sfx('pick');
  const el = $('#inspect');
  el.innerHTML = `<div class="inspectcard">${staticCardHTML(c)}</div>`;
  if(el.classList) el.classList.add('show');
  SUPPRESSTAP = true;
}
function closeInspect(){
  const el = $('#inspect');
  if(el && el.classList) el.classList.remove('show');
  setTimeout(()=>{ SUPPRESSTAP = false; }, 60);
}
function unpress(){ document.querySelectorAll('#hand .cardw.pressed').forEach(w=>w.classList.remove('pressed')); }
document.addEventListener('pointermove', e=>{
  if(DRAG.pend && !DRAG.active){
    const dx = e.clientX-DRAG.pend.x, dy = e.clientY-DRAG.pend.y;
    const dist = Math.hypot(dx,dy);
    if(dist > 8) clearTimeout(HOLDT);
    if(G.over){ if(dist > 8){ unpress(); DRAG.pend = null; } return; } // post-game: hold-inspect only
    if(MODE.type){ if(dist > 10){ unpress(); DRAG.pend = null; } return; } // modes: taps only
    // raised card: already committed to it — any direction picks it up
    if(DRAG.pend.raised && dist > 6){ startDrag(e); return; }
    // any upward pull commits to a drag, even diagonal ones
    if(dy < -8 || (dist > 12 && Math.abs(dy) > Math.abs(dx))){ startDrag(e); return; }
    if(dx > 16 || dx < -16 || dy > 20){ unpress(); DRAG.pend = null; } // scrolling
    return;
  }
  if(!DRAG.active) return;
  if(!DRAG.clone || !DRAG.clone.style){ cancelDrag(true); return; }
  e.preventDefault();
  const dx = e.clientX-DRAG.px0, dy = e.clientY-DRAG.py0;
  const step = e.clientX - (DRAG.lx!=null ? DRAG.lx : e.clientX);
  DRAG.lx = e.clientX;
  DRAG.dx = dx; DRAG.dy = dy;
  DRAG.tilt = Math.max(-10, Math.min(10, (DRAG.tilt||0)*0.82 + step*0.7));
  DRAG.clone.style.transform = `translate3d(${dx}px,${dy}px,0) rotate(${DRAG.tilt.toFixed(1)}deg)`;
  hitTest(e.clientX, e.clientY, DRAG.cx0+dx, DRAG.cy0+dy);

function doDrop(zone){
  if(!zone || !zone.el || typeof zone.act !== 'function'){ springBack(); return; }
  const played = DRAG.card;
  const srcRect = rectOf(DRAG.clone);

  if(zone.el.classList){
    zone.el.classList.add('snapped');
    setTimeout(()=>{ if(zone.el.classList) zone.el.classList.remove('snapped'); }, 300);
  }

document.addEventListener('pointerup', e=>{

function startDrag(e){
  const { w, c } = DRAG.pend;
  unpress();
  clearSelection();
  const CW = 102, CH = 150;
  const inner = w.querySelector ? w.querySelector('.card') : null;
  const r = (inner && inner.getBoundingClientRect) ? inner.getBoundingClientRect() : w.getBoundingClientRect();
  const clone = document.createElement('div');

    const cardClone = inner.cloneNode(true);

  }

  clone.style.left = (r.left + r.width/2 - CW/2)+'px';
  clone.style.top = (r.top + r.height/2 - CH/2)+'px';
  clone.style.transform = 'translate3d(0,0,0)';
  document.body.appendChild(clone);
  w.classList.add('hidden-src');
  try{ if(e.target && e.target.setPointerCapture) e.target.setPointerCapture(e.pointerId); }catch(err){}

  DRAG.lx = e.clientX; DRAG.tilt = 0;
  DRAG.dx = 0; DRAG.dy = 0;
  DRAG.cx0 = (r.left + r.width/2); DRAG.cy0 = (r.top + r.height/2);

function inflate(r, pad){ return { left:r.left-pad, right:r.right+pad, top:r.top-pad, bottom:r.bottom+pad }; }
function nearestZone(cx, cy, maxDist){
  let best=null, bestD=maxDist;
  for(const z of DRAG.zones){
    const r=z.rect;
    const px=Math.max(r.left,Math.min(cx,r.right)), py=Math.max(r.top,Math.min(cy,r.bottom));
    const d=Math.hypot(cx-px, cy-py);
    if(d<bestD){ bestD=d; best=z; }
  }
  return best;
}
function buildZones(c){

    // property area becomes the action play zone for non-building actions
    const canPlayHere =
      (k==='payday' || k==='shout' || k==='favour') ||
      (k==='swipe' && othersOf(MYSEAT).some(t=>stealTargetsOf(t).length)) ||
      (k==='takeover' && othersOf(MYSEAT).some(t=>completeColors(G.players[t]).length)) ||
      (k==='swap' && propList(me()).some(x=>!isComplete(me(),x.color)) && othersOf(MYSEAT).some(t=>stealTargetsOf(t).length));
    if(free && canPlayHere && k!=='granny' && k!=='resort' && k!=='hike' && k!=='nodeal'){
      const props = $('#myprops');
      if(props && props.appendChild){
        const az = document.createElement('div');
        az.className = 'actionzone';
        const subs = { payday:'Draw 2 cards', shout:'Everyone pays you $2M', favour:'Then tap who pays $5M', swipe:'Then tap whose table to raid', takeover:'Then tap whose set to take', swap:'Then tap who to trade with' };
        az.innerHTML = `<span class="azname">${ACTIONS[k].n}</span><span class="azsub">${subs[k]||''}</span>`;
        if(props.classList) props.classList.add('actionmode');
        props.appendChild(az);
        add(az, ()=>playActionVia(c,k));
      }
    }
    if(k==='payday') add($('#deckcount'), ()=>playPayday(c));
    if(k==='shout') add($('#opponents'), ()=>doShout(c));
    if(k==='favour') oppEls.forEach(el=>add(el, ()=>doFavour(c, seatOfEl(el))));
    if(k==='swipe') oppEls.forEach(el=>{ const si=seatOfEl(el); if(stealTargetsOf(si).length) add(el, ()=>viewOppSelect(si,'swipe',c)); });
    if(k==='takeover') oppEls.forEach(el=>{ const si=seatOfEl(el); if(completeColors(G.players[si]).length) add(el, ()=>viewOppSelect(si,'takeover',c)); });
    if(k==='swap'){ if(propList(me()).some(x=>!isComplete(me(),x.color))) oppEls.forEach(el=>{ const si=seatOfEl(el); if(stealTargetsOf(si).length) add(el, ()=>viewOppSelect(si,'swapTheirs',c)); }); }
    if(k==='granny') completeColors(me()).filter(col=>col!=='black' && !(me().bldg[col]&&me().bldg[col].granny)).forEach(col=>add(group(col), ()=>placeBldg(c,col,'granny')));
    if(k==='resort') completeColors(me()).filter(col=>me().bldg[col]&&me().bldg[col].granny&&!me().bldg[col].resort).forEach(col=>add(group(col), ()=>placeBldg(c,col,'resort')));
    if(k==='nodeal') hint = 'No Deal! plays itself when you are attacked';
    else if(k==='hike') hint = 'Bank it — or play a Rent card and add the hike';
    else if(k==='favour') hint = 'Tap a player — they pay you $5M';
    else if(k==='swipe') hint = 'Tap a player to raid their table';
    else if(k==='takeover') hint = 'Tap a player with a complete set';
    else if(k==='swap') hint = 'Tap a player to trade properties';
    else if(k==='payday') hint = 'Tap the deck — draw 2';
    else if(k==='shout') hint = 'Tap the players — everyone pays $2M';
    else hint = 'Tap one of your complete sets';
  }
  if(c.t==='rent'){
    add($('#mybank'), ()=>{ sfx('coin'); bankCard(c); });
    c.colors.forEach(col=>{ if(rentFor(me(),col)>0) add(group(col), ()=>doRent(c,col,null)); });
    hint = 'Tap your matching set — everyone pays';
  }
  if(c.t==='rentall'){
    add($('#mybank'), ()=>{ sfx('coin'); bankCard(c); });
    Object.keys(me().props).forEach(col=>{ if(rentFor(me(),col)>0) add(group(col), ()=>{
      startOppSelect('Tap the player who pays $'+rentFor(me(),col)+'M '+COLORS[col].label+' rent', i=>true, t=>doRent(c,col,t));
    }); });
    hint = 'Tap a set, then choose who pays';
  }
  showPrompt(hint || 'Tap a highlighted zone', false);
}
function hitTest(x,y,cx,cy){
  let found = null;
  for(const z of DRAG.zones){
    const r=z.rect;
    if((x>=r.left && x<=r.right && y>=r.top && y<=r.bottom) ||
       (cx!=null && cx>=r.left && cx<=r.right && cy>=r.top && cy<=r.bottom)){ found=z; break; }
  }
  if(found !== DRAG.over){
    if(DRAG.over && DRAG.over.el.classList) DRAG.over.el.classList.remove('dropok');
    DRAG.over = found;
    if(found){ found.el.classList.add('dropok'); haptic(6); sfx('pick'); }
  }
}

function playActionVia(c,k){

/* ----- turn flow ----- */
function startTurn(){
  if(G.over) return;
  const p = cur();
  const n = p.hand.length===0 ? 5 : 2;
  for(let i=0;i<n;i++){ const c=draw(); if(c){ p.hand.push(c); if(!p.isAI) NEWIDS.add(c.id); } }
  G.playsLeft = 3;
  log(p.name + (n===5?' drew 5 (empty hand).':' drew 2 cards.'));
  banner(G.turn===MYSEAT ? 'YOUR TURN' : p.name.toUpperCase()+"'S TURN", G.turn===MYSEAT ? 'var(--gold-money)' : null);
  if(!p.isAI){ sfx('tick'); haptic(8); }
  renderAll();
  if(p.isAI){ setTimeout(()=>aiStep(p), Math.max(aiDelay(), visWait()+150)); return; }
  if(NET.mode==='host' && G.turn!==MYSEAT){ NET.pushState(); }
}
function usePlay(){
  G.playsLeft--;

function checkAllWin(){
  for(const p of G.players){
    if(checkWin(p)){
      G.over = true; renderAll();
      if(NET.mode==='host' && typeof ID!=='undefined') ID.recordMatch(G.players.indexOf(p));
      $('#wintitle').textContent = p===me() ? 'You win' : p.name+' wins';
      $('#winsub').textContent = 'Three complete sets: ' + completeColors(p).map(c=>COLORS[c].label).join(', ');
      $('#winstats').textContent = 'Round '+G.turnCount+' · '+G.players.map(x=>x.name+' $'+bankTotal(x)+'M').join(' · ');
      setTimeout(()=>{
        const wc = document.querySelector('.wincard');
        if(wc && wc.style){ wc.style.animation='none'; void (wc.offsetWidth||0); wc.style.animation=''; }
        $('#winscreen').classList.add('show');
        sfx(p===me()?'win':'alert');
        haptic(p===me()?[12,60,12,60,24]:20);
        if(p===me()) confetti();
      }, 700);
      return true;
    }
  }
  return false;
}

}

$('#endturn').onclick = ()=>{ if(isMyTurn() && !DRAG.active){ haptic(6); sfx('tick'); endTurn(); } };
function endTurn(){
  if(typeof netBusy==='function' && netBusy()){ showPrompt('Waiting for a payment to resolve…', false); return; }
  if(NET.intercept('endturn',{})) return;
  endOppSelect();
  const p = cur();
  if(p.hand.length>7){
    if(!p.isAI && G.turn!==MYSEAT && NET.mode==='host'){
      NET.ask(G.turn, {type:'discard', need:p.hand.length-7}, m=>{
        ((m&&m.ids)||[]).forEach(id=>{ const i=p.hand.findIndex(c=>c.id===id); if(i>-1) G.discard.push(p.hand.splice(i,1)[0]); });
        while(p.hand.length>7){ p.hand.sort((a,b)=>keepScore(a,p)-keepScore(b,p)); G.discard.push(p.hand.shift()); }
        finishEnd();
      });
      return;
    }
    if(p.isAI){
      while(p.hand.length>7){
        p.hand.sort((a,b)=>keepScore(a,p)-keepScore(b,p));
        G.discard.push(p.hand.shift());
      }
      finishEnd();
    } else discardPrompt();
  } else finishEnd();
}

function runOpt(i){ const o=window._opts[i]; if(o&&o.fn){ o.fn(); } }

function reassignWild(id){

<script>
/* ================= ACTIONS / NO DEAL / PAYMENTS ================= */
function spendAction(c, actor){
  const p = (typeof actor==='number' ? G.players[actor] : actor) || me();
  const i = p.hand.findIndex(x=>x.id===c.id);
  if(i>-1) p.hand.splice(i,1);
  G.discard.push(c);
  G.playsLeft--;
  tableDrop(c, p===me()?'You':p.name);
  closeSheet(); renderAll();
}
/* No Deal chain. cb(blocked:boolean) */
function resolveBlock(defIdx, atkIdx, desc, cb){
  function chain(aIdx,bIdx,count){
    const p = G.players[aIdx];
    if(!hasNoDeal(p)) return cb(count%2===1);
    if(p.isAI){
      if(aiShouldJSN(p, aIdx, bIdx, desc, count)){
        const nd = takeNoDeal(p); log(p.name+' played No Deal!');
        if(aIdx>0) aiShowcase(nd, aIdx);
        renderAll();
        setTimeout(()=>chain(bIdx,aIdx,count+1), Math.max(700, visWait()+200));
      } else cb(count%2===1);
      return;
    }
    if(aIdx!==MYSEAT && NET.mode==='host'){
      NET.ask(aIdx, {type:'jsn', desc, count}, m=>{
        if(m && m.use && hasNoDeal(p)){
          const nd = takeNoDeal(p); log(G.players[aIdx].name+' played No Deal!');
          NET.evt(aIdx, nd);
          renderAll();
          setTimeout(()=>chain(bIdx,aIdx,count+1), 400);
        } else cb(count%2===1);
      });
      return;
    }
    visDefer(()=>{
    sfx('alert'); haptic([10,50,10]);
    const nds = p.hand.filter(x=>x.t==='action'&&x.kind==='nodeal').length;
    const msg = count===0
      ? `${G.players[bIdx].name} played <b>${desc}</b> against you.`
      : `${G.players[bIdx].name} cancelled your <b>${desc}</b> with No Deal!`;
    openSheet(`<div class="interrupt-flag">Interruption</div>
      <h3>No Deal!?</h3><div class="sub">${msg}<br>You hold ${nds} No Deal! card${nds>1?'s':''}.</div>
      <div class="optlist">
        <button class="optbtn primary" onclick="window._jsn(true)">Play No Deal! ${count===0?'— cancel it':'— counter back'}</button>
        <button class="optbtn" onclick="window._jsn(false)">Let it happen</button>
      </div>`, true);
    });
    window._jsn = (use)=>{
      closeSheet();
      if(use){ takeNoDeal(p); log('You played No Deal!'); renderAll(); chain(bIdx,aIdx,count+1); }
      else cb(count%2===1);
    };
  }
  chain(defIdx, atkIdx, 0);
}
/* ----- payments ----- */
function payAssetsTotal(p){ return bankTotal(p) + propList(p).reduce((s,x)=>s+x.card.v,0); }
function transferBank(payer,receiver,card){
  const i = payer.bank.findIndex(c=>c.id===card.id);
  if(i>-1){ payer.bank.splice(i,1); receiver.bank.push(card); }
}
function transferProp(payer,receiver,card){
  const color = removeProp(payer,card);
  if(color!=null){
    loseBuildingsIfBroken(payer,color);
    addProp(receiver,card,color);
  }
}
function requestPayment(payerIdx, amount, receiverIdx, done){
  const payer=G.players[payerIdx], receiver=G.players[receiverIdx];
  if(amount<=0) return done();
  const worth = payAssetsTotal(payer);
  if(worth===0){ log(payer.name+' has nothing to pay with.'); return done(); }
  if(worth<=amount){
    // hand over everything on the table
    payer.bank.splice(0).forEach(c=>receiver.bank.push(c));
    propList(payer).forEach(x=>transferProp(payer,receiver,x.card));
    Object.keys(payer.bldg).forEach(col=>{ // stray buildings discarded
      if(payer.bldg[col].granny) G.discard.push(payer.bldg[col].granny);
      if(payer.bldg[col].resort) G.discard.push(payer.bldg[col].resort);
      delete payer.bldg[col];
    });
    log(payer.name+' paid everything they had to '+receiver.name+'.');
    renderAll(); return done();
  }
  if(payer.isAI){
    // exact-cover DP: minimise value given + strategic damage; never complete the receiver's set
    const items = [];
    payer.bank.forEach(c=>items.push({c, v:c.v, pen:0, bank:true}));
    propList(payer).forEach(x=>{
      const n=countIn(payer,x.color), size=COLORS[x.color].size;
      const PW = wOf(payer);
      let pen = isComplete(payer,x.color) ? PW.pay_complete : (n===size-1 ? PW.pay_near : PW.pay_base);
      if(x.card.t!=='prop') pen += 2; // wilds are flexible — keep them
      if(x.card.t==='prop'){
        const rn=countIn(receiver,x.color);
        if(rn>0) pen += (rn===size-1 ? 40 : 4); // gifting completion is unforgivable
      }
      items.push({c:x.card, v:Math.max(1,x.card.v), pen, bank:false});
    });
    const CAP = amount+11;
    const dp = new Array(CAP+1).fill(Infinity), pick = new Array(CAP+1).fill(null);
    dp[0]=0;
    items.forEach((it,ii)=>{
      for(let a=CAP; a>=0; a--){
        if(dp[a]===Infinity) continue;
        const na=Math.min(CAP, a+it.v), cost=dp[a]+it.v+it.pen;
        if(cost<dp[na]){ dp[na]=cost; pick[na]={ii, from:a}; }
      }
    });
    let bestA=-1;
    for(let a=amount; a<=CAP; a++) if(dp[a]<Infinity && (bestA<0||dp[a]<dp[bestA])) bestA=a;
    const chosen=new Set();
    for(let a=bestA; a>0 && pick[a]; ){ chosen.add(pick[a].ii); a=pick[a].from; }
    if(bestA<0) items.forEach((it,ii)=>chosen.add(ii)); // shouldn't happen (short-pay handled earlier)
    [...chosen].map(ii=>items[ii]).sort((a,b)=>a.v-b.v).forEach(it=>{
      if(it.bank) transferBank(payer,receiver,it.c); else transferProp(payer,receiver,it.c);
    });
    log(payer.name+' paid $'+amount+'M to '+receiver.name+'.');
    renderAll();
    if(receiverIdx===0){ sfx('coin'); zonePop('#mybank'); }
    return done();
  }
  // human payer
  if(payerIdx!==MYSEAT && NET.mode==='host'){
    NET.ask(payerIdx, {type:'pay', amount, recv:receiverIdx}, m=>{
      NET.applyPaymentIds(payerIdx, receiverIdx, amount, (m&&m.ids)||[]);
      done();
    });
    return;
  }
  visDefer(()=>enterPayMode(amount, receiverIdx, done));
}
function processQueue(idxs, perFn, done){
  const q=[...idxs];
  (function next(){ if(G.over) return; const i=q.shift(); if(i===undefined) return done(); perFn(i,next); })();
}
/* ----- human action executions ----- */
function doFavour(c,targetIdx,by){
  if(NET.intercept('favour',{id:c.id,t:targetIdx})) return;
  const b=(by==null?MYSEAT:by); NET.evt(b,c);
  spendAction(c,b);
  log(nameOf(b)+' played Call In a Favour on '+nameOf(targetIdx)+'.');
  resolveBlock(targetIdx,b,'Call In a Favour',blocked=>{
    if(blocked){ log(nameOf(targetIdx)+' blocked it.'); checkAllWin(); renderAll(); return; }
    requestPayment(targetIdx,5,b,()=>{ checkAllWin(); renderAll(); flashOpp(targetIdx); sfx('coin'); });
  });
}
function doShout(c,by){
  if(NET.intercept('shout',{id:c.id})) return;
  const b=(by==null?MYSEAT:by); NET.evt(b,c);
  spendAction(c,b);
  log(nameOf(b)+' shouted a round — everyone owes them $2M.');
  processQueue(othersOf(b),(t,next)=>{
    resolveBlock(t,b,'Shout a Round',blocked=>{
      if(blocked){ log(G.players[t].name+' blocked it.'); return next(); }
      requestPayment(t,2,b,next);
    });
  },()=>{ checkAllWin(); renderAll(); });
}
function doRent(c,color,targetIdx,by){
  if(NET.intercept('rent',{id:c.id,color,t:targetIdx})) return;
  const b=(by==null?MYSEAT:by); NET.evt(b,c);
  const actor = G.players[b];
  const base = rentFor(actor,color);
  const hikeCard = actor.hand.find(x=>x.t==='action'&&x.kind==='hike');
  if(hikeCard && G.playsLeft>=2 && b===MYSEAT){
    const who = targetIdx!=null ? G.players[targetIdx].name+' pays' : 'everyone pays';
    openSheet(`<h3>Rent Hike?</h3><div class="sub">You hold a Rent Hike — double this to $${base*2}M (${who}). Costs one extra play.</div>
      <div class="optlist">
        <button class="optbtn primary" onclick="window._hk(true)">Charge $${base*2}M</button>
        <button class="optbtn" onclick="window._hk(false)">Just $${base}M</button>
      </div>`);
    window._hk = (yes)=>{ closeSheet(); execRent(c,color,targetIdx,yes?hikeCard:null,base,b); };
  } else execRent(c,color,targetIdx,null,base,b);
}
function execRent(c,color,targetIdx,hikeCard,base,by){
  const b=(by==null?MYSEAT:by);
  haptic(10);
  spendAction(c,b);
  let amount = base;
  if(hikeCard){ spendAction(hikeCard,b); amount = base*2; }
  const targets = targetIdx!=null ? [targetIdx] : othersOf(b);
  log(nameOf(b)+' charged $'+amount+'M '+COLORS[color].label+' rent.');
  processQueue(targets,(t,next)=>{
    resolveBlock(t,b,'Rent',blocked=>{
      if(blocked){ log(nameOf(t)+' blocked the rent.'); return next(); }
      requestPayment(t,amount,b,()=>{ flashOpp(t); sfx('coin'); next(); });
    });
  },()=>{ checkAllWin(); renderAll(); });
}
function stealTargetsOf(pIdx){ // props not in complete sets
  const p=G.players[pIdx];
  return propList(p).filter(x=>!isComplete(p,x.color));
}
function execSwipe(c, tIdx, cardId, by){
  if(NET.intercept('swipe',{id:c.id,t:tIdx,cid:cardId})) return;
  const b=(by==null?MYSEAT:by); NET.evt(b,c);
  const target = G.players[tIdx];
  const entry = propList(target).find(x=>x.card.id===cardId);
  if(!entry) return;
  spendAction(c,b);
  log(nameOf(b)+' played Sneaky Swipe on '+nameOf(tIdx)+'.');
  resolveBlock(tIdx,b,'Sneaky Swipe',blocked=>{
    if(blocked){ log('Swipe blocked.'); checkAllWin(); renderAll(); return; }
    transferProp(target,G.players[b],entry.card);
    log(nameOf(b)+' swiped '+cardName(entry.card)+'.');
    flashOpp(tIdx); sfx('good'); haptic(12);
    checkAllWin(); renderAll();
  });
}
function execTakeoverD(c, tIdx, color, by){
  if(NET.intercept('takeover',{id:c.id,t:tIdx,color})) return;
  const b=(by==null?MYSEAT:by); NET.evt(b,c);
  spendAction(c,b);
  log(nameOf(b)+' launched a Hostile Takeover on '+nameOf(tIdx)+"'s "+COLORS[color].label+' set!');
  resolveBlock(tIdx,b,'Hostile Takeover',blocked=>{
    if(blocked){ log('Takeover blocked.'); checkAllWin(); renderAll(); return; }
    doTakeover(tIdx,b,color);
    checkAllWin(); renderAll(); flashOpp(tIdx); sfx('good'); haptic([12,50,18]);
  });
}
function execSwapFinal(c, tIdx, theirCardId, mineCardId, by){
  if(NET.intercept('swap',{id:c.id,t:tIdx,cid:theirCardId,mid:mineCardId})) return;
  const b=(by==null?MYSEAT:by); NET.evt(b,c);
  const target=G.players[tIdx];
  const actorP = G.players[b];
  const theirEntry = propList(target).find(x=>x.card.id===theirCardId);
  const mineEntry = propList(actorP).find(x=>x.card.id===mineCardId);
  if(!theirEntry||!mineEntry) return;
  spendAction(c,b);
  log(nameOf(b)+' proposed a Swap Meet with '+nameOf(tIdx)+'.');
  resolveBlock(tIdx,b,'Swap Meet',blocked=>{
    if(blocked){ log('Swap blocked.'); checkAllWin(); renderAll(); return; }
    transferProp(actorP,target,mineEntry.card);
    transferProp(target,actorP,theirEntry.card);
    log(nameOf(b)+' swapped '+cardName(mineEntry.card)+' for '+cardName(theirEntry.card)+'.');
    flashOpp(tIdx); sfx('good'); haptic(12);
    checkAllWin(); renderAll();
  });
}
function doTakeover(fromIdx,toIdx,color){
  const from=G.players[fromIdx], to=G.players[toIdx];
  const cards=(from.props[color]||[]).splice(0);
  delete from.props[color];
  cards.forEach(card=>addProp(to,card,color));
  if(from.bldg[color]){
    if(!to.bldg[color]) to.bldg[color]={};
    if(from.bldg[color].granny) to.bldg[color].granny=from.bldg[color].granny;
    if(from.bldg[color].resort) to.bldg[color].resort=from.bldg[color].resort;
    delete from.bldg[color];
  }
  log(to.name+' took the whole '+COLORS[color].label+' set.');
}
</script>

const NET = {
  mode: 'off',           // 'off' | 'lobby-host' | 'joining' | 'host' | 'client'
  seat: 0, code: null, tx: null, names: [], pile: null,
  applying: false, pendingAsks: {},
  myName: (typeof localStorage!=='undefined' && localStorage.getItem && localStorage.getItem('it_name')) || '',

  /* --- executor gate: on a client, local calls become intents --- */
  intercept(k, a){
    if(this.mode!=='client' || this.applying) return false;
    if(this.hold){ showPrompt('Hold on — someone is still responding…', false); return true; }
    this.tx.send('intent', { seat: this.seat, k, a });
    clearSelection(); hidePrompt(); closeSheet();
    this.sentWait = true;
    showPrompt('Sent…', false);
    return true;
  },
  reply(type, payload){ this.tx.send('intent', { seat: this.seat, k:'reply', a:Object.assign({rt:type}, payload) }); },
  evt(seat, card){ if(this.mode==='host' && this.tx && card) this.tx.send('evt', { kind:'play', seat, card }); },

  /* --- host: ask a remote seat for a decision --- */
  ask(seat, ask, cb){
    this.pendingAsks[seat] = cb;
    this.pushState();
    this.tx.send('ask', { seat, ask });
  },
  applyPaymentIds(payerIdx, receiverIdx, amount, ids){
    const payer=G.players[payerIdx], receiver=G.players[receiverIdx];
    const idset = new Set(ids);
    let bankSel = payer.bank.filter(c=>idset.has(c.id));
    let propSel = propList(payer).filter(x=>idset.has(x.card.id));
    let tot = bankSel.reduce((s,c)=>s+c.v,0) + propSel.reduce((s,x)=>s+x.card.v,0);
    if(tot < Math.min(amount, payAssetsTotal(payer))){
      // invalid or short selection: fall back to a fair smallest-first cover
      bankSel=[]; propSel=[];
      let owed=amount;
      const order=[...payer.bank.map(c=>({c,v:c.v,bank:true})), ...propList(payer).map(x=>({c:x.card,v:x.card.v,bank:false}))].sort((a,b)=>a.v-b.v);
      for(const o of order){ if(owed<=0)break; if(o.bank) bankSel.push(o.c); else propSel.push({card:o.c}); owed-=o.v; }
    }
    bankSel.forEach(c=>transferBank(payer,receiver,c));
    propSel.forEach(x=>transferProp(payer,receiver,x.card));
    log(payer.name+' paid $'+amount+'M to '+receiver.name+'.');
    renderAll();
  },

  /* --- host: apply a client intent as that seat --- */
  applyIntent(m){
    const seat = m.seat, k = m.k, a = m.a || {};
    if(k==='reply'){
      const cb = this.pendingAsks[seat];
      if(cb){ delete this.pendingAsks[seat]; cb(a); }
      return;
    }
    if(G.over || G.turn!==seat) return;   // stale / out-of-turn intents dropped
    if(Object.keys(this.pendingAsks).length) return; // a payment/interrupt is resolving — hold your horses
    const p = G.players[seat];
    const findHand = id => p.hand.find(c=>c.id===id);
    this.applying = true;
    try{
      const c = a.id!=null ? findHand(a.id) : null;
      if(k==='endturn') endTurn();
      else if(!c) {}
      else if(k==='bank') bankCard(c, seat);
      else if(k==='prop') playProp(c, a.color, seat);
      else if(k==='bldg') placeBldg(c, a.color, a.slot, seat);
      else if(k==='payday') playPayday(c, seat);
      else if(k==='shout') doShout(c, seat);
      else if(k==='favour') doFavour(c, a.t, seat);
      else if(k==='rent') doRent(c, a.color, a.t, seat);
      else if(k==='swipe') execSwipe(c, a.t, a.cid, seat);
      else if(k==='takeover') execTakeoverD(c, a.t, a.color, seat);
      else if(k==='swap') execSwapFinal(c, a.t, a.cid, a.mid, seat);
    } finally {
      this.applying = false;
    }
    renderAll();
  },

  /* --- state sync (public state broadcast; own hand per-seat) --- */
  serialize(){
    const top = G.discard.length ? cardName(G.discard[G.discard.length-1]) : 'Pile';
    return {
      turn:G.turn, playsLeft:G.playsLeft, turnCount:G.turnCount, over:G.over,
      deckN:G.deck.length, pile:{ label:top, n:G.discard.length },
      players:G.players.map(q=>({ name:q.name, isAI:!!q.isAI, handN:q.hand.length, bank:q.bank, props:q.props, bldg:q.bldg })),
      waitFor: Object.keys(this.pendingAsks).length ? +Object.keys(this.pendingAsks)[0] : null,
    };
  },
  pushState(){
    if(this.mode!=='host' || !this.tx) return;
    this.tx.send('state', this.serialize());
    G.players.forEach((q,i)=>{ if(!q.isAI && i!==MYSEAT) this.tx.send('hand', { seat:i, cards:q.hand }); });
  },
  applyState(st){
    const myHand = (G.players[MYSEAT] && G.players[MYSEAT].hand) || [];
    G.turn=st.turn; G.playsLeft=st.playsLeft; G.turnCount=st.turnCount;
    G.deck = new Array(st.deckN);
    G.discard = new Array(st.pile.n);
    this.pile = st.pile;
    G.players = st.players.map((q,i)=>({
      name:q.name, isAI:q.isAI, bank:q.bank, props:q.props, bldg:q.bldg,
      hand: i===MYSEAT ? myHand : new Array(q.handN).fill(0).map((_,j)=>({ id:'h'+i+'_'+j, t:'money', v:0 })),
    }));
    const wasOver = G.over; G.over = st.over;
    if(this.lastTurn!==st.turn && !st.over){
      this.lastTurn = st.turn;
      banner(st.turn===this.seat ? 'YOUR TURN' : st.players[st.turn].name.toUpperCase()+"'S TURN", st.turn===this.seat ? 'var(--gold-money)' : null);
      if(st.turn===this.seat){ sfx('good'); haptic([8,40,8]); }
    }
    this.hold = (st.waitFor!=null && st.waitFor!==this.seat);
    if(this.sentWait){ this.sentWait=false; hidePrompt(); }
    if(this.hold && st.turn===this.seat) showPrompt('Waiting for '+ (G.players[st.waitFor]? st.players[st.waitFor].name : 'a player') +'…', false);
    else if(this.hold===false && st.turn===this.seat && MODE.type===null && !SELECTED) hidePrompt();
    renderAll();
    if(st.over && !wasOver){
      const w = G.players.find(p=>completeColors(p).length>=3);
      if(w){
        $('#wintitle').textContent = w===me() ? 'You win' : w.name+' wins';
        $('#winsub').textContent = 'Three complete sets: ' + completeColors(w).map(c=>COLORS[c].label).join(', ');
        $('#winstats').textContent = 'Round '+G.turnCount+' · '+G.players.map(x=>x.name+' $'+bankTotal(x)+'M').join(' · ');
        setTimeout(()=>{ $('#winscreen').classList.add('show'); sfx(w===me()?'win':'alert'); if(w===me()) confetti(); }, 500);
      }
    }
  },

  onMessage(type, m){
    if(this.mode==='host'){
      if(type==='intent') this.applyIntent(m);
      if(type==='hello') this.pushState();
      return;
    }
    if(this.mode==='client'){
      if(type==='state') this.applyState(m);
      if(type==='hand' && m.seat===this.seat){
        if(G.players[this.seat]) G.players[this.seat].hand = m.cards;
        renderAll();
      }
      if(type==='evt' && m.kind==='play' && m.seat!==this.seat && m.card) aiShowcase(m.card, m.seat);
      if(type==='ask' && m.seat===this.seat){
        const a = m.ask;
        if(a.type==='pay') visDefer(()=>enterPayMode(a.amount, a.recv, ()=>{}));
        if(a.type==='discard'){ MODE.type='discard'; MODE.need=a.need; MODE.sel=new Set(); sfx('alert'); renderAll(); updateDiscardHUD(); }
        if(a.type==='jsn'){
          sfx('alert'); haptic([10,50,10]);
          const nds = me().hand.filter(x=>x.t==='action'&&x.kind==='nodeal').length;
          openSheet(`<div class="interrupt-flag">Interruption</div>
            <h3>No Deal!?</h3><div class="sub">${a.desc} was played against you.<br>You hold ${nds} No Deal! card${nds===1?'':'s'}.</div>
            <div class="optlist">
              <button class="optbtn primary" onclick="NET.reply('jsn',{use:true});closeSheet()">Play No Deal!</button>
              <button class="optbtn" onclick="NET.reply('jsn',{use:false});closeSheet()">Let it happen</button>
            </div>`, true);
        }
      }
      return;
    }
    if(type==='start' && (this.mode==='joining')) this.onStart(m, false);
  },

  /* --- lobby --- */
  makeCode(){ const A='ABCDEFGHJKMNPQRSTUVWXYZ23456789'; let c=''; for(let i=0;i<4;i++) c+=A[Math.floor(Math.random()*A.length)]; return c; },
  async connect(code, hosting){
    if(!SUPABASE_URL || !SUPABASE_ANON){
      alert('Online needs Supabase keys pasted into the config at the top of this file (SUPABASE_URL / SUPABASE_ANON). Solo works without them.');
      return false;
    }
    if(!window.supabase){
      await new Promise((res,rej)=>{ const sc=document.createElement('script'); sc.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'; sc.onload=res; sc.onerror=()=>rej(new Error('supabase cdn failed')); document.head.appendChild(sc); });
    }
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    this.pkey = this.pkey || (Math.random().toString(36).slice(2,10));
    const ch = sb.channel('room-'+code, { config:{ broadcast:{ self:false }, presence:{ key: this.pkey } } });
    const self = this;
    this.tx = {
      send(type, payload){ ch.send({ type:'broadcast', event:type, payload }); },
      track(meta){ ch.track(meta); },
      presence(){ return ch.presenceState(); },
    };
    ['state','hand','evt','ask','intent','start','hello'].forEach(ev=>{
      ch.on('broadcast', { event:ev }, (msg)=>self.onMessage(ev, msg.payload));
    });
    ch.on('presence', { event:'sync' }, ()=>self.renderLobby());
    await new Promise(res=>ch.subscribe(st=>{ if(st==='SUBSCRIBED') res(); }));
    this.code = code;
    return true;
  },
  async hostGame(){
    this.myName = (($('#homename')&&$('#homename').value)||'Host').slice(0,12) || 'Host';
    if(typeof localStorage!=='undefined' && localStorage.setItem) localStorage.setItem('it_name', this.myName);
    const code = this.makeCode();
    if(!(await this.connect(code, true))) return;
    this.mode = 'lobby-host';
    this.tx.track({ key:this.pkey, name:this.myName, uid:(ID.user&&ID.user.id)||null, host:true, joined:Date.now() });
    $('#homemain').style.display='none'; $('#homelobby').style.display='';
    $('#lobbycode').textContent = code;
    this.renderLobby();
  },
  async joinGame(){
    this.myName = (($('#homename')&&$('#homename').value)||'Guest').slice(0,12) || 'Guest';
    if(typeof localStorage!=='undefined' && localStorage.setItem) localStorage.setItem('it_name', this.myName);
    const code = (($('#joincode')&&$('#joincode').value)||'').toUpperCase().trim();
    if(code.length!==4){ alert('Enter the 4-letter room code.'); return; }
    if(!(await this.connect(code, false))) return;
    this.mode = 'joining';
    this.tx.track({ key:this.pkey, name:this.myName, uid:(ID.user&&ID.user.id)||null, host:false, joined:Date.now() });
    $('#homemain').style.display='none'; $('#homelobby').style.display='';
    $('#lobbycode').textContent = code;
    const st=$('#lobbystart'); if(st&&st.style) st.style.display='none';
    $('#lobbywait').textContent = 'Waiting for the host to start…';
    this.renderLobby();
  },
  lobbySeats(){
    const pres = this.tx ? this.tx.presence() : {};
    const list = [];
    Object.values(pres).forEach(arr=>arr.forEach(mm=>list.push(mm)));
    list.sort((a,b)=>((b.host?1:0)-(a.host?1:0)) || (a.joined-b.joined));
    return list.slice(0,4);
  },
  renderLobby(){
    const el = $('#lobbyseats'); if(!el || !this.tx) return;
    const seats = this.lobbySeats();
    el.innerHTML = seats.map((mm,i)=>`<div class="lobbyseat"><span class="avatar" style="background:${i===0?'var(--money-gold)':'var(--felt-highlight)'}">${(mm.name||'?')[0]}</span>${mm.name}${mm.host?' · host':''}</div>`).join('')
      + (seats.length<2 ? '<div class="sub" style="opacity:.5">Waiting for players… share the code</div>' : '');
    const st = $('#lobbystart'); if(st && this.mode==='lobby-host') st.disabled = seats.length<2;
  },
  startOnline(){
    if(this.mode!=='lobby-host') return;
    const seats = this.lobbySeats();
    if(seats.length<2) return;
    const roster = seats.map(mm=>({ key:mm.key, name:mm.name, uid:mm.uid||null }));
    this.tx.send('start', { roster });
    this.onStart({ roster }, true);
  },
  onStart(m, hosting){
    const roster = m.roster || (m.names||[]).map(n=>({key:n,name:n}));
    this.roster = roster;
    const names = roster.map(r=>r.name);
    if(hosting){ this.mode='host'; this.seat=0; MYSEAT=0; }
    else {
      this.mode='client';
      const bykey = roster.findIndex(r=>r.key===this.pkey);
      this.seat = bykey>=0 ? bykey : Math.max(0, names.indexOf(this.myName));
      MYSEAT = this.seat;
    }
    newGame();
    G.players = names.map(n=>({ name:n, isAI:false, hand:[], bank:[], props:{}, bldg:{} }));
    G.deck = shuffle(buildDeck());
    for(let i=0;i<5;i++) G.players.forEach(p=>p.hand.push(draw()));
    G.turn = 0; G.playsLeft = 0; G.turnCount = 1; G.over = false;
    closeHome();
    log('Online game — '+names.join(', ')+'. First to 3 sets wins.');
    if(hosting){ renderAll(); this.pushState(); setTimeout(startTurn, 800); }
    else renderAll();
  },
};
function closeHome(){ const h=$('#home'); if(h&&h.classList) h.classList.remove('show'); }
function netBusy(){
  return (NET.mode==='host' && Object.keys(NET.pendingAsks).length>0) || (NET.mode==='client' && !!NET.hold);
}
</script>

<script>
/* ================= IDENTITY (v0.4.0): accounts, friends, invites, stats, elo ================= */
const ID = {
  sb: null, user: null, profile: null, friends: [], ready: false,

  async ensureSB(){
    if(this.sb) return this.sb;
    if(!SUPABASE_URL || !SUPABASE_ANON) return null;
    if(!window.supabase){
      await new Promise((res,rej)=>{ const sc=document.createElement('script'); sc.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'; sc.onload=res; sc.onerror=()=>rej(new Error('cdn')); document.head.appendChild(sc); });
    }
    this.sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    return this.sb;
  },

  makeFriendCode(){ const A='ABCDEFGHJKMNPQRSTUVWXYZ23456789'; let c=''; for(let i=0;i<6;i++) c+=A[Math.floor(Math.random()*A.length)]; return c; },

  async init(){
    try{
      const sb = await this.ensureSB(); if(!sb) return;
      let { data:{ session } } = await sb.auth.getSession();
      if(!session){
        const r = await sb.auth.signInAnonymously();
        session = r.data && r.data.session;
      }
      if(!session) { this.renderProfile(); return; }
      this.user = session.user;
      let { data: prof } = await sb.from('profiles').select('id,name,elo,games,wins').eq('id', this.user.id).maybeSingle();
      if(!prof){
        const name = (NET.myName || 'Player').slice(0,12);
        await sb.from('profiles').insert({ id:this.user.id, name, friend_code:this.makeFriendCode() });
        const r2 = await sb.from('profiles').select('id,name,elo,games,wins').eq('id', this.user.id).maybeSingle();
        prof = r2.data;
      }
      if(prof){
        const { data: code } = await sb.rpc('my_friend_code');
        prof.friend_code = code || '——————';
      }
      this.profile = prof;
      if(prof && prof.name){ NET.myName = prof.name; const hn=$('#homename'); if(hn && hn.value!==undefined) hn.value = prof.name; }
      this.ready = true;
      this.renderProfile();
      this.loadFriends();
      this.listenInvites();
    }catch(e){ this.renderProfile(); }
  },

  async saveName(name){
    name = (name||'').slice(0,12).trim() || 'Player';
    NET.myName = name;
    if(typeof localStorage!=='undefined' && localStorage.setItem) localStorage.setItem('it_name', name);
    if(this.sb && this.user){
      await this.sb.from('profiles').update({ name }).eq('id', this.user.id);
      if(this.profile) this.profile.name = name;
      this.renderProfile();
    }
  },

  renderProfile(){
    const el = $('#profcard'); if(!el || el.innerHTML===undefined) return;
    if(!this.profile){
      el.innerHTML = `<div class="profrow"><span class="avatar profav" style="background:var(--felt-highlight)">?</span>
        <div class="profinfo"><div class="profname">Offline profile</div><div class="profsub">Stats &amp; Elo connect automatically online</div></div></div>`;
      return;
    }
    const p = this.profile;
    const losses = Math.max(0, p.games - p.wins);
    el.innerHTML = `<div class="profrow">
      <span class="avatar profav" style="background:var(--money-gold);color:var(--table-night)">${(p.name||'?')[0]}</span>
      <div class="profinfo">
        <div class="profname">${p.name}</div>
        <div class="profsub">${p.wins}W · ${losses}L &nbsp;·&nbsp; friend code <b class="fcode" onclick="ID.copyCode()">${p.friend_code}</b></div>
      </div>
      <span class="elochip">${p.elo}<small>ELO</small></span>
    </div>`;
  },
  copyCode(){
    try{ navigator.clipboard && navigator.clipboard.writeText(this.profile.friend_code); banner('CODE COPIED','var(--gold-money)'); }catch(e){}
  },

  async loadFriends(){
    if(!this.sb || !this.user) return;
    const uid = this.user.id;
    const { data: rows } = await this.sb.from('friends').select('a,b').or(`a.eq.${uid},b.eq.${uid}`);
    const ids = [...new Set((rows||[]).map(r=> r.a===uid ? r.b : r.a))];
    if(!ids.length){ this.friends=[]; this.renderFriends(); return; }
    const { data: profs } = await this.sb.from('profiles').select('id,name,elo').in('id', ids);
    this.friends = profs || [];
    this.renderFriends();
  },
  renderFriends(){
    const el = $('#friendlist'); if(!el || el.innerHTML===undefined) return;
    if(!this.ready){ el.innerHTML=''; return; }
    el.innerHTML = (this.friends||[]).map(f=>`
      <div class="friendrow">
        <span class="avatar" style="background:var(--felt-highlight)">${(f.name||'?')[0]}</span>
        <span class="frname">${f.name}</span>
        <span class="frelo">${f.elo}</span>
        <button class="frinvite" onclick="ID.invite('${f.id}')">Invite</button>
        <button class="frremove" onclick="ID.removeFriend('${f.id}')">✕</button>
      </div>`).join('') || '<div class="profsub" style="text-align:center;opacity:.5;padding:4px 0">Add mates with their friend code</div>';
  },
  async removeFriend(id){
    if(!this.sb) return;
    await this.sb.rpc('remove_friend', { p_id: id });
    this.loadFriends();
  },
  async addFriend(){
    const inp = $('#friendcode'); const code = ((inp&&inp.value)||'').toUpperCase().trim();
    if(code.length!==6){ banner('6-LETTER CODE','var(--danger-red)'); return; }
    if(!this.sb || !this.user) return;
    const { data: r } = await this.sb.rpc('add_friend', { p_code: code });
    if(!r || !r.ok){
      banner(r && r.err==='self' ? "THAT'S YOU" : 'CODE NOT FOUND', r && r.err==='self' ? 'var(--warning-amber)' : 'var(--danger-red)');
      return;
    }
    if(inp) inp.value='';
    banner('ADDED '+String(r.name||'').toUpperCase(),'var(--success-green)');
    this.loadFriends();
  },

  /* --- invites: personal realtime channel per user --- */
  listenInvites(){
    if(!this.sb || !this.user) return;
    const ch = this.sb.channel('user-'+this.user.id, { config:{ broadcast:{ self:false } } });
    ch.on('broadcast', { event:'invite' }, ({payload})=>{
      const m = payload || {};
      const t = document.createElement('div');
      t.className = 'invitetoast';
      t.innerHTML = `<span><b>${m.from||'A mate'}</b> invited you to a game</span><button onclick="ID.acceptInvite('${m.code}',this)">Join</button>`;
      t.addEventListener('pointerdown', e=>{ if(e.target.tagName!=='BUTTON') t.remove(); });
      document.body.appendChild(t);
      sfx('alert'); haptic([8,40,8]);
      setTimeout(()=>{ if(t.parentNode) t.remove(); }, 20000);
    });
    ch.subscribe();
  },
  async invite(friendId){
    if(!this.sb) return;
    if(NET.mode!=='lobby-host'){
      await NET.hostGame();
      if(NET.mode!=='lobby-host') return;
    }
    const ch = this.sb.channel('user-'+friendId);
    await new Promise(res=>ch.subscribe(st=>{ if(st==='SUBSCRIBED') res(); }));
    ch.send({ type:'broadcast', event:'invite', payload:{ from:this.profile? this.profile.name : NET.myName, code: NET.code } });
    banner('INVITE SENT','var(--gold-money)');
    setTimeout(()=>{ try{ this.sb.removeChannel(ch); }catch(e){} }, 3000);
  },
  acceptInvite(code, btn){
    const jc = $('#joincode'); if(jc && jc.value!==undefined) jc.value = code;
    const toast = btn && btn.closest ? btn.closest('.invitetoast') : null;
    if(toast) toast.remove();
    const h=$('#home'); if(h&&h.classList) h.classList.add('show');
    NET.joinGame();
  },

  /* --- match recording: host calls once per finished online game --- */
  async recordMatch(winnerSeat){
    try{
      if(!this.sb || NET.mode!=='host' || !NET.roster) return;
      const ids = NET.roster.map(r=>r.uid).filter(Boolean);
      if(ids.length < 2) return;
      const winnerUid = NET.roster[winnerSeat] && NET.roster[winnerSeat].uid;
      if(!winnerUid) return;
      await this.sb.rpc('record_match', { p_players: ids, p_winner: winnerUid, p_rounds: G.turnCount });
      this.init && this.sb.from('profiles').select('*').eq('id', this.user.id).maybeSingle().then(r=>{ if(r.data){ this.profile=r.data; this.renderProfile(); } });
    }catch(e){}
  },
};
function eloDelta(winnerElo, loserElo){
  const ea = 1/(1+Math.pow(10,(loserElo-winnerElo)/400));
  return Math.round(32*(1-ea));
}
