<!DOCTYPE html>
<!--
  COASTLINE — the Sunshine Coast property card game
  Version: 0.10.1
  Single-file vanilla HTML/JS. No build step.
  v0.1.0 scope: local play, 1 human vs 2 AI opponents, full ruleset.
  Multiplayer (Supabase Realtime) planned for v0.2.0.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>M Deal — Infinite Table</title>
<meta name="description" content="Build sets, charge rent, raid your mates. Solo or 2–4 online.">
<meta property="og:title" content="M Deal — Infinite Table">
<meta property="og:description" content="Build sets, charge rent, raid your mates. Pull up a chair.">
<meta property="og:type" content="website">
<meta property="og:image" content="/icon-512.png">
<meta name="twitter:card" content="summary">
<link rel="manifest" href="../manifest.webmanifest">
<meta name="theme-color" content="#121A16">
<link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  /* ============ 1. BASE UI ============ */
  --table-night:#121A16; --felt-green:#1D2B25; --felt-highlight:#29392F;
  --text-ivory:#F2EEE2; --text-faint:rgba(242,238,226,.55);
  /* ============ 2. CARDS ============ */
  --card-ivory:#F7F2E6; --card-edge:#D9D2C0; --ink-black:#24241D; --muted-ink:#6E6C5E;
  /* ============ 3. ACTIONS ============ */
  --primary-coral:#E26A4B; --primary-coral-deep:#BC4F37;
  --money-gold:#BE8F41; --money-gold-deep:#97702C;
  /* ============ 4. STATUS ============ */
  --success-green:#3E8E68; --danger-red:#B8483D; --warning-amber:#D9A03F; --info-slate:#5A8CA8;
  /* ============ 5. PROPERTY / GAME COLOURS ============ */
  --property-amber:#E0AB52; --property-teal:#3B8B82; --property-coral:#D4756B;
  --property-green:#5C8B53; --property-purple:#7F6595; --property-orange:#D0813E;
  --property-brown:#86603F; --property-sky:#6394B6; --property-sage:#8B9A6B;
  --property-charcoal:#474D4A;
  /* ============ 6. SHADOWS / BORDERS ============ */
  --line-soft-t:rgba(242,238,226,.13); --line-faint-t:rgba(242,238,226,.07);
  --scrim:rgba(12,17,14,.78);
  /* ============ legacy aliases (all rules resolve through tokens) ============ */
  --table:var(--felt-green); --table-deep:var(--table-night); --table-edge:var(--table-night);
  --ui-highlight:var(--felt-highlight); --ui-deep:var(--table-night);
  --foam:var(--text-ivory);
  --sand:var(--card-ivory); --sand-edge:var(--card-edge); --ink:var(--ink-black); --ink-soft:var(--muted-ink);
  --coral:var(--primary-coral); --coral-deep:var(--primary-coral-deep);
  --gold-money:var(--money-gold); --gold-deep:var(--money-gold-deep);
  --action-success:var(--success-green); --action-danger:var(--danger-red);
  --action-warning:var(--warning-amber); --action-info:var(--info-slate);
  --line:var(--line-soft-t); --line-soft:var(--line-faint-t);
  --c-gold:var(--property-amber); --c-teal:var(--property-teal); --c-coral:var(--property-coral);
  --c-green:var(--property-green); --c-purple:var(--property-purple); --c-orange:var(--property-orange);
  --c-brown:var(--property-brown); --c-sky:var(--property-sky); --c-sage:var(--property-sage);
  --c-black:var(--property-charcoal);
  --sh-card:0 2px 5px rgba(8,12,10,.28), 0 9px 22px rgba(8,12,10,.2);
  --sh-raise:0 14px 26px rgba(8,12,10,.42);
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,html{overflow-x:hidden}
body{
  overflow-x:hidden;max-width:100vw;
  font-variant-numeric:tabular-nums;height:100%}
body{
  animation:appin .35s ease;
  font-family:'Nunito Sans',system-ui,sans-serif;color:var(--foam);
  background:var(--table);
  min-height:100dvh;
  overscroll-behavior:none;display:flex;flex-direction:column;overscroll-behavior:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible,[onclick]:focus-visible{outline:2px solid var(--gold-money);outline-offset:2px}
::-webkit-scrollbar{display:none}

/* ---------- header ---------- */
header{display:flex;align-items:flex-end;justify-content:space-between;padding:12px 16px 8px}
.eyebrow{font-size:9px;font-weight:800;letter-spacing:2.2px;opacity:.55;margin-bottom:1px}
.logo{font-family:'Lilita One',cursive;font-size:23px;letter-spacing:.5px;color:var(--sand);line-height:1}
.logo .wave{color:var(--c-teal)}
.ver{font-size:10.5px;opacity:.5;font-weight:700}
.hdr-right{display:flex;gap:6px;align-items:center}
.icon-btn{transition:transform .1s;
  font-size:15px;width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.07);border:1px solid var(--line-soft);
}
.icon-btn:active{background:rgba(255,255,255,.16)}

/* ---------- opponents ---------- */
#opponents{display:flex;gap:8px;padding:4px 16px 8px}
#opponents .opp{min-width:0}
.opp-top{min-width:0}
.opp-id{display:flex;flex-direction:column;min-width:0;flex:1;line-height:1.25}
.opp-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.opp-meta{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:10px;opacity:.6}
.tidebar{overflow:hidden}
.opp{transition:box-shadow .3s ease, opacity .3s ease;
  flex:1;background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.1)), var(--table-deep);
  border:1px solid var(--line-soft);border-radius:14px;padding:9px 10px 8px;
  box-shadow:0 2px 8px rgba(8,12,10,.3);transition:box-shadow .25s, transform .12s;cursor:pointer;
}
.opp:active{transform:scale(.98)}
.opp.active{border-color:rgba(226,106,75,.7)}
.opp-top{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.avatar{
  width:24px;height:24px;border-radius:50%;flex:0 0 24px;
  font-family:'Lilita One',cursive;font-size:12.5px;color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 -2px 3px rgba(0,0,0,.25);
}
.opp-name{font-weight:800;font-size:13.5px;flex:1}
.opp-meta{font-size:10.5px;opacity:.65;font-weight:700;white-space:nowrap}
.opp.active .opp-meta::before{content:'▸ ';color:var(--gold-money);animation:blip 1.1s ease-in-out infinite}
.tidebar{display:flex;flex-wrap:wrap;gap:4px;min-height:15px;align-items:flex-end}
.chipset{display:flex;gap:1.5px;align-items:flex-end}
.chip{width:7px;border-radius:2px;height:12px;box-shadow:inset 0 -2px 2px rgba(0,0,0,.25)}
.chip.done-mark{height:15px;box-shadow:0 0 0 1.5px var(--gold-money), inset 0 -2px 2px rgba(0,0,0,.25)}
.opp-bldg{font-size:10px;margin-left:2px;color:var(--gold-money)}
.emptynote{opacity:.35;font-size:10px;font-weight:600}

/* ---------- table strip ---------- */
#tablestrip{display:flex;align-items:center;gap:8px;padding:2px 16px 8px;font-size:12px}
.pill.low{border-color:var(--warning-amber);color:var(--warning-amber)}
.pill{
  display:inline-block;font-size:10.5px;font-weight:800;background:rgba(255,255,255,.07);
  border:1px solid var(--line-soft);border-radius:20px;padding:3px 9px;white-space:nowrap;
}
#log{display:none}
#playpile{margin-right:auto}
#turnbadge{
  font-family:'Lilita One',cursive;font-size:12.5px;color:var(--table-deep);
  background:linear-gradient(180deg,#E3C588,var(--gold-money));border-radius:8px;padding:4px 10px;
  white-space:nowrap;box-shadow:0 2px 5px rgba(8,12,10,.35);
}

/* ---------- player board ---------- */
#board{flex:1;overflow-y:auto;padding:4px 16px 6px;display:flex;flex-direction:column;gap:12px}
.zone-label{
  font-size:9.5px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;
  opacity:.42;margin-bottom:5px;display:flex;align-items:center;gap:8px;
}
.zone-label::after{content:'';flex:1;height:1px;background:var(--line-soft)}
#myprops{display:flex;flex-wrap:wrap;gap:7px;min-height:48px}
.setgroup{
  background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(0,0,0,.1));
  border:1px solid var(--line);border-radius:11px;padding:6px 8px;
  display:flex;flex-direction:column;gap:4px;cursor:pointer;transition:transform .12s;
}
.setgroup:active{transform:scale(.97)}
.setgroup.complete{
  border-color:rgba(217,160,63,.75);
  background:linear-gradient(180deg, rgba(217,160,63,.16), rgba(217,160,63,.05));
}
.setdot{width:9px;height:9px;border-radius:3px;box-shadow:inset 0 -2px 2px rgba(0,0,0,.3)}
.bldg-tags{display:flex;gap:3px}
.bldg-tag{font-size:9px;font-weight:800;letter-spacing:.4px;background:var(--gold-money);color:var(--table-deep);border-radius:4px;padding:1px 5px;box-shadow:0 1px 2px rgba(8,12,10,.3)}
#mybank{display:flex;gap:5px;flex-wrap:wrap;align-items:center;min-height:32px}
.banktotal{font-size:12px;font-weight:800;opacity:.75;margin-left:4px;display:inline-block}
.banktotal.pop{animation:zpop .35s ease}

/* ---------- hand ---------- */
#handwrap{background:linear-gradient(to top, rgba(10,15,12,.55), transparent);padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
#handbar{display:flex;justify-content:space-between;align-items:center;padding:0 16px 8px}
#playsleft{display:flex;gap:5px;align-items:center;font-size:11.5px;font-weight:800;letter-spacing:.3px}
.playdot{width:10px;height:10px;border-radius:50%;background:var(--coral);opacity:.22;box-shadow:inset 0 -2px 2px rgba(0,0,0,.3);transition:opacity .25s, box-shadow .25s}
.playdot.on{opacity:1;box-shadow:0 0 6px rgba(226,106,75,.6), inset 0 -2px 2px rgba(0,0,0,.3)}
#endturn{
  font-family:'Lilita One',cursive;font-size:14px;letter-spacing:.4px;color:#fff;
  background:linear-gradient(180deg,var(--coral),var(--coral-deep));
  border-radius:12px;padding:8px 18px;box-shadow:0 3px 10px rgba(188,79,55,.32), inset 0 1px 0 rgba(255,255,255,.25);
}
#endturn:active{transform:translateY(1px)}
#endturn:disabled{opacity:.3;box-shadow:none}
#hand{display:flex;overflow-x:auto;padding:48px 16px 10px;margin-top:-30px;overscroll-behavior:contain}
#hand.few{justify-content:center}
.cardw{flex:0 0 102px;width:102px;position:relative;touch-action:pan-x;transition:transform .26s cubic-bezier(.34,1.56,.64,1)}
.cardw.pressed{z-index:40!important}
.cardw.pressed .card{
  box-shadow:inset 0 0 0 1px rgba(36,36,29,.07);
  transform:scale(.955) translateY(2px);
  box-shadow:0 1px 4px rgba(8,12,10,.45);
  transition:transform .07s ease, box-shadow .07s ease;
}
.cardw.hidden-src{visibility:hidden}
.cardw .card{rotate:var(--fan,0deg);translate:0 var(--fanY,0px)}
.cardw.raised .card{rotate:0deg;translate:0 0}
.cardw.raised{z-index:60!important;transform:translateY(-30px)}
.cardw.part-l{transform:translateX(-9px)}
.cardw.part-r{transform:translateX(9px)}
.cardw.denied .card{animation:deny .32s ease}
@keyframes deny{25%{transform:translateX(-5px)}50%{transform:translateX(5px)}75%{transform:translateX(-3px)}}
.cardw.raised .card{box-shadow:var(--sh-raise);transform:scale(1.03)}
.card{transition:transform .18s cubic-bezier(.2,1.1,.3,1), box-shadow .18s}
.card{
  width:102px;min-width:102px;max-width:102px;height:150px;min-height:150px;max-height:150px;
  flex:0 0 102px;border-radius:11px;
  background:linear-gradient(168deg, #FFFDF6 0%, var(--sand) 55%, #F1E9D4 100%);
  color:var(--ink);position:relative;overflow:hidden;
  border:1px solid rgba(10,25,26,.35);box-shadow:var(--sh-card);
  display:flex;flex-direction:column;transition:transform .15s, box-shadow .15s;
}
.card.static{cursor:default}
.card .band{
  height:30px;flex:0 0 30px;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:#fff;letter-spacing:1.3px;text-transform:uppercase;
  text-shadow:0 1px 2px rgba(0,0,0,.4);padding:0 6px;text-align:center;
  box-shadow:inset 0 -3px 5px rgba(0,0,0,.16), inset 0 1px 0 rgba(255,255,255,.22);
}
.card .body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 7px;text-align:center;gap:3px}
.card .cname{font-weight:800;font-size:11.5px;line-height:1.18}
.card .cdesc{font-size:8.8px;color:var(--ink-soft);line-height:1.25;font-weight:700}
.coin{
  position:absolute;top:31px;left:5px;z-index:2;
  font-size:8px;font-weight:800;color:var(--table-deep);
  background:linear-gradient(180deg,#E3C588,var(--gold-money));
  border-radius:9px;padding:1.5px 5px;border:1px solid rgba(96,70,20,.4);
  box-shadow:0 1px 2px rgba(0,0,0,.3);
}
.ladder{padding:0 11px 9px;display:flex;flex-direction:column}
.rrow{display:flex;justify-content:space-between;align-items:baseline;font-size:9px;font-weight:700;color:var(--ink-soft);padding:2.5px 0}
.rrow + .rrow{border-top:1px solid rgba(36,36,29,.08)}
.propfield{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
.wopt{display:flex;align-items:center;justify-content:center;gap:7px;font-weight:800;font-size:11.5px;color:var(--ink);margin:2.5px 0}
.wswatch{width:20px;height:12px;border-radius:3.5px;box-shadow:inset 0 0 0 1px rgba(36,36,29,.14);flex:0 0 auto}

.rrow b{color:var(--ink)}
.rrow .star{color:var(--gold-deep)}
.card.moneycard .mband{
  height:20px;flex:0 0 20px;display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:800;letter-spacing:2px;color:var(--gold-deep);
  border-bottom:1px dashed rgba(96,70,20,.3);
}
.card.moneycard{background:linear-gradient(168deg,#FFF6DE,#FBE7B4 60%,#F3D488)}
.card.moneycard .mbody{flex:1;display:flex;align-items:center;justify-content:center}
.bigcoin{
  width:58px;height:58px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #EBDCAE, var(--gold-money) 60%, var(--gold-deep));
  border:2px solid rgba(96,70,20,.45);box-shadow:0 3px 6px rgba(96,70,20,.3), inset 0 2px 3px rgba(255,255,255,.6);
  display:flex;align-items:center;justify-content:center;
  font-family:'Lilita One',cursive;font-size:16px;color:#6B4A08;
}
.card.actioncard .band{background:linear-gradient(180deg,var(--coral),var(--coral-deep))}
.card.rentcard .band{background:linear-gradient(90deg,var(--b1),var(--b2))}
.card.wildall .band{
  color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.45);
  background:linear-gradient(90deg,#E84A4A,#F0912E,#EFD22F,#3FBF5E,#2FBBD6,#4A6CE8,#A44AE0,#E84A8F,#E84A4A);
  background-size:400% 100%;
  animation:rainbowflow 7s linear infinite;
}
@keyframes rainbowflow{to{background-position:400% 0}}
.bandsplit{background:linear-gradient(90deg,var(--b1) 50%,var(--b2) 50%)!important}

/* ---------- modal / sheet ---------- */
#overlay{position:fixed;inset:0;background:var(--scrim);backdrop-filter:blur(2px);display:flex;align-items:flex-end;justify-content:center;z-index:72;opacity:0;pointer-events:none;transition:opacity .18s ease}
#overlay.show{opacity:1;pointer-events:auto}
#sheet{
  width:100%;max-width:520px;background:linear-gradient(180deg,var(--ui-highlight),var(--ui-deep) 50%);
  border-radius:24px 24px 0 0;padding:10px 16px calc(18px + env(safe-area-inset-bottom));
  max-height:78dvh;overflow-y:auto;border-top:1px solid rgba(255,255,255,.18);
  box-shadow:0 -10px 40px rgba(0,0,0,.5);
}
#sheet::before{content:'';display:block;width:38px;height:4px;border-radius:4px;background:rgba(255,255,255,.25);margin:0 auto 12px}
#sheet h3{font-family:'Lilita One',cursive;font-size:17.5px;letter-spacing:.3px;margin-bottom:4px}
#sheet .sub{font-size:12.5px;opacity:.8;margin-bottom:12px;font-weight:600;line-height:1.4}
.optlist{display:flex;flex-direction:column;gap:8px}
.optbtn{
  background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:11px;
  padding:12px 13px;text-align:left;font-weight:700;font-size:13.5px;color:var(--foam);
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  transition:background .12s;
}
.optbtn:active{background:rgba(255,255,255,.16)}
.optbtn .hint{font-size:11px;opacity:.55;font-weight:700;text-align:right}
.optbtn.danger{border-color:rgba(226,106,75,.7)}
.optbtn.primary{background:linear-gradient(180deg,var(--coral),var(--coral-deep));border-color:transparent;color:#fff;box-shadow:0 3px 8px rgba(188,79,55,.35)}
.optbtn:disabled{opacity:.32}
.colorpickrow{display:flex;gap:8px;flex-wrap:wrap}
.colorpick{
  width:48px;height:48px;border-radius:11px;border:2px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:9.5px;color:#fff;
  text-shadow:0 1px 2px rgba(0,0,0,.5);box-shadow:inset 0 -4px 6px rgba(0,0,0,.25), 0 2px 4px rgba(8,12,10,.3);
}
.colorpick:active{transform:scale(.95)}

/* ---------- win ---------- */
#winscreen{
  position:fixed;inset:0;z-index:60;display:flex;
  background:rgba(10,15,12,.72);backdrop-filter:blur(3px);
  flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;
  opacity:0;pointer-events:none;transition:opacity .25s ease;
}
#winscreen.show{opacity:1;pointer-events:auto}
.wincard{
  background:linear-gradient(180deg,var(--felt-highlight),var(--table-deep) 72%);
  border:1px solid var(--line);border-radius:20px;padding:26px 28px 24px;
  box-shadow:0 20px 50px rgba(8,12,10,.6);max-width:340px;
  display:flex;flex-direction:column;gap:10px;align-items:center;
  animation:winpop .35s cubic-bezier(.2,1.3,.4,1);
}
@keyframes winpop{from{transform:scale(.85) translateY(14px);opacity:0}}
#winscreen h1{font-family:'Lilita One',cursive;font-size:34px;color:var(--gold-money);text-shadow:0 4px 14px rgba(0,0,0,.4)}
#winscreen p{font-weight:700;opacity:.85;max-width:300px;line-height:1.45}
#winstats{display:none}
#winrows{margin:14px 0 16px}
.wrow{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid rgba(36,36,29,.1)}
.wrow:last-child{border-bottom:none}
.wrow.wout{opacity:.45}
.wname{font-weight:800;font-size:14px;flex:0 0 auto;min-width:64px;text-align:left}
.wsets{flex:1;display:flex;gap:4px;align-items:center}
.wdot{width:11px;height:11px;border-radius:3.5px;box-shadow:inset 0 -2px 2px rgba(0,0,0,.25)}
.wworth{font-weight:800;font-size:13px;opacity:.7;font-variant-numeric:tabular-nums}
.wbadge{font-size:9.5px;font-weight:800;letter-spacing:1px;padding:3px 8px;border-radius:20px;flex:0 0 auto}
.wbadge.gold{background:var(--money-gold);color:var(--table-deep)}
.wbadge.red{background:rgba(200,67,58,.16);color:var(--danger-red);border:1px solid rgba(200,67,58,.4)}
#winscreen button{
  font-family:'Lilita One',cursive;font-size:16px;color:#fff;border-radius:12px;padding:13px 30px;margin-top:8px;
  background:linear-gradient(180deg,var(--coral),var(--coral-deep));
  box-shadow:0 4px 12px rgba(188,79,55,.45), inset 0 1px 0 rgba(255,255,255,.25);
}

/* ---------- log drawer ---------- */
#logdrawer{position:fixed;inset:0;background:rgba(10,15,12,.9);backdrop-filter:blur(3px);z-index:55;display:none;padding:26px 18px;overflow-y:auto}
#logdrawer.show{display:block}
#logdrawer h3{font-family:'Lilita One',cursive;margin-bottom:12px;letter-spacing:.4px}
#loglist{display:flex;flex-direction:column;gap:7px;font-size:13px;font-weight:600}
#loglist div{border-bottom:1px solid var(--line-soft);padding-bottom:6px;opacity:.9}
#logclose{position:fixed;top:14px;right:18px;font-size:20px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.1)}

/* ---------- drag & direct manipulation (restored) ---------- */
.dragclone{
  position:fixed;z-index:81;pointer-events:none;will-change:transform;
  width:102px;height:150px;
  filter:drop-shadow(0 14px 22px rgba(8,12,10,.55));
}
.dragclone .card{transform:scale(1);transition:transform .13s cubic-bezier(.3,1.4,.5,1);animation:none}
.dragclone.lifted .card{transform:scale(1.07)}
.dragclone.springback{transition:transform .19s cubic-bezier(.3,1.5,.5,1)}
.droppable{outline:2px dashed rgba(255,255,255,.35);outline-offset:2px}
.dropok{
  outline:2px solid var(--gold-money);outline-offset:2px;
  box-shadow:0 0 14px rgba(217,160,63,.55)!important;transform:scale(1.03);

<script>
/* ---- global error surface: masked "Script error" becomes a readable toast ---- */
(function(){
  function report(text){
    try{
      if(typeof log === 'function') log('⚠ ' + text);
      var t = document.createElement('div');
      t.className = 'errtoast';
      t.textContent = '⚠ ' + text;
      t.addEventListener('pointerdown', function(){ t.remove(); });
      document.body.appendChild(t);
      setTimeout(function(){ if(t.parentNode) t.remove(); }, 9000);
    }catch(e){}
  }
  window.addEventListener('error', function(e){
    var msg = e.message || 'Script error';
    if(e.error && e.error.stack) msg = e.error.stack.split('\n').slice(0,2).join(' · ');
    if(e.lineno) msg += ' @' + e.lineno + ':' + (e.colno||0);
    report(msg);
  });
  window.addEventListener('unhandledrejection', function(e){
    report('Promise: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
})();
</script>

<script>
/* ================= ENGINE ================= */
const COLORS = {
  gold:  {label:'Yellow', hex:'#E8C63B', ink:'#24241D', size:2, rent:[3,8]},
  teal:  {label:'Teal',   hex:'#1FA8A0', size:3, rent:[2,4,7]},
  coral: {label:'Red',    hex:'#C8433A', size:3, rent:[2,3,6]},
  green: {label:'Blue',   hex:'#2E5EAA', size:2, rent:[1,2]},
  purple:{label:'Pink',   hex:'#DE559C', size:3, rent:[1,2,4]},
  orange:{label:'Orange', hex:'#F08A24', size:3, rent:[1,3,5]},
  brown: {label:'Brown',  hex:'#8A5A38', size:2, rent:[1,2]},
  sky:   {label:'Cyan',   hex:'#4FC3E8', ink:'#24241D', size:3, rent:[1,2,3]},
  sage:  {label:'Green',  hex:'#3F9142', size:3, rent:[2,4,6]},
  black: {label:'Black',  hex:'#2B2F33', size:4, rent:[1,2,3,4]},
};
const PROPS = [
  ['gold','',4],['gold','',4],
  ['teal','',4],['teal','',4],['teal','',4],
  ['coral','',3],['coral','',3],['coral','',3],
  ['green','',2],['green','',2],
  ['purple','',2],['purple','',2],['purple','',2],
  ['orange','',2],['orange','',2],['orange','',2],
  ['brown','',1],['brown','',1],
  ['sky','',1],['sky','',1],['sky','',1],
  ['sage','',3],['sage','',3],['sage','',3],
  ['black','',2],['black','',2],
  ['black','',2],['black','',2],
];
const ACTIONS = {
  takeover:{n:'Hostile Takeover', d:'Steal a complete set from any player', v:5, c:2},
  nodeal:  {n:'No Deal!',         d:'Cancel an action played against you',  v:4, c:3},
  swipe:   {n:'Sneaky Swipe',     d:'Steal a property (not from a complete set)', v:3, c:3},
  swap:    {n:'Swap Meet',        d:'Swap one of your properties with another player\'s', v:3, c:3},
  favour:  {n:'Call In a Favour', d:'One player pays you $5M', v:3, c:3},
  shout:   {n:'Shout a Round',    d:'Every player pays you $2M', v:2, c:3},
  payday:  {n:'Payday',           d:'Draw 2 extra cards', v:1, c:10},
  granny:  {n:'Granny Flat',      d:'+$3M rent on a complete set (not Transport)', v:3, c:3},
  resort:  {n:'Beach Resort',     d:'+$4M rent on a set with a Granny Flat', v:4, c:2},
  hike:    {n:'Rent Hike',        d:'Play with a Rent card to double it', v:1, c:2},
};
const MONEY = [[1,6],[2,5],[3,3],[4,3],[5,2],[10,1]];
const DUAL_WILDS = [
  [['gold','teal'],4,1],      // Dark Blue / Green
  [['teal','black'],4,1],     // Green / Railroad
  [['sky','black'],4,1],      // Light Blue / Railroad
  [['green','black'],2,1],    // Utility / Railroad
  [['sky','brown'],1,1],      // Light Blue / Brown
  [['orange','purple'],2,2],  // Pink / Orange
  [['coral','sage'],3,2],     // Red / Yellow
];
const RENT_DUALS = [['gold','teal'],['black','green'],['brown','sky'],['orange','purple'],['coral','sage']];

let CID = 0;
function mk(c){ c.id = ++CID; return c; }
function buildDeck(){
  CID = 0;   // the catalog is canonical: card N is card N in every build, forever
  const d = [];
  PROPS.forEach(([color,name,v]) => d.push(mk({t:'prop', color, name, v})));
  DUAL_WILDS.forEach(([colors,v,count]) => { for(let i=0;i<count;i++) d.push(mk({t:'wild', colors:[...colors], v})); });
  for(let i=0;i<2;i++) d.push(mk({t:'wildall', v:0}));
  MONEY.forEach(([v,count]) => { for(let i=0;i<count;i++) d.push(mk({t:'money', v})); });
  Object.entries(ACTIONS).forEach(([kind,a]) => { for(let i=0;i<a.c;i++) d.push(mk({t:'action', kind, v:a.v})); });
  RENT_DUALS.forEach(colors => { for(let i=0;i<2;i++) d.push(mk({t:'rent', colors:[...colors], v:1})); });
  for(let i=0;i<3;i++) d.push(mk({t:'rentall', v:3}));
  return d;
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function cardName(c){
  if(c.t==='prop') return COLORS[c.color].label+' property';
  if(c.t==='wild') return COLORS[c.colors[0]].label+' / '+COLORS[c.colors[1]].label;
  if(c.t==='wildall') return 'Rainbow Wild';
  if(c.t==='money') return '$'+c.v+'M';
  if(c.t==='action') return ACTIONS[c.kind].n;
  if(c.t==='rent') return 'Rent: '+COLORS[c.colors[0]].label+' / '+COLORS[c.colors[1]].label;
  if(c.t==='rentall') return 'Rent: Any Colour';
  return '?';
}

/* ----- game state ----- */
const G = {
  deck:[], discard:[], players:[], turn:0, playsLeft:0, over:false,
};
function newGame(){
  G.deck = shuffle(buildDeck());
  G.discard = [];
  G.players = [
    {name:'You',   isAI:false, hand:[], bank:[], props:{}, bldg:{}},
    {name:'Bazza', isAI:true,  hand:[], bank:[], props:{}, bldg:{}},
    {name:'Shaz',  isAI:true,  hand:[], bank:[], props:{}, bldg:{}},
  ];
  for(let i=0;i<5;i++) G.players.forEach(p => p.hand.push(draw()));
  G.turn = 0; G.playsLeft = 0; G.over = false; G.turnCount = 1;
}
function draw(){
  if(G.deck.length===0){
    if(G.discard.length===0) return null;
    G.deck = shuffle(G.discard.splice(0));
    log('Discard pile reshuffled into deck.');
    if(typeof banner==='function') banner('RESHUFFLE');
    if(typeof sfx==='function') sfx('tick');
  }
  return G.deck.pop();
}
function propColorOf(card, assignedColor){ return card.t==='prop' ? card.color : assignedColor; }
function propList(p){ // flatten props to [{card,color}]
  const out=[];
  Object.entries(p.props).forEach(([color,cards]) => cards.forEach(card => out.push({card,color})));
  return out;
}
function countIn(p,color){ return (p.props[color]||[]).length; }
function isComplete(p,color){ return countIn(p,color) >= COLORS[color].size; }
function completeColors(p){ return Object.keys(p.props).filter(c => isComplete(p,c)); }
function rentFor(p,color){
  const n = Math.min(countIn(p,color), COLORS[color].size);
  if(n===0) return 0;
  let r = COLORS[color].rent[n-1];
  if(isComplete(p,color)){
    if(p.bldg[color]?.granny) r += 3;
    if(p.bldg[color]?.resort) r += 4;
  }
  return r;
}
function bankTotal(p){ return p.bank.reduce((s,c)=>s+c.v,0); }
function assetTotal(p){ return bankTotal(p) + propList(p).reduce((s,x)=>s+x.card.v,0) + Object.values(p.bldg).reduce((s,b)=> s + (b.granny?3:0) + (b.resort?4:0), 0); }
function addProp(p, card, color){
  if(!p.props[color]) p.props[color]=[];
  p.props[color].push(card);
}
function removeProp(p, card){
  for(const color of Object.keys(p.props)){
    const i = p.props[color].findIndex(c=>c.id===card.id);
    if(i>-1){
      p.props[color].splice(i,1);
      if(p.props[color].length===0){
        delete p.props[color];
        if(p.bldg[color]){ // buildings are lost to discard if set broken
          if(p.bldg[color].granny) G.discard.push(p.bldg[color].granny);
          if(p.bldg[color].resort) G.discard.push(p.bldg[color].resort);
          delete p.bldg[color];
        }
      }
      return color;
    }
  }
  return null;
}
function loseBuildingsIfBroken(p,color){
  if(p.bldg[color] && !isComplete(p,color)){
    if(p.bldg[color].granny) G.discard.push(p.bldg[color].granny);
    if(p.bldg[color].resort) G.discard.push(p.bldg[color].resort);
    delete p.bldg[color];
  }
}
function checkWin(p){ return completeColors(p).length >= 3; }
function hasNoDeal(p){ return p.hand.some(c=>c.t==='action'&&c.kind==='nodeal'); }
function takeNoDeal(p){
  const i = p.hand.findIndex(c=>c.t==='action'&&c.kind==='nodeal');
  const c = p.hand.splice(i,1)[0]; G.discard.push(c);
  if(typeof tableDrop==='function') tableDrop(c, p===G.players[0]?'You':p.name);
  return c;
}
</script>
<script>
/* ================= UI ================= */
const $ = q => document.querySelector(q);
/* ----- feel / FX ----- */
let SOUND = true;
try{ SOUND = localStorage.getItem('it_sound') !== 'off'; }catch(e){}
let AC = null;
let INITDEAL = false;
function ac(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
document.addEventListener('touchstart',()=>ac(),{once:true});
document.addEventListener('mousedown',()=>ac(),{once:true});
function haptic(ms){ if(navigator.vibrate){ try{ navigator.vibrate(ms); }catch(e){} } }
function sfx(kind){
  if(!SOUND) return; const ctx = ac(); if(!ctx) return;
  if(ctx.state==='suspended') ctx.resume();
  const t = ctx.currentTime;
  const tone=(f,start,dur,type,gain)=>{
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type||'sine'; o.frequency.value=f;
    g.gain.setValueAtTime(gain||.07, t+start);
    g.gain.exponentialRampToValueAtTime(.0001, t+start+dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(t+start); o.stop(t+start+dur+.02);
  };
  if(kind==='tick') tone(340,0,.06,'triangle',.06);
  if(kind==='pick') tone(520,0,.045,'triangle',.05);

function renderHand(p){
  sortHand(p);
  const hand = document.getElementById('hand');
  const n = p.hand.length;
  const ov = n<=6 ? 40 : Math.min(62, 40 + (n-6)*3.5);
  const stag = INITDEAL ? 95 : 70;
  const browser = hand && typeof hand.children === 'object';
  if(!browser){ // headless test fallback
    const armedND = (MODE.type==='pay' && !!MODE.jsn) || MODE.type==='react';
    $('#hand').innerHTML = p.hand.map(c=>`<div class="cardw${armedND && c.t==='action' && c.kind==='nodeal' ? ' blockable' : ''}" data-cid="${c.id}">${handCardHTML(c)}</div>`).join('');
    NEWIDS.clear();
    return;
  }
  const mineChanged = HAND_MINE !== isMyTurn();
  HAND_MINE = isMyTurn();
  // FLIP: first positions of surviving cards
  const first = {};
  [...hand.children].forEach(w=>{ first[w.dataset.cid] = w.getBoundingClientRect().left; });
  const byId = {};
  [...hand.children].forEach(w=>{ byId[w.dataset.cid] = w; });
  const seen = new Set();
  const newNodes = [];
  let newIdx = 0;
  p.hand.forEach((c,i)=>{
    let w = byId[c.id];
    if(!w){
      w = document.createElement('div');
      w.className = 'cardw';
      w.dataset.cid = c.id;
      w.innerHTML = handCardHTML(c);
      if(NEWIDS.has(c.id)) newNodes.push({ w, idx: newIdx++ });
    } else if(mineChanged){
      w.innerHTML = handCardHTML(c); // refresh tap handlers for new turn state
    }
    w.style.zIndex = i+1;
    w.style.marginLeft = i>0 ? (-ov+'px') : '0px';
    if(w.classList){
      w.classList.toggle('paysel', MODE.type==='discard' && MODE.sel && MODE.sel.has(c.id));
      w.classList.toggle('blockable', ((MODE.type==='pay' && !!MODE.jsn) || MODE.type==='react') && c.t==='action' && c.kind==='nodeal');
    }
    if(w.style && w.style.setProperty){
      const fm=(hand.length-1)/2, foff=i-fm;
      const fdeg=Math.max(-4,Math.min(4, foff*(8/Math.max(hand.length-1,1))));
      w.style.setProperty('--fan', fdeg.toFixed(2)+'deg');
      w.style.setProperty('--fanY', (Math.abs(foff)*1.3).toFixed(1)+'px');
    }
    if(w !== hand.children[i]) hand.insertBefore(w, hand.children[i]||null);
    seen.add(String(c.id));
  });
  [...hand.children].forEach(w=>{ if(!seen.has(w.dataset.cid)) w.remove(); });
  hand.classList.toggle('few', n<=3);
  NEWIDS.clear();
  // FLIP: slide surviving cards from old to new positions
  [...hand.children].forEach(w=>{
    const old = first[w.dataset.cid];
    if(old===undefined) return;
    const dx = old - w.getBoundingClientRect().left;
    if(Math.abs(dx)>3){
      w.style.transition = 'none';
      w.style.transform = `translateX(${dx}px)`;
      requestAnimationFrame(()=>{
        w.style.transition = '';
        w.style.transform = '';
      });
    }
  });
  // draws: card backs fly from the deck into each new slot, face pops on arrival
  if(newNodes.length){
    const deckEl = document.getElementById('deckcount');
    const deckR = rectOf(deckEl);
    newNodes.forEach(({w, idx})=>{
      const cardEl = w.firstElementChild;
      if(cardEl && cardEl.style) cardEl.style.opacity = '0';
      setTimeout(()=>{
        const slot = rectOf(w);
        const from = deckR ? { left: deckR.left, top: deckR.top, width: 102, height: 150 } : null;
        const reveal = ()=>{
          if(cardEl && cardEl.style){ cardEl.style.opacity = ''; }
          if(cardEl && cardEl.classList){
            cardEl.classList.add('landpop');
            setTimeout(()=>cardEl.classList&&cardEl.classList.remove('landpop'), 260);
          }
          sfx('tick');
        };
        if(from && slot){
          if(idx===0) zonePop('#deckcount');
          flyCard(BACK_HTML, from, slot, { fromScale: 0.22, scale: 1, dur: 240, fade: false, rot: 0, onEnd: reveal });
        } else reveal();
      }, idx*stag);
    });
    const last = newNodes[newNodes.length-1].w;
    setTimeout(()=>{ if(last.scrollIntoView) last.scrollIntoView({behavior:'smooth', inline:'nearest', block:'nearest'}); }, newNodes.length*stag+260);
  }
}

/* ----- card flight (played cards travel, drawn cards arrive from the deck) ----- */
function rectOf(el){ return (el && el.getBoundingClientRect) ? el.getBoundingClientRect() : null; }
function flyCard(html, from, to, opts){
  opts = opts||{};
  if(!from || !to || !document.body || !document.body.appendChild) return;
  const f = document.createElement('div');
  f.className = 'flyer';
  f.innerHTML = html;
  const fw = from.width||102, fh = from.height||150;
  f.style.left = from.left+'px'; f.style.top = from.top+'px';
  f.style.width = fw+'px'; f.style.height = fh+'px';
  if(opts.fromScale) f.style.transform = `scale(${opts.fromScale})`;
  document.body.appendChild(f);
  const dx = (to.left + (to.width||0)/2) - (from.left + fw/2);
  const dy = (to.top + (to.height||0)/2) - (from.top + fh/2);
  const dur = opts.dur||270;
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>{
    if(!f.style) return;
    f.style.transition = `transform ${dur}ms cubic-bezier(.25,.8,.25,1), opacity ${dur}ms ease-in`;
    f.style.transform = `translate(${dx}px,${dy}px) scale(${opts.scale!=null?opts.scale:0.3}) rotate(${opts.rot||0}deg)`;
    if(opts.fade!==false) f.style.opacity = '0.12';
  }); });
  setTimeout(()=>{ if(f.remove) f.remove(); if(opts.onEnd) opts.onEnd(); }, dur+50);
}
const BACK_HTML = '<div class="cardback"><span>C</span></div>';
/* ----- play pile: compact widget, tap to review recent plays full-size ----- */
let TABLEPILE = [];
function tableDrop(c, by){
  TABLEPILE.push({ c, by });
  if(TABLEPILE.length>12) TABLEPILE.shift();
  updatePile(true);
}
function updatePile(landed){
  if(NET.mode==='client' && NET.pile){
    const el=$('#playpile');
    el.innerHTML = `<span class="ppchip"></span><span>${NET.pile.label} · ${NET.pile.n}</span>`;
    return;
  }
  const el = $('#playpile');
  if(!el) return;
  const top = TABLEPILE[TABLEPILE.length-1];
  el.innerHTML = `<span class="ppchip"></span><span>${top ? cardName(top.c) : 'Pile'} · ${G.discard.length}</span>`;
  if(landed && el.classList){
    el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
  }
}
function openPlays(){
  if(!TABLEPILE.length){ log('Nothing played yet.'); return; }
  const rows = [...TABLEPILE].reverse().map(e=>
    `<div class="fullcol">${staticCardHTML(e.c)}<span style="font-size:10px;font-weight:800;opacity:.7">${e.by}</span></div>`
  ).join('');
  openSheet(`<h3>Recent plays</h3><div class="sub">Newest first · ${G.discard.length} cards in the pile total</div>
    <div class="fullrow">${rows}</div>
    <button class="optbtn" onclick="closeSheet()">Close</button>`);
}
function flightScaleFor(zoneEl){
  return (zoneEl && zoneEl.id==='mybank') ? 0.2 : 0.3;
}
function playFlight(cardObj, srcRect, zoneEl, rot){
  const to = rectOf(zoneEl);
  if(!srcRect || !to) return;
  flyCard(staticCardHTML(cardObj), srcRect, to, { scale: flightScaleFor(zoneEl), rot: rot||4, onEnd:()=>sfx('drop') });
}

/* one router: zone taps while a card is raised; also swallows post-drag ghost clicks */
document.addEventListener('click', e=>{
  if(SUPPRESSTAP){
    if(e.target && e.target.closest && e.target.closest('#inspect')) closeInspect();
    e.stopPropagation(); e.preventDefault(); return;
  }
  if(!SELECTED) return;
  const t = e.target;
  if(t.closest && t.closest(`#hand .cardw[data-cid="${SELECTED.id}"]`)) return; // its own onclick lowers it
  const zone = DRAG.zones.find(z=> z.el===t || (z.el.contains && z.el.contains(t)));
  if(zone){
    e.stopPropagation(); e.preventDefault();
    const played = SELECTED;
    const srcW = document.querySelector(`#hand .cardw[data-cid="${played.id}"]`);
    const srcRect = rectOf(srcW);
    clearSelection();
    if(zone.el.classList){ zone.el.classList.add('snapped'); setTimeout(()=>zone.el.classList&&zone.el.classList.remove('snapped'),300); }
    haptic(12);
    playFlight(played, srcRect, zone.el, 4);
    zone.act();
    return;
  }
  if(t.closest && (t.closest('#hand .cardw') || t.closest('#promptbar'))) return; // switching cards / using bar
  e.stopPropagation();
  clearSelection(); sfx('tick'); // tap anywhere else: card returns to hand
}, true);

/* ================= DRAG ENGINE ================= */
const DRAG = { pend:null, active:false, card:null, clone:null, srcW:null, px0:0, py0:0, zones:[], over:null };
let SUPPRESSTAP = false;
document.getElementById('hand').addEventListener('pointerdown', e=>{
  const payBlock = (MODE.type==='pay' && !!MODE.jsn) || MODE.type==='react';   // reacting happens off-turn; the block must too
  if((!isMyTurn() && !G.over && !payBlock) || document.querySelector('#overlay.show')) return;
  if(typeof netBusy==='function' && netBusy() && !payBlock) return;
  if(MODE.type && MODE.type!=='discard' && !payBlock) return;
  const w = e.target.closest ? e.target.closest('.cardw') : null;
  if(!w) return;
  const c = findInHand(me(), +w.dataset.cid);
  if(!c) return;
  DRAG.pend = { w, c, x:e.clientX, y:e.clientY, id:e.pointerId, raised: !!(SELECTED && SELECTED.id===c.id) };
  if(w.classList) w.classList.add('pressed');   // squish fires on every touch, instantly
  haptic(4);
  clearTimeout(HOLDT);
  HOLDT = setTimeout(()=>{
    if(DRAG.pend && !DRAG.active){ const cc = DRAG.pend.c; DRAG.pend = null; unpress(); openInspect(cc); }
  }, 430);
});
let HOLDT = null;
function openInspect(c){
  haptic(10); sfx('pick');
  const el = $('#inspect');
  el.innerHTML = `<div class="inspectcard">${staticCardHTML(c)}</div>`;
  if(el.classList) el.classList.add('show');
  SUPPRESSTAP = true;
}
function closeInspect(){
  const el = $('#inspect');
  if(el && el.classList) el.classList.remove('show');
  setTimeout(()=>{ SUPPRESSTAP = false; }, 60);
}
function unpress(){ document.querySelectorAll('#hand .cardw.pressed').forEach(w=>w.classList.remove('pressed')); }
document.addEventListener('pointermove', e=>{
  if(DRAG.pend && !DRAG.active){
    const dx = e.clientX-DRAG.pend.x, dy = e.clientY-DRAG.pend.y;
    const dist = Math.hypot(dx,dy);
    if(dist > 8) clearTimeout(HOLDT);
    if(G.over){ if(dist > 8){ unpress(); DRAG.pend = null; } return; } // post-game: hold-inspect only
    const armedBlock = ((MODE.type==='pay' && !!MODE.jsn) || MODE.type==='react') && DRAG.pend.c && DRAG.pend.c.t==='action' && DRAG.pend.c.kind==='nodeal';
    if(MODE.type && !armedBlock){ if(dist > 10){ unpress(); DRAG.pend = null; } return; } // modes: taps only — except the armed No Deal
    // raised card: already committed to it — any direction picks it up
    if(DRAG.pend.raised && dist > 6){ startDrag(e); return; }
    // any upward pull commits to a drag, even diagonal ones
    if(dy < -8 || (dist > 12 && Math.abs(dy) > Math.abs(dx))){ startDrag(e); return; }
    if(dx > 16 || dx < -16 || dy > 20){ unpress(); DRAG.pend = null; } // scrolling
    return;
  }
  if(!DRAG.active) return;
  if(!DRAG.clone || !DRAG.clone.style){ cancelDrag(true); return; }
  e.preventDefault();
  const dx = e.clientX-DRAG.px0, dy = e.clientY-DRAG.py0;
  const step = e.clientX - (DRAG.lx!=null ? DRAG.lx : e.clientX);
  DRAG.lx = e.clientX;
  DRAG.dx = dx; DRAG.dy = dy;
  DRAG.tilt = Math.max(-10, Math.min(10, (DRAG.tilt||0)*0.82 + step*0.7));
  DRAG.clone.style.transform = `translate3d(${dx}px,${dy}px,0) rotate(${DRAG.tilt.toFixed(1)}deg)`;
  hitTest(e.clientX, e.clientY, DRAG.cx0+dx, DRAG.cy0+dy);
}, {passive:false});
function doDrop(zone){
  if(!zone || !zone.el || typeof zone.act !== 'function'){ springBack(); return; }
  const played = DRAG.card;
  const srcRect = rectOf(DRAG.clone);
  const tilt = DRAG.tilt||4;
  if(zone.el.classList){
    zone.el.classList.add('snapped');
    setTimeout(()=>{ if(zone.el.classList) zone.el.classList.remove('snapped'); }, 300);
  }
  haptic(14);
  finishDrag(true);
  playFlight(played, srcRect, zone.el, tilt);
  zone.act();
}
document.addEventListener('pointerup', e=>{
  clearTimeout(HOLDT);
  unpress();
  if(DRAG.pend && !DRAG.active){
    const pend = DRAG.pend; DRAG.pend = null;
    const dist = Math.hypot(e.clientX-pend.x, e.clientY-pend.y);
    if(dist < 8 && !G.over){
      toggleSelect(pend.c.id);           // instant response on finger lift
      SUPPRESSTAP = true;                 // swallow the trailing click
      setTimeout(()=>{ SUPPRESSTAP=false; }, 400);
    }
    return;
  }
  if(!DRAG.active) return;
  SUPPRESSTAP = true;
  setTimeout(()=>{ SUPPRESSTAP=false; }, 350);
  let zone = DRAG.over;
  if(!zone){
    // magnetic drop: near-misses within 48px of the card centre still count
    const cx = DRAG.cx0 + (DRAG.dx||0), cy = DRAG.cy0 + (DRAG.dy||0);
    zone = nearestZone(cx, cy, 48);
  }
  if(zone) doDrop(zone);
  else springBack();
});
document.addEventListener('touchmove', e=>{ if(DRAG.active) e.preventDefault(); }, {passive:false});
document.addEventListener('pointercancel', ()=>{
  clearTimeout(HOLDT);
  unpress();
  if(DRAG.active){
    if(DRAG.over) doDrop(DRAG.over);   // browser cancelled while over a valid zone: honour the drop
    else springBack();
  } else DRAG.pend=null;
});

function startDrag(e){
  const { w, c } = DRAG.pend;
  unpress();
  clearSelection();
  const CW = 102, CH = 150;
  const inner = w.querySelector ? w.querySelector('.card') : null;
  const r = (inner && inner.getBoundingClientRect) ? inner.getBoundingClientRect() : w.getBoundingClientRect();
  const clone = document.createElement('div');
  clone.className = 'dragclone';
  if(inner && inner.cloneNode){
    const cardClone = inner.cloneNode(true);
    clone.appendChild(cardClone);
  }
  // fixed uniform size, centred on the card regardless of fan rotation
  clone.style.left = (r.left + r.width/2 - CW/2)+'px';
  clone.style.top = (r.top + r.height/2 - CH/2)+'px';
  clone.style.transform = 'translate3d(0,0,0)';
  document.body.appendChild(clone);
  w.classList.add('hidden-src');
  try{ if(e.target && e.target.setPointerCapture) e.target.setPointerCapture(e.pointerId); }catch(err){}
  DRAG.active = true; DRAG.card = c; DRAG.clone = clone; DRAG.srcW = w;
  DRAG.px0 = e.clientX; DRAG.py0 = e.clientY; DRAG.over = null;
  DRAG.lx = e.clientX; DRAG.tilt = 0;
  DRAG.dx = 0; DRAG.dy = 0;
  DRAG.cx0 = (r.left + r.width/2); DRAG.cy0 = (r.top + r.height/2);
  DRAG.pend = null;
  haptic(8); sfx('pick');
  requestAnimationFrame(()=>{ if(clone.classList) clone.classList.add('lifted'); });
  buildZones(c);
  showPromptOptions(false);
}
function inflate(r, pad){ return { left:r.left-pad, right:r.right+pad, top:r.top-pad, bottom:r.bottom+pad }; }
function nearestZone(cx, cy, maxDist){
  let best=null, bestD=maxDist;
  for(const z of DRAG.zones){
    const r=z.rect;
    const px=Math.max(r.left,Math.min(cx,r.right)), py=Math.max(r.top,Math.min(cy,r.bottom));
    const d=Math.hypot(cx-px, cy-py);
    if(d<bestD){ bestD=d; best=z; }
  }
  return best;
}
function buildZones(c){
  DRAG.zones = [];
  if(MODE.type==='pay' || MODE.type==='react'){
    const react = MODE.type==='react';
    if((MODE.jsn || react) && c.t==='action' && c.kind==='nodeal'){
      [$('#myprops'), $('#playpile')].forEach(el=>{
        if(el && el.classList){
          el.classList.add('droppable');
          DRAG.zones.push({ el, act: react ? ()=>reactWithNoDeal(c) : ()=>blockWithNoDeal(c), hint:'', rect: inflate(el.getBoundingClientRect(), 26) });
        }
      });
      showPrompt(react ? 'Drop it on your table — cancel it' : 'Drop it on your table — cancel the demand', false);
    } else if(!react){
      showPrompt('Pay up — or drag a No Deal! onto the pile', false);
    }
    return;
  }
  const free = G.playsLeft > 0;
  const add = (el, act, hint) => { if(!el) return; el.classList.add('droppable'); DRAG.zones.push({ el, act, hint, rect: inflate(el.getBoundingClientRect(), 22) }); };
  const group = col => document.querySelector(`#myprops .setgroup[data-color="${col}"]`);
  const oppEls = [...document.querySelectorAll('#opponents .opp')];
  const seatOfEl = el => +el.getAttribute('data-idx');
  let hint = '';
  if(!free && c.t!=='wild' && c.t!=='wildall'){ showPrompt('No plays left — end your turn', false); return; }
  if(c.t==='money'){ add($('#mybank'), ()=>{ sfx('coin'); bankCard(c); }); hint='Tap your bank — bank $'+c.v+'M'; }
  if(c.t==='prop'){
    const g = group(c.color);
    add(g || $('#myprops'), ()=>playProp(c, c.color));
    if(g) add($('#myprops'), ()=>playProp(c, c.color));
    hint='Tap your table to place it';
  }
  if(c.t==='wild' || c.t==='wildall'){
    if(free){
      const cols = c.t==='wild' ? c.colors : Object.keys(COLORS);
      cols.forEach(col=>{
        const g = group(col);
        if(g) add(g, ()=>playProp(c, col));
        else {
          const ghost = document.createElement('div');
          ghost.className='setghost';
          ghost.innerHTML = `<span class="setdot" style="background:${COLORS[col].hex}"></span> ${COLORS[col].label}`;
          $('#myprops').appendChild(ghost);
          add(ghost, ()=>playProp(c, col));
        }
      });
    }
    hint = free ? 'Tap a set to place the wild' : 'No plays left';
  }
  if(c.t==='action'){
    const k=c.kind;
    if(k!=='nodeal') add($('#mybank'), ()=>{ sfx('coin'); bankCard(c); });
    // property area becomes the action play zone for non-building actions
    const canPlayHere =
      (k==='payday' || k==='shout' || k==='favour') ||
      (k==='swipe' && othersOf(MYSEAT).some(t=>stealTargetsOf(t).length)) ||
      (k==='takeover' && othersOf(MYSEAT).some(t=>completeColors(G.players[t]).length)) ||
      (k==='swap' && propList(me()).some(x=>!isComplete(me(),x.color)) && othersOf(MYSEAT).some(t=>stealTargetsOf(t).length));
    if(free && canPlayHere && k!=='granny' && k!=='resort' && k!=='hike' && k!=='nodeal'){
      const props = $('#myprops');
      if(props && props.appendChild){
        const az = document.createElement('div');
        az.className = 'actionzone';
        const subs = { payday:'Draw 2 cards', shout:'Everyone pays you $2M', favour:'Then tap who pays $5M', swipe:'Then tap whose table to raid', takeover:'Then tap whose set to take', swap:'Then tap who to trade with' };
        az.innerHTML = `<span class="azname">${ACTIONS[k].n}</span><span class="azsub">${subs[k]||''}</span>`;
        if(props.classList) props.classList.add('actionmode');
        props.appendChild(az);
        add(az, ()=>playActionVia(c,k));
      }
    }
    if(k==='payday') add($('#deckcount'), ()=>playPayday(c));
    if(k==='shout') add($('#opponents'), ()=>doShout(c));
    if(k==='favour') oppEls.forEach(el=>add(el, ()=>doFavour(c, seatOfEl(el))));
    if(k==='swipe') oppEls.forEach(el=>{ const si=seatOfEl(el); if(stealTargetsOf(si).length) add(el, ()=>viewOppSelect(si,'swipe',c)); });
    if(k==='takeover') oppEls.forEach(el=>{ const si=seatOfEl(el); if(completeColors(G.players[si]).length) add(el, ()=>viewOppSelect(si,'takeover',c)); });
    if(k==='swap'){ if(propList(me()).some(x=>!isComplete(me(),x.color))) oppEls.forEach(el=>{ const si=seatOfEl(el); if(stealTargetsOf(si).length) add(el, ()=>viewOppSelect(si,'swapTheirs',c)); }); }
    if(k==='granny') completeColors(me()).filter(col=>buildable(col) && !(me().bldg[col]&&me().bldg[col].granny)).forEach(col=>add(group(col), ()=>placeBldg(c,col,'granny')));
    if(k==='resort') completeColors(me()).filter(col=>me().bldg[col]&&me().bldg[col].granny&&!me().bldg[col].resort).forEach(col=>add(group(col), ()=>placeBldg(c,col,'resort')));
    if(k==='nodeal') hint = 'No Deal! plays itself when you are attacked';
    else if(k==='hike') hint = 'Bank it — or play a Rent card and add the hike';
    else if(k==='favour') hint = 'Tap a player — they pay you $5M';
    else if(k==='swipe') hint = 'Tap a player to raid their table';
    else if(k==='takeover') hint = 'Tap a player with a complete set';
    else if(k==='swap') hint = 'Tap a player to trade properties';
    else if(k==='payday') hint = 'Tap the deck — draw 2';
    else if(k==='shout') hint = 'Tap the players — everyone pays $2M';
    else hint = 'Tap one of your complete sets';
  }
  if(c.t==='rent'){
    add($('#mybank'), ()=>{ sfx('coin'); bankCard(c); });
    c.colors.forEach(col=>{ if(rentFor(me(),col)>0) add(group(col), ()=>doRent(c,col,null)); });
    hint = 'Tap your matching set — everyone pays';
  }
  if(c.t==='rentall'){
    add($('#mybank'), ()=>{ sfx('coin'); bankCard(c); });
    Object.keys(me().props).forEach(col=>{ if(rentFor(me(),col)>0) add(group(col), ()=>{
      startOppSelect('Tap the player who pays $'+rentFor(me(),col)+'M '+COLORS[col].label+' rent', i=>true, t=>doRent(c,col,t));
    }); });
    hint = 'Tap a set, then choose who pays';
  }
  showPrompt(hint || 'Tap a highlighted zone', false);
}
function hitTest(x,y,cx,cy){
  let found = null;
  for(const z of DRAG.zones){
    const r=z.rect;
    if((x>=r.left && x<=r.right && y>=r.top && y<=r.bottom) ||
       (cx!=null && cx>=r.left && cx<=r.right && cy>=r.top && cy<=r.bottom)){ found=z; break; }
  }
  if(found !== DRAG.over){
    if(DRAG.over && DRAG.over.el.classList) DRAG.over.el.classList.remove('dropok');
    DRAG.over = found;
    if(found){ found.el.classList.add('dropok'); haptic(6); sfx('pick'); }
  }
}
function springBack(){
  sfx('back');
  const clone = DRAG.clone;
  clone.classList.add('springback');
  clone.style.transform = 'translate3d(0,0,0)';
  const srcW = DRAG.srcW;
  setTimeout(()=>{
    if(clone.remove) clone.remove();
    if(srcW && srcW.classList) srcW.classList.remove('hidden-src');
  }, 200);
  finishDrag(false);
}
function finishDrag(played){
  DRAG.zones.forEach(z=>{
    if(z.el.classList){ z.el.classList.remove('droppable','dropok'); }
    if(z.el.className==='setghost'||(z.el.classList&&z.el.classList.contains&&z.el.classList.contains('setghost'))){ if(z.el.remove) z.el.remove(); }
  });
  document.querySelectorAll('.setghost').forEach(g=>g.remove());
  document.querySelectorAll('.actionzone').forEach(g=>g.remove());
  { const mp=$('#myprops'); if(mp && mp.classList) mp.classList.remove('actionmode'); }
  if(played && DRAG.clone && DRAG.clone.remove) DRAG.clone.remove();
  DRAG.active=false; DRAG.card=null; DRAG.clone=null; DRAG.srcW=null; DRAG.zones=[]; DRAG.over=null; DRAG.pend=null;
  if(!SELECT.active) hidePrompt();
}
function cancelDrag(silent){
  if(DRAG.active){
    if(DRAG.clone && DRAG.clone.remove) DRAG.clone.remove();
    if(DRAG.srcW && DRAG.srcW.classList) DRAG.srcW.classList.remove('hidden-src');
    finishDrag(true);
  }
  DRAG.pend=null;
}
function playActionVia(c,k){
  if(k==='payday') return playPayday(c);
  if(k==='shout') return doShout(c);
  if(k==='favour') return startOppSelect('Tap the player who pays you $5M', i=>true, t=>doFavour(c,t));
  if(k==='swipe') return startOppSelect('Tap a player to raid', i=>stealTargetsOf(i).length>0, t=>viewOppSelect(t,'swipe',c));
  if(k==='takeover') return startOppSelect('Tap a player with a complete set', i=>completeColors(G.players[i]).length>0, t=>viewOppSelect(t,'takeover',c));
  if(k==='swap') return startOppSelect('Tap a player to trade with', i=>stealTargetsOf(i).length>0, t=>viewOppSelect(t,'swapTheirs',c));
}
function playPayday(c,by){
  if(NET.intercept('payday',{id:c.id})) return;
  const b=(by==null?MYSEAT:by), p=G.players[b];
  removeHandOf(p,c); G.discard.push(c);
  tableDrop(c, nameOf(b));
  NET.evt(b,c);
  const a=draw(),d=draw();
  if(a){p.hand.push(a); if(b===MYSEAT) NEWIDS.add(a.id);} if(d){p.hand.push(d); if(b===MYSEAT) NEWIDS.add(d.id);}
  sfx('coin'); haptic(10); log(nameOf(b)+' played Payday.');
  usePlay(); closeSheet();
}

/* ----- turn flow ----- */
function startTurn(){
  if(G.over) return;
  const p = cur();
  const n = p.hand.length===0 ? 5 : 2;
  for(let i=0;i<n;i++){ const c=draw(); if(c){ p.hand.push(c); if(!p.isAI) NEWIDS.add(c.id); } }
  G.playsLeft = 3;
  log(p.name + (n===5?' drew 5 (empty hand).':' drew 2 cards.'));
  banner(G.turn===MYSEAT ? 'YOUR TURN' : p.name.toUpperCase()+"'S TURN", G.turn===MYSEAT ? 'var(--gold-money)' : null);
  if(!p.isAI){ sfx('tick'); haptic(8); }
  renderAll();
  if(p.isAI){ setTimeout(()=>aiStep(p), Math.max(aiDelay(), visWait()+150)); return; }
  if(NET.mode==='host' && G.turn!==MYSEAT){ NET.pushState(); }
}
function usePlay(){
  G.playsLeft--;
  if(checkAllWin()) return true;
  renderAll();
  return false;
}
function checkAllWin(){
  for(const p of G.players){
    if(checkWin(p)){
      G.over = true; renderAll();
      if(NET.mode!=='off'){ try{ localStorage.removeItem('it_room'); localStorage.removeItem('it_host'); }catch(e){} }
      if(NET.mode==='host' && typeof ID!=='undefined') ID.recordMatch(G.players.indexOf(p));
      $('#wintitle').textContent = p===me() ? 'You win' : p.name+' wins';
      $('#winsub').textContent = 'Three complete sets: ' + completeColors(p).map(c=>COLORS[c].label).join(', ');
      fillWinRows(); NET.teardown();
      setTimeout(()=>{
        const wc = document.querySelector('.wincard');
        if(wc && wc.style){ wc.style.animation='none'; void (wc.offsetWidth||0); wc.style.animation=''; }
        refreshWinBtn();
        $('#winscreen').classList.add('show');
        sfx(p===me()?'win':'alert');
        haptic(p===me()?[12,60,12,60,24]:20);
        if(p===me()) confetti();
      }, 700);
      return true;
    }
  }
  return false;
}
function fillWinRows(){
  const el = $('#winrows'); if(!el || el.innerHTML===undefined) return;
  const alive = alivePlayers();
  const rows = G.players.map((p,i)=>{
    const won = checkWin(p) || (G.over && alive.length===1 && alive[0]===i);
    const sets = completeColors(p);
    const badge = won ? '<span class="wbadge gold">WINNER</span>'
                : p.out ? '<span class="wbadge red">OUT</span>' : '';
    const dots = sets.map(c=>`<span class="wdot" style="background:${COLORS[c].hex}"></span>`).join('');
    return { won, html: `<div class="wrow ${p.out?'wout':''}">
      <span class="wname">${i===MYSEAT?'You':p.name}</span>
      <span class="wsets">${dots}</span>
      <span class="wworth">$${bankTotal(p)}M</span>
      ${badge}
    </div>` };
  });
  rows.sort((a,b)=>(b.won?1:0)-(a.won?1:0));
  el.innerHTML = rows.map(r=>r.html).join('');
}
function playAgain(){
  if(NET.mode==='host'){ NET.rematch(); return; }
  if(NET.mode==='client'){ return; }   // host drives rematches
  location.reload();
}
function refreshWinBtn(){
  const b = $('#winagain'); if(!b) return;
  if(NET.mode==='client'){ b.textContent = 'Waiting for the host…'; b.disabled = true; }
  else if(NET.mode==='host'){ b.textContent = 'Rematch'; b.disabled = false; }
  else { b.textContent = 'Play Again'; b.disabled = false; }
}

$('#endturn').onclick = ()=>{ if(isMyTurn() && !DRAG.active){ haptic(6); sfx('tick'); endTurn(); } };
function endTurn(){
  if(typeof netBusy==='function' && netBusy()){ showPrompt('Waiting for a payment to resolve…', false); return; }
  if(NET.intercept('endturn',{})) return;
  endOppSelect();
  const p = cur();
  if(p.hand.length>7){
    if(!p.isAI && G.turn!==MYSEAT && NET.mode==='host'){
      NET.ask(G.turn, {type:'discard', need:p.hand.length-7}, m=>{
        ((m&&m.ids)||[]).forEach(id=>{ const i=p.hand.findIndex(c=>c.id===id); if(i>-1) G.discard.push(p.hand.splice(i,1)[0]); });
        while(p.hand.length>7){ p.hand.sort((a,b)=>keepScore(a,p)-keepScore(b,p)); G.discard.push(p.hand.shift()); }
        finishEnd();
      });
      return;
    }
    if(!p.isAI){ try{ if(typeof closePOVForce==='function' && POVIDX!=null) closePOVForce(); }catch(e){} }
    if(p.isAI){
      while(p.hand.length>7){
        p.hand.sort((a,b)=>keepScore(a,p)-keepScore(b,p));
        G.discard.push(p.hand.shift());
      }
      finishEnd();
    } else discardPrompt();
  } else finishEnd();
}
function finishEnd(skipInc){
  if(!skipInc && RULES.clock.mode==='on' && RULES.clock.incrementMs>0 && CLK.bank[G.turn]!=null && !G.players[G.turn].out){
    CLK.bank[G.turn] += RULES.clock.incrementMs;   // Fischer increment on the turn owner
  }
  let guard = 0;
  do{
    G.turn = (G.turn+1)%G.players.length;
    if(G.turn===0) G.turnCount++;
  } while(G.players[G.turn] && G.players[G.turn].out && ++guard < 8);
  CLK.turnLeft = RULES.clock.turnMs || 0;
  CLK.active = null;
  renderAll();
  setTimeout(startTurn, 600);
}
function discardPrompt(){
  MODE.type='discard'; MODE.need = me().hand.length - 7; MODE.sel = new Set();
  sfx('alert'); haptic(8);
  renderAll(); updateDiscardHUD();
}

function openOptions(c){

  if(c.t==='prop') play('Play property','into your '+COLORS[c.color].label+' set',()=>playProp(c,c.color));
  if(c.t==='wild'){
    c.colors.forEach(col=>opts.push({label:'Play as '+COLORS[col].label,hint:'',fn:()=>playProp(c,col),disabled:noPlays}));
  }
  if(c.t==='wildall'){
    const occ = Object.keys(COLORS).filter(col=>(me().props[col]||[]).length);
    if(occ.length) play('Play as any colour','joins an existing set',()=>pickColor(occ,col=>playProp(c,col)));
    else opts.push({label:'Rainbow Wild', hint:"can't start a set — play a property first", fn:null, disabled:true});
  }
  if(c.t==='action'){
    const k=c.kind;
    if(k==='payday') play('Play — draw 2','',()=>playPayday(c));
    if(k==='favour') play('Play — one player pays you $5M','',()=>pickTarget(t=>doFavour(c,t)));
    if(k==='shout') play('Play — everyone pays you $2M','',()=>doShout(c));
    if(k==='swipe') play('Play — steal a property','pick it on their board',()=>playActionVia(c,'swipe'));
    if(k==='swap') play('Play — swap properties','pick on the boards',()=>playActionVia(c,'swap'), !(propList(me()).some(x=>!isComplete(me(),x.color))));
    if(k==='takeover'){
      const targets = G.players.filter((p,i)=>i>0 && completeColors(p).length>0);
      play('Play — steal a complete set','pick it on their board',()=>playActionVia(c,'takeover'), targets.length===0);
    }
    if(k==='granny'){
      const sets = completeColors(me()).filter(col=>buildable(col) && !(me().bldg[col]&&me().bldg[col].granny));
      play('Play on a complete set','+$3M rent',()=>pickColor(sets,col=>placeBldg(c,col,'granny')), sets.length===0);
    }
    if(k==='resort'){
      const sets = completeColors(me()).filter(col=>me().bldg[col]&&me().bldg[col].granny&&!me().bldg[col].resort);
      play('Play on a Granny Flat set','+$4M rent',()=>pickColor(sets,col=>placeBldg(c,col,'resort')), sets.length===0);
    }
    if(k==='hike') opts.push({label:'Rent Hike',hint:'plays together with a Rent card',fn:null,disabled:true});
    if(k==='nodeal') opts.push({label:'No Deal! is reactive',hint:"it's offered when you're attacked",fn:null,disabled:true});
    if(k!=='nodeal') opts.push({label:'Bank it',hint:'$'+c.v+'M',fn:()=>{sfx('coin');bankCard(c);},disabled:noPlays});
  }
  if(c.t==='rent'){
    c.colors.forEach(col=>{
      const r = rentFor(me(),col);
      play('Charge '+COLORS[col].label+' rent — $'+r+'M','all players pay',()=>doRent(c,col,null), r===0);
    });
    play('Bank it','$'+c.v+'M',()=>{sfx('coin');bankCard(c);});
  }
  if(c.t==='rentall'){
    const owned = Object.keys(me().props).filter(col=>rentFor(me(),col)>0);
    play('Charge any colour — one player','',()=>pickColor(owned,col=>pickTarget(t=>doRent(c,col,t))), owned.length===0);
    play('Bank it','$'+c.v+'M',()=>{sfx('coin');bankCard(c);});
  }
  openSheet(`<h3>${cardName(c)}</h3><div class="sub">${G.playsLeft} play${G.playsLeft===1?'':'s'} left this turn</div>
    <div class="optlist">${opts.map((o,i)=>`<button class="optbtn" ${o.disabled?'disabled':''} onclick="runOpt(${i})">${o.label}<span class="hint">${o.hint||''}</span></button>`).join('')}
    <button class="optbtn" onclick="closeSheet()">Cancel</button></div>`);
  window._opts = opts;
}
function runOpt(i){ const o=window._opts[i]; if(o&&o.fn){ o.fn(); } }
function removeHand(c){ const p=me(); const i=p.hand.findIndex(x=>x.id===c.id); if(i>-1)p.hand.splice(i,1); }
function bankCard(c, by){
  if(NET.intercept('bank',{id:c.id})) return;
  const b=(by==null?MYSEAT:by); removeHandOf(G.players[b], c); G.players[b].bank.push(c); log(nameOf(b)+' banked $'+c.v+'M.'); announcePlay(b,c); usePlay(); if(b===MYSEAT) zonePop('#mybank'); closeSheet(); }
function removeHandOf(p,c){ const i=p.hand.findIndex(x=>x.id===c.id); if(i>-1) p.hand.splice(i,1); }
function playProp(c,color,by){
  if(NET.intercept('prop',{id:c.id,color})) return;
  const b=(by==null?MYSEAT:by), p=G.players[b];
  if(c.t==='wildall' && !((p.props[color]||[]).length)){
    if(b===MYSEAT) banner("RAINBOWS CAN'T START A SET",'var(--warning-amber)');
    return;
  }
  removeHandOf(p,c); addProp(p,c,color);
  log(nameOf(b)+' played '+cardName(c)+' ('+COLORS[color].label+').');
  announcePlay(b,c);
  usePlay(); sfx('tick'); if(b===MYSEAT) zonePop('#myprops'); closeSheet();
}
function placeBldg(c,color,slot,by){
  if(NET.intercept('bldg',{id:c.id,color,slot})) return;
  const b=(by==null?MYSEAT:by), p=G.players[b];
  removeHandOf(p,c);
  if(!p.bldg[color]) p.bldg[color]={};
  p.bldg[color][slot]=c;
  log(nameOf(b)+' added a '+ACTIONS[c.kind].n+' to '+COLORS[color].label+'.');
  announcePlay(b,c);
  usePlay(); sfx('good'); closeSheet();
}
function buildable(color){ return color!=='black' && color!=='green'; }   // no houses on Stations or Utilities
function canMoveWildFrom(p,color){
  const b = p.bldg[color];
  return !(b && (b.granny || b.resort));
}
function wildTargets(p, c, fromColor){
  const pool = c.t==='wild' ? c.colors : Object.keys(COLORS);
  return pool.filter(col=>{
    if(col===fromColor) return false;
    if(c.t==='wildall' && !((p.props[col]||[]).length)) return false;   // rainbows never sit alone
    return true;
  });
}
function moveWildTo(id, toColor, by){
  if(NET.intercept('rewild',{id,to:toColor})) return;
  const b=(by==null?MYSEAT:by), p=G.players[b];
  const entry = propList(p).find(x=>x.card.id===id);
  if(!entry || entry.card.t==='prop') return;
  const c = entry.card;
  if(!canMoveWildFrom(p, entry.color)){
    if(b===MYSEAT) banner('BUILDINGS LOCK WILDS','var(--warning-amber)');
    return;
  }
  if(c.t==='wild' && !c.colors.includes(toColor)) return;
  if(c.t==='wildall' && toColor!==entry.color && !((p.props[toColor]||[]).length)){
    if(b===MYSEAT) banner("RAINBOWS CAN'T SIT ALONE",'var(--warning-amber)');
    return;
  }
  removeProp(p,c); addProp(p,c,toColor);   // push: rejoining lands at the bottom
  const left = p.props[entry.color]||[];
  if(left.length && left.every(x=>x.t==='wildall')){
    left.slice().forEach(r=>{ removeProp(p,r); addProp(p,r,toColor); });   // rainbows can't sit alone: they follow
    log(nameOf(b)+"'s rainbow wild went along for the ride.");
  }
  loseBuildingsIfBroken(p, entry.color);
  log(nameOf(b)+' moved a wild to '+COLORS[toColor].label+'.');
  sfx('tick'); checkAllWin(); renderAll();
}
let WDRAG = null;
function wildDragDown(ev, id, fromColor){
  if(!isMyTurn() || netBusy() || MODE.type || SELECT.active || POVIDX!=null) return;
  if(!canMoveWildFrom(me(), fromColor)) return;   // locked sets don't even start a drag
  ev.stopPropagation();
  WDRAG = { id, fromColor, sx:ev.clientX, sy:ev.clientY, live:false, el:null, targets:[] };
  window.addEventListener('pointermove', wildDragMove);
  window.addEventListener('pointerup', wildDragUp, { once:true });
}
function wildDragMove(ev){
  if(!WDRAG) return;
  const dx = ev.clientX-WDRAG.sx, dy = ev.clientY-WDRAG.sy;
  if(!WDRAG.live){
    if(Math.hypot(dx,dy) < 10) return;
    WDRAG.live = true;
    // visual pop: the card leaves its set the moment the drag is real
    const src = document.querySelector(`.tcard[data-cid="${WDRAG.id}"]`);
    if(src && src.style) src.style.visibility = 'hidden';
    const entry = propList(me()).find(x=>x.card.id===WDRAG.id);
    const valid = entry ? wildTargets(me(), entry.card, null).filter(c=>c!==null) : [];
    WDRAG.valid = new Set(valid);
    document.querySelectorAll('#myprops .setgroup').forEach(g=>{
      const col = g.getAttribute && g.getAttribute('data-color');
      if(col && WDRAG.valid.has(col) && g.classList) g.classList.add('dropready');
    });
    const fly = document.createElement('div');
    fly.className = 'wildfly';
    fly.innerHTML = entry ? staticCardHTML(entry.card, null) : '';
    document.body.appendChild(fly);
    WDRAG.el = fly;
    sfx('tick'); haptic(6);
  }
  if(WDRAG.el && WDRAG.el.style){
    WDRAG.el.style.left = (ev.clientX-34)+'px';
    WDRAG.el.style.top = (ev.clientY-52)+'px';
  }
}
function wildDragUp(ev){
  window.removeEventListener('pointermove', wildDragMove);
  const d = WDRAG; WDRAG = null;
  if(!d) return;
  if(d.el && d.el.remove) d.el.remove();
  document.querySelectorAll('.dropready').forEach(g=>g.classList.remove('dropready'));
  if(!d.live){ return; }   // it was a tap; viewSet's own handlers take it
  let target = null;
  try{
    const under = document.elementFromPoint(ev.clientX, ev.clientY);
    const grp = under && under.closest && under.closest('#myprops .setgroup');
    if(grp) target = grp.getAttribute('data-color');
  }catch(e){}
  const entry = propList(me()).find(x=>x.card.id===d.id);
  if(target && d.valid && d.valid.has(target)) moveWildTo(d.id, target);
  else if(!target && entry && entry.card.t==='wild'){
    const other = entry.card.colors.find(x=>x!==d.fromColor);
    moveWildTo(d.id, other);   // dragged off the table: the 50/50 flips
  }
  renderAll();   // whatever happened (move, refuse, cancel), nothing stays hidden
}
function reassignWild(id){
  if(!isMyTurn() || netBusy()) return;
  const p=me();
  const entry = propList(p).find(x=>x.card.id===id);
  if(!entry) return;
  if(!canMoveWildFrom(p, entry.color)){ banner('BUILDINGS LOCK WILDS','var(--warning-amber)'); return; }
  const choices = wildTargets(p, entry.card, entry.color);
  if(!choices.length){ banner('NOWHERE TO MOVE IT','var(--warning-amber)'); return; }
  pickColor(choices, col=>{ moveWildTo(id, col); closeSheet(); }, 'Move wild card (free)');
}
