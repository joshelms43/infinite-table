<!DOCTYPE html>
<!-- The Range — Infinite Table. Version: 0.1.0
     Trackpad-first 3D shooter: the cursor is the crosshair, a click is a shot.
     No pointer lock anywhere — pointer lock on a trackpad is misery. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Range — Infinite Table</title>
<meta name="theme-color" content="#121A16">
<link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --table-night:#121A16; --felt-green:#1D2B25;
  --text-ivory:#F2EEE2; --primary-coral:#E26A4B; --primary-coral-deep:#BC4F37;
  --money-gold:#BE8F41; --line-soft:rgba(242,238,226,.13);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--table-night);
  font-family:'Nunito Sans',system-ui,sans-serif;color:var(--text-ivory);user-select:none}
#gl{position:fixed;inset:0;width:100%;height:100%;display:block}
body.playing #gl{cursor:none}

/* ---- HUD ---- */
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;
  padding:calc(16px + env(safe-area-inset-top)) 22px 0;pointer-events:none;z-index:5;
  opacity:0;transition:opacity .25s}
body.playing #hud{opacity:1}
.hudcell{font-family:'Lilita One',cursive;font-size:30px;letter-spacing:.5px;line-height:1;
  text-shadow:0 2px 6px rgba(8,12,10,.6);font-variant-numeric:tabular-nums}
.hudlabel{font-family:'Nunito Sans',sans-serif;font-size:10px;font-weight:800;letter-spacing:2.2px;
  text-transform:uppercase;opacity:.45;margin-bottom:5px}
#score{color:var(--money-gold)}
#clock.low{color:var(--primary-coral)}
#streak{position:fixed;top:calc(18px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  font-family:'Lilita One',cursive;font-size:16px;color:var(--primary-coral);
  opacity:0;transition:opacity .2s;pointer-events:none;z-index:5;text-shadow:0 2px 6px rgba(8,12,10,.6)}
#streak.show{opacity:1}

/* ---- shells ---- */
#shells{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  display:flex;gap:8px;pointer-events:none;z-index:5;opacity:0;transition:opacity .25s}
body.playing #shells{opacity:1}
.shell{width:9px;height:22px;border-radius:4px 4px 3px 3px;
  background:linear-gradient(180deg,#E3C588,var(--money-gold) 55%,#8F6A2C);
  box-shadow:0 1px 3px rgba(8,12,10,.5);transition:opacity .12s, transform .12s}
.shell.spent{opacity:.14;transform:translateY(3px)}
#shells.loading .shell{animation:shellpulse .8s ease}
@keyframes shellpulse{40%{opacity:.14}100%{opacity:1}}

/* ---- crosshair ---- */
#cross{position:fixed;width:34px;height:34px;margin:-17px 0 0 -17px;pointer-events:none;z-index:6;
  display:none}
body.playing #cross{display:block}
#cross::before{content:'';position:absolute;inset:0;border:1.5px solid rgba(242,238,226,.85);
  border-radius:50%;box-shadow:0 0 6px rgba(8,12,10,.6)}
#cross::after{content:'';position:absolute;left:50%;top:50%;width:4px;height:4px;margin:-2px 0 0 -2px;
  border-radius:50%;background:var(--primary-coral)}
#cross.kick{animation:kick .12s ease}
@keyframes kick{35%{transform:scale(.82)}}

/* ---- floating score pops ---- */
.pop{position:fixed;pointer-events:none;z-index:6;font-family:'Lilita One',cursive;
  font-size:21px;color:var(--text-ivory);text-shadow:0 2px 6px rgba(8,12,10,.7);
  animation:popup .8s cubic-bezier(.2,.8,.3,1) forwards}
.pop.gold{color:var(--money-gold);font-size:26px}
.pop.coral{color:var(--primary-coral)}
@keyframes popup{from{opacity:0;transform:translateY(6px) scale(.7)}
  25%{opacity:1;transform:translateY(-4px) scale(1.08)}
  to{opacity:0;transform:translateY(-34px) scale(1)}}

/* ---- sheets (menu / round over) ---- */
.sheetwrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;
  background:radial-gradient(120% 100% at 50% 30%, rgba(18,26,22,.42), rgba(10,15,12,.82));
  opacity:1;transition:opacity .3s;padding:20px}
.sheetwrap.hide{opacity:0;pointer-events:none}
.panel{text-align:center;max-width:340px;width:100%}
.gametitle{font-family:'Lilita One',cursive;font-size:44px;letter-spacing:1px;line-height:1;
  text-shadow:0 4px 14px rgba(8,12,10,.6)}
.gametitle .the{color:var(--money-gold)}
.bigscore{font-family:'Lilita One',cursive;font-size:64px;color:var(--money-gold);line-height:1;
  margin:6px 0 2px;text-shadow:0 4px 14px rgba(8,12,10,.6);font-variant-numeric:tabular-nums}
.overline{font-size:11px;font-weight:800;letter-spacing:2.4px;text-transform:uppercase;opacity:.5}
.bestline{font-size:12.5px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--money-gold);margin-top:10px;opacity:.9}
.btncol{display:flex;flex-direction:column;gap:10px;margin-top:26px}
.bigbtn{font-family:'Lilita One',cursive;font-size:18px;color:#fff;border:none;cursor:pointer;
  background:linear-gradient(180deg,var(--primary-coral),var(--primary-coral-deep));
  border-radius:13px;padding:15px;letter-spacing:.5px;
  box-shadow:0 4px 12px rgba(188,79,55,.4), inset 0 1px 0 rgba(255,255,255,.25);
  transition:transform .12s}
.bigbtn:active{transform:scale(.97)}
.quietbtn{font-family:'Lilita One',cursive;font-size:14px;color:var(--text-ivory);cursor:pointer;
  background:rgba(255,255,255,.07);border:1px solid var(--line-soft);border-radius:12px;padding:12px;
  text-decoration:none;display:block}
@media (prefers-reduced-motion: reduce){
  .pop{animation-duration:.5s}
  #cross.kick{animation:none}
}
</style>
</head>
<body>

<canvas id="gl"></canvas>

<div id="hud">
  <div><div class="hudlabel">Score</div><div class="hudcell" id="score">0</div></div>
  <div style="text-align:right"><div class="hudlabel">Time</div><div class="hudcell" id="clock">60</div></div>
</div>
<div id="streak"></div>
<div id="shells"></div>
<div id="cross"></div>

<div class="sheetwrap" id="menu">
  <div class="panel">
    <div class="gametitle"><span class="the">THE</span> RANGE</div>
    <div class="bestline" id="menubest" style="display:none"></div>
    <div class="btncol">
      <button class="bigbtn" id="startbtn">Start</button>
      <a class="quietbtn" href="../">Home</a>
    </div>
  </div>
</div>

<div class="sheetwrap hide" id="over">
  <div class="panel">
    <div class="overline">Round Over</div>
    <div class="bigscore" id="finalscore">0</div>
    <div class="bestline" id="overbest"></div>
    <div class="btncol">
      <button class="bigbtn" id="againbtn">Play Again</button>
      <a class="quietbtn" href="../">Home</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
<script>
/* ================= The Range — engine ================= */
var ROUND_SECONDS = 60;
var SHELL_COUNT = 6;
var RELOAD_TIME = 0.8;

var COL = {
  night: 0x121A16, felt: 0x1D2B25, ivory: 0xF2EEE2,
  coral: 0xE26A4B, coralDeep: 0xBC4F37, gold: 0xBE8F41,
  timber: 0x4E3A2A, timberDark: 0x37281C, tin: 0x8E8A7C, fog: 0x0C1310
};

/* three rows of posts; farther plates are physically larger so a trackpad
   can still land them */
var ROWS = [
  { z: -5,  y: 1.55, r: 0.52, spread: 3.2, mult: 1, slide: 0 },
  { z: -10, y: 1.75, r: 0.74, spread: 4.8, mult: 2, slide: 0 },
  { z: -16, y: 2.00, r: 1.00, spread: 6.6, mult: 3, slide: 1.1 }
];

var canvas = document.getElementById('gl');
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setClearColor(COL.fog);

var scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(COL.fog, 0.026);

var camera = new THREE.PerspectiveCamera(50, 1, 0.1, 90);
var CAM_BASE = new THREE.Vector3(0, 1.85, 5.4);
var BASE_PITCH = -0.055;
camera.position.copy(CAM_BASE);
camera.rotation.x = BASE_PITCH;

function size() {
  var w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', size);
size();

/* ---- lights ---- */
scene.add(new THREE.HemisphereLight(0x3A4C42, 0x0A0F0C, 0.85));
var moon = new THREE.DirectionalLight(0xBFD2C6, 0.55);
moon.position.set(-6, 12, 4);
scene.add(moon);
var lampGlow = new THREE.PointLight(0xE8C57A, 1.15, 26, 1.6);
lampGlow.position.set(0, 4.6, -2);
scene.add(lampGlow);
var lampGlow2 = new THREE.PointLight(0xE8C57A, 0.7, 30, 1.7);
lampGlow2.position.set(0, 5.2, -13);
scene.add(lampGlow2);

/* ---- ground + lane ---- */
var ground = new THREE.Mesh(
  new THREE.PlaneGeometry(120, 120),
  new THREE.MeshStandardMaterial({ color: COL.felt, roughness: 1 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

/* faint distance stripes so depth reads on a flat lane */
ROWS.forEach(function (row) {
  var stripe = new THREE.Mesh(
    new THREE.PlaneGeometry(row.spread * 2 + 4, 0.14),
    new THREE.MeshBasicMaterial({ color: 0x27392F })
  );
  stripe.rotation.x = -Math.PI / 2;
  stripe.position.set(0, 0.01, row.z + 0.9);
  scene.add(stripe);
});

/* rifle rest in the foreground */
var rest = new THREE.Group();
var restTop = new THREE.Mesh(
  new THREE.BoxGeometry(30, 0.12, 0.55),
  new THREE.MeshStandardMaterial({ color: COL.timberDark, roughness: 0.9 })
);
restTop.position.set(0, 1.06, 3.5);
rest.add(restTop);
var restFace = new THREE.Mesh(
  new THREE.BoxGeometry(30, 1.06, 0.1),
  new THREE.MeshStandardMaterial({ color: 0x241A12, roughness: 0.95 })
);
restFace.position.set(0, 0.53, 3.78);
rest.add(restFace);
scene.add(rest);

/* ---- bulb string: two warm catenaries over the range ---- */
function bulbString(zPos, height, count) {
  var g = new THREE.Group();
  var span = 22;
  var wirePts = [];
  var i;
  for (i = 0; i <= 40; i++) {
    var t = i / 40, x = (t - 0.5) * span;
    var y = height - Math.cos((t - 0.5) * Math.PI) * 0.85;
    wirePts.push(new THREE.Vector3(x, y, zPos));
  }
  g.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(wirePts),
    new THREE.LineBasicMaterial({ color: 0x0A0F0C })
  ));
  var bulbGeo = new THREE.SphereGeometry(0.075, 8, 8);
  var bulbMat = new THREE.MeshBasicMaterial({ color: 0xF3D48A });
  for (i = 1; i < count; i++) {
    var tt = i / count, xx = (tt - 0.5) * span;
    var yy = height - Math.cos((tt - 0.5) * Math.PI) * 0.85 - 0.1;
    var b = new THREE.Mesh(bulbGeo, bulbMat);
    b.position.set(xx, yy, zPos);
    g.add(b);
  }
  return g;
}
scene.add(bulbString(-3, 5.4, 14));
scene.add(bulbString(-13, 6.0, 14));

/* ---- targets ---- */
var plateMats = {
  face: new THREE.MeshStandardMaterial({ color: COL.ivory, roughness: 0.6, side: THREE.DoubleSide }),
  ring: new THREE.MeshStandardMaterial({ color: COL.coral, roughness: 0.6, side: THREE.DoubleSide }),
  bull: new THREE.MeshStandardMaterial({ color: COL.gold, roughness: 0.45, side: THREE.DoubleSide }),
  rim:  new THREE.MeshStandardMaterial({ color: 0x24241D, roughness: 0.7, side: THREE.DoubleSide }),
  back: new THREE.MeshStandardMaterial({ color: COL.tin, roughness: 0.5, side: THREE.DoubleSide }),
  post: new THREE.MeshStandardMaterial({ color: COL.timber, roughness: 0.9 })
};

var targets = [];      /* live target objects */
var hitMeshes = [];    /* the face discs the raycaster tests */

function makeTarget(rowIdx, x) {
  var row = ROWS[rowIdx];
  var r = row.r;
  var root = new THREE.Group();
  root.position.set(x, 0, row.z);

  var post = new THREE.Mesh(new THREE.BoxGeometry(0.13, row.y, 0.13), plateMats.post);
  post.position.y = row.y / 2;
  root.add(post);

  /* hinge sits at the top of the post; the plate folds up out of it */
  var hinge = new THREE.Group();
  hinge.position.y = row.y;
  root.add(hinge);

  var plate = new THREE.Group();
  plate.position.y = r * 0.92;
  hinge.add(plate);

  var rim = new THREE.Mesh(new THREE.CircleGeometry(r, 40), plateMats.rim);
  var face = new THREE.Mesh(new THREE.CircleGeometry(r * 0.94, 40), plateMats.face);
  face.position.z = 0.012;
  var ring = new THREE.Mesh(new THREE.CircleGeometry(r * 0.60, 36), plateMats.ring);
  ring.position.z = 0.024;
  var bull = new THREE.Mesh(new THREE.CircleGeometry(r * 0.24, 28), plateMats.bull);
  bull.position.z = 0.036;
  var back = new THREE.Mesh(new THREE.CircleGeometry(r, 40), plateMats.back);
  back.rotation.y = Math.PI;
  back.position.z = -0.012;
  plate.add(rim); plate.add(face); plate.add(ring); plate.add(bull); plate.add(back);

  var tgt = {
    root: root, hinge: hinge, plate: plate, face: face,
    row: rowIdx, radius: r,
    age: 0, life: 0, state: 'rising',  /* rising | up | falling | sinking */
    fall: 0, dir: Math.random() < 0.5 ? -1 : 1
  };
  face.userData.target = tgt;
  hinge.rotation.x = -Math.PI / 2;   /* starts folded flat behind the post */
  scene.add(root);
  targets.push(tgt);
  hitMeshes.push(face);
  return tgt;
}

function removeTarget(tgt) {
  scene.remove(tgt.root);
  targets.splice(targets.indexOf(tgt), 1);
  hitMeshes.splice(hitMeshes.indexOf(tgt.face), 1);
}

function spawnTarget() {
  /* weight later rows in as the round goes on */
  var t = state.elapsed / ROUND_SECONDS;
  var weights = [1, 0.35 + t * 0.9, 0.12 + t * 0.9];
  var pick = Math.random() * (weights[0] + weights[1] + weights[2]);
  var rowIdx = pick < weights[0] ? 0 : (pick < weights[0] + weights[1] ? 1 : 2);
  var row = ROWS[rowIdx];

  /* find an x that doesn't crowd a live plate in the same row */
  var x = 0, ok = false, tries = 0;
  while (!ok && tries < 14) {
    x = (Math.random() * 2 - 1) * row.spread;
    ok = true;
    for (var i = 0; i < targets.length; i++) {
      if (targets[i].row === rowIdx && Math.abs(targets[i].root.position.x - x) < row.r * 2.6) { ok = false; break; }
    }
    tries++;
  }
  if (!ok) return null;

  var tgt = makeTarget(rowIdx, x);
  tgt.life = 3.4 - t * 1.6;           /* stays up 3.4s early, 1.8s late */
  return tgt;
}

/* ---- state ---- */
var state = {
  phase: 'menu',                       /* menu | playing | over */
  score: 0, streak: 0, best: 0,
  elapsed: 0, spawnTimer: 0,
  shells: SHELL_COUNT, reload: 0
};
try { state.best = parseInt(localStorage.getItem('range_best') || '0', 10) || 0; } catch (e) {}

var $ = function (id) { return document.getElementById(id); };
var scoreEl = $('score'), clockEl = $('clock'), streakEl = $('streak');
var shellsEl = $('shells'), crossEl = $('cross'), menuEl = $('menu'), overEl = $('over');

function buildShells() {
  shellsEl.innerHTML = '';
  for (var i = 0; i < SHELL_COUNT; i++) {
    var s = document.createElement('div');
    s.className = 'shell';
    shellsEl.appendChild(s);
  }
}
buildShells();
function paintShells() {
  var kids = shellsEl.children;
  for (var i = 0; i < kids.length; i++) {
    kids[i].className = 'shell' + (i < state.shells ? '' : ' spent');
  }
}

if (state.best > 0) {
  $('menubest').style.display = 'block';
  $('menubest').textContent = 'Best ' + state.best;
}

/* ---- audio (synthesised, created on first gesture) ---- */
var AC = null;
function audio() {
  if (AC) return AC;
  try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { AC = null; }
  return AC;
}
function sShot() {
  var ac = audio(); if (!ac) return;
  var len = 0.11, buf = ac.createBuffer(1, ac.sampleRate * len, ac.sampleRate);
  var d = buf.getChannelData(0);
  for (var i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2.2);
  var src = ac.createBufferSource(); src.buffer = buf;
  var f = ac.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 1400;
  var g = ac.createGain(); g.gain.value = 0.5;
  src.connect(f); f.connect(g); g.connect(ac.destination); src.start();
  var o = ac.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(150, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(55, ac.currentTime + 0.1);
  var og = ac.createGain();
  og.gain.setValueAtTime(0.35, ac.currentTime);
  og.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.12);
  o.connect(og); og.connect(ac.destination); o.start(); o.stop(ac.currentTime + 0.13);
}
function sDing(ring) {
  var ac = audio(); if (!ac) return;
  var freq = ring === 2 ? 1318 : (ring === 1 ? 880 : 659);
  var o = ac.createOscillator(); o.type = 'triangle'; o.frequency.value = freq;
  var g = ac.createGain();
  g.gain.setValueAtTime(0.28, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.35);
  o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime + 0.36);
}
function sClick() {
  var ac = audio(); if (!ac) return;
  var o = ac.createOscillator(); o.type = 'square'; o.frequency.value = 2200;
  var g = ac.createGain();
  g.gain.setValueAtTime(0.06, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.04);
  o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime + 0.05);
}

/* ---- aim: the cursor is the crosshair ---- */
var mouse = new THREE.Vector2(0, 0);      /* NDC */
var mousePx = { x: -100, y: -100 };
var raycaster = new THREE.Raycaster();
var reducedMotion = false;
try { reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}

window.addEventListener('pointermove', function (ev) {
  mousePx.x = ev.clientX; mousePx.y = ev.clientY;
  mouse.x = (ev.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(ev.clientY / window.innerHeight) * 2 + 1;
  crossEl.style.transform = 'translate(' + ev.clientX + 'px,' + ev.clientY + 'px)';
});

/* ---- effects: tracer, sparks, camera kick ---- */
var effects = [];
var sparkGeo = new THREE.BoxGeometry(0.05, 0.05, 0.05);
var sparkMatGold = new THREE.MeshBasicMaterial({ color: 0xE8C57A });
var sparkMatIvory = new THREE.MeshBasicMaterial({ color: COL.ivory });

function tracer(toPoint) {
  var from = new THREE.Vector3(0.55, 1.05, 3.45);   /* off the rifle rest */
  var geo = new THREE.BufferGeometry().setFromPoints([from, toPoint]);
  var mat = new THREE.LineBasicMaterial({ color: 0xF3D48A, transparent: true, opacity: 0.9 });
  var line = new THREE.Line(geo, mat);
  scene.add(line);
  effects.push({ obj: line, mat: mat, life: 0.09, kind: 'fade' });
}
function sparks(point, hit) {
  for (var i = 0; i < (hit ? 10 : 5); i++) {
    var m = new THREE.Mesh(sparkGeo, hit ? sparkMatGold : sparkMatIvory);
    m.position.copy(point);
    var v = new THREE.Vector3((Math.random() - 0.5) * 4, Math.random() * 3 + 1, (Math.random() - 0.3) * 3);
    effects.push({ obj: m, life: 0.45 + Math.random() * 0.2, kind: 'spark', vel: v });
    scene.add(m);
  }
}
var camKick = 0;

/* ---- score pops ---- */
function popText(px, py, text, cls) {
  var d = document.createElement('div');
  d.className = 'pop' + (cls ? ' ' + cls : '');
  d.textContent = text;
  d.style.left = px + 'px'; d.style.top = py + 'px';
  d.style.transform = 'translate(-50%,-50%)';
  document.body.appendChild(d);
  setTimeout(function () { d.remove(); }, 850);
}

/* ---- firing ---- */
function ringOf(tgt, worldPoint) {
  var local = tgt.face.worldToLocal(worldPoint.clone());
  var d = Math.sqrt(local.x * local.x + local.y * local.y) / tgt.radius;
  return d < 0.24 ? 2 : (d < 0.60 ? 1 : 0);   /* 2 bull, 1 ring, 0 face */
}
var RING_POINTS = [25, 50, 100];

function resolveShot() {
  /* returns a result object; render tool asserts on this too */
  raycaster.setFromCamera(mouse, camera);
  var hits = raycaster.intersectObjects(hitMeshes, false);
  var live = null, i;
  for (i = 0; i < hits.length; i++) {
    var t = hits[i].object.userData.target;
    if (t && (t.state === 'up' || t.state === 'rising')) { live = { tgt: t, point: hits[i].point }; break; }
  }
  if (!live) {
    /* trace to whatever the ray crosses at z=-24 for the visual */
    var far = raycaster.ray.at(26, new THREE.Vector3());
    tracer(far);
    var g = raycaster.intersectObject(ground, false);
    if (g.length) sparks(g[0].point, false);
    return { hit: false };
  }
  var tgt = live.tgt;
  var ring = ringOf(tgt, live.point);
  tracer(live.point);
  sparks(live.point, true);
  tgt.state = 'falling';
  tgt.fall = 0;

  var pts = RING_POINTS[ring] * ROWS[tgt.row].mult;
  state.streak++;
  if (state.streak >= 5) pts *= 2;
  state.score += pts;
  return { hit: true, ring: ring, points: pts, tgt: tgt };
}

function fire() {
  if (state.phase !== 'playing') return;
  if (state.reload > 0) { sClick(); return; }
  if (state.shells <= 0) return;

  state.shells--;
  paintShells();
  sShot();
  camKick = reducedMotion ? 0 : 1;
  crossEl.classList.remove('kick');
  void crossEl.offsetWidth;
  crossEl.classList.add('kick');

  var res = resolveShot();
  if (res.hit) {
    sDing(res.ring);
    var cls = res.ring === 2 ? 'gold' : (res.ring === 1 ? 'coral' : '');
    popText(mousePx.x, mousePx.y - 26, '+' + res.points, cls);
    streakEl.textContent = state.streak >= 5 ? 'Streak ×2' : (state.streak >= 3 ? 'Streak ' + state.streak : '');
    streakEl.classList.toggle('show', state.streak >= 3);
  } else {
    state.streak = 0;
    streakEl.classList.remove('show');
  }
  scoreEl.textContent = state.score;

  if (state.shells === 0) beginReload();
}

function beginReload() {
  if (state.reload > 0) return;
  state.reload = RELOAD_TIME;
  shellsEl.classList.add('loading');
}
window.addEventListener('keydown', function (ev) {
  if (ev.key === 'r' || ev.key === 'R') {
    if (state.phase === 'playing' && state.shells < SHELL_COUNT) beginReload();
  }
});

canvas.addEventListener('pointerdown', function (ev) {
  audio();
  if (state.phase !== 'playing') return;
  mousePx.x = ev.clientX; mousePx.y = ev.clientY;
  mouse.x = (ev.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(ev.clientY / window.innerHeight) * 2 + 1;
  crossEl.style.transform = 'translate(' + ev.clientX + 'px,' + ev.clientY + 'px)';
  fire();
});

/* ---- round control ---- */
function startRound() {
  while (targets.length) removeTarget(targets[0]);
  state.phase = 'playing';
  state.score = 0; state.streak = 0;
  state.elapsed = 0; state.spawnTimer = 0.3;
  state.shells = SHELL_COUNT; state.reload = 0;
  scoreEl.textContent = '0';
  clockEl.textContent = ROUND_SECONDS;
  clockEl.classList.remove('low');
  streakEl.classList.remove('show');
  paintShells();
  menuEl.classList.add('hide');
  overEl.classList.add('hide');
  document.body.classList.add('playing');
}
function endRound() {
  state.phase = 'over';
  document.body.classList.remove('playing');
  if (state.score > state.best) {
    state.best = state.score;
    try { localStorage.setItem('range_best', String(state.best)); } catch (e) {}
  }
  $('finalscore').textContent = state.score;
  $('overbest').textContent = 'Best ' + state.best;
  overEl.classList.remove('hide');
}
$('startbtn').addEventListener('click', function () { audio(); startRound(); });
$('againbtn').addEventListener('click', function () { audio(); startRound(); });

/* ---- main loop ---- */
var clock3 = new THREE.Clock();

function tick() {
  requestAnimationFrame(tick);
  var dt = Math.min(clock3.getDelta(), 0.05);
  var i, tgt;

  if (state.phase === 'playing') {
    state.elapsed += dt;
    var left = Math.max(0, ROUND_SECONDS - state.elapsed);
    clockEl.textContent = Math.ceil(left);
    if (left <= 10) clockEl.classList.add('low');
    if (left <= 0) { endRound(); }

    if (state.reload > 0) {
      state.reload -= dt;
      if (state.reload <= 0) {
        state.reload = 0;
        state.shells = SHELL_COUNT;
        shellsEl.classList.remove('loading');
        paintShells();
        sClick();
      }
    }

    state.spawnTimer -= dt;
    if (state.spawnTimer <= 0) {
      var t = state.elapsed / ROUND_SECONDS;
      var cap = 3 + Math.floor(t * 4);
      var liveCount = 0;
      for (i = 0; i < targets.length; i++) if (targets[i].state !== 'falling' && targets[i].state !== 'sinking') liveCount++;
      if (liveCount < cap) spawnTarget();
      state.spawnTimer = 1.35 - t * 0.8;
    }
  }

  /* targets */
  for (i = targets.length - 1; i >= 0; i--) {
    tgt = targets[i];
    tgt.age += dt;
    if (tgt.state === 'rising') {
      var k = Math.min(1, tgt.age / 0.28);
      var over = Math.sin(k * Math.PI * 0.5);
      tgt.hinge.rotation.x = -Math.PI / 2 * (1 - over) + (k === 1 ? 0 : Math.sin(k * 9) * 0.04 * (1 - k));
      if (k >= 1) { tgt.state = 'up'; tgt.hinge.rotation.x = 0; tgt.age = 0; }
    } else if (tgt.state === 'up') {
      var row = ROWS[tgt.row];
      if (row.slide) tgt.root.position.x += tgt.dir * row.slide * dt *
        (Math.abs(tgt.root.position.x) > row.spread ? 0 : 1);
      if (Math.abs(tgt.root.position.x) >= row.spread) tgt.dir *= -1;
      tgt.hinge.rotation.x = Math.sin(tgt.age * 2.2) * 0.02;
      if (tgt.age > tgt.life && state.phase === 'playing') { tgt.state = 'sinking'; tgt.age = 0; }
    } else if (tgt.state === 'falling') {
      tgt.fall += dt;
      tgt.hinge.rotation.x = -Math.min(1, tgt.fall / 0.3) * Math.PI * 0.62;
      if (tgt.fall > 0.55) removeTarget(tgt);
    } else if (tgt.state === 'sinking') {
      var s = Math.min(1, tgt.age / 0.3);
      tgt.hinge.rotation.x = -Math.PI / 2 * s;
      if (s >= 1) removeTarget(tgt);
    }
  }

  /* effects */
  for (i = effects.length - 1; i >= 0; i--) {
    var e = effects[i];
    e.life -= dt;
    if (e.kind === 'spark') {
      e.vel.y -= 9.8 * dt;
      e.obj.position.addScaledVector(e.vel, dt);
      e.obj.rotation.x += dt * 9; e.obj.rotation.y += dt * 7;
    } else if (e.mat) {
      e.mat.opacity = Math.max(0, e.life / 0.09) * 0.9;
    }
    if (e.life <= 0) { scene.remove(e.obj); effects.splice(i, 1); }
  }

  /* camera: gentle parallax toward the cursor + recoil kick */
  var wantYaw = reducedMotion ? 0 : -mouse.x * 0.085;
  var wantPitch = BASE_PITCH + (reducedMotion ? 0 : mouse.y * 0.05);
  camera.rotation.y += (wantYaw - camera.rotation.y) * Math.min(1, dt * 7);
  camera.rotation.x += (wantPitch - camera.rotation.x) * Math.min(1, dt * 7);
  if (camKick > 0) {
    camKick = Math.max(0, camKick - dt * 7);
    camera.position.z = CAM_BASE.z + camKick * 0.10;
    camera.rotation.x += camKick * 0.012;
  } else {
    camera.position.z = CAM_BASE.z;
  }

  renderer.render(scene, camera);
}
tick();

/* ---- headless eye ---- */
window.RangeDebug = {
  THREE_OK: true,
  renderer: renderer, scene: scene, camera: camera,
  state: state, targets: targets,
  makeTarget: makeTarget, spawnTarget: spawnTarget,
  setAim: function (nx, ny) { mouse.x = nx; mouse.y = ny; },
  aimAtWorld: function (v) {
    var p = v.clone().project(camera);
    mouse.x = p.x; mouse.y = p.y;
  },
  resolveShot: resolveShot,
  startRound: startRound,
  step: function (dt) {
    clock3.getDelta();
    var saved = requestAnimationFrame;
    /* advance target/effect simulation without scheduling */
    state.elapsed += dt;
    for (var i = targets.length - 1; i >= 0; i--) {
      var tgt = targets[i];
      tgt.age += dt;
      if (tgt.state === 'rising' && tgt.age > 0.3) { tgt.state = 'up'; tgt.hinge.rotation.x = 0; tgt.age = 0; }
    }
    void saved;
  }
};
</script>
</body>
