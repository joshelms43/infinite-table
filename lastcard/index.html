<!DOCTYPE html>
<!-- Last Card — Infinite Table. Version: 0.2.0
     Match the colour or the number, actions bite, wilds turn the table, and
     you call "Last Card" before you go to one — or the table charges you two.
     Host-authoritative over TableKit broadcast, same shape as M Deal: clients
     send intents, the host runs shared/lastcard-rules.js and pushes truth.
     Practice mode runs the same rulebook against local bots, no wire. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Last Card — Infinite Table</title>
<meta name="theme-color" content="#121A16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --table-night:#121A16; --felt-green:#1D2B25; --felt-highlight:#29392F;
  --text-ivory:#F2EEE2; --text-faint:rgba(242,238,226,.55);
  --card-ivory:#F7F2E6; --card-edge:#D9D2C0; --ink-black:#24241D; --muted-ink:#6E6C5E;
  --primary-coral:#E26A4B; --primary-coral-deep:#BC4F37;
  --money-gold:#BE8F41; --warning-amber:#D9A03F; --danger-red:#B8483D; --success-green:#3E8E68;
  --c-coral:#D4756B; --c-teal:#3B8B82; --c-gold:#E0AB52; --c-blue:#5A8CA8;
  --line-soft-t:rgba(242,238,226,.13); --line-faint-t:rgba(242,238,226,.07);
  --scrim:rgba(12,17,14,.78);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--table-night);color:var(--text-ivory);
  font-family:'Nunito Sans',system-ui,sans-serif;user-select:none;overscroll-behavior:none}
body{display:flex;flex-direction:column;overflow:hidden}
button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit}
.hidden{display:none !important}

header{display:flex;align-items:center;justify-content:space-between;
  padding:calc(12px + env(safe-area-inset-top)) 18px 10px}
.logo{font-family:'Lilita One',cursive;font-size:17px;letter-spacing:.5px}
.logo a{color:inherit;text-decoration:none}
.logo .inf{color:var(--primary-coral)}
#vtag{font-size:10px;font-weight:800;letter-spacing:1.5px;color:var(--text-faint)}

/* ================= menu / room ================= */
.panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:0 26px calc(30px + env(safe-area-inset-bottom))}
.title{font-family:'Lilita One',cursive;font-size:44px;line-height:1.05;text-align:center}
.title small{display:block;font-size:13px;font-family:'Nunito Sans',sans-serif;font-weight:800;
  letter-spacing:3px;color:var(--text-faint);margin-top:8px;text-transform:uppercase}
.bigbtn{width:100%;max-width:320px;padding:15px;border-radius:14px;font-weight:800;font-size:16px;
  background:var(--felt-green);border:1px solid var(--line-soft-t);transition:transform .1s}
.bigbtn:active{transform:scale(.97)}
.bigbtn.primary{background:var(--primary-coral);border-color:transparent}
.bigbtn.busy{opacity:.5;pointer-events:none}
input[type=text]{width:100%;max-width:320px;padding:14px;border-radius:14px;border:1px solid var(--line-soft-t);
  background:rgba(242,238,226,.06);color:var(--text-ivory);font-family:inherit;font-weight:800;
  font-size:16px;text-align:center;outline:none}
input[type=text]::placeholder{color:var(--text-faint);font-weight:700}
#codein{letter-spacing:6px;text-transform:uppercase}
#neterr{color:var(--danger-red);font-size:13px;font-weight:800;min-height:18px;text-align:center}
.faint{color:var(--text-faint);font-size:13px;font-weight:700;text-align:center}

#codeshow{font-family:'Lilita One',cursive;font-size:52px;letter-spacing:10px;margin-left:10px}
#seatlist{display:flex;flex-direction:column;gap:8px;width:100%;max-width:320px}
.seatrow{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;
  background:var(--felt-green);border:1px solid var(--line-faint-t);font-weight:800}
.seatrow .dot{width:9px;height:9px;border-radius:50%;background:var(--success-green)}
.seatrow .hosttag{margin-left:auto;font-size:10px;letter-spacing:1.5px;color:var(--text-faint)}
#botrow{display:flex;align-items:center;gap:14px;font-weight:800}
#botrow button{width:42px;height:42px;border-radius:12px;background:var(--felt-green);
  border:1px solid var(--line-soft-t);font-size:20px;font-weight:800}

/* ================= table ================= */
#game{flex:1;display:flex;flex-direction:column;overflow:hidden}
#foes{display:flex;justify-content:center;gap:10px;padding:6px 12px 2px;flex-wrap:wrap}
.foe{display:flex;flex-direction:column;align-items:center;gap:5px;padding:9px 13px;min-width:78px;
  border-radius:14px;background:var(--felt-green);border:1.5px solid var(--line-faint-t);
  transition:border-color .25s, box-shadow .25s}
.foe.turn{border-color:var(--money-gold);box-shadow:0 0 14px rgba(190,143,65,.25)}
.foe .fname{font-size:12px;font-weight:800;max-width:86px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.foe .fcards{display:flex;gap:2px;height:18px;align-items:center}
.foe .mini{width:12px;height:17px;border-radius:2.5px;background:var(--primary-coral-deep);
  border:1px solid rgba(8,12,10,.4)}
.foe .fcount{font-size:11px;font-weight:800;color:var(--text-faint)}
.foe .lastbadge{font-size:9px;font-weight:800;letter-spacing:1px;color:var(--warning-amber);display:none}
.foe.called .lastbadge{display:block}

#centre{flex:1;display:flex;align-items:center;justify-content:center;gap:26px;position:relative;min-height:0}
#dirtag{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:20px;
  color:var(--text-faint);transition:transform .3s}
#dirtag.ccw{transform:translateX(-50%) scaleX(-1)}
#drawpile{position:relative;width:88px;height:126px;border-radius:12px;cursor:pointer}
#drawpile .back{position:absolute;inset:0;border-radius:12px;background:linear-gradient(150deg,var(--primary-coral) 0%,var(--primary-coral-deep) 100%);
  border:2px solid rgba(8,12,10,.35);display:flex;align-items:center;justify-content:center}
#drawpile .back::after{content:'∞';font-family:'Lilita One',cursive;font-size:34px;color:rgba(242,238,226,.85)}
#drawpile .back:nth-child(1){transform:translate(-4px,4px)}
#drawpile .back:nth-child(2){transform:translate(-2px,2px)}
#drawpile.pulse .back:nth-child(3){animation:drawpulse 1.4s ease-in-out infinite}
@keyframes drawpulse{0%,100%{box-shadow:0 0 0 rgba(190,143,65,0)}50%{box-shadow:0 0 18px rgba(190,143,65,.5)}}
#decknum{position:absolute;bottom:-22px;width:100%;text-align:center;font-size:11px;font-weight:800;color:var(--text-faint)}
#pilewrap{position:relative}
#pilewrap .ring{position:absolute;inset:-8px;border-radius:16px;border:2.5px solid transparent;transition:border-color .3s}

/* ---- the card itself ---- */
.card{width:88px;height:126px;border-radius:12px;background:var(--card-ivory);
  border:1px solid var(--card-edge);position:relative;color:var(--ink-black);
  box-shadow:0 3px 10px rgba(8,12,10,.35);flex-shrink:0}
.card .oval{position:absolute;inset:14px 11px;border-radius:50% / 44%;display:flex;
  align-items:center;justify-content:center}
.card .big{font-family:'Lilita One',cursive;font-size:44px;color:var(--card-ivory);
  text-shadow:0 2px 3px rgba(8,12,10,.28)}
.card .big.sym{font-size:34px}
.card .pip{position:absolute;font-family:'Lilita One',cursive;font-size:14px;line-height:1}
.card .pip.tl{top:7px;left:9px}
.card .pip.br{bottom:7px;right:9px;transform:rotate(180deg)}
.card.c-coral .oval{background:var(--c-coral)} .card.c-coral .pip{color:var(--c-coral)}
.card.c-teal  .oval{background:var(--c-teal)}  .card.c-teal  .pip{color:var(--c-teal)}
.card.c-gold  .oval{background:var(--c-gold)}  .card.c-gold  .pip{color:var(--c-gold)}
.card.c-blue  .oval{background:var(--c-blue)}  .card.c-blue  .pip{color:var(--c-blue)}
.card.c-wild .oval{background:conic-gradient(var(--c-coral) 0 25%,var(--c-gold) 0 50%,var(--c-teal) 0 75%,var(--c-blue) 0)}
.card.c-wild .pip{color:var(--ink-black)}

/* ================= my side ================= */
#myside{padding:4px 0 calc(14px + env(safe-area-inset-bottom))}
#mystatus{display:flex;align-items:center;justify-content:center;gap:10px;min-height:26px;
  font-size:13px;font-weight:800;color:var(--text-faint);padding:0 16px}
#mystatus.go{color:var(--money-gold)}
#hand{display:flex;overflow-x:auto;padding:34px 18px 8px;margin-top:-18px;scrollbar-width:none;overscroll-behavior:contain}
#hand::-webkit-scrollbar{display:none}
#hand.few{justify-content:center}
.cardw{flex:0 0 88px;width:88px;position:relative;touch-action:pan-x;
  transition:transform .26s cubic-bezier(.34,1.56,.64,1)}
.cardw .card{rotate:var(--fan,0deg);translate:0 var(--fanY,0px);
  transition:transform .18s cubic-bezier(.2,1.1,.3,1), box-shadow .18s, opacity .18s}
.cardw.dead .card{opacity:.55}
.cardw.pressed{z-index:40!important}
.cardw.pressed .card{transform:scale(.955) translateY(2px);
  box-shadow:0 1px 4px rgba(8,12,10,.45);transition:transform .07s ease, box-shadow .07s ease}
.cardw.raised{z-index:60!important;transform:translateY(-26px)}
.cardw.raised .card{rotate:0deg;translate:0 0;transform:scale(1.03);
  box-shadow:0 10px 22px rgba(8,12,10,.55)}
.cardw.part-l{transform:translateX(-8px)}
.cardw.part-r{transform:translateX(8px)}
.cardw.hidden-src{visibility:hidden}
.cardw.denied .card{animation:deny .32s ease}
@keyframes deny{25%{transform:translateX(-5px)}50%{transform:translateX(5px)}75%{transform:translateX(-3px)}}
.cardw.dealt .card{animation:dealin .3s cubic-bezier(.2,1.3,.4,1)}
@keyframes dealin{from{transform:translateY(20px) scale(.92);opacity:0}}

.dragclone{position:fixed;z-index:81;pointer-events:none;will-change:transform;
  width:88px;height:126px;filter:drop-shadow(0 14px 22px rgba(8,12,10,.55))}
.dragclone .card{transform:scale(1);transition:transform .13s cubic-bezier(.3,1.4,.5,1)}
.dragclone.lifted .card{transform:scale(1.08)}
.dragclone.springback{transition:transform .19s cubic-bezier(.3,1.5,.5,1)}
.droppable{outline:2px dashed rgba(242,238,226,.35);outline-offset:4px;border-radius:16px}
.dropok{outline:2px solid var(--money-gold);outline-offset:4px;border-radius:16px;
  box-shadow:0 0 14px rgba(190,143,65,.55);transform:scale(1.03);
  transition:transform .12s, box-shadow .12s}
.snapped{animation:snapin .28s cubic-bezier(.2,1.4,.4,1)}
@keyframes snapin{35%{transform:scale(1.06)}}
.flyer{position:fixed;z-index:80;pointer-events:none}
#inspect{position:fixed;inset:0;background:var(--scrim);display:none;
  align-items:center;justify-content:center;z-index:70}
#inspect.show{display:flex}
#inspect .card{transform:scale(2.1);box-shadow:0 18px 40px rgba(8,12,10,.6)}
#actions{display:flex;justify-content:center;gap:10px;padding:6px 18px 0}
.actbtn{padding:12px 26px;border-radius:13px;font-weight:800;font-size:15px;
  background:var(--felt-green);border:1px solid var(--line-soft-t)}
.actbtn:disabled{opacity:.35}
#callbtn{background:var(--money-gold);color:var(--ink-black);border-color:transparent;
  animation:callpulse 1.2s ease-in-out infinite}
@keyframes callpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* ================= overlays ================= */
#banner{position:fixed;top:calc(66px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  background:var(--scrim);border:1px solid var(--line-soft-t);border-radius:12px;
  padding:9px 18px;font-weight:800;font-size:14px;z-index:40;opacity:0;transition:opacity .25s;
  pointer-events:none;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis}
#banner.show{opacity:1}
#overlay{position:fixed;inset:0;background:var(--scrim);display:none;align-items:center;
  justify-content:center;z-index:50;flex-direction:column;gap:16px;padding:26px}
#overlay.show{display:flex}
#picktitle{font-family:'Lilita One',cursive;font-size:26px}
#swatches{display:flex;gap:14px}
.swatch{width:64px;height:64px;border-radius:18px;border:2px solid rgba(242,238,226,.2);transition:transform .1s}
.swatch:active{transform:scale(.92)}
#overtitle{font-family:'Lilita One',cursive;font-size:40px;text-align:center}
#oversub{font-weight:800;color:var(--text-faint)}
</style>
</head>
<body>

<header>
  <div class="logo"><a href="../"><span class="inf">INFINITE</span> TABLE</a></div>
  <div id="vtag">LAST CARD</div>
</header>

<!-- ================= menu ================= -->
<div id="menu" class="panel">
  <div class="title">Last Card</div>
  <input type="text" id="namein" maxlength="14" placeholder="Your Name">
  <button class="bigbtn primary" id="hostbtn">Host Table</button>
  <input type="text" id="codein" maxlength="4" placeholder="CODE" autocomplete="off">
  <button class="bigbtn" id="joinbtn">Join Table</button>
  <button class="bigbtn" id="practicebtn">Practice</button>
  <div id="neterr"></div>
</div>

<!-- ================= practice size ================= -->
<div id="botsetup" class="panel hidden">
  <div class="title">Practice</div>
  <div id="botrow">
    <button id="botminus">−</button>
    <span id="botshow">1 Bot</span>
    <button id="botplus">+</button>
  </div>
  <button class="bigbtn primary" id="botgo">Deal</button>
  <button class="bigbtn" id="botback">Back</button>
</div>

<!-- ================= room ================= -->
<div id="room" class="panel hidden">
  <div class="faint">Table Code</div>
  <div id="codeshow"></div>
  <div id="seatlist"></div>
  <button class="bigbtn primary" id="startbtn">Start Game</button>
  <div class="faint" id="roomhint"></div>
  <button class="bigbtn" id="leaveroom">Leave</button>
</div>

<!-- ================= table ================= -->
<div id="game" class="hidden">
  <div id="foes"></div>
  <div id="centre">
    <div id="dirtag">⟳</div>
    <div id="drawpile">
      <div class="back"></div><div class="back"></div><div class="back"></div>
      <div id="decknum"></div>
    </div>
    <div id="pilewrap"><div class="ring" id="pilering"></div><div id="pilecard"></div></div>
  </div>
  <div id="myside">
    <div id="mystatus"></div>
    <div id="hand"></div>
    <div id="actions">
      <button class="actbtn" id="drawbtn">Draw</button>
      <button class="actbtn hidden" id="passbtn">Keep It</button>
      <button class="actbtn hidden" id="callbtn">Last Card</button>
    </div>
  </div>
</div>

<div id="banner"></div>
<div id="inspect"></div>

<div id="overlay">
  <div id="pickwrap" class="hidden" style="display:contents">
    <div id="picktitle">Pick a Colour</div>
    <div id="swatches"></div>
  </div>
  <div id="overwrap" class="hidden" style="display:contents">
    <div id="overtitle"></div>
    <div id="oversub"></div>
    <button class="bigbtn primary" id="againbtn">Play Again</button>
    <button class="bigbtn" id="overleave">Leave Table</button>
  </div>
</div>

<script src="../shared/config.js?v=0.2.0"></script>
<script src="../shared/tablekit.js?v=0.2.0"></script>
<script src="../shared/lastcard-rules.js?v=0.2.0"></script>
<script>
'use strict';
var VERSION = '0.2.0';
TableKit.watchErrors({ game: 'lastcard', version: VERSION, onError: function (m) { banner(m); } });

function $(id) { return document.getElementById(id); }
function show(id) { $(id).classList.remove('hidden'); }
function hide(id) { $(id).classList.add('hidden'); }
function haptic(v) { try { if (navigator.vibrate) navigator.vibrate(v); } catch (e) {} }

var bannerT = null;
function banner(text, ms) {
  var b = $('banner');
  b.textContent = text;
  b.classList.add('show');
  clearTimeout(bannerT);
  bannerT = setTimeout(function () { b.classList.remove('show'); }, ms || 1900);
}

/* ================= the one view of the table =================
   Everything renders from V — in practice and on the host that's the live
   engine state; on a client it's the last truth the host pushed. One render
   path, no second way for the screen to disagree with the game. */
var V = null;        // { turn, dir, activeColour, top, deckN, phase, drawnId, winner,
                     //   players:[{name, handN, called}], over }
var MYHAND = [];     // my cards, always from truth
var MYSEAT = 0;
var MODE = 'off';    // 'off' | 'bot' | 'host' | 'client'

function cardEl(c) {
  var el = document.createElement('div');
  var col = (c.kind === 'wild' || c.kind === 'w4') ? 'wild' : c.colour;
  el.className = 'card c-' + col;
  var glyph, sym = false;
  if (c.kind === 'num') glyph = String(c.n);
  else if (c.kind === 'skip') { glyph = '⊘'; sym = true; }
  else if (c.kind === 'rev') { glyph = '⇄'; sym = true; }
  else if (c.kind === 'd2') { glyph = '+2'; sym = true; }
  else if (c.kind === 'w4') { glyph = '+4'; sym = true; }
  else { glyph = '★'; sym = true; }
  el.innerHTML = '<div class="oval"><span class="big' + (sym ? ' sym' : '') + '">' + glyph + '</span></div>' +
    '<span class="pip tl">' + glyph + '</span><span class="pip br">' + glyph + '</span>';
  return el;
}

function renderAll() {
  if (!V) return;
  if (SELECTED != null && !MYHAND.some(function (c) { return c.id === SELECTED; })) SELECTED = null;
  /* opponents, seated clockwise from my left */
  var foes = $('foes');
  foes.innerHTML = '';
  var n = V.players.length;
  for (var i = 1; i < n; i++) {
    var s = (MYSEAT + i) % n;
    var p = V.players[s];
    var d = document.createElement('div');
    d.className = 'foe' + (V.turn === s && !V.over ? ' turn' : '') + (p.called ? ' called' : '');
    var minis = '';
    for (var m = 0; m < Math.min(p.handN, 8); m++) minis += '<span class="mini"></span>';
    d.innerHTML = '<span class="fname">' + esc(p.name) + '</span>' +
      '<span class="fcards">' + minis + '</span>' +
      '<span class="fcount">' + p.handN + (p.handN === 1 ? ' card' : ' cards') + '</span>' +
      '<span class="lastbadge">LAST CARD</span>';
    foes.appendChild(d);
  }

  /* centre */
  $('dirtag').classList.toggle('ccw', V.dir < 0);
  $('decknum').textContent = V.deckN;
  var pw = $('pilecard');
  pw.innerHTML = '';
  pw.appendChild(cardEl(V.top));
  $('pilering').style.borderColor = LastCard.COLOURS[V.activeColour].hex;

  /* my side */
  var mine = V.turn === MYSEAT && !V.over;
  var st = $('mystatus');
  st.className = mine ? 'go' : '';
  if (V.over) st.textContent = '';
  else if (mine) st.textContent = V.phase === 'drawn' ? 'Play it or keep it' : 'Your Turn';
  else st.textContent = V.players[V.turn].name + '\u2019s turn';

  renderHand(mine);

  $('drawbtn').disabled = !mine || V.phase === 'drawn';
  $('drawpile').classList.toggle('pulse', mine && V.phase === 'play' &&
    !MYHAND.some(function (c) { return LastCard.canPlay(c, V.top, V.activeColour); }));
  $('passbtn').classList.toggle('hidden', !(mine && V.phase === 'drawn'));
  $('callbtn').classList.toggle('hidden',
    !(MYHAND.length === 2 && !V.players[MYSEAT].called && !V.over));

  if (V.over) showOver();
}

function esc(s) {
  return String(s || '').replace(/[<>&"]/g, function (ch) {
    return { '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' }[ch];
  });
}

function sayEvents(evts, names) {
  (evts || []).forEach(function (e) {
    var who = function (s) { return s === MYSEAT ? 'You' : names[s]; };
    if (e.e === 'call') banner(who(e.seat) + (e.seat === MYSEAT ? ' called Last Card' : ' called Last Card!'));
    else if (e.e === 'penalty') banner(who(e.seat) + (e.seat === MYSEAT ? ' forgot to call — draw two' : ' forgot to call — draws two'));
    else if (e.e === 'forced') banner('+' + e.n + ' to ' + who(e.seat));
    else if (e.e === 'reverse') banner('Play reverses');
    else if (e.e === 'skip') banner(who(e.seat) + (e.seat === MYSEAT ? ' are skipped' : ' is skipped'));
    else if (e.e === 'reshuffle') banner('The pile shuffles back in');
    if (e.e === 'forced' && e.seat === MYSEAT) haptic(60);
  });
}

/* ================= the hand: M Deal's fan, keyed and FLIPped =================
   Wrappers keyed by card id survive re-renders, so cards slide to their new
   places instead of teleporting; new arrivals pop in; the fan bows outward
   like a hand actually held. Same grammar as the flagship: press squishes,
   tap raises, any upward pull picks the card up, hold inspects it. */
var SELECTED = null;
var PREVIDS = new Set();

function isLegal(c) {
  return V && V.turn === MYSEAT && !V.over &&
    LastCard.canPlay(c, V.top, V.activeColour) &&
    (V.phase !== 'drawn' || c.id === V.drawnId);
}

function sortHand(cards) {
  var colOrd = { coral: 0, teal: 1, gold: 2, blue: 3 };
  var kindOrd = { num: 0, skip: 1, rev: 2, d2: 3, wild: 4, w4: 5 };
  return cards.slice().sort(function (a, b) {
    var ac = a.colour == null ? 9 : colOrd[a.colour];
    var bc = b.colour == null ? 9 : colOrd[b.colour];
    if (ac !== bc) return ac - bc;
    if (kindOrd[a.kind] !== kindOrd[b.kind]) return kindOrd[a.kind] - kindOrd[b.kind];
    return (a.n || 0) - (b.n || 0);
  });
}

function renderHand(mine) {
  var hand = $('hand');
  var cards = sortHand(MYHAND);
  var n = cards.length;
  var browser = hand && typeof hand.children === 'object';
  if (!browser) {                                       // headless harness fallback
    hand.innerHTML = cards.map(function (c) { return '<div class="cardw" data-cid="' + c.id + '"></div>'; }).join('');
    PREVIDS = new Set(cards.map(function (c) { return c.id; }));
    return;
  }
  var ov = n <= 5 ? 30 : Math.min(54, 30 + (n - 5) * 3.5);

  var first = {};
  [].slice.call(hand.children).forEach(function (w) { first[w.dataset.cid] = w.getBoundingClientRect().left; });
  var byId = {};
  [].slice.call(hand.children).forEach(function (w) { byId[w.dataset.cid] = w; });

  var seen = new Set();
  cards.forEach(function (c, i) {
    var w = byId[c.id];
    if (!w) {
      w = document.createElement('div');
      w.className = 'cardw';
      w.dataset.cid = c.id;
      w.appendChild(cardEl(c));
      if (PREVIDS.size && !PREVIDS.has(c.id)) {
        w.classList.add('dealt');
        setTimeout(function () { w.classList.remove('dealt'); }, 340);
      }
    }
    w.style.zIndex = i + 1;
    w.style.marginLeft = i > 0 ? (-ov + 'px') : '0px';
    w.classList.toggle('dead', !isLegal(c) && mine);
    if (!mine) w.classList.remove('dead');
    w.classList.toggle('raised', SELECTED === c.id);
    var fm = (n - 1) / 2, foff = i - fm;
    var fdeg = Math.max(-4, Math.min(4, foff * (8 / Math.max(n - 1, 1))));
    w.style.setProperty('--fan', fdeg.toFixed(2) + 'deg');
    w.style.setProperty('--fanY', (Math.abs(foff) * 1.3).toFixed(1) + 'px');
    if (w !== hand.children[i]) hand.insertBefore(w, hand.children[i] || null);
    seen.add(String(c.id));
  });
  [].slice.call(hand.children).forEach(function (w) { if (!seen.has(w.dataset.cid)) w.remove(); });
  hand.classList.toggle('few', n <= 3);
  partNeighbours();
  PREVIDS = new Set(cards.map(function (c) { return c.id; }));

  /* FLIP: survivors slide from where they were to where they are */
  [].slice.call(hand.children).forEach(function (w) {
    var old = first[w.dataset.cid];
    if (old === undefined) return;
    var dx = old - w.getBoundingClientRect().left;
    if (Math.abs(dx) > 3) {
      w.style.transition = 'none';
      w.style.transform = 'translateX(' + dx + 'px)';
      requestAnimationFrame(function () { w.style.transition = ''; w.style.transform = ''; });
    }
  });
}

function partNeighbours() {
  var hand = $('hand');
  if (!hand || typeof hand.children !== 'object') return;
  [].slice.call(hand.children).forEach(function (w) { w.classList.remove('part-l', 'part-r'); });
  if (SELECTED == null) return;
  var kids = [].slice.call(hand.children);
  var at = kids.findIndex(function (w) { return +w.dataset.cid === SELECTED; });
  if (at < 0) return;
  if (kids[at - 1]) kids[at - 1].classList.add('part-l');
  if (kids[at + 1]) kids[at + 1].classList.add('part-r');
}

function findMine(id) {
  return MYHAND.find(function (c) { return c.id === id; }) || null;
}

function toggleSelect(id) {
  SELECTED = SELECTED === id ? null : id;
  haptic(6);
  renderAll();
  if (SELECTED != null) {
    var c = findMine(SELECTED);
    if (c && isLegal(c)) markPileDroppable(true);
  } else markPileDroppable(false);
}
function clearSelection() {
  SELECTED = null;
  markPileDroppable(false);
  partNeighbours();
}
function markPileDroppable(on) {
  var pw = $('pilewrap');
  if (!pw.classList) return;
  pw.classList.toggle('droppable', !!on);
  if (!on) pw.classList.remove('dropok');
}

/* ---- commit a card to the pile (drop or raised tap) ---- */
var pendingWild = null;
function commitCard(c, srcRect, tilt) {
  if (!isLegal(c)) return false;
  if (c.kind === 'wild' || c.kind === 'w4') {
    pendingWild = c.id;
    openPick();
    return true;
  }
  if (srcRect) playFlight(c, srcRect, tilt);
  sendMove({ t: 'play', id: c.id });
  return true;
}

function playFlight(c, srcRect, tilt) {
  var to = $('pilewrap');
  if (!srcRect || !to.getBoundingClientRect || !document.body.appendChild) return;
  var tr = to.getBoundingClientRect();
  var f = document.createElement('div');
  f.className = 'flyer';
  f.appendChild(cardEl(c));
  f.style.left = srcRect.left + 'px';
  f.style.top = srcRect.top + 'px';
  document.body.appendChild(f);
  var dx = (tr.left + tr.width / 2) - (srcRect.left + srcRect.width / 2);
  var dy = (tr.top + tr.height / 2) - (srcRect.top + srcRect.height / 2);
  requestAnimationFrame(function () { requestAnimationFrame(function () {
    f.style.transition = 'transform 240ms cubic-bezier(.25,.8,.25,1), opacity 240ms ease-in';
    f.style.transform = 'translate(' + dx + 'px,' + dy + 'px) scale(.96) rotate(' + (tilt || 4) + 'deg)';
    f.style.opacity = '0.1';
  }); });
  setTimeout(function () { if (f.remove) f.remove(); }, 300);
  var pw = $('pilewrap');
  if (pw.classList) {
    pw.classList.add('snapped');
    setTimeout(function () { if (pw.classList) pw.classList.remove('snapped'); }, 300);
  }
}

/* ================= DRAG ENGINE (M Deal's, one zone: the pile) ================= */
var DRAG = { pend: null, active: false, card: null, clone: null, srcW: null,
  px0: 0, py0: 0, cx0: 0, cy0: 0, dx: 0, dy: 0, lx: 0, tilt: 0, over: false };
var SUPPRESSTAP = false;
var HOLDT = null;

$('hand').addEventListener('pointerdown', function (e) {
  if (!V) return;
  if (V.turn !== MYSEAT && !V.over) return;
  if (document.querySelector('#overlay.show')) return;
  var w = e.target.closest ? e.target.closest('.cardw') : null;
  if (!w) return;
  var c = findMine(+w.dataset.cid);
  if (!c) return;
  DRAG.pend = { w: w, c: c, x: e.clientX, y: e.clientY,
    raised: SELECTED === c.id };
  if (w.classList) w.classList.add('pressed');
  haptic(4);
  clearTimeout(HOLDT);
  HOLDT = setTimeout(function () {
    if (DRAG.pend && !DRAG.active) {
      var cc = DRAG.pend.c;
      DRAG.pend = null;
      unpress();
      openInspect(cc);
    }
  }, 430);
});

function openInspect(c) {
  haptic(10);
  var el = $('inspect');
  el.innerHTML = '';
  el.appendChild(cardEl(c));
  if (el.classList) el.classList.add('show');
  SUPPRESSTAP = true;
}
$('inspect').addEventListener('pointerdown', function () {
  this.classList.remove('show');
  setTimeout(function () { SUPPRESSTAP = false; }, 60);
});
function unpress() {
  document.querySelectorAll('#hand .cardw.pressed').forEach(function (w) { w.classList.remove('pressed'); });
}

document.addEventListener('pointermove', function (e) {
  if (DRAG.pend && !DRAG.active) {
    var dx = e.clientX - DRAG.pend.x, dy = e.clientY - DRAG.pend.y;
    var dist = Math.hypot(dx, dy);
    if (dist > 8) clearTimeout(HOLDT);
    if (V && V.over) { if (dist > 8) { unpress(); DRAG.pend = null; } return; }
    if (DRAG.pend.raised && dist > 6) { startDrag(e); return; }
    if (dy < -8 || (dist > 12 && Math.abs(dy) > Math.abs(dx))) { startDrag(e); return; }
    if (dx > 16 || dx < -16 || dy > 20) { unpress(); DRAG.pend = null; }   // scrolling the fan
    return;
  }
  if (!DRAG.active) return;
  if (!DRAG.clone || !DRAG.clone.style) { cancelDrag(); return; }
  e.preventDefault();
  var mdx = e.clientX - DRAG.px0, mdy = e.clientY - DRAG.py0;
  var step = e.clientX - (DRAG.lx != null ? DRAG.lx : e.clientX);
  DRAG.lx = e.clientX;
  DRAG.dx = mdx; DRAG.dy = mdy;
  DRAG.tilt = Math.max(-10, Math.min(10, (DRAG.tilt || 0) * 0.82 + step * 0.7));
  DRAG.clone.style.transform = 'translate3d(' + mdx + 'px,' + mdy + 'px,0) rotate(' + DRAG.tilt.toFixed(1) + 'deg)';
  hitPile(e.clientX, e.clientY, DRAG.cx0 + mdx, DRAG.cy0 + mdy);
}, { passive: false });

function pileRect() {
  var el = $('pilewrap');
  if (!el.getBoundingClientRect) return null;
  var r = el.getBoundingClientRect();
  return { left: r.left - 26, right: r.right + 26, top: r.top - 26, bottom: r.bottom + 26 };
}
function hitPile(x, y, cx, cy) {
  if (!DRAG.legal) return;
  var r = pileRect();
  if (!r) return;
  var over = (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) ||
    (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom);
  if (over !== DRAG.over) {
    DRAG.over = over;
    var pw = $('pilewrap');
    if (pw.classList) pw.classList.toggle('dropok', over);
    if (over) haptic(6);
  }
}

document.addEventListener('pointerup', function (e) {
  clearTimeout(HOLDT);
  unpress();
  if (DRAG.pend && !DRAG.active) {
    var pend = DRAG.pend;
    DRAG.pend = null;
    var dist = Math.hypot(e.clientX - pend.x, e.clientY - pend.y);
    if (dist < 8 && V && !V.over) {
      toggleSelect(pend.c.id);
      SUPPRESSTAP = true;
      setTimeout(function () { SUPPRESSTAP = false; }, 400);
    }
    return;
  }
  if (!DRAG.active) return;
  SUPPRESSTAP = true;
  setTimeout(function () { SUPPRESSTAP = false; }, 350);
  var drop = DRAG.over;
  if (!drop && DRAG.legal) {
    /* magnetic: a near-miss within 48px of the card centre still lands */
    var r = pileRect(), cx = DRAG.cx0 + DRAG.dx, cy = DRAG.cy0 + DRAG.dy;
    if (r) {
      var px = Math.max(r.left, Math.min(cx, r.right)), py = Math.max(r.top, Math.min(cy, r.bottom));
      drop = Math.hypot(cx - px, cy - py) < 48;
    }
  }
  if (drop && DRAG.legal) doDrop();
  else springBack(!DRAG.legal);
});
document.addEventListener('touchmove', function (e) { if (DRAG.active) e.preventDefault(); }, { passive: false });
document.addEventListener('pointercancel', function () {
  clearTimeout(HOLDT);
  unpress();
  if (DRAG.active) {
    if (DRAG.over && DRAG.legal) doDrop();
    else springBack(false);
  } else DRAG.pend = null;
});

function startDrag(e) {
  var w = DRAG.pend.w, c = DRAG.pend.c;
  unpress();
  clearSelection();
  var inner = w.querySelector ? w.querySelector('.card') : null;
  var r = (inner && inner.getBoundingClientRect) ? inner.getBoundingClientRect() : w.getBoundingClientRect();
  var clone = document.createElement('div');
  clone.className = 'dragclone';
  if (inner && inner.cloneNode) clone.appendChild(inner.cloneNode(true));
  clone.style.left = (r.left + r.width / 2 - 44) + 'px';
  clone.style.top = (r.top + r.height / 2 - 63) + 'px';
  clone.style.transform = 'translate3d(0,0,0)';
  document.body.appendChild(clone);
  w.classList.add('hidden-src');
  try { if (e.target && e.target.setPointerCapture) e.target.setPointerCapture(e.pointerId); } catch (err) {}
  DRAG.active = true; DRAG.card = c; DRAG.clone = clone; DRAG.srcW = w;
  DRAG.px0 = e.clientX; DRAG.py0 = e.clientY;
  DRAG.lx = e.clientX; DRAG.tilt = 0; DRAG.dx = 0; DRAG.dy = 0; DRAG.over = false;
  DRAG.cx0 = r.left + r.width / 2; DRAG.cy0 = r.top + r.height / 2;
  DRAG.legal = isLegal(c);
  DRAG.pend = null;
  haptic(8);
  requestAnimationFrame(function () { if (clone.classList) clone.classList.add('lifted'); });
  if (DRAG.legal) markPileDroppable(true);
}

function doDrop() {
  var c = DRAG.card;
  var srcRect = DRAG.clone.getBoundingClientRect ? DRAG.clone.getBoundingClientRect() : null;
  var tilt = DRAG.tilt || 4;
  haptic(14);
  finishDrag(true);
  if (c.kind === 'wild' || c.kind === 'w4') {
    pendingWild = c.id;
    openPick();
  } else {
    if (srcRect) playFlight(c, srcRect, tilt);
    sendMove({ t: 'play', id: c.id });
  }
}

function springBack(deny) {
  var clone = DRAG.clone, srcW = DRAG.srcW;
  if (clone && clone.classList) {
    clone.classList.add('springback');
    clone.style.transform = 'translate3d(0,0,0)';
  }
  setTimeout(function () {
    if (clone && clone.remove) clone.remove();
    if (srcW && srcW.classList) {
      srcW.classList.remove('hidden-src');
      if (deny) {
        srcW.classList.add('denied');
        setTimeout(function () { if (srcW.classList) srcW.classList.remove('denied'); }, 340);
      }
    }
  }, 200);
  finishDrag(false);
  if (deny) haptic(20);
}

function finishDrag(played) {
  markPileDroppable(false);
  if (played && DRAG.clone && DRAG.clone.remove) DRAG.clone.remove();
  if (played && DRAG.srcW && DRAG.srcW.classList) DRAG.srcW.classList.remove('hidden-src');
  DRAG.active = false; DRAG.card = null; DRAG.clone = null; DRAG.srcW = null;
  DRAG.over = false; DRAG.pend = null; DRAG.legal = false;
}

function cancelDrag() {
  if (DRAG.active) {
    if (DRAG.clone && DRAG.clone.remove) DRAG.clone.remove();
    if (DRAG.srcW && DRAG.srcW.classList) DRAG.srcW.classList.remove('hidden-src');
    finishDrag(false);
  }
  DRAG.pend = null;
}

/* the raised-card grammar: tap the pile to commit it */
$('pilewrap').onclick = function () {
  if (SUPPRESSTAP) return;
  if (SELECTED == null) return;
  var c = findMine(SELECTED);
  var w = document.querySelector('#hand .cardw.raised');
  var srcRect = (w && w.getBoundingClientRect) ? w.getBoundingClientRect() : null;
  if (c && isLegal(c)) {
    clearSelection();
    commitCard(c, srcRect, 4);
  } else if (c && w && w.classList) {
    w.classList.add('denied');
    setTimeout(function () { if (w.classList) w.classList.remove('denied'); }, 340);
    haptic(20);
  }
};

$('drawbtn').onclick = function () { clearSelection(); sendMove({ t: 'draw' }); };
$('drawpile').onclick = function () { if (SUPPRESSTAP) return; clearSelection(); if (!$('drawbtn').disabled) sendMove({ t: 'draw' }); };
$('passbtn').onclick = function () { clearSelection(); sendMove({ t: 'pass' }); };
$('callbtn').onclick = function () { haptic(30); sendMove({ t: 'call' }); };

function openPick() {
  var sw = $('swatches');
  sw.innerHTML = '';
  LastCard.COLOUR_IDS.forEach(function (col) {
    var b = document.createElement('button');
    b.className = 'swatch';
    b.style.background = LastCard.COLOURS[col].hex;
    b.onclick = function () {
      closeOverlay();
      sendMove({ t: 'play', id: pendingWild, colour: col });
      pendingWild = null;
    };
    sw.appendChild(b);
  });
  $('pickwrap').classList.remove('hidden');
  $('overwrap').classList.add('hidden');
  $('overlay').classList.add('show');
}
function closeOverlay() { $('overlay').classList.remove('show'); }
$('overlay').onclick = function (e) {
  if (e.target === this && !$('pickwrap').classList.contains('hidden')) {
    pendingWild = null;
    closeOverlay();
    renderAll();
  }
};

function showOver() {
  $('pickwrap').classList.add('hidden');
  $('overwrap').classList.remove('hidden');
  var won = V.winner === MYSEAT;
  $('overtitle').textContent = won ? 'You Win' : V.players[V.winner].name + ' Wins';
  $('oversub').textContent = won ? 'Clean exit.' : 'Next one\u2019s yours.';
  $('againbtn').style.display = (MODE === 'client') ? 'none' : '';
  $('overlay').classList.add('show');
}
$('overleave').onclick = function () { location.reload(); };
$('againbtn').onclick = function () {
  closeOverlay();
  if (MODE === 'bot') startBot(botCount);
  else if (MODE === 'host') hostDeal();
};

/* ================= practice ================= */
var ENGINE = null;
var botCount = 1;
var botNames = ['Riley', 'Morgan', 'Charlie', 'Frankie'];
var ROSTER_NAMES = [];

function myName() {
  var v = $('namein').value.trim();
  if (v) { try { localStorage.setItem('it_name', v); } catch (e) {} }
  return v || 'You';
}

function startBot(bots) {
  MODE = 'bot';
  botCount = bots;
  ENGINE = LastCard.newGame(bots + 1);
  MYSEAT = 0;
  ROSTER_NAMES = [myName()].concat(botNames.slice(0, bots));
  hide('menu'); hide('botsetup'); show('game');
  syncFromEngine([]);
  botClock();
}

function syncFromEngine(evts) {
  V = publicView(ENGINE, ROSTER_NAMES);
  MYHAND = ENGINE.players[MYSEAT].hand.slice();
  sayEvents(evts, ROSTER_NAMES);
  renderAll();
}

function publicView(g, names) {
  return {
    turn: g.turn, dir: g.dir, activeColour: g.activeColour,
    top: LastCard.top(g), deckN: g.deck.length,
    phase: g.phase, drawnId: g.drawnId,
    over: g.phase === 'over', winner: g.winner,
    players: g.players.map(function (p, i) {
      return { name: names[i] || ('Seat ' + (i + 1)), handN: p.hand.length, called: p.called };
    }),
  };
}

var botT = null;
function botClock() {
  clearTimeout(botT);
  if (!ENGINE || ENGINE.phase === 'over' || ENGINE.turn === MYSEAT) return;
  botT = setTimeout(function () {
    var mv = LastCard.botMove(ENGINE, ENGINE.turn);
    if (mv && mv.t === 'call') {
      LastCard.apply(ENGINE, ENGINE.turn, mv);
      syncFromEngine(ENGINE.events);
      botClock();                      // the call is free; it plays right after
      return;
    }
    LastCard.apply(ENGINE, ENGINE.turn, mv);
    syncFromEngine(ENGINE.events);
    botClock();
  }, 850 + Math.random() * 700);
}

$('practicebtn').onclick = function () { hide('menu'); show('botsetup'); };
$('botback').onclick = function () { hide('botsetup'); show('menu'); };
$('botminus').onclick = function () { botCount = Math.max(1, botCount - 1); $('botshow').textContent = botCount + (botCount === 1 ? ' Bot' : ' Bots'); };
$('botplus').onclick = function () { botCount = Math.min(4, botCount + 1); $('botshow').textContent = botCount + (botCount === 1 ? ' Bot' : ' Bots'); };
$('botgo').onclick = function () { startBot(botCount); };

/* ================= online =================
   The host runs the engine. Clients send intents; the host validates through
   the same legalMoves/apply every local finger goes through, then pushes:
     'state'  — the public view, to everyone
     'hand'   — { seat, cards }; each phone keeps only its own seat's
     'nack'   — { seat }; the intent bounced, re-render from truth */
var TX = null, HOSTING = false, CODE = null, ROSTER = null;

function netEvents() { return ['intent', 'state', 'hand', 'start', 'nack']; }

function sendMove(move) {
  if (MODE === 'bot') {
    if (LastCard.apply(ENGINE, MYSEAT, move)) {
      syncFromEngine(ENGINE.events);
      botClock();
    }
    return;
  }
  if (MODE === 'host') {
    if (LastCard.apply(ENGINE, MYSEAT, move)) hostPush(ENGINE.events);
    return;
  }
  if (MODE === 'client') TX.send('intent', { key: TX.key, seat: MYSEAT, move: move });
}

function hostPush(evts) {
  V = publicView(ENGINE, ROSTER_NAMES);
  MYHAND = ENGINE.players[MYSEAT].hand.slice();
  TX.send('state', { v: V, evts: evts || [] });
  ENGINE.players.forEach(function (p, s) {
    if (s !== MYSEAT) TX.send('hand', { seat: s, cards: p.hand });
  });
  sayEvents(evts, ROSTER_NAMES);
  renderAll();
}

function onWire(ev, m) {
  if (MODE === 'host' || HOSTING) {
    if (ev === 'intent') {
      if (!ENGINE || MODE !== 'host') return;            // no intents before the deal
      var seat = seatOfKey(m.key);
      if (seat < 0 || seat !== m.seat) return;             // a seat speaks only for itself
      if (LastCard.apply(ENGINE, seat, m.move)) hostPush(ENGINE.events);
      else TX.send('nack', { seat: seat });
    }
    return;
  }
  if (ev === 'start') {
    ROSTER = m.roster;
    ROSTER_NAMES = m.roster.map(function (r) { return r.name; });
    MYSEAT = m.roster.findIndex(function (r) { return r.key === TX.key; });
    if (MYSEAT < 0) { banner('The table filled without you'); return; }
    MODE = 'client';
    hide('room'); show('game');
    closeOverlay();
  } else if (ev === 'state') {
    if (MODE !== 'client') return;
    V = m.v;
    sayEvents(m.evts, ROSTER_NAMES);
    renderAll();
  } else if (ev === 'hand') {
    if (MODE !== 'client' || m.seat !== MYSEAT) return;
    MYHAND = m.cards;
    renderAll();
  } else if (ev === 'nack') {
    if (MODE === 'client' && m.seat === MYSEAT) { banner('Not that one'); renderAll(); }
  }
}

function seatOfKey(key) {
  if (!ROSTER) return -1;
  return ROSTER.findIndex(function (r) { return r.key === key; });
}

function onPresence() {
  if ($('room').classList.contains('hidden')) return;
  renderRoom();
}

function renderRoom() {
  var seats = TableKit.seatsFrom(TX.presence(), 5);
  var list = $('seatlist');
  list.innerHTML = '';
  seats.forEach(function (s) {
    var d = document.createElement('div');
    d.className = 'seatrow';
    d.innerHTML = '<span class="dot"></span><span>' + esc(s.name || 'Guest') + '</span>' +
      (s.host ? '<span class="hosttag">HOST</span>' : '');
    list.appendChild(d);
  });
  if (HOSTING) {
    $('startbtn').style.display = '';
    $('startbtn').classList.toggle('busy', seats.length < 2);
    $('roomhint').textContent = seats.length < 2 ? 'Share the code — the game starts at two.' : '';
  } else {
    $('startbtn').style.display = 'none';
    $('roomhint').textContent = 'Waiting for the host to deal.';
  }
}

var joining = false;
async function joinRoom(code, asHost) {
  if (joining) return;
  joining = true;
  $('neterr').textContent = '';
  try {
    TX = await TableKit.join({
      prefix: 'lastcard', code: code, events: netEvents(),
      onMessage: onWire, onPresence: onPresence,
      meta: { key: TableKit.pkey(), host: asHost, name: myName() },
    });
    HOSTING = asHost;
    CODE = code;
    hide('menu'); show('room');
    $('codeshow').textContent = code;
    renderRoom();
  } catch (e) {
    $('neterr').textContent = String(e.message || e);
  }
  $('hostbtn').classList.remove('busy');
  $('joinbtn').classList.remove('busy');
  joining = false;
}

function hostDeal() {
  var seats = TableKit.seatsFrom(TX.presence(), 5);
  if (seats.length < 2) return;
  ROSTER = seats.map(function (s) { return { key: s.key, name: s.name || 'Guest' }; });
  ROSTER_NAMES = ROSTER.map(function (r) { return r.name; });
  MYSEAT = ROSTER.findIndex(function (r) { return r.key === TX.key; });
  MODE = 'host';
  ENGINE = LastCard.newGame(ROSTER.length);
  TX.send('start', { roster: ROSTER });
  hide('room'); show('game');
  closeOverlay();
  hostPush([]);
}

$('hostbtn').onclick = function () { this.classList.add('busy'); joinRoom(TableKit.roomCode(), true); };
$('joinbtn').onclick = function () {
  var code = $('codein').value.trim().toUpperCase();
  if (code.length !== 4) { $('neterr').textContent = 'Codes are four letters.'; return; }
  this.classList.add('busy');
  joinRoom(code, false);
};
$('startbtn').onclick = function () { hostDeal(); };
$('leaveroom').onclick = function () { location.reload(); };

/* ---- boot ---- */
(function () {
  var saved = '';
  try { saved = localStorage.getItem('it_name') || ''; } catch (e) {}
  $('namein').value = saved;
  var qp = new URLSearchParams(location.search);
  var code = (qp.get('join') || '').toUpperCase();
  if (code.length === 4) { $('codein').value = code; joinRoom(code, false); }
})();
</script>
</body>
</html>
